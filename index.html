n\n…"},"A0439":{"t":"극장판 5등분의 신부","type":"애니","img":"https://image.tmdb.org/t/p/w500/shtqSAsB8snS3iww99iksu2QaoZ.jpg","status":"개봉","summary":"「낙제 직전」「공부가 싫은」미소녀 다섯 쌍둥이를  아르바이트 가정 교사로서 「졸업」까지 이끈 후타로.  배우에 전념하기 위해 휴학하기로 한 이치카의 공부를 봐주면서  「학교 축제」 준비에 힘쓰는 후타로와,  후회 없는 「학교 축제」를 만들기 위해 평소 이상으로 노력하는 요츠바.  어지러운 날들이 지나고 정신을 차려보니 「학교 축제」 전날.  후타로는 포기하지 않고 힘쓰는 이츠키의 모습에 힘입…"},"A0440":{"t":"천공의 성 라퓨타","type":"애니","img":"https://image.tmdb.org/t/p/w500/lObRXt53izxDbdlkGpNAHkDACmy.jpg","status":"개봉","summary":"광산촌 슬랙 계곡의 기계 견습공인 고아 소년 파즈는 어느날 빛이 나는 목걸이를 한 채 하늘에서 떨어지던 소녀시타를 구해준다. 소녀는 대대로 전해져 오던 목걸이(비행석)로 인해 정부군과 해적 도라 일당들에게 쫓기고 있던 신세. 시타가 이들로부터 무사히 도망갈 수 있게 도와주던 중 파즈는 비행석과 하늘에 떠 있는 성 라퓨타가 실제로 존재한다는 사실을 알게 된다. 라퓨타의 존재를 믿고 있던 파즈는…"},"A0441":{"t":"디지몬 크로스워즈","type":"애니","img":"https://image.tmdb.org/t/p/w500/v2y0eYhTepOG5gD2qfl4T5CycnH.jpg","status":"방영 종료","summary":""},"A0442":{"t":"베르세르크 황금시대편 메모리얼 에디션","type":"애니","img":"https://image.tmdb.org/t/p/w500/sqA82qe75CxFDpRbgiLShQXkJ4l.jpg","status":"방영 종료","summary":"검은 전사 가츠가 펼치는 인간의 한계를 넘어선 극한의 액션과 운명의 사투를 벌이는 이야기"},"A0443":{"t":"은혼","type":"애니","img":"https://image.tmdb.org/t/p/w500/7mYg0J52HqWobmoml2kghf4hd0T.jpg","status":"방영 종료","summary":"2006년 4월 4일부터 TV애니메이션 시리즈가 시작했다.\n\n우주인이 침략해서 돌연 가치관이 변해버린 마을, 에도.\n\n우주인, 고층 빌딩, 바이크에 전철 등등 뭐든지 있는 세계에서 변하지않는 “혼”을 가진 마지막 사무라이가 있다.\n\n그의 이름은 긴토키. 대충대충하는 성격에 무대포. 거기에다가 극도로 단 것을 좋아하는 이상한 성격을 가지고 있다.\n\n아버지를 잃고 폐도령의 영향으로 쓰러져가는 검…"},"A0444":{"t":"명탐정 코난: 제로의 일상","type":"애니","img":"https://image.tmdb.org/t/p/w500/shjOlyxLSNIBL7jsPFuaDxArTH1.jpg","status":"방영 종료","summary":"탐정, 공안 경찰 그리고 검은 조직의 멤버. 세 가지 정체를 오가며 사는 한 남자의 이야기를 그린 《명탐정 코난》 시리즈의 스핀오프."},"A0445":{"t":"살육의 천사","type":"애니","img":"https://image.tmdb.org/t/p/w500/1sjK2VGIQSHD9QoU86aBIxLAdaq.jpg","status":"방영 종료","summary":"어느 건물의 최하층에서 눈을 뜬 소녀, 레이첼.  레이첼은 기억을 잃은 탓에 왜 그곳에 있는지 모르는 상태였다.  밖으로 빠져나가기 위해 건물 안을 헤매던 레이첼의 앞에 나타난 것은, 사신처럼 낫을 들고 얼굴에 붕대를 두른 살인귀 잭이었다.  '부탁이야, 날 죽여 줘.' 그 맹세를 계기로 두 사람의 기묘한 인연은 맺어졌다.  과연 이곳은 어디이고, 둘은 왜 건물에 갇혔으며, 그들을 기다리고 …"},"A0446":{"t":"손끝과 연연","type":"애니","img":"https://image.tmdb.org/t/p/w500/3qLwk1sf2rOzAnT48CcVLJnyNmX.jpg","status":"방영 종료","summary":"이 손으로 '좋아해요'라고 전하고 싶어...\n\n여대생인 유키는 어느 날 곤란하던 차에 같은 대학교 선배인 이츠오미의 도움을 받게 되었다.\n\n청각 장애가 있는 탓에 귀가 들리지 않는 유키한테 동요하지 않고, 그녀를 자연스럽게 대하는 이츠오미.\n\n자신에게 새로운 세계를 느끼게 해준 이츠오미를 유키는 점점 의식하기 시작했는데...?!\n\n청각 장애가 있는 여자애 유키와 세계를 여행하는 대학교 선배 …"},"A0447":{"t":"극장판 바이올렛 에버가든","type":"애니","img":"https://image.tmdb.org/t/p/w500/mBUy2lCwk6fpByQ7GBFKRApKEHb.jpg","status":"개봉","summary":"친애하는 길베르트 소령님, 오늘도 또 당신을 떠올리고 말았습니다.  무엇을 보든 무엇을 하든 당신이 떠오릅니다.  시간이 지나도 당신과 보냈던 기억은 선명하게 되살아납니다. 당신은 날 곁에 두었고 아무것도 모르는 제게 살아가는 방법을 가르쳐 주셨고 처음으로 사랑이라는 감정을 알려주셨습니다.  그래서 이렇게 또 편지를 쓰게 됩니다.  -언젠가 이 편지가 당신에게 닿기를 바라며-"},"A0448":{"t":"날씨의 아이","type":"애니","img":"https://image.tmdb.org/t/p/w500/t6r33klGbbZZjbEkHqsfZ9yahRy.jpg","status":"개봉","summary":"고등학교 1학년 여름. 외딴 섬에서 가출해, 도쿄에 온 호타카. 그러나 생활은 곧 곤란해졌고, 고독한 나날의 끝에 겨우 찾아낸 일은, 수상한 오컬트 잡지의 작가 일이었다. 그의 앞날을 시사하는 듯, 연일 쏟아지는 비. 그런 가운데, 잡담으로 북적거리는 도시 한 편에서, 호타카는 한 소녀를 만난다. 어떤 사연을 안고, 남동생과 둘이서 밝고 씩씩하게 사는 소녀, 하루나. 그녀에게는, 이상한 능력…"},"A0449":{"t":"조제, 호랑이 그리고 물고기들","type":"애니","img":"https://image.tmdb.org/t/p/w500/v60S8rPRCQRYSeCtmLiuRpQqIfC.jpg","status":"개봉","summary":"지체장애인인 조제는 그림 그리기를 좋아하며, 미처 경험해 보지 못한 세상에 대한 호기심과 두려움을 동시에 가지고 살아간다. 해양생물학을 전공하며 유학을 준비 중인 츠네오는 바다를 사랑하는 대학생으로 조제와 비슷한 또래이다. 조제를 온실 속 화초처럼 키워온 할머니는 츠네오를 아르바이트생으로 고용하여 조제를 일정 시간 돌보게 한다. 조제는 할머니의 눈을 피해, 혹은 할머니의 묵인하에, 츠네오와 …"},"A0450":{"t":"새벽의 연화","type":"애니","img":"https://image.tmdb.org/t/p/w500/uF11jqAUCXJzG5aLihc8My4IIgc.jpg","status":"방영 중","summary":"고화 왕국의 연화는 상냥한 아버지와 소꿉친구인 호위무사 하쿠에게 지켜지며 소중히 자란 외동공주로, 사촌지간인 수원을 짝사랑하고 있었다. 그런 그녀의 16세 생일, 수원으로 부터 머리장식을 선물받은 연화는 아버지에게 수원과 결혼시켜달라는 부탁을 하기 위해 아버지의 침소로 찾아가는데, 그곳에서 그녀가 보게 된 것은 죽어있는 아버지와 피 묻은 칼은 든 수원이었다."},"A0451":{"t":"나의 히어로 아카데미아 더 무비: 유어 넥스트","type":"애니","img":"https://image.tmdb.org/t/p/w500/rSJnz7FqxEIe5uzAZbWSzc8bk5f.jpg","status":"개봉","summary":"“다음은 너다” 초자연능력 ‘개성’을 가진 인간이 당연해진 세계에서 옛 ‘평화의 상징’ NO.1 히어로 ‘올마이트’가 악의 제왕 ‘올 포 원’과의 사투 직후 한 말. ‘올마이트’의 의지는 데쿠와 유에이 고등학교 히어로과로 이어져 왔다. 유에이 2년 차 봄, 히어로 VS 빌런의 전면전이 발발하고 황폐해진 사회에 수수께끼의 남자가 나타난다. 스스로를 ‘올마이트를 대신하는 새로운 상징’이라고 말하…"},"A0452":{"t":"극장판 진격의 거인 완결편 더 라스트 어택","type":"애니","img":"https://image.tmdb.org/t/p/w500/nNjXyrutNl6fAAEFUvOsnC7tjgC.jpg","status":"개봉","summary":"거인의 위협으로부터 몸을 지키기 위해 거대한 벽을 쌓고 그 안에서 숨을 죽이고 살고 있는 인류. 백 년의 평화는 초대형 거인의 습격으로 파괴됐고, 어머니를 잃은 소년 엘런 예거는 모든 거인을 없앨 것을 맹세하고 거인과 싸우는 조사병단의 일원이 되었다. 글자 그대로 목숨을 건 싸움 속에서 엘런 예거는 자신도 거인이 되는 능력을 손에 넣었고 인류의 승리에 공헌하면서 조금씩 세계의 진실에 가까워지…"},"A0453":{"t":"극장판 블루 록 -에피소드 나기-","type":"애니","img":"https://image.tmdb.org/t/p/w500/yN773yRQjwG6KPjUGqBsmiLfKom.jpg","status":"개봉","summary":"“귀찮아”가 말버릇인 고등학교 2학년, ‘나기 세이시로’는 하루하루를 무기력하게 살고 있었다. 축구로 전 세계 제패를 꿈꾸는 동급생 ‘미카게 레오’가 그의 재능을 찾아내기 전까지는. ‘레오’의 권유로 축구를 시작하게 된 ‘나기’는 압도적인 축구 센스를 발휘하고 어느 날, 그들에게 ‘블루 록’ 프로젝트 초대장이 도착한다. 그곳에서 ‘이사기 요이치’, ‘바치라 메구루’, ‘이토시 린’ 등, 전국…"},"A0454":{"t":"나루토 질풍전 극장판 7기: 더 라스트","type":"애니","img":"https://image.tmdb.org/t/p/w500/zAxdiiyYbwmCUqzRJAsF3My9bsI.jpg","status":"개봉","summary":"나루토와 사스케가 인연의 대결을 결판 지었던 2년 후  아직 전하지 못한 마음, 그 숨겨온 마음의 행방은…?  전쟁이 끝나고 평화로운 나뭇잎 마을. 나루토는 이제 전쟁 영웅이 되어 마을의 인기를 한 몸에 받는 인기남이 되어 있다. 그런 나루토를 바라보는 히나타는 자신의 마음을 전하기 위해 남몰래 짠 목도리를 나루토에게 전하고 싶지만 아직 전하지 못하고 있다. 그때 갑자기 의문의 남자가 나타나…"},"A0455":{"t":"극장판 오버로드 성왕국편","type":"애니","img":"https://image.tmdb.org/t/p/w500/15r8PgmVneYGxigbvu2bNEHIuuv.jpg","status":"개봉","summary":"성왕녀 '칼카'가 통치하는 로블 성왕국은 길고 거대한 성벽을 쌓고 그 안에서 평화로운 시대를 구가해 왔다. 하지만, 갑자기 나타난 마황 '얄다바오트'와 '아인' 연합군의 침공으로 평화는 너무나도 쉽게 붕괴되고 말았다. 성기사 단장 '레메디오스', 신관 단장 '케랄트'를 시작으로 성왕국은 전력을 모아 맞섰지만 얄다바오트와의 압도적인 힘의 차이에 손쓸 도리 없이 국가는 붕괴 위기에 직면하게 됐다…"},"A0456":{"t":"불우직 【감정사】는 사실은 최강이었다","type":"애니","img":"https://image.tmdb.org/t/p/w500/2FPV5FGO7TeZG0Dbj1eChhh51lm.jpg","status":"방영 종료","summary":"물건을 【감정】하는 것만 할 수 있는 최약직이자 불우직인 【감정사】를 직업으로 가지고 있는 아인. 동료들로부터 『고미 히로이』라고 불리고, 심한 취급을 받으며, 자신감이 떨어지는, 비굴한 나날을 보내고 있었다. 어느날 아인은 【세계수】의 정령 유리와 그것을 지키는 현자인 우슬라와 만나면서, 운명이 많이 바꿔간다. 유리에게 【정령의 의안】을 받고, 이것을 잘 활용하기 위해 우슬라의 특별훈련을 …"},"A0457":{"t":"노블레스","type":"애니","img":"https://image.tmdb.org/t/p/w500/czcrMXV7oCwg0gRfTAHcphmSnVl.jpg","status":"방영 종료","summary":"820년간의 긴 수면기에서 깨어난 뱀파이어 귀족 '카디스 에트라마 디 라이제르'와  세계 정복을 꾀하는 의문의 조직 '유니온'과의 전투를 그린 다크 액션 판타지."},"A0458":{"t":"후르츠 바스켓","type":"애니","img":"https://image.tmdb.org/t/p/w500/58W8bhu029XVe8ezBuqg9qVFetP.jpg","status":"방영 종료","summary":"동물로 변하는 송씨 가문과 수정이의 소소한 이야기"},"A0459":{"t":"약속의 네버랜드","type":"애니","img":"https://image.tmdb.org/t/p/w500/ze3PDkMIfxndqvKPrW3Qk2ZhaPb.jpg","status":"방영 종료","summary":"엄마라고 불리는 그 사람은 부모가 아니다. 함께 사는 그 아이들도 형제가 아니다.  그레이스 필드 하우스는 부모가 없는 아이들이 사는 고아원이었다. 핏줄이 이어지진 않았지만 엄마와 38명의 형제자매들이 행복한 나날을 보내는, 안락한 집. 하지만 그 행복한 일상은 아이들에게 갑작스러운 끝을 고했다."},"A0460":{"t":"최근 고용한 메이드가 수상하다","type":"애니","img":"https://image.tmdb.org/t/p/w500/vNV3PACWDGhJWyaY0Uq6QkrfYZG.jpg","status":"방영 종료","summary":"최근에 메이드를 고용했다. 일에는 항상 열심이고 성실하지만, 매우... 수상하다. 시골에 있는 자그마한 저택의 주인인 유리는, 갑자기 나타난 메이드 릴리스의 정체를 파헤치고 있었다. 과거도 목적도 불명이지만 이상할 정도로 잘 일하고, 요리도 빨래도 무서울 정도로 완벽하다. 그리고, 그 빨려들 것 같은 보랏빛 눈동자. 분명 릴리스가 무언가를 꾸미고 있는 게 틀림없다고, 너무나도 수상하다고 생각…"},"A0461":{"t":"일하는 세포 BLACK","type":"애니","img":"https://image.tmdb.org/t/p/w500/yX3ToT8aYxFjVzQ8QLG4RLOq3QI.jpg","status":"방영 종료","summary":"탈핵을 마치고 업무에 투입되는 신참 적혈구. 의욕 충만한 모범 사원이지만, 하필 이 몸의 주인은 걸어 다니는 종합병원? 블랙 기업급의 쉴 틈 없는 노동이 시작된다. 누가 나 좀 살려줘!"},"A0462":{"t":"방과 후 소년 하나코 군","type":"애니","img":"https://image.tmdb.org/t/p/w500/z2HTuCdpRObzpR1oLRqodKrsEXh.jpg","status":"방영 종료","summary":"실록! 밝혀지는 7대 불가사의의 방과 후!카모메 학원의 7대 불가사의 \"화장실의 하나코 군\"과 오컬트 소녀 야시로 네네.사건이 일어나지 않는 오프인 날에는 뭘 하고 있을까?그런 그들의 한가로운~ 방과 후를 모든 캐릭터를 동원해서 그린 「지박소년 하나코 군」 스핀오프"},"A0463":{"t":"마법사의 신부 별을 기다리는 이","type":"애니","img":"https://image.tmdb.org/t/p/w500/awx3nmqDPHiidQT6H4DNAf30kga.jpg","status":"방영 종료","summary":"엘리어스의 부탁으로 치세가 볼 마법 교재들을 준비하던 안젤리카는 일본 그림책 한 권을 사이에 끼워 넣는다. 그 책 한 권으로, 평범한 사람들에겐 보이지 않는 것이 보여 따돌림 받던 치세의 어릴 적 이야기가 펼쳐진다."},"A0464":{"t":"遊☆戯☆王","type":"애니","img":"https://image.tmdb.org/t/p/w500/dJ3aC5E8M7wSvzNOK72AvPxmS4C.jpg","status":"방영 종료","summary":" 로부터 생활을 지원받는 대신 학교의 전속 베이비시터로 일하게 되는데..."},"A0502":{"t":"구슬대전 배틀비드맨","type":"애니","img":"https://image.tmdb.org/t/p/w500/tfZvZ71KdBMdfa9SaDlxWMQqedn.jpg","status":"방영 종료","summary":"이누키 에이지의 만화를 원작 기반으로 하며, 손오공과 타카라토미가 공동으로 만든 한일 합작 애니.\n\n현실 세계(지구)를 배경으로 한 다른 비드맨 작품들과는 달리, 이 시리즈는 다른 차원을 배경으로 한다. 작중 세계관은 서부를 배경으로 하며, 비드맨은 총과 같은 개념으로 쓰인다. 여기 사람들이 먹는 음식이 좀 특이한데 고기 대신 생선을 주식으로 하는 모양. 그래서 꽁치 샌드위치라든가 고등어 스…"},"A0503":{"t":"귀환자의 마법은 특별해야 합니다","type":"애니","img":"https://image.tmdb.org/t/p/w500/3MBX9HmulOmnim7ToCb3QGbHnsk.jpg","status":"방영 중","summary":"\"다시 돌아온 이상, 사랑하는 사람들을 두 번 잃을 순 없어!\"\n\n인류가 맞이한 최악의 재앙, 그림자 미궁. 데지르 아르망은 미궁 속에서 마지막까지 살아남은 최후의 생존자 6명 중 한 명이다. 그들은 그림자 미궁의 마지막 단계에 도전하지만 결국 실패하고, 세계는 멸망을 맞이하고 만다.\n\n모든 게 끝이라 생각했던 순간, 데지르의 눈앞에 펼쳐진 것은 다름 아닌 13년 전의 세상?!\n\n제국 최고의…"},"A0504":{"t":"무적코털 보보보","type":"애니","img":"https://image.tmdb.org/t/p/w500/1RjQBoEaVYOBanratoUFedYA0Zh.jpg","status":"방영 종료","summary":"300X년, 지구는 알대가르퉁 제국이 지배한다. 제국의 황제 반들 반드리나 4세는 전국민의 빠박화를 선언하고 털 소탕을 시작했다. 털 소탕이란 머리카락을 생으로 잡아뽑아 대머리를 만드는 것으로, 털 소탕 전속부대 모발(毛拔)대의 폭력에 사람들은 고통을 받고 있다. 이러한 제국의 압제에 맞서 두발의 자유를 외치며 분연히 일어난 사람들이 있었으니..."},"A0505":{"t":"기절 용사와 암살 공주","type":"애니","img":"https://image.tmdb.org/t/p/w500/xAnBlAfqqbEXCE11ktP8UA0P6Nv.jpg","status":"방영 종료","summary":"용사 토토는 실력은 있지만 극도로 낯을 가리는 성격 탓에 파티를 꾸리지 못하고,\n\n시작의 마을에서 계속 제자리걸음 중이었다.\n\n그러던 중, 세 명의 미녀\n\n시엘, 아네모네, 고어가 갑자기\n\n파티를 짜자며 제안해 온다!\n\n염원하던 여행에 의욕이 넘치는 토토.  하지만 그녀들은 그 용사를 '죽일 각오'로\n\n가득했다고?!\n\n여성에 대한 내성이 전혀 없어서\n\n조금만 두근거려도 기절해버리는\n\n극도로 …"},"A0506":{"t":"휴일의 악당","type":"애니","img":"https://image.tmdb.org/t/p/w500/thKhPuHjsd6DEC4eiDnlIU0Tt22.jpg","status":"방영 종료","summary":"지구 침략을 계획하는 악의 조직에서 \"장군\"이라고 불리는 그는 지구 방위 조직 「레인저」와 날마다 사투를 벌인다.\n\n하지만, 오늘은 휴일. 매일의 격무에 지친 심신을 치유하기 위해, 팬더를 보기 위해 동물원에, 아이스크림을 사기 위해 편의점에. 완전 오프 모드로 충실한 휴일을 보내고, 그런 \"악당\"의 일상을 그리는, 치유되는 힐링 코미디"},"A0507":{"t":"포켓몬스터 THE ORIGIN","type":"애니","img":"https://image.tmdb.org/t/p/w500/i1VBvb96toO2stZVE1QbD9IX3Ay.jpg","status":"방영 종료","summary":""},"A0508":{"t":"기동전사 건담 썬더볼트","type":"애니","img":"https://image.tmdb.org/t/p/w500/tpIjhiHFxSTrblBwl5U8YAu2jTL.jpg","status":"방영 종료","summary":"1년전쟁 후기~ 말기, 콜로니의 잔해 등이 떠다니며 계속해서 방전을 일으키는 '썬더볼트 주역' 이곳은 아 바오아 쿠로의 보급로였고, 그렇기에 지키려는 지온과 뚫으려는 연방의 싸움이 계속되고 있었다."},"A0509":{"t":"미기와 다리","type":"애니","img":"https://image.tmdb.org/t/p/w500/BMvJ9kJjW5SEWpQc90KVT7yDrP.jpg","status":"방영 종료","summary":"1990년 고베 시 키타 구.\n\n미국 교외를 모델로 조성된 뉴타운 오리건 마을.\n\n유복한 주민들이 사는 이 동네에 ‘한’ 소년이 나타난다.\n\n자식이 없는 소노야마 가에 양자로 들어간 소년의 이름은 히토리(秘鳥).\n\n아름답고 총명한 소년 히토리에게 소노야마 부부는 곧바로 매료되지만, 히토리에겐 거대한 비밀과 가공할 만한 목적이 있었다?."},"A0510":{"t":"이별의 아침에 약속의 꽃을 장식하자","type":"애니","img":"https://image.tmdb.org/t/p/w500/x4lFC7knq631uFzGsOiu4xZ9ZYQ.jpg","status":"개봉","summary":"10대 중반에 외모의 성장이 멈추고 수백년을 사는 장수 민족 이올프는 인간이 사는 마을에서 멀리 떨어져 조용히 살고 있었다.  하지만 그들의 온화한 일상은 장수의 피를 요구하는 메자테 군에 의해 파괴된다. 모든 것을 잃고 외톨이가 된 이올프의 소녀 마키아는 숲을 방황하던 중 부모를 잃은 아기를 운명적으로 만나 그를 키워 나가기로 결심한다."},"A0511":{"t":"나의 히어로 아카데미아 더 무비: 두 명의 히어로","type":"애니","img":"https://image.tmdb.org/t/p/w500/3coOIbsmeYwhLshMXHUrwtdhzDa.jpg","status":"개봉","summary":"모두가 ‘개성’이라는 초능력을 가진 세계, 여기에 ‘무개성’의 소년이 있었다! 하지만 소년은 ‘개성’ 대신 히어로가 될 조건을 가지고 있었는데… NO.1 히어로 ‘올마이트’의 뒤를 잇는 새로운 영웅 탄생! 개성이 없어도, 넌 세상을 빛낼 히어로가 될 수 있다! 5월 모두 다같이 입학~!"},"A0512":{"t":"강철의 연금술사: 샴발라를 정복하는 자","type":"애니","img":"https://image.tmdb.org/t/p/w500/pBTMwJQp5h5si0fUsPqRLbCEm4W.jpg","status":"개봉","summary":"1920년 독일로 떨어진 에드워드는 연금술을 사용할 수 없게 되어, 로켓등의 기계문맹에 관심을 가지된다. 그런데 이곳(현실세계)에서 전설에 등장하는 샴발라라고 불리는 에드의 세계로 가기 위한 음모가 꾸며진다. 여러가지 우여곡절끝에 결국 에드는 아보지 호엔 함임을 연성하고 알은 살아남은 호문크루스인 롸스와 그라토니를 연성하여 문을 열게되는데..."},"A0513":{"t":"초속 5센티미터","type":"애니","img":"https://image.tmdb.org/t/p/w500/7qOhFQhvuCZ1hEJHJTWkFo75Vsm.jpg","status":"개봉","summary":"도쿄의 초등학교에 다니는 타카키와 아카리는 부모의 전근으로 막 이사왔다. 가정환경도, 적극성이 없다는 것도, 작은 체구에 병약한 부분도 같은 닮은 꼴이이었던 두 사람. 하지만 초등학교 졸업과 동시에 아카리의 이사가 결정된다. 뜻대로 되지 않는 사정을 이해하면서도 어린 아이이기에 쌓아올 수 있던 시간은 어린 아이이기에 무너지게 된다. 시간이 흘러 벚꽃의 계절을 눈앞에 둔 중학교 1학년 3학기,…"},"A0514":{"t":"극장판 블리치 : 페이드 투 블랙","type":"애니","img":"https://image.tmdb.org/t/p/w500/gZNO8lIF1IuSpaNm3OmuaG2hDi6.jpg","status":"개봉","summary":"‘마유리’의 실험이 습격당한 후 모두의 기억 속에서 ‘루키아’가 사라지게 되는 이야기를 다룬 애니메이션"},"A0515":{"t":"극장판 주술회전: 회옥·옥절","type":"애니","img":"https://image.tmdb.org/t/p/w500/3aKvAaZ4V9QKiqBFUVwyfXdATNU.jpg","status":"개봉","summary":"최강의 두 사람, 다시는 돌아갈 수 없는 푸른 봄. 2006년 봄, 주술고등전문학교 시절의 고죠 사토루와 게토 스구루. 불사의 술식을 가진 주술계 핵심, 텐겐으로부터 의뢰가 도착한다. 의뢰는 두 가지, 텐겐과 적합자인 성장체 아마나이 리코라는 소녀의 ‘호위’와 ‘말소’. 두 사람은 주술계 존속을 위한 호위 임무에 나서지만 후시구로라 불리는 ‘주술사 킬러’가 암살을 노리고 나타난다. 최강의 주…"},"A0516":{"t":"시간을 달리는 소녀","type":"애니","img":"https://image.tmdb.org/t/p/w500/zhvpSzYKUMdAfId2VSU1qLFeW5x.jpg","status":"개봉","summary":"평범한 고등학생인 콘노 마코토는 어떤 사고를 계기로 시간을 이동하는 능력을 얻게 된다. 이모 요시야마 카즈코에게 상담을 해 본 결과, 그것은 타임 리프라 불리는 능력으로 또래의 여자아이들에게 자주 있는 일이라고 아무렇지도 않게 말하는 것. 원하는 시간으로 돌아가 원하는 것은 모두 할 수 있게 된 마코토는 세상이 자기 것이 된 듯한 기분에 빠진다. 그러나 머지 않아 친구인 마미야 치아키와 츠다…"},"A0517":{"t":"에반게리온: 파","type":"애니","img":"https://image.tmdb.org/t/p/w500/dbKtCH5Z8Ocq7vA1oQOfMVGwbBJ.jpg","status":"개봉","summary":"세컨드 임팩트의 충격으로 인류의 절반이 사라진 이 곳에 정체불명의 사도들이 다시 공격해 오기 시작한다. 특무기관 네르프 소속의 14세 파일럿들은 각자의 에반게리온을 타고 사도의 위협에 맞서 싸운다. 자신이 왜 타야 하는지도 모른 체 에반게리온을 타는 신지와 자신의 임무를 묵묵히 수행하는 레이. 그리고 에반게리온을 통해 자신의 능력을 표출하고 싶은 아스카까지! 같은 운명을 타고난 그들은 조금씩…"},"A0518":{"t":"용과 주근깨 공주","type":"애니","img":"https://image.tmdb.org/t/p/w500/lN9cobJaHHLy3jojZf4YKEMTZWy.jpg","status":"개봉","summary":"고치현의 자연이 풍요로운 마을에 사는 17세의 여고생 스즈는, 어릴 적에 어머니를 사고로 여의고 아버지와 단둘이 살고 있다. 엄마와 함께 노래하는 것을 무엇보다도 좋아했던 스즈는 그 죽음을 계기로 노래할 수 없게 되었고, 어느새 아버지와의 관계에도 틈이 생겨 현실 세계에 마음을 닫게 된다. 곡을 만드는 일만이 삶의 양식이 되던 어느 날 공교롭게도 전세계에서 50억명 이상이 모여드는 초거대 인…"},"A0519":{"t":"나루토 극장판 1: 대활극! 눈의 공주 인법첩","type":"애니","img":"https://image.tmdb.org/t/p/w500/kACy5S4EwO4lcV4dAVy4yx6o6aL.jpg","status":"개봉","summary":"풋내기 닌자인 우즈마키 나루토는 하다케 카카시 선생의 밑에서 수많은 임무를 수행한다. 명문가의 아들 사스케와 반의 유일한 홍일점 사쿠라와 함께 새로운 임무를 맡은 나루토는 유키노쿠니로 향하여 영화배우 후지카제 유키에를 경호하는 임무를 맡게 된다. 그러나 유키에는 촬영장을 맘에 들어하지 않고, 나루토 일행은 그런 유키에를 달래어 다시 유키노쿠니로 데려간다. 하지만 그곳에는 유키에를 공격하기 위…"},"A0520":{"t":"괴물의 아이","type":"애니","img":"https://image.tmdb.org/t/p/w500/knZlJ5kC1nUdRCwhE1l5IYtVHTF.jpg","status":"개봉","summary":"괴물의 손에 길러진 인간 소년 X 인간을 제자로 삼은 괴물  너무도 달랐던 그들이 만들어가는 하나의 세상!  갈 곳을 잃고 시부야의 뒷골목을 배회하던 9살 소년 ‘렌’은 인간 세계로 나온 괴물 ‘쿠마테츠’와 마주치게 되고, 그를 쫓다 우연히 괴물의 세계에 발을 들이게 된다. ‘쿠마테츠’에게 ‘큐타’라는 새로운 이름을 얻게 된 소년은 그의 스승을 자처한 ‘쿠마테츠’와 함께 기묘한 동거를 시작하…"},"A0522":{"t":"담배 고양이","type":"애니","img":"https://image.tmdb.org/t/p/w500/1OEYjA3bpPlXNPwV51WJhGWx8Mk.jpg","status":"방영 중","summary":"골초인 고양이 수인 여자 야니. 담배 때문에 일자리를 구하기도, 월세를 내기도 버거운 지경인데. 주변의 걱정은 점점 커지고, 야니도 이제 본인의 미래를 진지하게 생각해 봐야 한다."},"A0523":{"t":"네가 죽을 때까지 사랑하고 싶어","type":"애니","img":"https://image.tmdb.org/t/p/w500/73DZoZWswGICwZ8G287avfBUeYj.jpg","status":"방영 중","summary":"오갈 곳 없는 아이를 전쟁용 병기로 키우는 학교에 다니는 소녀들.\n\n사람을 죽이기 위한 수업, 누가 죽든 슬퍼하는 것조차 쉽지 않은 일상.\n\n자신의 처지를 받아들이지 못하고 있는 14살의 시나는\n\n어느 밤, 피투성이의 어린 소녀 미미를 만난다.\n\n평온을 바라는 시나와 웃으며 전장으로 향하는 불사의 미미.\n\n늘 죽음과 함께 하는 세계에서 두 소녀가 찾아낸, 천진난만한 소원을 그린 이야기."},"A0524":{"t":"여기는 내게 맡기고 먼저 가라고 말한 지 10년이 지났더니 전설이 되어 있었다.","type":"애니","img":"https://image.tmdb.org/t/p/w500/svcJyWDhj1STkOTSfxgd2hOvZ0z.jpg","status":"방영 중","summary":"용사 파티의 S랭크 마도사 랙은 용사 에릭, 전사 골란과 함께 차원의 틈새에서 마신왕을 쓰러뜨리기위해 격렬한 전투를 벌이고 있었다. 동료들의 전멸을 피하기 위해 랙은 혼자서 적과 계속 싸우기로 결심하고 외쳤다. '여기는 내게 맡기고 먼저 가!' 상상을 초월하는 고독한 싸움의 연속, 결국 마신왕조차 쓰러뜨린 랙. 하지만 그가 원래 세계로 돌아왔을 때는 '10년'이라는 세월이 지나 있었고 랙은 …"},"A0525":{"t":"고양이와 용","type":"애니","img":"https://image.tmdb.org/t/p/w500/yxk6gTbLKnENVzej1ER4mH6zfkB.jpg","status":"방영 중","summary":"깊고 깊은 숲속.\n\n한 마리의 불을 뿜는 용이 마법을 다루는 고양이들과 살고 있습니다.\n\n태어나기 전에 친부모를 잃은 그 용은\n\n우연히 만난 어미 고양이에 의해 키워졌습니다.\n\n고양이들은, 하늘을 날고 불을 뿜는 '조금 별난 고양이'로 생각하며\n\n용을 가족으로 맞이했습니다.\n\n호기심이 왕성한 숲의 고양이들은 삶의 방식도 십묘십색.\n\n용은 어미 고양이에게 은혜를 갚기 위해,\n\n숲의 고양이들 가…"},"A0526":{"t":"버려진 성녀의 이세계 밥 여행: 숨겨진 스킬로 캠핑카를 소환했습니다","type":"애니","img":"https://image.tmdb.org/t/p/w500/d0hx0f1vz6S5UvZChaxyUf51HFK.jpg","status":"방영 중","summary":""},"A0528":{"t":"세계 최강의 후위 ~미궁국의 신인 탐색자~","type":"애니","img":"https://image.tmdb.org/t/p/w500/oYVBc1fUzPNrBSrfOLSCSd9BYjL.jpg","status":"방영 중","summary":"속칭 회사의 노예 사원이었던 '아토베 아리히토'는 사고에 휘말려 \"미궁국\"이라고 불리는 이세계로 전생하고,\n\n미궁 탐색자로서 정체불명의 직업 \"후위\"를 얻게 된다. 처음에는 별생각 없었지만, 이후 공격 및 방어뿐 아니라  회복까지 할 수 있는 만능 지원 직업임을 알게 된다.\n\n그렇게 신인 탐색자가 된 주인공 아리히토는 미스터리한 아인 용병 소녀,  이전 상사였던 미녀 등의 개성 넘치는 동료들…"},"A0529":{"t":"하이큐!! 콘셉트의 싸움","type":"애니","img":"https://image.tmdb.org/t/p/w500/xihNhrJnGa04zn9pUr3ZxA8B4ZU.jpg","status":"개봉","summary":"“콘크리트 땅에서 맺은 열매를 보여주겠어!”  봄철 고교 배구 대회의 현 대표를 가리는 결승전에 오른 ‘카라스노’ 고교는\n 현 내 최강의 학교로 일컬어지는 ‘시라토리자와’ 고교와 맞붙게 된다.  현 내에서는 물론 전국구 플레이어인 ‘우시지마’를 필두로  강력한 공격을 보이는 ‘시라토리자와’와\n 끈질긴 공격과 수비로 득점의 순간을 놓치지 않는 ‘카라스노’의 경기는\n 5세트 끝까지 뜨거운 접전을…"},"A0530":{"t":"하이큐!! 승자와 패자","type":"애니","img":"https://image.tmdb.org/t/p/w500/qwIyTYDYZaPeN7I8Cpt4dqkoNlj.jpg","status":"개봉","summary":"‘카라스노’ 고교의 스파이커 ‘히나타’와  천재 세터 ‘카게야마’는 입부 후 첫 전국 대회인  인터하이 예선에 참가한다.  한 번이라도 패배하면 탈락해 버리는 상황에서  ‘카라스노’는 상대팀들을 쓰러뜨리며 점차 성장한다.  그러나 현내 강호 ‘아오바 죠사이’ 고교와 3회전에서 맞붙게 되고,  최강 세터 ‘오이카와’와 대결하며 ‘카라스노’는 벼랑 끝에 내몰리게 되는데…  흐름을 바꾸기 위한 마…"},"A0531":{"t":"하이큐!! 끝과 시작","type":"애니","img":"https://image.tmdb.org/t/p/w500/rWq0l9foXejIjijNCNcx7wXruYh.jpg","status":"개봉","summary":"‘한 때’ 고교 배구의 명문이었던 카라스노 고교에 입학하게 된 의욕 충만한 스파이커 ‘히나타’. 우연히 중학 시절 시합에서 만났던 천재 세터 ‘카게야마’를 같은 학교 배구부에서 만나고, 라이벌 구도를 형성하지만 점차 호흡을 맞추게 된다.  카라스노 고교 배구부는 예전의 명성을 찾기 위해 점차 팀을 꾸리게 되고 영원한 라이벌 네코마 고교와의 본격적인 첫 공식 연습 경기를 가지게 되는데…  최강…"},"A0532":{"t":"하이큐!! 재능과 센스","type":"애니","img":"https://image.tmdb.org/t/p/w500/jbIPlkdoMr9KlewowJ6wGO60XAQ.jpg","status":"개봉","summary":"'카라스노’ 고교 배구팀은 ‘인터하이’ 예선 탈락 후,  도쿄에서의 합숙 훈련 끝에 봄철 고교 배구 대회에 참가한다.. 결승 진출을 노릴만큼 눈에 띄게 성장한 ‘카라스노’는 드디어 준결승에서 강호 ‘아오바 죠사이’ 고교와의 결전을 치르게 된다.  다시 한 번 맞붙게 된 ‘카게야마’와 ‘오이카와’, ‘카라스노’와 ‘아오바 죠사이’ 고교 사이의 경기에  모든 이들의 이목이 집중되는데… 모든 것을…"},"A0533":{"t":"진격의 거인 크로니클","type":"애니","img":"https://image.tmdb.org/t/p/w500/pBgC7eZ4Zk88It6nuUntEsiCAje.jpg","status":"개봉","summary":"거인의 침공으로 인해 인류를 지키는 커다란 벽이 무너진다. 그날부터 모든 거인을 없애리라 맹세하고 그들과 치열한 전투를 벌이기 시작한 엘런 예거의 이야기가 펼쳐진다."},"A0534":{"t":"진격! 거인중학교","type":"애니","img":"https://image.tmdb.org/t/p/w500/tdxMOaADopycFKZFWsM5inkUM3a.jpg","status":"방영 종료","summary":"스핀오브 작품. 칼 대신 연필을 쥔다! 거인은 사람대신 도시락을 먹는다!  거인에게 습격당해서 벽 안에 갇혀 새장 같은 생활을 하던 인류....는 꿈이었다?  아침부터 지각 위기에 처한 엘런을 미카사가 깨워 둘은 함께 학교를 향해 달린다.\n\n가는 길에 사샤, 장, 코니 등을 만나고 이들은 거대 벽처럼 생긴 학교에 도착한다. 이곳은 거인과 함께 다니는 학교였다!\n\n거인에게 도시락을 뺏긴 슬픈 …"},"A0535":{"t":"진격의 거인: 자유의 날개","type":"애니","img":"https://image.tmdb.org/t/p/w500/ZV2aFuwOb7zfvNwXTcQrQrfvEU.jpg","status":"개봉","summary":"거인이 모든 것을 지배하는 세계, 사람들의 평온한 일상은 무너졌다. “한 마리도 남김없이 쓸어버리겠어.” 그 각오와는 정반대로 갑자기 거인으로 변해버린 주인공 엘런. 자신이 누구인지 갈등하던 와중에 엘런은 그 능력을 써서 인류를 구하게 된다. 어떤 이는 그를 ‘구세주’라 칭송하고, 어떤 이는 그를 ‘악마’라 두려워한다. 다음으로 그들 앞에 나타난 것은 다른 거인들과는 명백히 다르게 지성을 가…"},"A0536":{"t":"극장판 진격의 거인 2기: 각성의 포효","type":"애니","img":"https://image.tmdb.org/t/p/w500/1qzSByhW3dRQVqjnI7g1zyj6S3S.jpg","status":"개봉","summary":"거대 장벽 속에서 발견된 거인의 존재 이후, 마침내 하나씩 밝혀지는 충격적인 진실! 그리고 모두를 혼란에 빠뜨린 짐승 거인의 출현까지! 월교가 감시하는 ‘크리스타’에게 숨겨진 비밀은 무엇인가? 한편, 거인의 손에 납치된 ‘엘런’을 구하기 위해 인간과 거인이 뒤섞인 초대형 전투가 펼쳐지는데! ‘엘런’의 손에 들어온 ‘좌표’는 희망의 열쇠일까? 인류의 빼앗긴 자유를 되찾기 위해 심장을 바쳐라!"},"A0537":{"t":"진격의 거인: 홍련의 화살","type":"애니","img":"https://image.tmdb.org/t/p/w500/oMuxM0n4EZ4SILoTUsdruJoUAfe.jpg","status":"개봉","summary":"무차별적으로 잡아먹는 식인 거인들이 나타나면서 멸망 위기에 놓인 인간 세계. 인간들은 그들을 피해 50미터의 거대한 벽을 쌓은 채 그 속에서 살아간다. 100년여 동안 평화 아닌 평화를 지켜 가며 숨죽여 살아가지만, 벽 밖의 세계가 궁금한 어린 ‘엘런 예거’는 새장에 갇힌 새처럼 사는 현실이 싫어 가족과 어릴 때부터 자신을 지켜 주었던 ‘미카사 아커만’의 반대 속에서도 그곳을 벗어나겠다는 고…"},"A0538":{"t":"원피스 히로인즈","type":"애니","img":"https://image.tmdb.org/t/p/w500/hbRXvcckbdKMhCea1JalPnSQQge.jpg","status":"개봉","summary":""},"A0539":{"t":"원피스 필름 골드","type":"애니","img":"https://image.tmdb.org/t/p/w500/reeQrajJNioLPJvpFnZZu5jft1n.jpg","status":"개봉","summary":"세계 정부도 손대지 못하는 절대 성역이자, 밤낮을 가리지 않고 화려한 쇼가 펼쳐지는 세계 최대의 엔터테인먼트 도시 ‘그랑 테소로’. 이곳에 도착한 루피와 밀짚모자 해적단은 ‘그랑 테소로’의 주인이자 ‘골드골드 열매’의 능력자인 ‘길드 테소로’가 준비한 승자와 패자간의 비정한 룰이 존재하는 게임에 참여하게 되는데…. 동료를 위해, 자유를 위해 루피와 밀짚모자 해적단의 운명을 건 베팅이 시작된다…"},"A0540":{"t":"원피스 극장판 제트","type":"애니","img":"https://image.tmdb.org/t/p/w500/ocKRm5umq5DeQ37utOLNPeYUx7d.jpg","status":"개봉","summary":"해적 말살!신세계 대 붕괴?!  모두의 운명을 건 마지막 전투가 펼쳐진다!  모든 해적 말살이 정의라고 믿는 전 해군대장 ‘제트’. 그는 부하인 아인, 빈즈와 함께 ‘NEO 해군’을 이끌며 막강한 고대 무기에 필적한다고 알려진, 거대한 에너지를 담고있는 광물 ‘다이나스톤’을 강탈한다.  그리고 신세계의 바다 전체를 불태워 없애려는 계획을 실행에 옮기는 제트!  한편 신세계의 바다를 순항 중이…"},"A0541":{"t":"원피스 - 꿈의 축구왕","type":"애니","img":"https://image.tmdb.org/t/p/w500/dZMYhcTT3H8h93Epm2gCqPDBDmd.jpg","status":"개봉","summary":""},"A0542":{"t":"원피스: 어드벤처 오브 네브란디아","type":"애니","img":"https://image.tmdb.org/t/p/w500/xdu9XJSHT835OoChOiwEgi9Uzjf.jpg","status":"개봉","summary":"루피에 대한 패배를 갚기위해 폭시는 신세계로 넘어와 루피에 대한 함정을 파고 기다린다. 하지만 배신당하고 조로와 상디는 끌려가버리는 데..."},"A0543":{"t":"원피스 극장판 7기: 기계태엽성의 메카거병","type":"애니","img":"https://image.tmdb.org/t/p/w500/cPlG9F0qqK6EYUExtR23HHiiSHk.jpg","status":"개봉","summary":"신비한 전설 속의 보물을 찾아 신나는 모험을 떠나자!거센 폭풍우을 헤치고 구사일생으로 살아난 루피 일행. 침몰 직전에 있는 해적선에서 커다란 보물 상자를 발견하고 두근두근 기대에 부풀어 상자를 열어보지만 안에서 나온 것은 보물이 아닌 번쩍거리는 황금니의 할머니 로바 뿐. 해적들에게 도망쳐 보물 상자에 숨어있던 로바는 또다시 흉악한 해적들에게 잡힌 것이라 생각하고, 신비한 전설 속의 보물인 바…"},"A0544":{"t":"원피스 극장판: 스트롱 월드","type":"애니","img":"https://image.tmdb.org/t/p/w500/aHuZP6xE1fOCCGVH9N7frgdXXek.jpg","status":"개봉","summary":"세상에서 가장 센 놈들의 무.한.대.결!!  세상에서 가장 센 놈들의 무한 대결!  진짜 모험은 이제부터 시작이다!  최고의 해적왕을 꿈꾸며 머나먼 바다를 항해하던 9명의 밀짚모자 해적단 앞에 전설의 해적왕으로 악명 높은 ‘금사자 시키’가 나타나 나미를 납치하고 그들을 이상한 섬으로 보내버린다.  끝이 없는 무성한 정글, 괴상한 동물들의 약육강식 전투가 끊이지 않는 수상한 하늘 섬에서 그들은…"},"A0545":{"t":"원피스 하트 오브 골드","type":"애니","img":"https://image.tmdb.org/t/p/w500/72TeAMgRWM0VLvBrrQTwjQ3RfOC.jpg","status":"개봉","summary":"해군은 천룡인마저 탐내는 전설적인 보물 퓨어골드가 있는 알케미 섬의 위치를 알고 있는 소녀 오르가를 데리고 성지 마리조아로 향한다. 하지만 도중에 매드 트레저라는 트레저 헌터에게 습격 당하고 오르가는 혼란을 틈타 탈출한다. 탈출한 뒤 바다를 헤메던 도중 루피 일행을 만나게 되는데  원피스의 TV 스페셜이다. 원피스 필름 골드로 이어지는 이야기이며 시점은 드레스로자 이후다."},"A0546":{"t":"원피스 - 스트롱월드 에피소드 0","type":"애니","img":"https://image.tmdb.org/t/p/w500/5m0FhjQdWhBS3nkRFKIfkwFt1Zc.jpg","status":"개봉","summary":"원피스 - 스트롱월드 에피소드 0"},"A0547":{"t":"극장판 원피스 스탬피드","type":"애니","img":"https://image.tmdb.org/t/p/w500/nAThMRphPiMfKIp6OSF8vIGhLLT.jpg","status":"개봉","summary":"루피를 비롯한 밀짚모자 일당과 해적들은 축제꾼 ‘부에나 페스타’의 초대장을 받고 20년 만에 부활한 세계 최고의 축제 해적 박람회에 모여든다. 해적왕 로저가 남긴 전설의 보물을 찾기 위한 해적들의 보물 쟁탈전이 시작되고, ‘괴물의 후계자’라 불린 사나이 ‘더글라스 불릿’이 난입해 밀짚모자 일당 앞을 가로막는다. 해적들과 해군, 칠무해, 혁명군까지 가세해 ‘불릿’과 유례없는 대전투가 벌어지고,…"},"A0548":{"t":"원피스 - 쓰러트려라 간자크!","type":"애니","img":"https://image.tmdb.org/t/p/w500/98ZSnYpfltah6YuJTkiwHV0O739.jpg","status":"개봉","summary":""},"A0549":{"t":"원피스: 로맨스 던","type":"애니","img":"https://image.tmdb.org/t/p/w500/gP9MhzsAWoMPPZf60iQwBjnWSiL.jpg","status":"개봉","summary":"원피스의 작가 오다 에이치로의 단편 만화. 원피스의 원형이다.  원피스 RED 맨 뒷부분과 오다 에이이치로 단편집 《WANTED!》에 수록되어 있다. 두 버전은 설정이 조금 다르다.  원피스의 프롤로그 편이라고 해도 믿을정도로 현재의 원피스와 매우 비슷하며 나미와 몽키 D. 가프의 모태가 되는 캐릭터들이 나온다."},"A0550":{"t":"원피스 극장판 2기: 네지마키섬의 모험","type":"애니","img":"https://image.tmdb.org/t/p/w500/hjW0xJp6W9NR1uJ1cf5oFhZ9IQs.jpg","status":"개봉","summary":"애지중지하던 고잉메리호를 도둑맞은 루피 일행은 세계 제일의 도둑이라고 소개하는 보로드와 아키스 형제를 만난다. 그들에게 고잉메리호가 세계에서 가장 비싼 시계, 다이아몬드 클락이 있는 태엽섬에 있다는 사실을 알게 된다. 루피 일행은 고잉메리호와 함께 납치당한 나미를 구하기 위해 트럼프 군단이 있는 테엽섬을 향해 떠난다. 나미는 적의 대장인 베어킹에 의해 강제로 결혼을 당할 상황에 빠지게 되고,…"},"A0551":{"t":"원피스 3D : 밀짚모자 체이스","type":"애니","img":"https://image.tmdb.org/t/p/w500/2DJONtQA7a4UeIkZ6NFSqieHE3d.jpg","status":"개봉","summary":"밀짚모자해적단 필살기 총집합!  `이제 3D로 느껴라!`  루피의 새로운 어드벤쳐, 세기의 모험을 체감하라!  스크린을 압도하는 해적단 필살기! 논스톱 3D 액션 퍼레이드!  루피에게 일대 사건이 발생한다!  어린 시절, 동경의 대상인 해적 ‘빨간 머리 샹크스’와 약속을 하고 맡았던 생명보다 더 소중한 보물인, 밀짚모자가 홀연히 사라져버린 것이다! ‘나는 해적왕이 되겠다!’는 꿈을 가진 온갖…"},"A0552":{"t":"원피스 극장판 4기: 데드엔드의 모험","type":"애니","img":"https://image.tmdb.org/t/p/w500/krmgOLOGsHOYtNljMUi3OUwzdzr.jpg","status":"개봉","summary":"항구 한니발에서 대해적들이 경쟁하는 레이스 '데드엔드'가 열린다. 루피 일행도 참가 신청서를 내지만 아무래도 유력한 우승 후보자는 전직 해군인 가스바데 장군이다. 생명의 은인인 비에라의 목숨을 구하기 위해 아나구마는 필사의 노력을 하지만 배의 주인인 가스바데 장군은 해적들을 죽이고 그 현상금으로 약을 구하라는 이야기를 해줄 뿐 절대 도와주지 않는다. 마침내 규칙도 없는 대망의 레이스가 시작되…"},"A0553":{"t":"원피스: 에피소드 오브 스카이피아","type":"애니","img":"https://image.tmdb.org/t/p/w500/yV1ktIC8YdWVDVuvVaG3yolrTcs.jpg","status":"개봉","summary":"알라바스타를 떠나자마자 하늘섬에 기록을 빼앗긴 밀짚모자 일당은 그 방법을 알기 위해 자야에 들른다.  그곳에서 황금향을 봤다고 주장했다가 사형당한 모험가 몽블랑 노랜드의 자손 몽블랑 크리켓의 도움으로 하늘섬 스카이피아에 도착한다.  하지만 그곳에서 불법 입국자로 낙인 찍히는 바람에 스카이피아의 지배자 에넬에게 쫓기게 되고, 에넬로부터 고향을 되찾으려는 샨디아 전사들이 이에 편승하면서 싸움이 …"},"A0554":{"t":"원피스 극장판 3기: 진기한 동물섬의 쵸파 왕국","type":"애니","img":"https://image.tmdb.org/t/p/w500/9kX70YTbL6f59lthf68gCHJ0Nl7.jpg","status":"개봉","summary":"바다에서 보물지도를 줍게 된 밀짚모자 해적단은 지도에 표시된 왕관섬으로 향한다. 하지만 섬에 도착하자 마자 발생한 화산의 분화로 인해 쵸파가 섬으로 날려가 버리고 만다. 쵸파를 찾으러 들어간 섬은 진귀한 동물들의 낙원이었고, 전설에 따르면 이 섬의 보물은 섬에 사는 동물들의 뿔에 숨겨져 있다는 것을 알게 된다. 보물을 빼앗기 위해 해적인 바토라 백작이 뿔을 가진 동물들을 잇따라 습격하고 있었…"},"A0555":{"t":"원피스 극장판 8기: 사막의 공주와 해적들","type":"애니","img":"https://image.tmdb.org/t/p/w500/yifvEx9VuF4oJ7Qy3PIq4l13zUL.jpg","status":"개봉","summary":"사막의 나라라고 불리는 아라바스타는 악의 비밀결사에 의해 붕괴 위기에 처했다. 이에 아라바스타 왕국의 공주 비비는 조직의 정체를 밝히기 위해 2년 전 나라를 빠져 나왔었고, 마침내 모든 악의 근원이 국가의 영웅인 크로커다일에게 있다는 사실을 알게되었다. 그리고 비비는 루피와 그 일행을 친구로 얻어 국왕과 백성들을 구하기 위해 아라바스타로 향하는데.."},"A0556":{"t":"원피스 극장판 1기: 황금의 대해적 우난","type":"애니","img":"https://image.tmdb.org/t/p/w500/pWkf3HgH5wFTRggkmvKzXfgOnJc.jpg","status":"개봉","summary":"멀지않은 옛날 한 대해적이 있었는데, 엄청난 황금을 모았고 그는 소리없이 사라진다. 한 소년이 우난은 아직 살아있을 꺼라며 우난의 부하가 되겠다고 뛰쳐나간다. 꼬마의 할아버지는 사실 우난의 어릴 적 친구. 꼬마는 바다에서 난파당하지만 루피 일행에게 건져지고 루피 일행과 꼬마 할아버지는 우난이 있은 곳으로 향한다. 물론 악당도 나오는데 우난의 황금을 노리고 올라오는 자들인데 루피일행이 날려버린…"},"A0557":{"t":"원피스 - 지켜라! 마지막 대무대","type":"애니","img":"https://image.tmdb.org/t/p/w500/U2TK7SbUMTOz3bNXgkW9CjqkXi.jpg","status":"개봉","summary":"원피스 - 지켜라! 마지막 대무대"},"A0558":{"t":"원피스 극장판 6기: 오마츠리 남작과 비밀의 섬","type":"애니","img":"https://image.tmdb.org/t/p/w500/o1kfDW0amGpMEAhrfyqd36eBtiW.jpg","status":"개봉","summary":"바다에 떠 있는 유리병 속에 꽃과 보석상자 등이 잔뜩 그려진 오마츠리섬의 지도와 ‘당신은 그랜드 라인을 항해하는 1억 명 중에서 뽑힌 행운의 해적입니다!’라는 편지가 함께 들어 있는 것을 발견한 밀짚모자 해적단. 당연히 오마츠리섬으로 방향을 틀고 그곳으로 향하는데 루피 일행이 도착한 오마츠리섬은 너무나도 평범한 섬이다. 루피 일행의 앞에 갑자기 등에 꽃을 피우고 있는 오마츠리 남작이 나타난다…"},"A0559":{"t":"원피스 - 글로리어스 아일랜드","type":"애니","img":"https://image.tmdb.org/t/p/w500/mMjKCCPi7hcUcGYq8ENYjhrfBEF.jpg","status":"개봉","summary":""},"A0560":{"t":"원피스 극장판 5기: 저주받은 성검","type":"애니","img":"https://image.tmdb.org/t/p/w500/oL5ERUnQ0Lc3WBAtWPcSxmmksQE.jpg","status":"개봉","summary":"칠성검과 보물이 숨겨진 아스카섬의 항구에 도착한 루피 일행. 하지만 식료품을 구해서 고잉메리호로 돌아온 루피 일행을 기다리는 것은 사라져버린 조로이다. 루피 일행은 조로를 찾기 위해 호수로 향하고, 호숫가에서 마야라는 소녀에게 조로에 대해 물어보지만 도망쳐 버리고 만다. 일행은 모두 흩어지게 되고, 상디와 동료들은 해군과 함께 있는 조로와 대치하게 되고, 루피 일행은 우연히 들어간 해군 도장…"},"A0561":{"t":"원피스 - 노려라! 해적 야구왕","type":"애니","img":"https://image.tmdb.org/t/p/w500/7NJz6sLxEgk5a6u6WCBWs9qVo6i.jpg","status":"개봉","summary":""},"A0562":{"t":"원피스: 3D2Y 에이스의 죽음을 넘어! 루피, 동료와의 맹세","type":"애니","img":"https://image.tmdb.org/t/p/w500/8nYx5d5svGibvuPQfV4GVy8IhmS.jpg","status":"개봉","summary":"정상결전 후 수련 중이던 당시의 루피가 반디 월드와의 싸움을 담은 에피소드"},"A0563":{"t":"원피스 극장판 9기: 에피소드 오브 쵸파","type":"애니","img":"https://image.tmdb.org/t/p/w500/A3ObglUld6m8BI4kj7MBzjGUL72.jpg","status":"개봉","summary":"그랜드 라인을 돌파한 써니호에 탄 루피 일행은 갑작스레 원인불명의 고열로 쓰러진 나미를 위해 의사를 찾아간다. 다행스럽게 그들이 도착한 곳은 의료대국으로 알려진 \"겨울섬 드럼왕국\"이었다. 먼저 호위대장 달튼에게 의사를 소개해 달라고 부탁하지만, 이 나라에는 의사가 눈에 갇힌 산꼭대기 성에 사는 마녀 닥터 구레하 한 명뿐이라고 한다. 루피와 상디는 나미를 데리고 닥터 구레하를 만나러 눈이 쌓인…"},"A0564":{"t":"원피스 - 루피 낙하! 비경 바다의 중심 대모험","type":"애니","img":"https://image.tmdb.org/t/p/w500/zXIaogkeoKrVqpXLmWFLG8dIzf5.jpg","status":"개봉","summary":"루피 낙하! - 비경 바다의 중심 대모험"},"A0565":{"t":"원피스 - 연말특멸기획! 밀짚모자 루피 대장 수사기록!","type":"애니","img":"https://image.tmdb.org/t/p/w500/5L7NUNTwHYA9TkLK3glf00gMFv.jpg","status":"개봉","summary":"원피스 - 연말특멸기획! 밀짚모자 루피 대장 수사기록!"},"A0566":{"t":"원피스 필름 골드: 에피소드 0","type":"애니","img":"https://image.tmdb.org/t/p/w500/wPBFqO9zeSjX3bK9NMvhm9xL1Le.jpg","status":"개봉","summary":"《원피스 필름 골드 에피소드 0》은 극장판 《원피스 필름 골드》의 프리퀄(앞이야기)에 해당하는 특별편입니다. 밀짚모자 일당은 그랑 테소로로 향하던 중 바비큐 파티를 열고 다양한 스포츠를 즐깁니다. 나미, 로빈, 쵸파, 프랑키는 배구를 하고, 루피, 우솝, 프랑키는 스모 시합을 벌입니다."},"A0567":{"t":"극장판 : 원피스 3D 격주! 트랩 코스터","type":"애니","img":"https://image.tmdb.org/t/p/w500/jnCH5BL1Oamkj1JqZhSv9wcpJuV.jpg","status":"개봉","summary":""},"A0568":{"t":"토리코 x 원피스 x 드래곤볼 Z 최강 콜라보 스페셜","type":"애니","img":"https://image.tmdb.org/t/p/w500/elBJEP95IRwiaxfvV16dcQzh2A6.jpg","status":"개봉","summary":"1부. IGO는 룰이 없는 가혹한 레이스 천하제일 먹기 대회를 개최하지만.. 그 직후, 참가자들은 거대한 개미지옥의 먹이가 되고 만다 하지만 그 난관을 벗어난 토리코, 루피,손오공 일행이 레이스를 이어가며 여러 가지 장해물을 넘어 골인 지점으로 향하는데.. 맛있는 만찬을 즐기고 있는토리코와 루피, 손오공 일행 앞에 심해의 대식자 아카미가 나타난다 뭐든지 먹어치운다는 소문과 달리 아카미의 외형…"},"A0569":{"t":"원피스 - 대양에 펼쳐라! 크나큰 아빠의 꿈!","type":"애니","img":"https://image.tmdb.org/t/p/w500/wa7I5E9PegOOMVWE0pPLtSAt42S.jpg","status":"개봉","summary":"원피스 - 대양에 펼쳐라! 크나큰 아빠의 꿈!"},"A0570":{"t":"원피스: 에피소드 오브 루피 ~핸드 아일랜드의 모험~","type":"애니","img":"https://image.tmdb.org/t/p/w500/MYFF7Pfj69PLpiH97OKDESOxmU.jpg","status":"개봉","summary":"신세계로 떠난 밀짚모자 일당은 대포를 피하려다 어떤 섬에 거꾸로 처박힌다.  그곳은 바로 장인들의 섬 ‘핸드 아일랜드’.  루피는 그 섬에서 밀랍장인 디에고를 만나고 밀랍으로 만들어진 샹크스, 에이스와 재회한다. 루피는 추억을 떠올리게 한 보답으로 해군에 있는 디에고의 아들에게 인형을 전해주기로 한다. 하지만 이곳 해군 기지 책임자인 ‘비릿치 준장’은 욕심 많고 악독한 인물로 마을 사람들을 …"},"A0571":{"t":"원피스: 에피소드 오브 메리 ~또 하나의 동료의 이야기~","type":"애니","img":"https://image.tmdb.org/t/p/w500/zQDxCTJZCwKjlPKCA70E2LtgsnO.jpg","status":"개봉","summary":"프랑키를 도와 써니호의 도크 시설을 점검하던 우솝, 쵸파, 브룩은  미니 메리 2호를 타고 나가게 된다.  즐거운 시승 도중 문득 미니 메리의 이름 유래를 궁금해하는 브룩. 우솝과 쵸파는 브룩이 고잉•메리호를 알지 못한다는 사실을 그제서야 깨닫고  메리호의 이야기를 들려주기 시작한다.  밀짚모자 일당의 시작을 함께 했던 소중한 또 하나의 동료,  메리의 이야기가 추억 속에서 되살아나는데…."},"A0572":{"t":"원피스: 에피소드 오브 나미 ~항해사의 눈물과 동료의 인연~","type":"애니","img":"https://image.tmdb.org/t/p/w500/cQ8bGrWsAJphjS2SUFHAZpZXbsG.jpg","status":"개봉","summary":"갑자기 고잉•메리호를 훔쳐서 달아난 나미.  루피, 조로, 우솝, 상디는 나미를 찾아서 아론 파크로 떠난다. 아론 파크는 아론이 지배하는 섬으로 마을 사람들은 8년째 고통 받고 있다. 나미는 마을을 구하기 위해 '1억 베리'를 모아 마을을 사겠다는 계약을 맺고 아론의 측량사로 일하고 있었다. 이제 조금만 더 모으면 마을도 자신도 자유로워질 수 있을 거란 희망으로 버티고 있는 나미. 하지만 그…"},"A0573":{"t":"원피스: 에피소드 오브 사보 ~3형제의 유대 기적의 재회와 계승된 의지~","type":"애니","img":"https://image.tmdb.org/t/p/w500/927XxgsFOyYLual9dpNVYJorhQj.jpg","status":"개봉","summary":"사보가 루피, 에이스와 함께 어느 묘지에 간다. 사보는 그곳에서 자신의 어린시절을 떠올린다."},"A0574":{"t":"보루토 - 나루토 더 무비","type":"애니","img":"https://image.tmdb.org/t/p/w500/pvYHOrNCdlJR9uiVvxyqAfIeA3a.jpg","status":"개봉","summary":"거대한 전설을 넘어설 새로운 시대가 시작된다!  지켜야 하는 소중한 가치를 위해 닌자는 강해진다!  그리고 지금, 역대 최강! 사상 최대! 대격돌이 펼쳐진다!  오랜 세월에 걸친 전쟁이 끝나고 고도성장을 이룬 새 시대, 평화의 시대를 이끌고 있는 것은 전설이 된 7대 호카게 우즈마키 나루토다. 분신술로도 감당하지 못할 만큼 바쁜 나날을 보내는 중에 나뭇잎 마을에서는 다섯 마을 통합으로 개최되…"},"A0575":{"t":"나루토 질풍전 극장판 3기: 불의 의지를 잇는 자","type":"애니","img":"https://image.tmdb.org/t/p/w500/lydplyUnKCc73T54bV87sAtVXhD.jpg","status":"개봉","summary":"제4차 닌자대전을 저지하라!  제 4차 닌자대전이 일어날 위기에 놓인 닌자세계의 모습 그리고 우정과 의리로 똘똘 뭉쳐 위기를 극복해 나가는 나루토의 고군분투와 동료들의 훈훈한 이야기를 그리고 있다."},"A0576":{"t":"나루토 극장판 2: 대격돌! 환상의 지하유적","type":"애니","img":"https://image.tmdb.org/t/p/w500/oxH91AspDauMq4lgyceu3UQKjxS.jpg","status":"개봉","summary":"나루토, 시카마루, 사쿠라는 길 잃은 애완동물을 한 마을에 전해주는 임무를 수행하고 있다. 임무를 수행하던 세 사람은 의문의 소년 기사 테무진이 이끄는 부대의 습격을 받고 격렬한 전투를 벌이게 된다. 의문의 소년 기사 테무진의 정체는 과연 무엇일까?"},"A0577":{"t":"나루토 질풍전 극장판 4기: 더 로스트 타워","type":"애니","img":"https://image.tmdb.org/t/p/w500/kMKhM7RUhA4j3yH9oTi1FN8cZJE.jpg","status":"개봉","summary":"그 야망을 저지하라!  호카게 츠나데로부터 임무를 받은 나루토는 사쿠라, 야마토와 함께 도망친 닌자 무카데를 쫓아 모래에 가려져있는 폐가 ‘로우란’에 도착한다.  무카데가 노리는 것은 로우란의 지하에 잠들어 있는 ‘용맥’. 결판을 내기 위해 폐허 속 깊은 곳으로 향하는 나루토.  하지만, 무카데에 의해 봉인이 풀린 ‘용맥’의 힘에 삼켜져 버리고 마는데…"},"A0578":{"t":"나루토 질풍전 극장판 6기: 로드 투 닌자","type":"애니","img":"https://image.tmdb.org/t/p/w500/lFK2QMv9BWDxVDpWt47SUzJAvur.jpg","status":"개봉","summary":"십 수년 전. 수수께끼의 닌자 가면 남자에 의해 거대한 마수 구미가 풀려나고 만다. 구미에 쫓겨 괴멸 위기에 처한 나뭇잎 마을. 마을을 지킬 수 있는 방법은 단 한가지. 리더인 4대 호카게 미나토와 아내 쿠시나가 함께 막 태어난 아들 나루토의 몸에 구미를 봉인하는 것 뿐. 자신의 생명을 희생한 두 사람에 의해 가까스로 마을은 구해지고, 그 미래는 나루토에게 맡겨지게 되는데.  시간은 흘러, …"},"A0579":{"t":"나루토 미풍전 : 나루토와 마신과 3개의 소원이라니깐!!완결작","type":"애니","img":"https://image.tmdb.org/t/p/w500/mrtdE8Uqx39Pq9d24e9Geq1mzuy.jpg","status":"개봉","summary":"나루토는 일행과 함께 제닌 그릴 파티에 갔다가 지니의 병을 발견한다. 모두가 지니의 소원 들어주기 능력을 알게 되면서 최후의 추격전이 시작된다."},"A0580":{"t":"나루토 SD 록리의 청춘 풀파워 인법","type":"애니","img":"https://image.tmdb.org/t/p/w500/4kJRnSOAMYlaA07UzgNkko3wMMH.jpg","status":"방영 종료","summary":"꿈틀꿈틀 송충이 눈썹 록리의 닌자 되기 프로젝트! 여기는 나뭇잎 마을. \"나루토\"의 주인공으로 유명한 닌자 나루토도(!) 살고있는 닌자의 마을에서 벌어지는 이야기를 그린 애니메이션"},"A0581":{"t":"보루토: 나루토 넥스트 제너레이션즈","type":"애니","img":"https://image.tmdb.org/t/p/w500/n4OLeeHqP4tpdvDxiloV65N6M5h.jpg","status":"방영 중","summary":"평화와 함께 근대화가 진행된 나뭇잎 2Y6tHxWKpEtmioV.jpg","status":"개봉","summary":"귀살대에 입대한 탄지로는 매일 소녀가 실종된다고 하는 마을로 향한다.  혈귀의 냄새는 나지만 그 모습을 찾을 수 없는 가운데, 새로운 소녀에게 혈귀의 손이 다가온다.  그다음으로 탄지로가 방문한 곳은 아사쿠사.  화려한 도시와 즐비한 상점에 당황하는 탄지로는 그곳에서 혈귀의 냄새를 찾아낸다.  그 냄새는 인간을 혈귀로 바꿀 수 있는 유일한 존재이자  탄지로의 숙적이기도 한 키부츠지 무잔의 것…"},"A0590":{"t":"귀멸의 칼날: 장구저택 편","type":"애니","img":"https://image.tmdb.org/t/p/w500/xxw1XMMFN47zITUh9qQmh8oYkkf.jpg","status":"개봉","summary":"꺽쇠 까마귀가 일러준 다음 임무지는 남남동. 임무로 향하는 도중 탄지로는 최종 선별에서 만난 동기 검사인 아가츠마 젠이츠를 우연히 만난다. 젠이츠의 소극적인 태도에 애를 태우면서, 탄지로는 산의 오지에 있는 저택에 다다른다. 그곳에는 장구로 저택을 변화시킬 수 있는 능력을 가진 혈귀의 모습이 보이고, 심지어 멧돼지 얼굴의 기괴한 남자가 나타나는데…"},"A0591":{"t":"귀멸의 칼날: 환락의 거리 결전편","type":"애니","img":"https://image.tmdb.org/t/p/w500/jYxonluq2lL91Rd5o2Pgzb6gwi1.jpg","status":"개봉","summary":"혈귀화가 진행되어,  사람을 습격하려고 하는 네즈코를 탄지로는 자장가로 힘겹게 재운다.  한편, 우즈이는 다키의 목을 베는 데 성공하지만,  다키의 안에서 또다시 새로운 혈귀인 규타로가 나타나고 만다.  다키의 오빠이자, 또 하나의 상현 6인 규타로.  다키와 규타로, 두 혈귀와 우즈이의 싸움이 시작된다."},"A0592":{"t":"귀멸의 칼날: 환락의 거리 잠입편","type":"애니","img":"https://image.tmdb.org/t/p/w500/eiGiMeh70khHzZXzeZBnhsEteJF.jpg","status":"개봉","summary":"임무를 위해 요시와라 유곽으로 향하는 우즈이 텐겐과 세 사람.  이곳에는 이미 우즈이의 세 아내가 잠입한 상태였다.  수상한 가게는 세 곳. 탄지로와 젠이츠, 이노스케는 각각의 가게에 한 명씩 취업해 들어가고.  연락이 끊겨 버린 우즈이의 세 아내를 찾아 가게를 탐색하기 시작한다."},"A0593":{"t":"못 미더운 악녀입니다만 ~추궁접서 교체전~","type":"애니","img":"https://image.tmdb.org/t/p/w500/sdWNqtcPJpudPItPG3zBdyGyzTH.jpg","status":"방영 중","summary":""},"A0594":{"t":"너를 너무너무너무너무 좋아하는 100명의 그녀","type":"애니","img":"https://image.tmdb.org/t/p/w500/8dnsvARbJbrWSKsZzz8wBEpKLwU.jpg","status":"방영 중","summary":"중학교에서 실연 100회를 달성한 아이죠 렌타로는 고등학교에서야말로 여자친구를!이라는 소원을 빌러 방문한 신사에서 갑자기 나타난 신으로부터 '고등학교에서 만나게 될 '운명의 상대'가 '100명' 있다'라는 말을 듣게 된다. 하지만 신이 말하길 운명의 상대와 만난 인간은 그 상대와 서로 '사랑'해서 '행복'해지지 않으면 '죽음'을 맞이한다고 하는데... 차례차례 기다리고 있는 운명의 상대와의 …"},"A0595":{"t":"소녀 괴수 캐러멜리제","type":"애니","img":"https://image.tmdb.org/t/p/w500/tG2yE7HILQdH32RzYajSgXYSrRV.jpg","status":"방영 중","summary":""},"A0596":{"t":"자금어묘방","type":"애니","img":"https://image.tmdb.org/t/p/w500/6mIWueYl03IsgvCr7A2j5Ywd8zZ.jpg","status":"방영 중","summary":"유구한 역사와 문화를 간직한 고궁(자금성)에 살고 있는 고양이들. 인간의 눈엔 한가롭게 노니는 것 같지만, 여섯 마리의 '어묘'는 유물의 기억(물화)을 지켜야 하는 특별한 임무를 짊어지고 있다. 지혜와 용기를 겸비한 어묘들은 물화 세계로 들어가 파괴자 흑효에 맞서 뒤틀린 세계를 올바른 궤도로 되돌리고 소중한 문화 유산을 지켜 낸다."},"A0597":{"t":"최강 찌꺼기 황자의 암약 제위 쟁탈전 ~무능한 척 연기하는 SS랭크 황자는 황위 계승전을 남몰래 지배한다~","type":"애니","img":"https://image.tmdb.org/t/p/w500/etpSosywRvOO8mds61uv3aSjhDF.jpg","status":"방영 중","summary":"무능하고 무기력한 황자 '아르놀트'. 제멋대로 지내는 그는 「우수한 쌍둥이 동생에게 좋은 점을 빼앗긴 『다 쓴 티백 황자』」라고 제국으로부터 바보 취급을 받고 있었다.\n\n그러나 황제 자녀들의 제위 다툼이 격화되고 위기가 닥치면서 마침내 '진심을 낼 것'을 결의한다.\n\n\"황제가 될 생각은 없지만, 패배해서 죽임을 당할 생각도 전혀 없어.\"\n\n숨기고 있었던 능력으로 책략이나 교섭술, 그리고 「금…"},"A0598":{"t":"아가씨 돌보기 ~영애들이 다니는 명문 학교에서 제일가는 아가씨(생활력 없음)를 남몰래 돕는 시중 담당이 되었습니다~","type":"애니","img":"https://image.tmdb.org/t/p/w500/o6k2eVEowtfwTKnKvbKUn87LGzX.jpg","status":"방영 중","summary":""},"A0599":{"t":"하나오리 양은 전생해서도 싸움이 하고 싶어","type":"애니","img":"https://image.tmdb.org/t/p/w500/MtHcMTVjuIPta3pQJtCc9LqYdT.jpg","status":"방영 중","summary":"전직 마왕인 니트 청년과 그를 쓰러뜨렸던 전생의 용사 소녀가 현대 일본에서 만나 벌어지는 유쾌한 일상을 다룬 역이세계 학원 러브 코미디 작품"},"A0600":{"t":"오니의 신부","type":"애니","img":"https://image.tmdb.org/t/p/w500/8grnaUpKFjvOP24oGlCtkPs1Yjn.jpg","status":"방영 중","summary":"인간과 요괴가 공존하는 일본. 뛰어난 능력과 외모를 지닌 요괴는 일본의 중추를 떠받치는 역할을 하고 있다.  그토록 막강한 권력을 가진 요괴는 본능적으로 운명의 ‘신부’를 찾아낼 수 있고, 여성들은 요괴의 신부로 뽑히는 걸 명예롭게 여기고 동경했다.  평범한 여고생 시노노메 유즈는 여우 요괴의 신부인 동생 카린과 늘 비교당하고 가족에게 무시당하며 자라왔다.  “찾았다, 나의 신부”  그의 이…"},"A0601":{"t":"구박하지 않는 계모와 언니들","type":"애니","img":"https://image.tmdb.org/t/p/w500/1i67CAfM8JsUvVOA6K6OC05L7X0.jpg","status":"방영 중","summary":""},"A0602":{"t":"극장판 유녀전기","type":"애니","img":"https://image.tmdb.org/t/p/w500/1rNq5tdWXAb3L51RH5xrcOtJyJC.jpg","status":"개봉","summary":"전장의 최전선에 있는 어린 소녀. 금발, 벽안, 그리고 투영하리만치 새하얀 피부의 소녀가 하늘을 날며 사정없이 적을 격추한다. 소녀답게 혀 짧은 말로 군을 지휘하는 그녀의 이름은 타냐 데그레챠프... 하지만 그 안에 든 것은 신의 폭주 탓에 여자로 다시 태어난 엘리트 샐러리맨. 열강 사이의 긴장이 고조되는 가운데 우연히 발발한 전쟁. 마침내 \"세계대전\"으로 발전하는 파괴의 소용돌이 속에서, …"},"A0603":{"t":"유녀전기","type":"애니","img":"https://image.tmdb.org/t/p/w500/tlYpbgtZxz4i1aAC3Q2PjG0jKrQ.jpg","status":"방영 중","summary":"통일력 1923년 6월, 금발의 파란 눈을 가진 소녀 타냐 데그레챠프는 북방군관구 노르덴 전투 구역의 제3초계선에서 상공 관측 임무를 맡고 있었다. 타냐는 제국의 사관학교에서 항공 마도사로 연수를 마친 후, 맡게 된 단순한 관측임무였기 때문에 무사히 끝나리라 믿고 있었다. 하지만 협상연합의 국경 침범을 계기로 제국과 협상연합은 전쟁 상태에 돌입하고 사태가 급변하게 된다. 협상연합에 의한 기습…"},"A0604":{"t":"클레바테스 -마수왕과 아기와 시체 용사-","type":"애니","img":"https://image.tmdb.org/t/p/w500/rCjvMBcxyDQJ50lcUdON6vc91al.jpg","status":"방영 중","summary":"어렸을 때부터 용사를 동경했던 알리시아는, 왕에게 선택받은 13명의 용사 중 한 명이 되었다. 전설의 검을 들고 마수왕 클레바테스 토벌을 위해 나아가는 용사들. 하지만 그 만용은, 에드세아 대륙의 모든 인속을 멸망시킬지도 모르는 최악의 위기를 불러들이고 말았다. 세계에 유일하게 남은 희망은, 마수왕에게 맡겨진 한 명의 아기였는데."},"A0605":{"t":"무직전생 ~이세계에 갔으면 최선을 다한다~","type":"애니","img":"https://image.tmdb.org/t/p/w500/bKGRbhv6ivalbt9sMniyxLVGnUZ.jpg","status":"방영 중","summary":"'나는 이 세계에서 최선을 다하겠어!' 34세 총각에 무직인 방구석 폐인이었던 남자. 그는 부모님의 장례식 날에 집에서 쫓겨나 트럭에 치여 목숨을 잃었다. 다시 눈을 떴을 때 그는 검과 마법이 존재하는 이세계에서 아기로 다시 환생해 있었다! 쓰레기처럼 살아온 남자는 소년 루데우스로서 이세계에서 최선을 다해 살아가기로 맹세한다! 루데우스를 기다리는 것은 로리 마술사, 엘프 귀를 가진 소꿉친구,…"},"A0606":{"t":"히로인? 성녀? 아니요, 올 워크스 메이드 입니다(자랑)!","type":"애니","img":"https://image.tmdb.org/t/p/w500/1dOBL5Px9mHbS6GMqSom0fO48Yk.jpg","status":"방영 중","summary":"이곳은 여성향 게임 '은빛 성녀와 다섯 가지 맹세'의 세계 안.\n\n곧 마왕이 부활해, 세상은 멸망할 위기에 처하게 된다...\n\n그런 운명으로부터 세상을 구할 예정이었던 히로인(성녀) 멜로디는,\n\n어째서인지 능력을 전부 메이드 업무를 하는 데 투자했고, 완전무결한 올 워크스 메이드로\n\n변모를 이루고 있었다!\n\n성녀 부재로 인해 예측불능이 되어버린 시나리오는, 세상은...\n\n대체 어떻게 되어버리…"},"A0607":{"t":"아름다운 그대에게","type":"애니","img":"https://image.tmdb.org/t/p/w500/4BoA0q0oh1FJiRe9PlZCxlqX26T.jpg","status":"방영 중","summary":"미국에서 자란 소녀 아시야 미즈키는 높이뛰기 선수 사노 이즈미를 동경해 그를 다시 뛰게 만들겠다는 일념으로 남장을 하고 사노가 다니는 남자 기숙학교에 잠입, 그의 룸메이트가 된다. 여자인 사실을 숨긴 채 기숙사 친구들과 어울리며 운동회와 문화제 같은 학교 행사를 겪는 동안, 사노는 점점 마음의 상처를 극복하여 높이뛰기에 재도전한다. 한편, 축구부의 에이스 나카츠는 미즈키를 남자로 알고 있으면…"},"A0608":{"t":"BanG Dream! YUME∞MITA","type":"애니","img":"https://image.tmdb.org/t/p/w500/etgqTDKW4WgMfzkpzpLzQCIRIST.jpg","status":"방영 중","summary":"'꺄아아아악!!!' 밴드 데뷔를 위해 갑작스럽게 모인 멤버들. 저마다 뛰어난 개성과 능력을 지니고 있지만, 제대로 된 밴드 활동은 꿈도 꿀 수 없는 상황이다. 과연 그녀들은, 그리고 이 밴드는 끝까지 살아남을 수 있을까!? '소리가 멈추더라도, 맞서 싸워라'"},"A0609":{"t":"데스노트 리라이트 2:  L을 잇는자","type":"애니","img":"https://image.tmdb.org/t/p/w500/e7gHO1hJHhiPV7nRG6oRUHWFe2q.jpg","status":"개봉","summary":"L의 사망 후 라이토와 니아의 대결의 총집편 2시간 스페셜."},"A0610":{"t":"도망을 잘 치는 도련님","type":"애니","img":"https://image.tmdb.org/t/p/w500/wtffQGdy6WAXoj57OuMqm2dqei3.jpg","status":"방영 중","summary":"때는 서력 1333년 무사들에 의한 일본 통치의 초석을 다진 가마쿠라 막부는  신뢰하던 막부의 신하 아시카가 타카우지가 일으킨 모반으로 멸명한다.모든 것을 잃고 절망의 늪으로 떨어진 막부의 정통 후계자 호죠 토키유키는 신을 자칭하는 신관 스와 요리시게의 도움으로 불타는 가마쿠라에서 탈출하는데......도망쳐 다다른 스와의 땅에서 신뢰할 수 있는 동료와 만나 가마쿠라 탈환을 위한 힘을 기르는 …"},"A0611":{"t":"책벌레의 하극상 ~사서가 되기 위해서라면 뭐든지 할 수 있어~","type":"애니","img":"https://image.tmdb.org/t/p/w500/tLlxU7NiG0abrx8szMIbvu7BC7c.jpg","status":"방영 중","summary":"현대의 일본에서 생활하고 있던 여대생 '모토스 우라노'는, 염원하던 도서관 취직이 결정된 그날 사망하고 만다. 더 많은 책을 읽고 싶다. 그런 미련이 남은 채로 그녀는 정신을 차려보니 이세계의 유녀 '마인'의 몸을 가지고 의식을 되찾았다. 이야기의 무대는 마법의 힘을 가진 귀족들이 지배하는 중세 시대와 같은 이세계의 도시 에렌페스트. 엄격한 신분제도 속에서, 현대의 일본에 대한 지식을 가진 …"},"A0612":{"t":"언데드 언럭","type":"애니","img":"https://image.tmdb.org/t/p/w500/3HqV8A4I9bpmjAcyL7W9dYUfJtP.jpg","status":"방영 중","summary":"자신에게 진정한 죽음을 선사할 이를 찾아온 죽지 않는 언데드의 능력을 지닌 부정자 앤디. 타인에게 불행을 가져오는 능력을 지닌 이즈모 후코. 이 둘이 힘을 합쳐 정체불명의 현상으로부터 세상을 지키려 한다. \"사상 최고의 죽음\"을 찾으며 세상의 미스터리를 파헤치는 이야기!"},"A0613":{"t":"라그나 크림슨","type":"애니","img":"https://image.tmdb.org/t/p/w500/ojHKJVrVk5ndqN5UHoEDoJejxKO.jpg","status":"방영 종료","summary":"은검을 휘두르며, 용을 사냥하고, 보수를 받는 직업 -- 「수룡인」. 미숙한 용 사냥꾼의 소년 라그나는 엄청난 용 토벌 수를 자랑하는 천재 소녀 레오니카와 콤비를 이뤄 날마다 용토벌에 도전하고 있었다. 라그나의 바람은 한 가지── 「 강해지지 않아도 된다. 레오 곁에 계속 있고 싶다」 그러나 그 생각은, 지금까지와 비교할 수 없는 강함을 가진 \"상위 용\"의 습격에 의해 덧없이 흩어진다. 막강…"},"A0614":{"t":"어쨌든 귀여워","type":"애니","img":"https://image.tmdb.org/t/p/w500/au7hJrQXwgNKh8G9hLrlETHETsQ.jpg","status":"방영 종료","summary":"수수께끼의 미소녀 츠카사에게 운명적으로 첫눈에 반한 소년 유자키 나사.\n\n나사의 죽음을 각오한 고백에, 그녀의 대답은 '결혼해 준다면, 사귀어 줄게'?! 나사와 츠카사의 사랑으로 가득한 귀엽고 소중한 신혼생활이 시작된다..!!"},"A0615":{"t":"건어물 여동생! 우마루짱","type":"애니","img":"https://image.tmdb.org/t/p/w500/8GCVuHqnqkJyqJIg1j8gQRemlBT.jpg","status":"방영 종료","summary":"수려한 외모에 상냥한 성격, 학업 성적까지 우수한 만능 여고생 우마루. 언제 어디서나 기품을 잃지 않을 것 같은 그녀이지만, 집에만 들어가면 숨겨진 모습이 드러난다. 그래도 괜찮아. 이런 모습을 아는 건 오빠 타이헤이밖에 없으니까!"},"A0616":{"t":"극장판 짱구는 못말려: 우리들의 공룡일기","type":"애니","img":"https://image.tmdb.org/t/p/w500/sxwOUajjGzkPYrrXy2sdMEfeZpE.jpg","status":"개봉","summary":"다이노스 아일랜드에 어서 오세요! 멸종된 공룡을 현대에 부활시킨 테마파크 다이노스 아일랜드 오픈! 떡잎마을은 물론, 전국이 공룡 열풍에 빠져든다! 그 무렵, 흰둥이는 어디선가 작은 공룡 나나를 발견한다. 나나는 짱구네 집의 새로운 가족이자 떡잎마을 방범대의 친구가 되어 아주 특별한 방학을 보내게 된다. 한편, 자신이 나나의 주인이라는 빌리가 나타나 나나를 데려가겠다 하고 다이노스 아일랜드 창…"},"A0617":{"t":"극장판 짱구는 못말려: 동물소환 닌자 배꼽수비대","type":"애니","img":"https://image.tmdb.org/t/p/w500/4DKjTt6VodfMRZ1Xs77peiQQXmY.jpg","status":"개봉","summary":"어느 날 ‘짱구‘와 동갑내기인 5살 ‘진구’를 데리고, 짱구 가족을 찾아온 수상한 여성. 서로의 아이가 바뀌었다는 충격적인 소식을 전한다. 하루아침에 닌자 가문의 후계자 ‘진구’로 불리게 된 짱구는 ‘부리부리 엉덩이 분신술’로 닌자 유치원을 초토화시킨다. 한편, 떡잎마을에 남겨진 진구와 짱구 가족은 짱구를 찾으러 닌자 마을로 향하고, 세상의 중심인 ‘지구의 배꼽’이 흔들리기 시작하며, 지구가…"},"A0618":{"t":"극장판 짱구는 못말려: 수수께끼! 꽃피는 천하떡잎학교","type":"애니","img":"https://image.tmdb.org/t/p/w500/sqAm04lTqq5ZBWENlpV25ITAiVw.jpg","status":"개봉","summary":"명문 엘리트 양성학교에 체험 입학하게 된 짱구와 친구들! 좋은 성적을 내서 학교에 정식 입학하고 싶은 철수와 장난만 치려는 짱구는 크게 싸우게 된다. 그러던 중 학교에 도는 괴소문의 존재 ‘흡덩귀’에게 철수가 엉덩이를 물린 채 발견된다. 흡덩귀에게 엉덩이를 물리면 엘리트 학생도 모지리로 변하게 되는데…. 철수와 학생들을 구하기 위해 짱구와 떡잎마을 방범대 친구들은 탐정 동아리를 결성하고 수사…"},"A0619":{"t":"극장판 짱구는 못말려: 격돌! 낙서왕국과 얼추 네 명의 용사들","type":"애니","img":"https://image.tmdb.org/t/p/w500/hIcSphAuXEKfsP6OTEY2Ok2trB6.jpg","status":"개봉","summary":"아이들의 낙서가 사라져 붕괴 위기에 처한 낙서왕국은 낙서 에너지를 모으기 위해 지구 침공을 시작한다. 낙서왕국의 위험한 작전을 막기 위해 지상의 용사로 선택 받은 짱구는 그림에 생명을 불어넣는 ‘미라클 크레용’을 얻게 된다. 쓰윽 쓰윽~ 그려 그려~! 짱구가 미라클 크레용으로 그림을 그리자 브리프, 가짜 이슬이 누나, 부리부리 용사가 스케치북 밖으로 튀어나오는데..! 과연, 크레용 용사 짱구…"},"A0620":{"t":"극장판 짱구는 못말려: 습격!! 외계인 덩덩이","type":"애니","img":"https://image.tmdb.org/t/p/w500/rqJtClna9UjgTBAWBGZ2UzuEdye.jpg","status":"개봉","summary":"짱구의 집에 불시착한 UFO의 주인 외계인 ‘덩덩이'. '나스파디’ 별에서 온 ‘덩덩이’는 무시무시한 ‘꼬마꼬마 파워’로짱구의 엄빠를 어린이로 만들어버린다!엄빠를 다시 어른으로 되돌리기 위해 ‘덩덩이’의 아빠를 만나러 떠나지만연락이 닿지 않고, 심지어 지구를 위협하는 외계인의 음모까지 드러나기 시작하는데…!!!짱구의 엉덩이에 숨은 외계인 ‘덩덩이’와 가족들의 스펙터클한 대모험이 펼쳐진다!"},"A0621":{"t":"극장판 짱구는 못말려: 폭풍수면! 꿈꾸는 세계 대돌격","type":"애니","img":"https://image.tmdb.org/t/p/w500/koXIthU3RAX9E2mvMlppRkZAUAM.jpg","status":"개봉","summary":"어느 날, 꿈 속에서 거대한 물고기가 나타나 짱구 가족을 한 입에 삼킨 날로 부터 마을 사람들은  모두 잠을 잘 때마다 보고 싶은 꿈을 꾸는 신기한 꿈의 세계로 가게 된다.  하지만 짱구의 유치원에 ‘보라’가 전학 온 날부터 마을 사람들이 꿈꾸는 세계는 점차 악몽으로 변해가는데…"},"A0622":{"t":"극장판 짱구는 못말려: 나의 이사 이야기 선인장 대습격","type":"애니","img":"https://image.tmdb.org/t/p/w500/a7apSmg36MmApRjGKPp4WQGBLpo.jpg","status":"개봉","summary":"안녕… 떡잎마을…  갑자기 멕시코 지사로 발령이 난 짱구아빠. 그로 인해 짱구 가족은 정든 떡잎마을을 떠나 멕시코로 이사를 가게 되고, 태양의 나라 멕시코에 도착한 짱구 가족은 선인장 페스티벌에 참여하게 되는데... 하지만 짱구 가족을 기다리는 건 선인장 괴물?!  과연 짱구와 멕시코 이웃들은 무시무시한 선인장 괴물에 맞서 마을을 지켜낼 수 있을까?  가족의 운명을 건 선인장 괴물과의 후끈한…"},"A0623":{"t":"극장판 짱구는 못말려: 어른 제국의 역습","type":"애니","img":"https://image.tmdb.org/t/p/w500/6N3OawAyXsJg0Ir6EQ6LHApUyzr.jpg","status":"개봉","summary":"떡잎마을에 20세기 박물관이 생기자 어른들은 그곳에 푹 빠져 헤어 나오지 못한다. 그러던 어느 날, 20세기 박물관은 TV를 통해 중요한 안내 방송을 한다. 그때부터 어른들은 어린아이처럼 행동하기 시작하고, 다음 날 아침에는 박물관에서 보낸 트럭을 타고 단체로 사라진다. 그 이후 남겨진 아이들도 20세기 박물관에서 보낸 트럭에 실려 어딘가로 끌려가고, 짱구와 친구들은 이리저리 도망친다.  어…"},"A0624":{"t":"극장판 짱구는 못말려: 폭발! 온천 부글부글 대작전","type":"애니","img":"https://image.tmdb.org/t/p/w500/qdQR8mlgguRU3qIQhgjaXWwXrZm.jpg","status":"개봉","summary":"어느 날, 경찰들이 나타나 불발탄이 있다며 짱구와 엄마, 짱아, 흰둥이를 어디론가 데리고 간다. 짱구 가족들을 납치한 것은 ‘온천 가드맨’이라는 온천 수호단. 이들은 목욕을 싫어하는 ‘때안미러’단들이 ‘지구 온천화 계획’을 세우고 있다는 것을 알고는 전설의 온천인 ‘황금 온천탕’을 찾았던 것이다. 그리고 그 ‘황금 온천탕’이 짱구네 집 밑에 있다는 것을 알고 짱구 식구들을 몰래 데리고 온 뒤…"},"A0625":{"t":"극장판 짱구는 못말려: 핸더랜드의 대모험","type":"애니","img":"https://image.tmdb.org/t/p/w500/rwdr0s4mM9jPCpRaapXHMO4aqD.jpg","status":"개봉","summary":"우주를 돌아다니며 나쁜 짓을 하는 악당들이 드디어 지구까지 손에 넣으려고 한다. 그들은 핸더랜드라는 놀이공원을 본거지로 삼아, 본격적으로 지구 공략에 나선다. 우연히 핸더랜드에 놀러간 짱구는 토페마에게 악당들의 음모를 듣게 된다. 토페마는 짱구에게 힘을 합쳐 악당들을 물리치자고 하지만, 짱구는 겁을 먹고 주저한다. 하지만 악당들은 이미 짱구가 를 가지고 있다는 사실을 알고 짱구를 찾아온다. …"},"A0626":{"t":"극장판 짱구는 못말려: 부리부리 왕국의 보물","type":"애니","img":"https://image.tmdb.org/t/p/w500/9djKSjGogao0ROefsa2YTeNy2w3.jpg","status":"개봉","summary":"어느 날, 부리부리 왕국의 왕자 슨노케시는 이상한 자들에게 납치당한다. 신 짱과 엄마 미사에는 제비뽑기를 하다 부리부리 왕국 여행권에 당첨된다. 그러나, 비행기에서 '화이트 스네이크' 라는 조직은 신 짱을 노리고 있었으며, 무사히 탈출했으나, 기차에서 또다시 출몰, 신 짱은 잡혀 버린다. 부리부리 왕국의 보물이 있는 지하 궁전의 열쇠가 바로 슨노케시 왕자와 신 짱! 화이트 스네이크 단의 두목…"},"A0627":{"t":"극장판 짱구는 못말려: 암흑 마왕 대추적","type":"애니","img":"https://image.tmdb.org/t/p/w500/mC7ICPzXL7kEBDjeyXWpYHzxUcg.jpg","status":"개봉","summary":"짱구는 어느 날 오후, 강가에서 자고 있는 한 남자 옆에서 작은 구슬을 하나 줍는다. 그 구슬은 옛날 주유랑족과 주황천족이 세상을 지배할 수 있는 힘을 가진 `잭`이라는 악마를 토기 인형 안에 봉인해 둔 열쇠가 되는 구슬이었다. 잭을 부활시켜 세상을 지배하려는 핵슨과 주황턴족의 여자 우두머리의 음모로 잭을 부활시킬 구슬 두 개를 찾아 혈전이 펼쳐진다.  세상의 평화를 지키려는 주유랑족은 주황…"},"A0628":{"t":"극장판 짱구는 못말려: 엄청 맛있어! B급 음식 서바이벌","type":"애니","img":"https://image.tmdb.org/t/p/w500/kWf8VZeBkjAYLucIYVFyC6z64U2.jpg","status":"개봉","summary":"볶음 국수를 먹기 위해 부모님들 몰래 ‘B급 음식 대축제’로 향하던 짱구와 떡잎마을 방범대 일행은 수수께끼의 여인으로부터 전설의 소스를 볶음 국수 달인에게 전달해 줄 것을 부탁 받는다. 그 소스는 바로 서민들이 사랑하는 B급 음식들을 모두 없애고 축제를 점령하려는 ‘A급 요리기구’로 부터 B급 음식을 구할 수 있는 전설의 소스! 이 소스를 노리는 A급 요리 기구는 특급 요원들을 동원해 짱구 …"},"A0629":{"t":"극장판 짱구는 못말려: 액션가면 VS 그래그래 마왕","type":"애니","img":"https://image.tmdb.org/t/p/w500/qP1JgbTpLITqXQM7qyaucdSNAxo.jpg","status":"개봉","summary":"아이들은 액션가면을 TV 속의 인물인줄만 알고 동경한다. 짱구는 친구들과 함께 액션 가면 카드를 사모으며 즐거운 하루를 보낸다. 드디어 여름방학이 시작되는데, 아버지가 갑자기 바다로 놀러가자고 한다. 그것은 지구를 지키는 액션가면이 그들을 바다로 유인해낸 것이다.  한편, 우주에서 온 그래그래 마왕은 지구를 지배하기 위해 사람들의 영혼을 빼앗아간다. 짱구는 지구를 지키기 위해 액션가면과 힘을…"},"A0630":{"t":"극장판 블리치 : 메모리즈 오브 노바디","type":"애니","img":"https://image.tmdb.org/t/p/w500/2RKEQ5OJngW9jLq7IQWAsD9CdJG.jpg","status":"개봉","summary":"마을에 이변이 일어나고 정체를 알 수 없는 생명체가 떠돌기 시작하자, 사신 대행인 주인공 일행들이 이에 대해 조사하면서 벌어지는 이야기를 다룬 애니메이션"},"A0631":{"t":"극장판 블리치 : 다이아몬드 더스트 리벨리온","type":"애니","img":"https://image.tmdb.org/t/p/w500/lEI73mSpf5sK8aODvxyRexr6hRi.jpg","status":"개봉","summary":"소울소사이어티에 있는 왕족의 비보가 운반 도중 의문의 무리에게 탈취당하면서 벌어지는 이야기를 그린 애니메이션"},"A0632":{"t":"꿈빛 파티시엘","type":"애니","img":"https://image.tmdb.org/t/p/w500/A2V9DJniztOLiHAx9V2gp9yD2ts.jpg","status":"방영 종료","summary":"케이크를 잘 먹는 것 외에 어떠한 장점도 없다고 생각했던 14세 여자아이 아마노 이치고(韓 감딸기). 하고 싶은 일조차 없이 하루 하루 nilistcdn/media/manga/cover/large/bx105398-b673Vt5ZSuz3.jpg","status":"완결","summary":"10여 년 전, \n다른 차원과 이쪽 세계를 이어 주는 통로 ‘게이트’가 열리고 \n평범한 이들 중 각성한 자들이 생겨났다.\n\n게이트 안의 던전에서 마물을 사냥하는 각성자.\n그들을 일컬어 ‘헌터’라 부른다.\n\n그러나 모든 헌터가 강한 것은 아니다.\n\n내 이름은 성진우.\nE급 헌터다. \n\n저급 던전에서조차 죽을 고비를 넘겨야 하는\n‘인류 최약병기’. \n\n무엇 하나 내세울 것 없는 형편에\n저급 던전…"},"W0006":{"t":"전지적 독자 시점","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx119257-Pi21aq3ey9GG.jpg","status":"연재 중","summary":"'이건 내가 아는 그 전개다'\n한순간에 세계가 멸망하고, 새로운 세상이 펼쳐졌다.\n오직 나만이 완주했던 소설 세계에서 평범했던 독자의 새로운 삶이 시작된다."},"W0007":{"t":"신의 탑","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx85143-23oup3ETbFJk.jpg","status":"연재 중","summary":"자신의 모든 것이었던 소녀를 쫓아 탑에 들어온 소년\n그리고 그런 소년을 시험하는 탑"},"W0008":{"t":"SSS급 죽어야 사는 헌터","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx128067-wnLBg6Cy1ncs.jpg","status":"연재 중","summary":"F급 말단 헌터 ‘김공자‘.\n랭킹 1위 ‘염제‘를 부러워하던 어느 날, 무려 S+급 스킬을 얻는다.\n하지만 기쁨도 잠시, 어째 스킬 내용이 이상하다?!\n\n상대의 스킬 중 1개를 복사한다,까지는 좋은데…\n\n\"뭐? 내가 죽어야만 발동된다고?!\"\n\n죽어야 사는 헌터의 인간찬가 <SSS급 죽어야 사는 헌터>"},"W0009":{"t":"후레자식","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/medium/b86964-vTdn1Esqw3va.jpg","status":"완결","summary":"'내 집안에 살인마가 산다.' 본격 세대갈등 잔혹 스릴러"},"W0010":{"t":"수평선","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx100568-4BC0PsdwU4bL.png","status":"완결","summary":"A world where everything has been lost. A boy and a girl alone together. A spark of hope kindled between them. All they can do is move forward. But against broken adults and devastating despair, how long will they be abl…"},"W0011":{"t":"입학용병","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx126297-SPiM7QtUnJ4P.jpg","status":"연재 중","summary":"어린 시절 비행기 추락 사고의 유일한 생존자 유이진.\n살아남기 위해 용병으로 살아가던 유이진은 10년 후, 가족이 있는 고향으로 돌아왔다."},"W0013":{"t":"귀환자의 마법은 특별해야 합니다","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx105393-oiHumQoBGKG5.jpg","status":"완결","summary":"The worst calamity humankind has ever faced...\n\n\n\nShadow Realms have ravaged the earth and decimated almost everyone in their way. The survival of humanity hinges upon the success of just six mages, including analytic fi…"},"W0014":{"t":"나노마신","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx120980-RZ9WLd0o9hyo.jpg","status":"연재 중","summary":"갖은 멸시와 목숨의 위협을 받던 마교의 사생아 천여운,\n미래에서 나타난 후손이 천여운의 몸에 나노 머신을 주입한 후 그의 인생이 송두리째 바뀐다.\n마교를 넘어 무림 최고의 자리에 오르기 위한 천여운의 거침없는 이야기가 시작된다!"},"W0015":{"t":"백작가의 망나니가 되었다","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx123573-LKoCKwRouEMW.png","status":"연재 중","summary":"Kim Rok-Su has one life motto: “Let’s not get beat up.” But after dozing off somewhere midway through the novel “Birth of a Hero,” he wakes up as Cale Henituse - one of the minor villains in the novel who gets the beatin…"},"W0016":{"t":"철혈검가 사냥개의 회귀","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx163824-KiablxybJD6i.jpg","status":"연재 중","summary":"Raised to kill like a pack of loyal hounds, the Baskerville children took countless lives as a band of fearsome assassins. Despite being the shunned illegitimate son of the brood, Vikir served his family faithfully, only…"},"W0017":{"t":"화산귀환","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx132144-i5B4VnG9sRgh.png","status":"연재 중","summary":"대 화산파 13대 제자. 천하삼대검수(天下三代劍手).\n매화검존(梅花劍尊) 청명(靑明).\n천하를 혼란에 빠뜨린 고금제일마 천마(天魔)의 목을 치고 십만대산의 정상에서 영면.\n\n백 년의 시간을 뛰어넘어 아이의 몸으로 다시 살아나다.\n\n그런데…….\n\n뭐? 화산이 망해?\n이게 뭔 개소리야!?\n\n망했으면 살려야 하는 게 인지상정.\n\n“망해? 내가 있는데? 누구 맘대로!”\n\n언제고 매화는 지기 마련.\n…"},"W0018":{"t":"검술명가 막내아들","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx149332-adkSyOFY3c5U.jpg","status":"연재 중","summary":"Jin Runcandel was destined to become the head of his swordmaster clan. But despite his best efforts, he's banished for his shoddy swordsmanship. Though Jin eventually makes a contract with the god Solderet and is freed f…"},"W0019":{"t":"멸망 이후의 세계","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx144957-h0qIwRwxOEdg.jpg","status":"연재 중","summary":"<전지적 독자 시점> 싱숑 작가 원작.\n\n이것은 모두가 과거로 돌아갈 때 마지막까지 회귀하지 않았던 한 사나이의 이야기다."},"W0020":{"t":"악역의 엔딩은 죽음뿐","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx118408-zZuOINqjBZYn.jpg","status":"연재 중","summary":"역하렘 공략 게임의 악역, \n에카르트 공작가의 하나뿐인 공녀이자 입양아\n페넬로페로 빙의했다. \n\n그런데 하필 난이도는 극악! \n뭘 해도 엔딩은 죽음뿐! \n\n‘진짜 공녀’가 나타나기 전에\n여주의 어장 중 한 명을 공략해서 살아남아야 한다.\n\n사사건건 시비를 거는 오빠 1, 2.\n모든 루트가 죽음으로 이어지는 미친 황태자.\n여주바라기 마법사와 충직한 노예 기사까지!\n\n‘일단 가망성 없는 놈들은 …"},"W0021":{"t":"픽 미 업!","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx159441-9W8201jAT9Yv.jpg","status":"연재 중","summary":"그 누구도 던전의 끝까지 오르지 못한 \n극악의 난이도를 자랑하는 모바일 가챠 게임 <픽 미 업!(Pick me up!)>\n\n마스터 오브 마스터라 불리는 세계 랭킹 5위의 마스터 '로키'는 던전을 깨던 중 정신을 잃게 된다.\n깨어나 보니 레벨도 1, 등급도 1성인 <픽 미 업!> 속 영웅 캐릭터 \n'한 이스라트'가 되어버린 '로키'.\n\n'그놈이다. 나를 데려온 건 그놈이 분명해!'\n\n지구로 돌…"},"W0022":{"t":"어느 날 공주가 되어버렸다","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx107521-M4x3AUb7UGIM.png","status":"완결","summary":"어느 날 눈을 떠보니 공주님이 되었다!\n\n금수저를 입에 물고 태어난 건 좋은데,\n하필이면 친아버지의 손에 죽는 비운의 공주라니!\n\n피도 눈물도 없는 냉혈한 황제 클로드!\n죽고 싶지 않다면 그의 눈에 띄어서는 안 된다.\n그런데,\n\n“언제부터 내 성에 이런 버러지가 살았지?”\n\n황제의 눈에 띄어버린 아타나시아.\n과연 그녀는 살아남을 수 있을까?\n\n“나…… 어떡하지……?”"},"W0023":{"t":"무한의 마법사","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx159930-qK1P4BNQL0zG.jpg","status":"연재 중","summary":"마굿간에 버려져 평민으로 키워진 아이, 시로네.\n\n타고난 통찰력으로 글까지 깨우친 아이는\n도시로 나간 어느 날 그토록 궁금해하던 마법을 경험한다.\n\n그 길로 마법사를 꿈꾸게 된 시로네.\n하지만 신분의 장벽이 두터운 이 곳은 아이에게 냉혹하고,\n그는 채 어른이 되기도 전에 이 세상의 이면을 알아버리는데···.\n\n어딘가 비틀어진 이 세계에서\n그는 자신이 꿈꾸던 마법사가 될 수 있을까?"},"W0024":{"t":"4000년 만에 귀환한 대마도사","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx118424-JbTApgnIP1ON.jpg","status":"연재 중","summary":"웨스트로드 아카데미의 열등생, 블레이크 가문의 수치.\n괴로운 삶을 이기지 못해 죽음을 선택한\n프레이 블레이크의 몸에 새로운 영혼이 깃든다.\n​\n“뭐야, 이 몸뚱이는?\n하나부터 열까지 손 봐야겠군.”\n​\n대마도사 루카스 트로우맨.\n​\n열등생 프레이 블레이크의 육체로 복수의 기회를 얻다!\n​\n4000년의 시간을 넘어 귀환한\n대마도사의 화려한 액션이 시작된다!"},"W0025":{"t":"템빨","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx117460-46JbftfHSXoc.jpg","status":"연재 중","summary":"Sin Yeong-U (a.k.a. Grid), an unlucky man in life and a low-level player in the popular VR game “Satisfy,” finds a powerful item that earns him a rare legendary class title: “Pagma’s Successor.” He’s now a skilled blacks…"},"W0026":{"t":"재앙급 영웅님이 귀환하셨다","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx143056-MEpVxW7346jz.jpg","status":"연재 중","summary":"Humans call them “calamities”—the unknown, destructive creatures that suddenly appeared on earth. To challenge these calamities, the zodiac gods awakened 12 humans known as saints. But there was one more that awoke—uncho…"},"W0027":{"t":"빌어먹을 환생","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx151512-q0Xddr1JNKNq.png","status":"연재 중","summary":"마왕을 없애기 위해 용사와 함께 모험을 하던 하멜. \n마왕과의 대결 직전 용사 베르무트 라이언하트를 구하고 대신 죽음을 맞이하게 된다. \n\n그리고 300년 후. \n\n하멜은 용사의 머나먼 후손인 유진 라이언하트로서 환생한다. \n죽기 전의 육체보다 월등한 성능을 가진 천재로서. \n\n전생의 경험을 토대로 더 뛰어난 육체에 맞춰 폭발적인 성장을 하는 유진. \n전생에 이루지 못한 마왕 토벌을 위해 유…"},"W0028":{"t":"만 년 만에 귀환한 플레이어","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx153284-roAlRmlRM7Vs.png","status":"연재 중","summary":"어느 날, 갑작스럽게 지옥으로 떨어졌다. \n가진 것은 살고 싶다는 갈망과 포식의 권능 뿐.\n \n일천의 지옥부터 구천의 지옥까지. 수만, 수십만의 악마를 잡아먹었고. \n마침내 일곱 대공까지 그 앞에 무릎을 꿇었다.\n \n\"어째서 돌아가려고 하십니까? \n왕께서는 이미 지옥의 모든 것을 가지고 계시지 않습니까.\"\n\n\"가지긴 뭘 다 가져.\"\n\n먹을 것도, 즐길 것도 없다! \n지옥에 있는 거라고는 황량…"},"W0029":{"t":"별을 품은 소드마스터","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx170400-yMIuOIboWuoO.jpg","status":"연재 중","summary":"기사를 동경하는 슬럼가의 부랑아 블라드.\n검은 벼락을 맞는 사고 이후부터 들리기 시작한 누군가의 목소리와,\n어느 날 갑자기 등장한 푸른 달빛의 기사가 블라드의 세계를 산산조각내면서\n뒷골목 소년의 삶이 송두리째 변하기 시작하는데...\n\n높디높은 밤하늘에 있지 않더라도,\n아무도 보지 못하는 곳에 떨어져 있더라도\n스스로가 빛나기를 원한다면, 그렇다면 그것은\n별일 것이다."},"W0030":{"t":"그녀가 공작저로 가야 했던 사정","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx104973-5KZSV2FK9BMt.jpg","status":"완결","summary":"의문의 사망 이후, 소설 속으로 빙의하게 된 재수생 박은하.\n하지만 그녀가 빙의한 인물은 주인공도 아닌 약혼자에게 독살당해 죽는 엑스트라, 레리아나 맥밀런?!\n\n그녀가 살아남을 유일한 길은 약혼자와의 파혼뿐!\n레리아나(=박은하)는 소설 남주, 노아 윈나이트에게 계약 약혼을 청하게 되는데…….\n\n“단 6개월만 약혼자 흉내를 내주신다면 그 후에는, 공작님 인생에서 깨끗이 사라져 드리죠.”\n“좋아…"},"W0031":{"t":"아카데미에서 살아남기","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx172619-LSoXY45QAas4.jpg","status":"연재 중","summary":"즐겨하던 게임의 삼류 엑스트라 악역으로 빙의했다.\n야망은 없고 그냥 조용히 살고 싶다. 근데 세상이 참 살아남기 힘들다.\n주인공이 할 수 없는 삼류 악역의 방식으로, 난 이 이야기의 끝을 맞이하기 위해 살아남는다!"},"W0032":{"t":"신과 함께 레벨업","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx138222-PyVZk5MOWP07.png","status":"연재 중","summary":"이계의 신, 아우터 갓(Outer God).\n\n하늘을 닫는 절망과 늪에 빠진 좌절, 탄생하지 못한 자, 어리석은 혼돈.\n평범한 사람들은 그저 바라보는 것만으로 목숨을 잃어 버릴 그 존재들이 세상을 휘젓는 지금…\n수 년간의 싸움 끝에, 최후의 생존자들이 낸 결론.\n\n\"이너(Inner)는 아우터(Outer)를 이길 수 없다.\"\n\n그 순간, 시간을 다루는 신격을 지닌 존재 크로노스는 자신을 희생시…"},"W0033":{"t":"소설 속 엑스트라","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx152128-hk1Dq8zlEPVn.png","status":"연재 중","summary":"\"나는 누구지?\"\n\n이 세상은 내가 쓴 소설.\n그러나 나는 단 한 번도 쓴 적 없는 인물이 되었다.\n\n얼굴은 물음표에다,\n소설 속 그 누구와도 접점이 없는,\n아무도 기억 못할 그런 인물.\n\n영웅 아카데미에 입학한 엑스트라, 아니 소설 속 먼지가 살아남는 법.\n\n남은 소설 분량까지 버텨야 한다!"},"W0034":{"t":"싸움독학","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/medium/b121991-hwrVszteyodi.jpg","status":"완결","summary":"힘없고 가진거 하나 없이 맞고만 살던 나였는데...\n우연히 비밀의 뉴튜브를 발견하게 되고 갑자기 떼돈을 벌었다."},"W0035":{"t":"아카데미의 천재칼잡이","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx167649-8qpdNIjBdIhQ.png","status":"연재 중","summary":"후회로 점철된 채 끝나버린 삶. 우연히 찾아온 두 번째 기회. 세상을 구하기 위한 로난의 모험이 시작된다."},"W0036":{"t":"8클래스 마법사의 회귀","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx136331-cM7yJu8RtCoU.jpg","status":"완결","summary":"As a powerful 8th class mage, Ian Paige took countless innocent lives under the orders of Emperor Ragnar, a close friend and ruler of the Greenriver Empire. Yet despite their closeness, Ragnar views Ian as a threat and s…"},"W0037":{"t":"그 악녀를 조심하세요!","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx117540-RRDXqQJbhWTv.jpg","status":"완결","summary":"소설 속 희대의 악녀에 빙의했다! 싫냐고? 아니? 좋은데?\n공작영애 = 돈 많은 백수인 것을 내가 마다할 리가! 꿀이나 빨면서 여유롭게 살기 딱 좋지 않은가? 원작같은 건 다 떨쳐버리고 나의 삶을 사는거야!\n\n그렇게 다짐했던 내가 이 몸에 빙의한지 얼마 되지 않아 목격한 것은 나의 약혼남이자 원작의 남주인공인 '황태자 이안'의 불륜 현장이었다. \n\n내가 아닌 다른 여자를 품에 안고 시시덕거리…"},"W0038":{"t":"얼어붙은 플레이어의 귀환","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx130870-hRlgIlkXBgqb.png","status":"연재 중","summary":"세상이 바뀌고 5년.\n최종보스가 나타났다.\n\n[지구 에어리어의 최후의 보스, 서리여왕이 출현합니다.]\n\n최후의 보스!\n그녀만 처치하면 예전처럼 살 수 있다!\n\n인류 최고의 플레이어, 어둑서니를 포함한 다섯 명의 플레이어가 마침내 서리여왕을 쓰러뜨리지만...\n그들은 기나긴 잠에 빠지는 혹독한 대가를 치뤄야했다.\n그로부터 25년 후.\n\n\"2층이라니? 서리여왕을 죽이면 끝나는 거 아니었어?\"\n\n얼…"},"W0039":{"t":"광마회귀","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx137304-XZ91kOmUIMQo.png","status":"연재 중","summary":"무공에 미친 광마 이자하.\n그는 마교 교주의 천옥을 훔쳐 쫓기던 중 벼랑에서 떨어지게 된다.\n모든 게 끝났다고 생각한 순간 눈을 떠보니, 사람들에게 무시당하던 점소이 시절로 돌아와 있는데...\n게다가 억울한 누명으로 두들겨 맞고 객잔은 박살이 나 있는 상황.\n​점소이 시절로 회귀한 광마!\n사내는 다시 미치게 될 것인가? 아니면 사내의 적들이 미치게 될 것인가."},"W0040":{"t":"FFF급 관심용사","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx113666-eemJQOpbo3qk.png","status":"완결","summary":"Han-Soo Kang was an average boy living in the normal world when he was suddenly summoned to Fantasia, a fantasy world run by demons. Deemed the Chosen Hero, he’s spent the last ten years building himself up to defeat the…"},"W0041":{"t":"66666년만에 환생한 흑마법사","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx137595-1m3i7vxyOqXc.png","status":"연재 중","summary":"강대했던 흑마법사 디아블로 볼피르.\n12신의 계략에 당해 억겁 속에 봉인되었지만,\n그로부터 66666년이 흘러 다시금 이 땅에 강림한다!\n\"응애!\"\n웰턴 백작의 갓 태어난 장남으로.\n딥다크 매직 판타지 시작!"},"W0042":{"t":"오늘만 사는 기사","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx177706-3r8dnAr8Prjq.jpg","status":"연재 중","summary":"\"넌 천재다\"\n\n어릴 때 들었던 말이 독이었다.\n엔크리드는 기사를 꿈꿨다.\n헛된 꿈이라는 건 금세 알았다.\n\n\"그런 실력으로 칼밥을 먹겠다고?\"\n\n누군가는 비웃고.\n\n\"그만둬라.\"\n\n누군가는 조언했다.\n\n그럼에도 빛 바랜 꿈은 그대로였다.\n\n덜 자고 더 뛰고 더 휘둘렀다.\n\n그리 살던 어느 날이었다.\n전장에서 목이 찔려 죽은 뒤였다.\n\n다시 눈을 뜬 엔크리드는 죽기 전 '오늘' 아침에 돌아와…"},"W0043":{"t":"이번 생은 가주가 되겠습니다","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx130429-m3PuqOmxBgoo.png","status":"연재 중","summary":"“…한번 해 보자. 내가 가주가 되는 거야.”\n\n제국에서 제일가는 가문, 롬바르디의 사생아로 환생한 피렌티아.\n게다가 이 가문은 막대한 부는 물론 외교와 문화까지 통달한\n말그대로 제국의 역사 자체!\n\n금수저 오브 금수저 인생 당첨!\n앞으로는 탄탄대로일 거라 생각했는데….\n아버지는 돌아가시고, 친척들은 문전박대,\n거기다 그 잘나가던 가문까지 쫄딱 망해 버릴 줄이야!!\n\n분통을 터트리며 술을 조…"},"W0044":{"t":"로그인 무림","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx120385-4JYGuOR6cn72.jpg","status":"연재 중","summary":"When an interdimensional portal appeared and released countless monsters across the world, humanity didn’t take the threat lying down. Mankind fought back, defeating the monsters' Demon King and creating a new way of lif…"},"W0045":{"t":"소녀더와일즈","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/medium/b75275-6sw70Ah3Y94V.jpg","status":"완결","summary":"<펫다이어리>, <열아홉스물하나> 제나(김혜진) 작가와 HUN 작가의 만남.\n그들이 들려주는, 다소 과격한 소녀들의 전쟁 같은 삶 이야기."},"W0046":{"t":"던전 리셋","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx116506-D6cG2hsUzSpx.jpg","status":"완결","summary":"Da-Woon's ordinary life is turned upside down when he is summoned into the Dungeon, where he must play a deadly game, outlasting dangerous monsters and life-threatening traps. To make matters worse, he's only a mere craf…"},"W0047":{"t":"킬더히어로","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx117536-tnTMgXV1V5KB.jpg","status":"완결","summary":"After he’s killed by the righteous leader of his own guild, Woojin gets a chance to start over. This time he’s not interested in saving the world from monsters—he’s got his sights set on revenge! His high-level kills qui…"},"W0048":{"t":"회귀한 공작가의 막내도련님은 암살자","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx175262-shGEYbbfLHDD.jpg","status":"연재 중","summary":"대륙 제일의 암살자 시안 베르트\n평생을 믿고 따랐던 형에게 배신당한 뒤, 비참한 최후를 맞이한다.\n만약 내게 한 번 더 생이 주어진다면 그때는 다른 삶을 살 것이다.\n오로지 나 하나만을 바라보면서, 내 스스로 모든 것을 이룰 수 있는 누구도 섬기지 않는 그런 삶을.\n그렇게 맞이하게 된 두 번째 삶. 더 이상 남을 위해 살던 그림자 시안 베르트는 없다.\n다시 쓰는 인생 나를 위한 모든 것을 이…"},"W0049":{"t":"악녀는 모래시계를 되돌린다","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx116382-EPyB5KDY9UEo.png","status":"완결","summary":"매춘부였던 어머니가 백작과 결혼하며 벼락출세하게 된 아리아.\n사치에 물든 삶을 살던 아리아는 여동생 미엘르의 계략에 의해 억울한 죽음을 맞이하게 된다.\n죽기 직전, 마치 환상처럼 떨어져 내리는 모래시계를 봄과 동시에 기적처럼 과거로 회귀하게 되는데...!\n\n\"저는, 제 동생 미엘르처럼 아주 우아한 사람이 되고 싶어요.\"\n\n악녀를 상대하기 위해서는 악녀를 뛰어넘는 악녀가 되어야 한다.\n그것이 …"},"W0050":{"t":"하루만 네가 되고 싶어","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx114542-3fUNOX8DqS5e.jpg","status":"연재 중","summary":"'완벽한 인생이었다, 그 애가 나타나기 전까지는'\n반전에 반전을 거듭하는 치밀한 궁중 서스펜스\n네이버웹툰 최강자전 19년 대표작."},"W0051":{"t":"아카데미에 위장취업당했다","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx150836-RbhplaCkc2dy.jpg","status":"완결","summary":"제국에서 제일가는 마법 아카데미의 교사가 되었다.\n…다른 사람과 착각당해서.\n그 어느 쪽에도 정체를 들켜선 안 되는 상황.\n이 아슬아슬한 외줄 타기의 끝은 어디일까."},"W0052":{"t":"약한영웅","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx113488-0ghq0eEnftk0.jpg","status":"완결","summary":"“비겁하 ":{"t":"시한부 천재 암흑기사","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx165182-k4Jfk2XMkylP.jpg","status":"연재 중","summary":"극악의 난이도로 악명이 자자한 판타지 RPG ‘이너 루나틱’.\n어린 나이, 시한부 판정을 받은 유찬에게 이 게임은 자신의 전부였으며 이제는 잔인한 현실이 되었다.\n지금부터 유찬은 시한부이자, 작중 1부 최대 악역 녹스 폰 리인하버로서 이 세계에서 살아남아야 한다.\n과연 무사히 그는 이야기의 엔딩에 도달할 수 있을까?"},"W0070":{"t":"신과함께 돌아온 기사왕님","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx165287-ZXv2LuVMn7cQ.jpg","status":"연재 중","summary":"이세계에서 300년동안 악마사냥을 하다 지구로 귀환했다.\n하지만 나 혼자 오진 않았다."},"W0071":{"t":"괴력 난신","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx175946-rx6eIfakvWYV.jpg","status":"연재 중","summary":"살인에서 삶의 즐거움을 느끼는 '겸살귀', 정(正).\n대 연목검장의 셋째공자 목경운과 똑같이 생긴 얼굴을 가졌는데...\n\"나의 대역이 되어라. 그러면 옥에서 나갈 수 있게 해 주마.\"\n\"그 기회. 제게 주시겠습니까?\"\n\n'촤악-!!!'\n\n셋째공자를 죽여버린다. 그리고 본인이 '진짜'가 되어 살아가고자 한다.\n가짜 목경운은 진짜 목경운으로서 살아남을 수 있을까?\n연쇄살인마, 대 연목검장의 셋째…"},"W0072":{"t":"아빠, 나 이 결혼 안 할래요!","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx130300-nlYyyPzECCjI.jpg","status":"완결","summary":"모두에게 미움받는 악녀 '쥬벨리안.’\n사랑했던 애인도 단 하나뿐인 가족, 아버지에게도 \n버림받고 쓸쓸히 죽어버린 비참한 악역…\n쥬벨리안이 바로 나라고?\n\n인생 2회차 \n이렇게 된 이상 사랑받는 건 텄다!\n아버지의 돈으로 꿀이나 빨겠어!\n\n화려한 공녀라이프를 선언했건만, \n아니, 아버지! 싸이코패스 황태자가 제 결혼 상대라고요?\n방법은 단 하나, 계약 연애뿐!\n그리고 상대로는 아버지의 제자가 …"},"W0073":{"t":"디펜스 게임의 폭군이 되었다","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx153513-dzG6p5H2wrN2.jpg","status":"연재 중","summary":"타워디펜스&던전오펜스 RPG <제국을 지켜라>\n누구도 클리어하지 못한 난이도로 게임의 엔딩을 봤다.\n그런데 정신을 차리니 게임 속이다.\n그것도 공략이 불가능한 튜토리얼 스테이지다.\n\"반드시 클리어해 주마, 이 거지 같은 게임……!\""},"W0074":{"t":"참교육","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx128521-e97aqKfciLy5.jpg","status":"연재 중","summary":"무너진 교권을 지키기 위해 교권보호국 소속 나화진의 참교육이 시작된다!\n<부활남> 채용택 작가 X <신석기녀> 한가람 작가의 신작!"},"W0075":{"t":"악녀를 죽여 줘","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx132165-v SvtDU.png","status":"연재 중","summary":"※사후 세계를 대비하세요!\n\n죽기 직전에 받은 이상한 스팸문자.\n죽은 줄 알고 눈떠보니 빙의심사국이다.\n\n정말 사후 세계가 있다고?\n책 속으로 빙의될 거라고?\n\n\"특별히 선호하는 장르가 있으신가요?\"\n\n전생에 덕질로 모든 장르를 섭렵한 나.\n다음 생은 귀염 뽀짝한 여자아이가 되어 무한한 사랑을 독차지하는 육아물을 희망했건만.\n\n내가 빙의될 책은ㅡ\n생존 난이도 S급,\n고구마 가득한 무한회귀물 …"},"W0087":{"t":"이직로그","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx188781-Dg2ZgRhzIZ8X.jpg","status":"연재 중","summary":"스타트업 회사에 재직 중인 '조이'와 '맥스'.\n\n조이는 눈에 띄는 외모와 뛰어난 사교성, 완벽한 실력의 소유자인 반면\n맥스는 존재감 제로에 대인기피증, 혼밥 마스터이다.\n\n그런 두 사람이 한 팀, 바로 옆자리에서 공존하게 되었고\n같은 팀이 된 첫날, 맥스는 조이의 모니터에서 보면 안 될 것을 보고 말았다!\n\n그 순간부터 그의 평온한 회사 생활은 뒤틀리기 시작하는데…!"},"W0088":{"t":"악당들의 후원자가 되었다","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx201009-jTY2arWw21sc.jpg","status":"연재 중","summary":"좋소 노예인 내가 게임 속 귀족으로 빙의되었다. 근데 미래의 악당들에게 죽는 엑스트라라고? 이들을 교화시켜 어떻게든 귀족 생활을 누리고 말 테다! 아직 어린 악당들의 흑화를 막기 위해 후원했고, 어려운 환경을 극복하게 만들어줬다. 그 결과 뿌듯함이 느껴질 만큼 모두 훌륭하고 평범하게 자랐다. 그렇게 나는 왕국의 최종 흑막이 되었다. …예?"},"W0089":{"t":"악당은 살고 싶다","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx187427-7A225QIPaIU3.png","status":"연재 중","summary":"Fresh out of a breakup, game developer Woo-Jin has little going for him. So when he hears that the middle boss of their game is based on him, he can't resist adding a few traits to make his virtual alter ego a tad more n…"},"W0090":{"t":"악녀라서 편하고 좋은데요?","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx158706-rGGTXRjqJQgu.jpg","status":"연재 중","summary":"\"악녀라서 뭐? 편하고 좋기만 한데?\"\n\n2020년 카카오페이지 올해의 웹소설\n<악녀라서 편하고 좋은데요?>\n웹툰으로 화려하게 다시 태어나다!\n\n은수저X, 금수저X\n\n:+: 오리하르콘 수저 :+: 악녀로 빙의한 윤도희\n180,000,000도 인생 역전에 성공한다.\n\n소심한 본체 그렇지 못한 걸크러시 비주얼,\n빙의 전 이대생 출신으로서의 지식까지 써먹게 되면서 완벽 그 잡채!\n\n게.다.가\n현대…"},"W0091":{"t":"결혼 장사","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx147587-ecBZHgnWa6T7.png","status":"완결","summary":"Bianca de Arno was a ruthless countess in the K anilistcdn/media/manga/cover/large/bx203958-AZVqS2yRXfiN.jpg","status":"연재 중","summary":"어느 날 지구 곳곳에 정체불명의 검은 탑이 솟아오르며, 극소수 인류의 각성이 시작된다.\n하지만 겁 많고 소심한 하남자 봉주혁과는 인연 없는 일일뿐.\n오늘도 알바로 고생한 몸뚱이에 라면 한 입 넣어주려는데…\n\n[봉주혁님은 각성하셨습니다.]\n“…으허, X발, 깜짝이야!”\n\n과연 인생 역전의 기회가 찾아온 걸까?!"},"W0149":{"t":"뱀파이어 로드로 사는 법","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx203154-hrncPJICVIok.jpg","status":"연재 중","summary":"반년간의 도주 생활 끝에 결국 성기사의 명성을 위한 제물로 살해당한 뱀파이어 유진.\n\n후회 속에서 삶을 마감한 그에게 회귀라는 기회가 찾아왔다.\n\n“절대로 또 그렇게 죽진 않을 거다. 정말 과거로 돌아온 거라면, 무슨 수를 써서라도……. 두 번 다시 후회하지 않겠다.”"},"W0150":{"t":"환생했더니 대공의 셋째 아들","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx203471-dCqKXpXikvqE.jpg","status":"연재 중","summary":"혈통 때문에 출세하지 못하고 용병으로 죽었다.\n그런데 다시 눈을 뜨자 내가 대공의 아들이란다.\n\n그토록 바라던 가문, 지위 재능까지 모두 갖춰졌으니 정점까지 올라가 봐야겠지?\n전(前) 용병 단장, 현(現) 대공 셋째 아들의 파격적인 귀족 라이프가 시작된다."},"W0151":{"t":"눈먼 공작과 약혼했다","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx203198-QNlatJXjBkXX.jpg","status":"연재 중","summary":"소설 속 조연으로 환생했지만 다른 인물들과는 엮이지 않겠어!\n하지만 폭삭 망해버린 가문 때문에 길가에 나앉게 되는데…\n\n‘돈이 필요해.’\n\n어쩔 수 없이 소설 속 남자 주인공인 눈먼 공작,\n제럴드의 공작 성에서 6개월 임시직으로 일하게 된 마린!\n\n“공작 성의 생활은 어떻지?”\n“공작 각하의 큰 배려로 아주 편안하게 잘 지내고 있습니다.”\n“여기서 사는 게 좋다고? 그럼 약혼하지.” \n\n아니…"},"W0152":{"t":"회귀한 엑스트라가 천재가 됨","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx203197-rzN3cinxYPDu.jpg","status":"연재 중","summary":"먼치킨 주인공이 다 해먹는 소설 '현대 마법사' 속 세계에 떨어졌다.\n조용히 살면 주인공 '이서준'이 알아서 결말까지 가겠지 했는데…\n\n왜 주인공이 갑자기 죽어버리는 건데?!\n이제 어쩌나 싶은 순간, 이번엔 이서준의 동급생이던 고등학생 때로 회귀했다.\n\n이 소설의 엑스트라로 살려고 했지만,\n이젠 꼬인 전개 속에서 주인공을 지켜야 한다.\n그러려면 먼저, 나 '김선우'가 천재가 되어야 한다."},"W0153":{"t":"방랑기사로 살아가는 법","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx202718-AkkO9OkIYbiw.jpg","status":"연재 중","summary":"불의의 사고로 사망 후 에이츠 가문의 요한 에이츠로 환생한 김요한.\n귀족으로 태어났으나 요한 에이츠는 가문 내 서열 꼴찌.\n설상가상으로 이 세계는 무자비한 중세다.\n\n\"믿을 수 있는 건 오직 자기 자신뿐.\"\n약육강식인 이 세계에서 ad no allies, threw herself into the lake…"},"W0249":{"t":"아빠를 살려보겠습니다","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx212727-tKT1jAER3lQz.jpg","status":"연재 중","summary":"난생 처음 보는 화려한 마차, 성인지 집인지 모를 대저택.\n시골 촌구석에서 아빠와 오붓하게 지내던 나의 일곱 살 인생은\n대부호 트라벨 백작이 집 나간 차남을 찾게 되며 달라졌다.\n\n우리 아빠가 귀족이라고? 나한테 부자 할아버지가 있었다고?!\n\n친척들은 6년 만에 어린 딸과 함께 돌아온 아빠에게 뜨거운 환영…이 아닌 싸늘한 눈빛만 쏘아댔다.\n그때, 머릿속에 이상한 장면들이 폭우처럼 쏟아졌다.\n…"},"W0250":{"t":"멍문세가를 호령하는 아기 고양이입니다","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx212097-OsdfgI5pM8wF.jpg","status":"연재 중","summary":"The coming-of-age story of a kitten who finds herself in the middle of a dog clan!\n\n\nHong-Seol, a cat-human hybrid, was abandoned by her parents because she couldn’t use her inner energy. After a miserable death, she ope…"},"W0251":{"t":"이 황제는 결혼 사기를 칩니다","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx212050-xR7oMjXAP7I4.jpg","status":"연재 중","summary":"Just as I was getting used to a novel where I’d been possessed by an unstoppable will to survive, an unusual little kid rolled into my life. It was hard enough just to make ends meet, but I couldn’t turn away from those …"},"W0252":{"t":"폭군 오빠는 덤입니다","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx212000-i0nMpzD1fKMl.jpg","status":"연재 중","summary":"내 코인이 대박 났다.\n그러나 다음 순간, 비행기 사고로 사망했다.\n\n‘젠장!’\n\n눈을 떴더니, 책 속 세계.\n거기다 하필이면 피폐 역하렘물의 악역 공녀.\n\n뭐...?\n\n여기서 1년만 약혼을 유지하면\n날 원래 세상으로 돌려준다고?\n\n수십 억대 돈을 수익 실현했던 그 날로?\n\n신이시여! 감사합니다!\n모든 게 쉬울 것만 같았건만!\n\n“당신과는 닿는 것조차 혐오스러우니 파혼하겠습니다.”\n\n약혼자가…"},"W0253":{"t":"새벽의 소네트","type":"웹툰","img":"https://s4.anilist.co/file/anilistcdn/media/manga/cover/large/bx210565-vc16cajaQJRl.jpg","status":"연재 중","summary":"Ah, the headstrong Charlotte Augusta? She really doesn’t seem like an Augusta at all. There’s a reason she still has no suitors even after three seasons in society.\n\n\n\nCharlotte Augusta, the third of the let NAV_STACK = [];
let CURRENT_WORK=null, CURRENT_BASE=null, CURRENT_HIGHLIGHT=null;

function myWatched(){ return Object.keys(WATCH).filter(id=>['done','watching'].includes(WATCH[id])); }

function go(page, opts={}){
  NAV_STACK.push({page:CURRENT_PAGE, work:CURRENT_WORK, base:CURRENT_BASE});
  render(page, opts);
}
function goBack(){
  const prev = NAV_STACK.pop();
  if(!prev){ render('home'); return; }
  CURRENT_WORK=prev.work; CURRENT_BASE=prev.base;
  render(prev.page, {noPush:true});
}
let CURRENT_PAGE='home';
function render(page, opts={}){
  CURRENT_PAGE=page;
  document.querySelectorAll('.gnb a').forEach(a=>a.classList.toggle('on', a.dataset.nav===page));
  const main = document.getElementById('main');
  if(page==='home') main.innerHTML = viewHome();
  else if(page==='anime') main.innerHTML = viewCatalog('애니', ANIME_IDS);
  else if(page==='webtoon') main.innerHTML = viewCatalog('웹툰', WEBTOON_IDS);
  else if(page==='ollpick') main.innerHTML = viewOllpick();
  else if(page==='detail') main.innerHTML = viewDetail(opts.work||CURRENT_WORK);
  else if(page==='ollpickDetail') main.innerHTML = viewOllpickDetail(opts.base||CURRENT_BASE);
  else if(page==='compose') main.innerHTML = viewCompose();
  else if(page==='mypage') main.innerHTML = viewMypage();
  else if(page==='search') main.innerHTML = viewSearch();
  window.scrollTo(0,0);
  if(page==='ollpick') afterOllpick();
  if(page==='anime'||page==='webtoon') renderCatGrid(true);
  if(page==='search') renderSearchGrid(true);
  if(page==='compose') afterCompose();
  if(page==='ollpickDetail' && CURRENT_HIGHLIGHT) highlightPost();
}

/* =================== 공통: 썸네일 =================== */
function thumbHTML(id, rank){
  const w=WORKS[id]; const st=WATCH[id]||'none';
  const saved = st!=='none';
  return `<div class="thumb">
    <div class="poster" onclick="go('detail',{work:'${id}'})">
      <img src="${w.img}" alt="${w.t}" loading="lazy">
      ${rank?`<span class="rank">${rank}</span>`:''}
      <button class="statebtn ${saved?'saved':''}" onclick="event.stopPropagation();openState('${id}',this)">${STATE_ICON[st]}</button>
    </div>
    <div class="tt" onclick="go('detail',{work:'${id}'})">${w.t}</div>
    <div class="tm">${w.status||w.type}</div>
  </div>`;
}
let STATE_TARGET=null;
function openState(id, btn){
  STATE_TARGET=id;
  const menu=document.getElementById('stateMenu');
  const cur=WATCH[id]||'none';
  menu.innerHTML = Object.entries(STATES).map(([k,label])=>
    `<button class="${cur===k?'active':''}" onclick="setState('${id}','${k}')">${STATE_ICON[k]} ${label}${cur===k?' ✓':''}</button>`
  ).join('') + (cur!=='none'?`<button onclick="setState('${id}','none')">✕ 상태 해제</button>`:'');
  const r=btn.getBoundingClientRect();
  menu.style.top=(r.bottom+6)+'px';
  menu.style.left=Math.min(r.left, window.innerWidth-160)+'px';
  menu.classList.add('on');
}
function setState(id, val){
  if(val==='none') delete WATCH[id]; else WATCH[id]=val;
  document.getElementById('stateMenu').classList.remove('on');
  toast(val==='none'?'상태를 해제했어요':`'${STATES[val]}'(으)로 저장했어요`);
  render(CURRENT_PAGE, {noPush:true});
}
document.addEventListener('click', e=>{
  const m=document.getElementById('stateMenu');
  if(m.classList.contains('on') && !m.contains(e.target) && !e.target.closest('.statebtn')) m.classList.remove('on');
});
