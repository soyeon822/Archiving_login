function afterCompose(){
  const hasEligible = Object.keys(WORKS).some(id=>['done','watching'].includes(WATCH[id]));
  if(!hasEligible) return;
  FAB={baseId:null, recoId:null};
  if(CURRENT_WORK && ['done','watching'].includes(WATCH[CURRENT_WORK])) selectFab('base',CURRENT_WORK);
  const bs=document.getElementById('fabBaseS'), rs=document.getElementById('fabRecoS');
  bs.addEventListener('input',()=>searchFab('base',bs.value));
  rs.addEventListener('input',()=>searchFab('reco',rs.value));
  bs.addEventListener('focus',()=>searchFab('base',bs.value));
  rs.addEventListener('focus',()=>searchFab('reco',rs.value));
  const rz=document.getElementById('fabReason');
  rz.addEventListener('input',()=>{
    const len=rz.value.trim().length;
    document.getElementById('fabCnt').textContent=rz.value.length;
    document.getElementById('fabWarn').classList.toggle('on', len>0&&len<REASON_MIN);
    updateFab();
  });
  document.addEventListener('click',e=>{
    if(!e.target.closest('.cp-search')){document.querySelectorAll('.cp-results').forEach(r=>r.classList.remove('on'));}
  });
  updateFab();
}
function eligibleBase(q){
  return Object.keys(WORKS).filter(id=>['done','watching'].includes(WATCH[id])&&WORKS[id].t.includes(q));
}
function searchFab(kind,q){
  const box=document.getElementById(kind==='base'?'fabBaseR':'fabRecoR');
  let ids = kind==='base'? eligibleBase(q) : Object.keys(WORKS).filter(id=>WORKS[id].t.includes(q));
  if(kind==='reco'&&FAB.baseId) ids=ids.filter(id=>id!==FAB.baseId);
  box.classList.add('on');
  if(!ids.length){ box.innerHTML=`<div class="cp-empty">${kind==='base'?'보는중·완료 상태인 작품이 없어요':'검색 결과가 없어요'}</div>`; return; }
  box.innerHTML=ids.slice(0,8).map(id=>{const w=WORKS[id];
    return `<div class="cp-ri" onclick="selectFab('${kind}','${id}')"><div class="rp"><img src="${w.img}"></div><div class="rt">${w.t}</div>${kind==='base'?`<span class="rs">${STATES[WATCH[id]]}</span>`:''}</div>`;}).join('');
}
function selectFab(kind,id){
  FAB[kind==='base'?'baseId':'recoId']=id;
  document.getElementById(kind==='base'?'fabBaseR':'fabRecoR').classList.remove('on');
  const inp=document.getElementById(kind==='base'?'fabBaseS':'fabRecoS'); if(inp) inp.value='';
  renderFabSel(kind); updateFab();
}
function renderFabSel(kind){
  const id=FAB[kind==='base'?'baseId':'recoId'];
  const sel=document.getElementById(kind==='base'?'fabBaseSel':'fabRecoSel');
  if(!id){ sel.classList.remove('on'); sel.innerHTML=''; return; }
  const w=WORKS[id];
  sel.classList.add('on');
  sel.innerHTML=`<div class="sp"><img src="${w.img}"></div><div class="st"><div class="stt">${w.t}</div><div class="stm">${w.type}${kind==='base'?' · '+STATES[WATCH[id]]+' 상태':''}</div></div><button class="clr" onclick="clearFab('${kind}')" title="선택 취소">✕</button>`;
}
function clearFab(kind){ FAB[kind==='base'?'baseId':'recoId']=null; renderFabSel(kind); updateFab(); }
function updateFab(){
  const dup=FAB.baseId&&FAB.recoId&&POSTINGS.some(p=>p.baseId===FAB.baseId&&p.recoId===FAB.recoId);
  document.getElementById('fabDup').classList.toggle('on',!!dup);
  const rz=document.getElementById('fabReason');
  const ok=FAB.baseId&&FAB.recoId&&FAB.baseId!==FAB.recoId&&rz&&rz.value.trim().length>=REASON_MIN;
  document.getElementById('fabSubmit').disabled=!ok;
}
function submitCompose(){
  const reason=document.getElementById('fabReason').value.trim();
  if(!FAB.baseId||!FAB.recoId||FAB.baseId===FAB.recoId||reason.length<REASON_MIN) return;
  let post=POSTINGS.find(p=>p.baseId===FAB.baseId&&p.recoId===FAB.recoId);
  if(post){ post.agree+=1; post.reasons.push({user:CURRENT_USER,text:reason}); }
  else{ post={id:'p'+Date.now(), baseId:FAB.baseId, recoId:FAB.recoId, agree:1, reasons:[{user:CURRENT_USER,text:reason}]}; POSTINGS.push(post); }
  toast('추천을 등록했어요');
  CURRENT_HIGHLIGHT=post.id;
  go('ollpickDetail',{base:FAB.baseId});
}

/* =================== 마이페이지 =================== */
let MP_TAB='all';
function viewMypage(){
  return `<div class="wrap">
    <div class="mp-hd"><div class="av">${CURRENT_USER[0].toUpperCase()}</div><div><div class="nm">${CURRENT_USER}</div><div class="sub">본 작품·볼 작품을 모아두는 나만의 아카이브</div></div></div>
    <div class="mp-tabs">
      <button class="${MP_TAB==='all'?'on':''}" onclick="setMpTab('all')">전체 보관함</button>
      <button class="${MP_TAB==='watching'?'on':''}" onclick="setMpTab('watching')">보는중</button>
      <button class="${MP_TAB==='done'?'on':''}" onclick="setMpTab('done')">완료</button>
      <button class="${MP_TAB==='keep'?'on':''}" onclick="setMpTab('keep')">볼예정</button>
      <button class="${MP_TAB==='mypost'?'on':''}" onclick="setMpTab('mypost')">내가 쓴 올블픽</button>
    </div>
    <div id="mpBody">${mpBody()}</div>
  </div>`;
}
function setMpTab(t){ MP_TAB=t; document.getElementById('mpBody').innerHTML=mpBody(); }
function mpBody(){
  if(MP_TAB==='mypost'){
    const mine=POSTINGS.filter(p=>p.reasons.some(r=>r.user===CURRENT_USER));
    if(!mine.length) return `<p style="font-size:13px;color:var(--muted);padding:20px 0;">아직 작성한 올블픽이 없어요.</p>`;
    return `<div class="grid3">${mine.map(p=>{const b=WORKS[p.baseId],r=WORKS[p.recoId];
      return `<div class="rec-pair"><div class="pgrid"><div><div class="thumb"><div class="poster"><img src="${b.img}"></div></div><div class="cap">기준작</div></div><div><div class="thumb"><div class="poster"><img src="${r.img}"></div></div><div class="cap">추천작</div></div></div><div class="foot" onclick="go('ollpickDetail',{base:'${p.baseId}'})" style="cursor:pointer;"><span class="who">👏 ${p.agree} 어인정</span><span class="heart">보기 →</span></div></div>`;}).join('')}</div>`;
  }
  const ids = Object.keys(WATCH).filter(id=> MP_TAB==='all'? true : WATCH[id]===MP_TAB);
  if(!ids.length) return `<p style="font-size:13px;color:var(--muted);padding:20px 0;">해당 상태의 작품이 없어요.</p>`;
  return `<div class="grid6">${ids.map(id=>thumbHTML(id)).join('')}</div>`;
}

function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('on'); setTimeout(()=>t.classList.remove('on'),1800); }

/* =================== 검색 =================== */
let SEARCH_Q='', SEARCH_IDS=[], SEARCH_SHOWN=0;
function doSearch(){
  const q=document.getElementById('hdSearch').value.trim();
  const type=document.getElementById('hdSearchType').value;
  if(!q){ return; }
  SEARCH_Q=q;
  SEARCH_IDS=Object.keys(WORKS).filter(id=>{
    const w=WORKS[id];
    if(type!=='all' && w.type!==type) return false;
    return w.t.includes(q) || (w.summary&&w.summary.includes(q));
  });
  go('search');
}
function viewSearch(){
  return `<div class="wrap">
    <div class="sec-h" style="font-size:20px;margin-bottom:6px;">'${SEARCH_Q}' 검색 결과</div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:20px;">${SEARCH_IDS.length.toLocaleString()}편을 찾았어요.</p>
    <div class="grid6" id="searchGrid"></div>
    ${SEARCH_IDS.length>30?`<div style="text-align:center;margin-top:24px;"><button id="searchMore" style="font-size:13px;font-weight:800;color:var(--brand);background:var(--surface);border:1px solid var(--line);padding:12px 28px;border-radius:22px;" onclick="moreSearch()">더 보기</button></div>`:''}
  </div>`;
}
function renderSearchGrid(reset){
  const grid=document.getElementById('searchGrid');
  if(reset){grid.innerHTML=''; SEARCH_SHOWN=0;}
  const next=SEARCH_IDS.slice(SEARCH_SHOWN, SEARCH_SHOWN+30);
  grid.insertAdjacentHTML('beforeend', next.map(id=>thumbHTML(id)).join(''));
  SEARCH_SHOWN+=next.length;
  const more=document.getElementById('searchMore');
  if(more) more.style.display=SEARCH_SHOWN>=SEARCH_IDS.length?'none':'inline-block';
  if(!SEARCH_IDS.length) grid.innerHTML=`<p style="grid-column:1/-1;font-size:13px;color:var(--muted);padding:20px 0;">검색 결과가 없어요. 다른 키워드로 찾아보세요.</p>`;
}
function moreSearch(){ renderSearchGrid(false); }

render('home');
</script>
</body>
</html>
