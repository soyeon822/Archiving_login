<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ALLBLU — 웹툰·애니 아카이브</title>
<link rel="stylesheet" as="style" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root{
  --brand:#1f5eff; --navy:#122848; --navyDeep:#0b1a33;
  --ink:#1a2233; --muted:#6b7280; --line:#e8ebf0; --search:#f1f3f7;
  --surface:#f6f8fb; --bg:#faf9fc; --footer:#111827;
  --green:#1a9c53; --card:#ffffff;
  --poster:linear-gradient(135deg,#c9d6ea,#9eb0cb);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Pretendard',-apple-system,sans-serif; background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased;}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
a{color:inherit; text-decoration:none;}
img{display:block;}
img{background:var(--poster);}
.app{max-width:1200px; margin:0 auto; min-height:100vh; background:#fff; box-shadow:0 0 60px rgba(15,23,42,.06);}

/* ===== 헤더 GNB ===== */
.hd{position:sticky; top:0; z-index:40; border-bottom:1px solid var(--line); background:rgba(255,255,255,.95); backdrop-filter:blur(8px);}
.hd-in{display:flex; height:70px; align-items:center; gap:22px; padding:0 30px;}
.logo{display:flex; flex-direction:column; align-items:center; gap:1px; flex-shrink:0;}
.logo svg{width:34px; height:34px;}
.logo span{font-size:14px; font-weight:900; color:var(--brand); letter-spacing:-.02em;}
.gnb{display:flex; gap:22px; font-size:15px; font-weight:700;}
.gnb a{color:var(--ink); padding:4px 0;}
.gnb a:hover{color:var(--brand);}
.gnb a.on{color:var(--brand);}
.search{margin-left:auto; display:flex; align-items:center; gap:8px; background:var(--search); border-radius:22px; padding:9px 16px; min-width:240px; max-width:380px; flex:1;}
.search input{border:none; background:none; outline:none; font-size:13px; flex:1; min-width:0; color:var(--ink);}
.search input::placeholder{color:var(--muted);}
.search select{border:none; background:none; outline:none; font-size:12px; font-weight:700; color:var(--ink);}
.hd-icon{width:38px; height:38px; border-radius:50%; border:1px solid rgba(26,34,51,.2); display:flex; align-items:center; justify-content:center; flex-shrink:0;}
.hd-icon:hover{border-color:var(--brand); color:var(--brand);}

/* ===== 페이지 ===== */
.page{display:none;}
.page.on{display:block;}
.wrap{padding:22px 30px;}
.sec{background:#fff; border:1px solid var(--line); border-radius:18px; padding:24px; margin-bottom:22px;}
.sec-h{font-size:18px; font-weight:900; margin-bottom:16px; letter-spacing:-.02em;}

/* 히어로 */
.hero{border-radius:20px; background:linear-gradient(135deg,var(--navy),var(--navyDeep) 60%,#06102a); color:#fff; padding:44px 40px; margin-bottom:22px;}
.hero .eyebrow{font-size:11px; font-weight:800; letter-spacing:.18em; color:rgba(255,255,255,.65); margin-bottom:12px;}
.hero h1{font-size:30px; font-weight:900; line-height:1.32; letter-spacing:-.02em;}
.hero p{margin-top:14px; font-size:14px; line-height:1.7; color:rgba(255,255,255,.75); max-width:640px;}

/* 썸네일 그리드 */
.grid6{display:grid; grid-template-columns:repeat(6,1fr); gap:16px;}
.grid3{display:grid; grid-template-columns:repeat(3,1fr); gap:16px;}
@media(max-width:900px){.grid6{grid-template-columns:repeat(3,1fr);} .grid3{grid-template-columns:1fr;}}

.thumb{position:relative;}
.thumb .poster{position:relative; aspect-ratio:2/3; border-radius:12px; overflow:hidden; background:var(--poster);}
.thumb .poster img{width:100%; height:100%; object-fit:cover;}
.thumb .rank{position:absolute; left:8px; top:8px; width:26px; height:26px; border-radius:50%; background:var(--navy); color:#fff; font-size:12px; font-weight:900; display:flex; align-items:center; justify-content:center; z-index:2;}
.thumb .statebtn{position:absolute; right:8px; bottom:8px; width:30px; height:30px; border-radius:50%; background:var(--brand); color:#fff; display:flex; align-items:center; justify-content:center; z-index:3; box-shadow:0 2px 8px rgba(31,94,255,.4); font-size:14px;}
.thumb .statebtn.saved{background:var(--green);}
.thumb .tt{font-size:13px; font-weight:800; margin-top:9px; line-height:1.35; display:-webkit-box; -webkit-line-clamp:1; -webkit-box-orient:vertical; overflow:hidden;}
.thumb .tm{font-size:12px; font-weight:700; color:var(--muted); margin-top:3px;}

/* 상태 드롭다운 */
.state-menu{position:fixed; z-index:100; background:#fff; border:1px solid var(--line); border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,.15); padding:6px; min-width:130px; display:none;}
.state-menu.on{display:block;}
.state-menu button{display:flex; width:100%; align-items:center; gap:8px; padding:9px 12px; border-radius:8px; font-size:13px; font-weight:700; text-align:left;}
.state-menu button:hover{background:var(--surface);}
.state-menu button.active{color:var(--brand);}

/* 탭 */
.tabs{display:flex; gap:14px; font-size:14px; font-weight:800; color:var(--muted); margin-bottom:16px;}
.tabs button.on{color:var(--ink);}
.tabs .divi{color:var(--line);}

/* 인기평가 카드 */
.eval-card{border:1px solid var(--line); border-radius:16px; overflow:hidden; background:#fff;}
.eval-card .banner{height:120px; background:var(--poster);}
.eval-card .body{padding:16px;}
.eval-card h3{font-size:15px; font-weight:900; margin-bottom:4px; display:-webkit-box; -webkit-line-clamp:1; -webkit-box-orient:vertical; overflow:hidden;}
.eval-card .sub{font-size:12px; font-weight:700; color:var(--muted); margin-bottom:8px;}
.eval-card .txt{font-size:13px; line-height:1.55; color:rgba(26,34,51,.8); min-height:58px; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;}
.eval-card .foot{display:flex; align-items:center; justify-content:space-between; margin-top:14px; font-size:12px; color:var(--muted);}
.eval-card .usr{display:flex; align-items:center; gap:7px; font-weight:700;}
.eval-card .av{width:22px; height:22px; border-radius:50%; background:var(--search); display:flex; align-items:center; justify-content:center; font-size:10px;}

/* 최근추가 추천 페어 카드(홈) */
.rec-pair{border:1px solid var(--line); border-radius:16px; padding:16px; background:#fff;}
.rec-pair .pgrid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
.rec-pair .cap{text-align:center; font-size:11px; font-weight:800; color:var(--muted); margin-top:6px;}
.rec-pair .foot{display:flex; align-items:center; justify-content:space-between; margin-top:12px;}
.rec-pair .who{display:flex; align-items:center; gap:6px; font-size:11px; font-weight:700; color:var(--muted);}
.rec-pair .who .a{width:20px; height:20px; border-radius:50%; background:var(--brand); color:#fff; font-size:9px; display:flex; align-items:center; justify-content:center;}
.rec-pair .heart{font-size:12px; font-weight:800; color:var(--brand);}

/* 푸터 */
.ft{background:var(--footer); color:rgba(255,255,255,.9); padding:40px 40px; font-size:13px; line-height:1.9;}
.ft a{text-decoration:underline; text-underline-offset:2px;}
.ft .muted{color:rgba(255,255,255,.6);}
.ft .team{color:#fff; margin-top:22px; font-weight:700;}

/* 카테고리 필터 */
.catbar{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:18px;}
.catbar button{font-size:12.5px; font-weight:700; color:var(--muted); padding:7px 14px; border-radius:16px; background:var(--surface);}
.catbar button.on{background:var(--brand); color:#fff;}

.toast{position:fixed; left:50%; bottom:32px; transform:translateX(-50%); background:var(--navy); color:#fff; font-size:13px; font-weight:700; padding:12px 22px; border-radius:22px; z-index:200; opacity:0; pointer-events:none; transition:opacity .25s;}
.toast.on{opacity:1;}

/* ===== 올블픽 탭 ===== */
.op-head h1{font-size:22px; font-weight:900; letter-spacing:-.02em;}
.op-head p{font-size:13px; color:var(--muted); margin-top:6px; margin-bottom:24px;}
.op-subh{font-size:16px; font-weight:800; margin-bottom:12px;}
.op-strip{display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:34px;}
@media(max-width:820px){.op-strip{grid-template-columns:1fr;}}
.op-mini{background:#fff; border:1px solid var(--line); border-radius:16px; padding:16px; cursor:pointer;}
.op-mini-head{display:flex; align-items:flex-start; gap:8px; margin-bottom:14px;}
.op-mini-head .av{width:26px; height:26px; border-radius:50%; background:var(--brand); color:#fff; font-size:11px; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
.op-mini-head .nick{font-size:11.5px; color:var(--muted); line-height:1.45; flex:1;}
.op-mini-head .nick b{color:var(--ink); font-weight:800;}
.op-mini-head .agree{font-size:12px; font-weight:800; color:var(--brand); flex-shrink:0;}
.op-mini-body{display:flex; gap:12px; margin-bottom:14px;}
.op-mini-body .mp{position:relative; width:100px; aspect-ratio:2/3; border-radius:10px; overflow:hidden; background:var(--poster); flex-shrink:0;}
.op-mini-body .mp img{width:100%; height:100%; object-fit:cover;}
.op-mini-body .badge{position:absolute; right:6px; bottom:6px; width:26px; height:26px; border-radius:50%; background:var(--brand); color:#fff; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:800; box-shadow:0 2px 6px rgba(0,0,0,.25);}
.op-mini-right{flex:1; min-width:0; display:flex; flex-direction:column;}
.op-mini-recotitle{font-size:14px; font-weight:800; line-height:1.4; text-align:center; margin-bottom:10px;}
.op-mini-quote{flex:1; font-size:12px; color:var(--muted); line-height:1.55; background:var(--surface); border-radius:10px; padding:12px; display:flex; align-items:center; justify-content:center; text-align:center;}
.op-mini-btn{width:100%; font-size:12.5px; font-weight:800; color:var(--brand); background:var(--surface); border:1px solid var(--line); padding:12px; border-radius:11px;}
.op-mini-btn:hover{border-color:var(--brand);}

.op-layout{display:flex; gap:24px; align-items:flex-start;}
@media(max-width:820px){.op-layout{flex-direction:column;} .op-right{width:100%!important; position:static!important;}}
.op-left{flex:1; min-width:0;}
.op-right{width:280px; flex-shrink:0; position:sticky; top:86px;}

/* 피드 카드 */
.feed-post{background:#fff; border:1px solid var(--line); border-radius:16px; padding:20px; margin-bottom:18px;}
.fp-head{display:flex; align-items:center; gap:8px; margin-bottom:14px;}
.fp-head .av{width:32px; height:32px; border-radius:50%; background:var(--brand); color:#fff; font-size:13px; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
.fp-head .nick{font-size:13px; font-weight:800;}
.fp-head .tag{font-size:10px; font-weight:700; color:var(--brand); background:#eaf0ff; padding:2px 8px; border-radius:9px;}
.fp-head .agree{font-size:12px; font-weight:800; color:var(--brand); margin-left:auto;}
.fp-head .time{font-size:11px; color:var(--muted); margin-left:8px;}
.fp-line{font-size:15px; font-weight:800; line-height:1.4; margin-bottom:16px; cursor:pointer;}
.fp-line b{color:var(--brand);}
.fp-line:hover{text-decoration:underline;}
.fp-pair{display:flex; align-items:center; justify-content:center; gap:16px; margin-bottom:14px;}
.fp-pair .pp{flex:0 0 130px; text-align:center;}
.fp-pair .poster{position:relative; width:130px; aspect-ratio:2/3; border-radius:10px; overflow:hidden; background:var(--poster); margin:0 auto 8px; cursor:pointer;}
.fp-pair .poster img{width:100%; height:100%; object-fit:cover;}
.fp-pair .badge{position:absolute; right:6px; bottom:6px; width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:800; color:#fff; box-shadow:0 2px 6px rgba(0,0,0,.25);}
.fp-pair .badge.seen{background:var(--green);}
.fp-pair .badge.reco{background:var(--brand);}
.fp-pair .pt{font-size:12.5px; font-weight:800; line-height:1.3;}
.fp-pair .pm{font-size:11px; color:var(--muted); margin-top:2px;}
.fp-pair .arrow{font-size:16px; color:var(--muted); flex-shrink:0; width:24px; height:24px; border-radius:50%; background:var(--surface); display:flex; align-items:center; justify-content:center;}
.fp-reasons-title{font-size:12px; font-weight:800; color:var(--muted); margin-bottom:10px;}
.fp-reason{display:flex; gap:9px; padding:9px 0; border-bottom:1px solid var(--line);}
.fp-reason:last-child{border-bottom:none;}
.fp-reason .av{width:24px; height:24px; border-radius:50%; background:var(--brand); color:#fff; font-size:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
.fp-reason .rn{font-size:12px; font-weight:800; margin-bottom:2px;}
.fp-reason .rb{font-size:12.5px; color:var(--muted); line-height:1.5;}
.fp-morebtn{font-size:11.5px; font-weight:800; color:var(--brand); cursor:pointer; margin-top:6px;}
.fp-more-wrap{display:none; margin:8px 0 0; background:var(--surface); border-radius:10px; padding:2px 12px;}
.fp-more-wrap.on{display:block;}
.fp-detailbtn{width:100%; margin-top:14px; font-size:13px; font-weight:800; color:var(--brand); background:var(--surface); border:1px solid var(--line); padding:13px; border-radius:12px;}
.fp-detailbtn:hover{border-color:var(--brand);}

/* 사이드바 */
.side{background:#fff; border:1px solid var(--line); border-radius:16px; padding:18px; margin-bottom:16px;}
.side-write{width:100%; background:var(--brand); color:#fff; font-size:14px; font-weight:800; padding:14px; border-radius:12px; margin-bottom:16px;}
.side h4{font-size:13px; font-weight:900; margin-bottom:12px;}
.side-stat{display:flex; justify-content:space-between; font-size:12.5px; padding:7px 0;}
.side-stat span:last-child{font-weight:800; color:var(--brand);}
.side-rank{display:flex; align-items:center; gap:9px; padding:8px 0;}
.side-rank .n{width:20px; font-size:12px; font-weight:900; color:var(--brand);}
.side-rank .av{width:26px; height:26px; border-radius:50%; background:var(--brand); color:#fff; font-size:11px; display:flex; align-items:center; justify-content:center;}
.side-rank .nm{font-size:12.5px; font-weight:700; flex:1;}
.side-rank .ct{font-size:11px; color:var(--muted);}
.side-todo{display:flex; align-items:center; gap:9px; padding:9px 0; border-bottom:1px solid var(--line);}
.side-todo:last-child{border-bottom:none;}
.side-todo .poster{width:34px; height:46px; border-radius:6px; overflow:hidden; background:var(--poster); flex-shrink:0;}
.side-todo .poster img{width:100%;height:100%;object-fit:cover;}
.side-todo .nm{flex:1; font-size:12px; font-weight:700; line-height:1.3;}
.side-todo .go{font-size:11px; font-weight:800; color:#fff; background:var(--brand); padding:6px 12px; border-radius:14px;}

/* ===== 작품 상세 ===== */
.dt-top{display:flex; gap:26px; margin-bottom:30px;}
@media(max-width:720px){.dt-top{flex-direction:column;}}
.dt-poster{width:200px; flex-shrink:0; aspect-ratio:2/3; border-radius:14px; overflow:hidden; background:var(--poster);}
.dt-poster img{width:100%;height:100%;object-fit:cover;}
.dt-info{flex:1;}
.dt-type{font-size:12px; font-weight:800; color:var(--brand); margin-bottom:8px;}
.dt-title{font-size:26px; font-weight:900; line-height:1.3; letter-spacing:-.02em; margin-bottom:10px;}
.dt-star{font-size:14px; font-weight:800; color:var(--muted); margin-bottom:18px;}
.dt-states{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px;}
.dt-state{font-size:13px; font-weight:800; padding:11px 18px; border-radius:12px; background:var(--surface); color:var(--ink); border:1px solid var(--line);}
.dt-state.on{background:var(--brand); color:#fff; border-color:var(--brand);}
.dt-desc{font-size:13.5px; color:var(--muted); line-height:1.7;}
.dt-op-strip{display:flex; gap:14px; overflow-x:auto; padding-bottom:6px;}
.dt-op-card{flex:0 0 220px; border:1px solid var(--line); border-radius:14px; padding:14px; cursor:pointer;}
.dt-op-card .row{display:flex; align-items:center; gap:8px; margin-bottom:10px;}
.dt-op-card .rp{width:40px; height:56px; border-radius:6px; overflow:hidden; background:var(--poster);}
.dt-op-card .rp img{width:100%;height:100%;object-fit:cover;}
.dt-op-card .rt{font-size:12.5px; font-weight:800; flex:1;}
.dt-op-card .rq{font-size:11.5px; color:var(--muted); line-height:1.5;}
.dt-op-card .ag{font-size:11px; font-weight:800; color:var(--brand); margin-top:8px;}

/* ===== 올블픽 상세 ===== */
.od-top{display:flex; gap:24px; align-items:flex-start; margin-bottom:26px;}
@media(max-width:720px){.od-top{flex-direction:column;}}
.od-base{width:180px; flex-shrink:0; position:sticky; top:86px;}
.od-base .poster{aspect-ratio:2/3; border-radius:14px; overflow:hidden; background:var(--poster); margin-bottom:12px;}
.od-base .poster img{width:100%;height:100%;object-fit:cover;}
.od-base .label{font-size:11px; font-weight:800; color:var(--green); margin-bottom:4px;}
.od-base .t{font-size:15px; font-weight:900; line-height:1.35;}
.od-base .m{font-size:12px; color:var(--muted); margin-top:4px;}
.od-list{flex:1; min-width:0;}
.od-entry{border:1px solid var(--line); border-radius:16px; padding:18px; margin-bottom:16px;}
.od-entry.hl{border-color:var(--brand); box-shadow:0 0 0 3px rgba(31,94,255,.12);}
.od-entry-top{display:flex; gap:14px; margin-bottom:14px;}
.od-entry .poster{width:90px; aspect-ratio:2/3; border-radius:10px; overflow:hidden; background:var(--poster); flex-shrink:0; cursor:pointer;}
.od-entry .poster img{width:100%;height:100%;object-fit:cover;}
.od-entry .meta{flex:1;}
.od-entry .rtype{font-size:11px; font-weight:800; color:var(--brand);}
.od-entry .rtitle{font-size:17px; font-weight:900; margin:3px 0 6px; cursor:pointer;}
.od-entry .rtitle:hover{text-decoration:underline;}
.od-entry .rstar{font-size:12px; color:var(--muted);}
.od-agree-row{display:flex; align-items:center; gap:12px; margin-bottom:14px;}
.od-agree-row .cnt{font-size:13px; font-weight:800;}
.od-agree-row .cnt b{color:var(--brand);}
.od-agree-btn{margin-left:auto; font-size:12.5px; font-weight:800; padding:9px 18px; border-radius:20px; background:var(--brand); color:#fff;}
.od-agree-btn.done{background:var(--surface); color:var(--muted); border:1px solid var(--line);}
.od-agree-write{display:none; gap:8px; margin-bottom:14px;}
.od-agree-write.on{display:flex;}
.od-agree-write input{flex:1; border:1px solid var(--line); border-radius:10px; padding:10px 12px; font-size:12.5px; outline:none; font-family:inherit;}
.od-agree-write button{background:var(--brand); color:#fff; font-size:12px; font-weight:800; padding:0 16px; border-radius:10px;}
.od-reason{display:flex; gap:10px; padding:11px 0; border-top:1px solid var(--line);}
.od-reason .av{width:28px; height:28px; border-radius:50%; background:var(--brand); color:#fff; font-size:11px; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
.od-reason .rn{font-size:12.5px; font-weight:800; margin-bottom:2px;}
.od-reason .rb{font-size:12.5px; color:var(--muted); line-height:1.5;}

/* ===== 투고 ===== */
.cp{max-width:540px; margin:0 auto;}
.cp-title{font-size:22px; font-weight:900; margin-bottom:24px;}
.cp label{display:block; font-size:13px; font-weight:800; margin:22px 0 8px;}
.cp label:first-of-type{margin-top:0;}
.cp .hint{font-size:11px; font-weight:600; color:var(--muted);}
.cp-search{position:relative;}
.cp-search input{width:100%; border:1px solid var(--line); border-radius:11px; padding:12px 14px; font-size:13px; outline:none; font-family:inherit;}
.cp-search input:focus{border-color:var(--brand);}
.cp-results{display:none; position:absolute; top:calc(100% + 4px); left:0; right:0; background:#fff; border:1px solid var(--line); border-radius:12px; max-height:240px; overflow-y:auto; z-index:5; box-shadow:0 8px 24px rgba(0,0,0,.12);}
.cp-results.on{display:block;}
.cp-ri{display:flex; align-items:center; gap:10px; padding:10px 12px; cursor:pointer; border-bottom:1px solid var(--line);}
.cp-ri:last-child{border-bottom:none;}
.cp-ri:hover{background:var(--surface);}
.cp-ri .rp{width:30px; height:42px; border-radius:5px; overflow:hidden; background:var(--poster); flex-shrink:0;}
.cp-ri .rp img{width:100%;height:100%;object-fit:cover;}
.cp-ri .rt{font-size:12.5px; font-weight:700; flex:1;}
.cp-ri .rs{font-size:10px; font-weight:800; padding:2px 8px; border-radius:8px; background:#e9f9ee; color:var(--green);}
.cp-empty{padding:16px; font-size:12.5px; color:var(--muted); text-align:center;}
.cp-selected{display:none; align-items:center; gap:12px; background:var(--surface); border-radius:12px; padding:12px 14px; margin-top:8px;}
.cp-selected.on{display:flex;}
.cp-selected .sp{width:36px; height:50px; border-radius:6px; overflow:hidden; background:var(--poster); flex-shrink:0;}
.cp-selected .sp img{width:100%;height:100%;object-fit:cover;}
.cp-selected .st{flex:1;}
.cp-selected .stt{font-size:13px; font-weight:800;}
.cp-selected .stm{font-size:11px; color:var(--muted); margin-top:2px;}
.cp-selected .clr{width:28px; height:28px; border-radius:50%; background:#fff; color:var(--muted); font-size:13px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
.cp textarea{width:100%; border:1px solid var(--line); border-radius:11px; padding:12px 14px; font-size:13px; outline:none; font-family:inherit; resize:none; height:110px;}
.cp textarea:focus{border-color:var(--brand);}
.cp-cnt{font-size:11px; color:var(--muted); text-align:right; margin-top:5px;}
.cp-warn{display:none; font-size:11.5px; color:#e11551; margin-top:6px;}
.cp-warn.on{display:block;}
.cp-dup{display:none; font-size:11.5px; color:var(--brand); background:var(--surface); padding:11px 14px; border-radius:10px; margin-top:12px;}
.cp-dup.on{display:block;}
.cp-blocked-note{display:none; font-size:11.5px; color:#e11551; background:var(--surface); padding:11px 14px; border-radius:10px; margin-top:10px;}
.cp-blocked-note.on{display:block;}
.cp-foot{display:flex; gap:10px; margin-top:28px;}
.cp-foot button{flex:1; font-size:14px; font-weight:800; padding:14px; border-radius:12px;}
.cp-foot .ghost{background:var(--surface); color:var(--ink);}
.cp-foot .primary{background:var(--brand); color:#fff;}
.cp-foot .primary:disabled{opacity:.4; cursor:not-allowed;}
.cp-blocked{background:#fff; border:1px solid var(--line); border-radius:16px; padding:44px 28px; text-align:center;}
.cp-blocked .ic{font-size:36px; margin-bottom:14px;}
.cp-blocked .tx{font-size:13.5px; line-height:1.7; margin-bottom:22px;}
.cp-blocked .bt{font-size:13px; font-weight:800; color:#fff; background:var(--brand); padding:13px 24px; border-radius:22px;}

/* ===== 마이페이지 ===== */
.mp-hd{display:flex; align-items:center; gap:18px; background:linear-gradient(135deg,var(--navy),var(--navyDeep)); border-radius:18px; padding:28px; color:#fff; margin-bottom:24px;}
.mp-hd .av{width:70px; height:70px; border-radius:50%; background:var(--brand); display:flex; align-items:center; justify-content:center; font-size:28px; font-weight:900;}
.mp-hd .nm{font-size:20px; font-weight:900;}
.mp-hd .sub{font-size:12.5px; color:rgba(255,255,255,.7); margin-top:4px;}
.mp-tabs{display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap;}
.mp-tabs button{font-size:13px; font-weight:800; padding:9px 18px; border-radius:20px; background:var(--surface); color:var(--muted);}
.mp-tabs button.on{background:var(--brand); color:#fff;}
</style>

<script>
/* =================== 데이터 (배포 HTML 실제 작품 재사용) =================== */
const CURRENT_USER = 'soya';
const WORKS = {"A0001":{"t":"영화 러브 라이브! 하스노소라 여학원 스쿨 아이돌 클럽 Bloom Garden Party","type":"애니","img":"https://image.tmdb.org/t/p/w500/eV9i7GRcLbCzraWN4PdvRKKqtZv.jpg","status":"개봉","summary":""},"A0002":{"t":"순례자들은 왜 돌아오지 않는가","type":"애니","img":"https://image.tmdb.org/t/p/w500/57SlsLysyEY2gJnR1vhCqXmGN9G.jpg","status":"개봉","summary":"혐오와 차별이 존재하지 않는 '마을'의 아이들은 고통과 슬픔은 조금도 모른 채로 자란다. 아이들은 18세가 되면 마을 밖으로 순례를 다녀오는데 일부는 영영 귀환하지 않는다. 마을이 이토록 완벽한데, 왜 돌아오지 않는 것일까. 호기심을 억누르지 못한 데이지는 순례자들을 따라서 '시초지'를 떠돈다. 여전히 마을에서 안온한 일상을 보내던 소피는 잊고 있던 데이지와의 기억을 되찾고, 데이지가 왜 시…"},"A0003":{"t":"검은 고양이와 마녀의 교실","type":"애니","img":"https://image.tmdb.org/t/p/w500/zlMu1pEUT2LuneUYttHXlWZ1ZzP.jpg","status":"방영 중","summary":"‘견습 마녀’ 스피카 버고는 마법을 쓸 수 없다. 꿈꾸던 마법학교에 합격하기 위해서는 스승이 필요하지만 돈도 연줄도 없다. 그때 인간 말을 구사하며 마법을 쓰는 수수께끼의 검은 고양이가 스피카 앞에 나타난다!! 마술을 배우고 싶은 스피카와 저주를 풀고 싶은 검은 고양이. 서로의 목적이 완벽하게 일치하며 비밀스러운 사제관계가 맺어진다! 저주를 푸는 열쇠는 ‘×××’에 키스?!"},"A0004":{"t":"다다미 한 장짜리 방 만끽 생활!","type":"애니","img":"https://image.tmdb.org/t/p/w500/jlUFMGnUUjPJysRdLOi64Icgugo.jpg","status":"방영 종료","summary":"\"여고생 in 만화 카페! 아키타에 사는 고등학생 모리타 메이코는 어느 날, 명문 여학교 ‘아마미야 여자 고등학교’의 특별 편입생으로 선발된다. 동경하던 도쿄에서의 학교생활에 기대와 불안을 안은 채 상경한 메이코. 그런 메이코를 기다리고 있는 것은 뜻밖에도 만화 카페 ‘헤지호그’였다. 카페 내부에 마련된 기숙사에서 개성 넘치는 기숙사생들과 함께 봉사활동의 일환으로 카페에서 일하게 되는데...…"},"A0005":{"t":"카미이나 보탄, 취한 모습은 백합의 꽃","type":"애니","img":"https://image.tmdb.org/t/p/w500/hrertHgFOWySasDqTEQCrjVHdxn.jpg","status":"방영 종료","summary":"스무 살의 대학생, 카미이나 보탄은 취하면 조금 대담해져 두근거리는 한마디를…?!\n\n21세기의 \"읽는 알콜\" 카미이나 보탄에게 취해보자구요."},"A0006":{"t":"킬 블루","type":"애니","img":"https://image.tmdb.org/t/p/w500/1hzamo8nOZmurGQQ7P2uqpsGHek.jpg","status":"방영 중","summary":"오오가미 쥬조는 아무리 어려운 의뢰라도 완수해 내는 전설의 킬러.\n\n어느 날, 한 조직을 괴멸시킨 쥬조는 정체불명의 벌에 쏘여 정신을 잃고 만다.\n\n정신을 차려보니 쥬조는 39세의 성인이 아닌, 13세 소년의 모습으로 변해 있었다!\n\n당황하는 쥬조에게 보스로부터 「그 모습 그대로 중학교에 잠입하라」는 지령이 내려온다.\n\n그를 기다리고 있는 것은 개성 넘치는 반 친구들과의 좌충우돌 학교생활이었…"},"A0007":{"t":"오타쿠에게 상냥한 갸루는 없다?!","type":"애니","img":"https://image.tmdb.org/t/p/w500/mpbX1OQTNoWbqY0ixz280GLrURy.jpg","status":"방영 종료","summary":"이상한 계기로 인해 음침하고 눈에 띄지 않는 오타쿠 남고생 세오 타쿠야한테같은 반 갸루 아마네 케이와 이지치 코토코가 말을 걸게 된다.쿨하지만 어딘가 허술하고 오타쿠 동지의 냄새가 나는 아마네와자리까지 포함해 가까운 느낌이 드는 밝은 성격의 이지치.아마네는 여동생의 영향으로 애니에 대해 아는 것일 뿐이며, 절대로 오타쿠가 아니라고 주장하는데...?서로 다른 매력 MAX의 갸루 두 명과 오타쿠…"},"A0008":{"t":"반에서 두 번째로 귀여운 여자와 친구가 되었다","type":"애니","img":"https://image.tmdb.org/t/p/w500/8Q6m5MCclChHHm8WkDChGXnEnEm.jpg","status":"방영 종료","summary":""},"A0009":{"t":"매리지 톡신","type":"애니","img":"https://image.tmdb.org/t/p/w500/8U9jHbzZxqsgsJkXWHlUESlI9i3.jpg","status":"방영 중","summary":"수백 년 동안 살인 기술을 갈고 닦아 온 이들, 일명 ‘술사’. 그 중에서도 최강의 힘과 권력을 가진 5대 명가 ‘독술사’.독술사 가문의 후계자 게로 히카루는 비밀스런 직업에 종사하며 여성과 관계를 맺지 않은 채 살아왔다. 그에게 ‘결혼’은 거리가 먼 존재였다. 하지만 게로 가문의 가주는 ‘독술사’의 혈통이 끊어지는 걸 막기 위해 그의 여동생에게 강제로 후계자를 낳게 하겠다고 통보하고. 마침…"},"A0010":{"t":"라이어 게임","type":"애니","img":"https://image.tmdb.org/t/p/w500/1bBCTwdIDdau06vQaNWc7bHErqq.jpg","status":"방영 중","summary":"어느 날 갑자기 배달된 소포. 거기에는 편지와 현금 1억 엔이 들어 있었다. 그것이 라이어 게임의 시작이었다.\n\n30일 후 게임 종료일에 자신의 소지금 1억 엔을 반환한다. 규칙은 그것뿐. 요령껏 대전 상대의 소지금을 빼앗는 데 성공하면 승자는 1억 엔을 갖고, 패자는 1억 엔의 빚을 지게 된다…."},"A0012":{"t":"새의 랩소디","type":"애니","img":"https://image.tmdb.org/t/p/w500/lzjtluV5ri5KXJWaMjlqviQcO5e.jpg","status":"개봉","summary":"성공과 인정의 상징인 새를 붙잡기 위해 수많은 사람들이 위로 기어오르지만, 반복되는 추락 끝에 한 인물은 그것이 소유할 수 있는 대상이 아님을 깨닫는다. 그는 새를 붙잡는 대신, 스스로 날아오르기를 선택한다."},"A0013":{"t":"황천의 츠가이","type":"애니","img":"https://image.tmdb.org/t/p/w500/jHzHbPVLF3Oi5HbJbQnc55LaHCZ.jpg","status":"방영 중","summary":"산 속 작은 마을에서 짐승을 사냥하며\n\n대자연 속에서 조용히 살아가는 소년, 유르.\n\n그러나 유르의 쌍둥이 여동생 아사는\n\n어째서인지 마을 깊숙이 자리 잡은 감옥 안에서\n\n어떠한 '책무'를 수행하고 있다.\n\n흡사 그곳에 유폐 당한 것처럼....\n\n평화로운 마을에 떠오르는 부자연스러운 수수께끼.\n\n이 마을에 숨겨진 비밀이란...?!"},"A0014":{"t":"新劇場版☆ケロロ軍曹 復活して速攻地球滅亡の危機であります！","type":"애니","img":"https://image.tmdb.org/t/p/w500/og3QLZOS8IGvikFcuHlYAVQ2zW9.jpg","status":"개봉","summary":""},"A0015":{"t":"바키도: 무적의 검사 편","type":"애니","img":"https://image.tmdb.org/t/p/w500/9tj6IveCi4eXS5Pq0MolwYFWqFY.jpg","status":"방영 중","summary":"일본 사상 최강의 검사 미야모토 무사시. 그의 부활과 함께, 바키와 지하격투장의 강력한 격투가들은 시간을 초월해 등장한 위협과 직면한다."},"A0016":{"t":"사랑해 게임을 끝내고 싶어","type":"애니","img":"https://image.tmdb.org/t/p/w500/2X4ZnNyhvkrGmjP3qJPtJ2tVbtv.jpg","status":"방영 중","summary":"같은 고등학교에 진학한 아사기 유키야와 사쿠라 미쿠는, '서로를 짝사랑하는' 소꿉친구.\n\n자신의 마음을 깨닫고는 있지만...\n\n지금이라도 좋아하는 감정이 흘러넘칠 거 같은데...\n\n...그래도, 솔직해질 수는 없어!!\n\n너무 가까우면서도 너무 먼 유키야와 미쿠.\n\n두 사람을 이어주는 건, 초등학교 6학년 때 시작한 '사랑해 게임'.\n\n서로 번갈아 가며 '사랑해'라고 말해서 먼저 부끄러워하는 …"},"A0017":{"t":"청춘 블라썸: 우리의 봄","type":"애니","img":"https://image.tmdb.org/t/p/w500/rirhpI3b2Tip0Vc3VVosEZiwJT7.jpg","status":"방영 중","summary":"자신의 절친을 위해 내뱉은 거짓말 한마디가 청섬고 2학년 윤보미의 일상을 뒤흔든다. 얼떨결에 시작된 최진영과의 계약 연애, 엇갈린 감정과 상처를 지나 진짜 마음을 찾아가는 풋풋한 첫사랑 이야기"},"A0018":{"t":"명탐정 코난: 하이웨이의 타천사","type":"애니","img":"https://image.tmdb.org/t/p/w500/l2kfiNoRi6ofM5pSjr1rCloOfpx.jpg","status":"개봉","summary":""},"A0019":{"t":"레플리카도, 사랑을 한다.","type":"애니","img":"https://image.tmdb.org/t/p/w500/c1xQKHLnBWmOTOGb2a61j0ybbOO.jpg","status":"방영 종료","summary":"아이카와 스나오를 대신하여 평범하게 생활하던 소위 '레플리카'인 나오.\n\n오직 오리지널인 스나오를 돕겠다는 생각으로 열심히 공부와 운동을 하며 학교생활을 보내던 어느 날,  사랑에 빠져 버렸다. 그 이후, 나오의 일상은 다채롭게 변해 간다.\n\n교복 데이트, 비밀 약속... 둘만의 특별한 시간이 늘어 가지만, 가면 갈수록 나오가 말할 수 없는 것들도  늘어만 간다. 그런 나오를 보며 어느새 스…"},"A0020":{"t":"자칭 악역 영애인 약혼자 관찰기록.","type":"애니","img":"https://image.tmdb.org/t/p/w500/ayhpfFHm1MtgPgLw3yN0euOUxsp.jpg","status":"방영 종료","summary":""},"A0021":{"t":"허당 선도부원과 스커트 길이가 부적절한 여고생의 이야기","type":"애니","img":"https://image.tmdb.org/t/p/w500/uBHcmbmC3TccLO6hdrttOpjy4bN.jpg","status":"방영 종료","summary":"사쿠라다이몬 토고는,\n\n매일 아침 교문 앞에서 학생들의 복장을 체크하고 있는 선도부원.\n\n포엠은,\n\n매일 아침 복장 검사에서 걸리는 스커트 길이가 부적절한 여고생.\n\n물과 기름 같은 두 사람이, 어느 날 보충수업에서 딱 마주치게 된다.\n\n성실하고 융통성이 없다고 생각했던 사쿠라다이몬의 정체는, 공부를 못하는 허당 선도부원이었다!\n\n정반대의 두 사람이지만, 서로를 알아가며 점차 거리를 좁혀 간…"},"A0022":{"t":"고깔모자의 아틀리에","type":"애니","img":"https://image.tmdb.org/t/p/w500/1qGSBnrANHLX8C7KqGuPDCylns2.jpg","status":"방영 중","summary":"마법사로 태어난 사람이 아니면 마법을 쓸 수 없는 세계. 하지만 평범한 소녀였던 코코가 마법을 쓰는 방법을 알아 버리고, 세상을 뒤바꿀 수 있는 싸움의 한복판에 서게 된다."},"A0023":{"t":"카난 님은 초보 악마","type":"애니","img":"https://image.tmdb.org/t/p/w500/dYZ29rRCaENal92byNjx9r9w69b.jpg","status":"방영 중","summary":"인간의 영혼을 먹어치우는, 요염하고도 아름다운 악마가 강림한다――. 미식의 악마 카난은 젊고 달콤한 영혼을 맛보기 위해 인간 세계의 고등학교에 내려왔다. 첫 번째 제물로 선택된 것은 한 남학생, 쿄우기 요우지. “나에게 먹힌다는 건 아주 영광스러운 일이야. 감사히 여기도록 해라, 하등 생물.” 그런데…… 어째서인지 쿄우기와 연인 계약을 맺게 되는데!? 수천 년을 살아왔음에도 첫사랑조차 해본 …"},"A0024":{"t":"신의 정원이 딸린 쿠스노키 저택","type":"애니","img":"https://image.tmdb.org/t/p/w500/kjsV2Vx8PnH0Af6kOqwKgPea1AC.jpg","status":"방영 종료","summary":"신님들과 함께하는 폭신폭신 슬로 라이프, 개막! 시골에 있는 신축 주택의 괸리인을 맡게 된 청년 쿠스노키 미나토. 그곳은 악령이 우글거리는 터무니없는 장소...일 터였지만, 엄청난 제령의 힘을 가지고 있는 미나토는 자기도 모르는 사이에 악령들을 일소해 버리고 말았다! 완전히 정화된 쿠스노키 저택의 편안함에 이끌려 개성 풍부한 신들이 모여들었다. 단 거를 정말 좋아하는 산신님과 그 권속들, 풍…"},"A0025":{"t":"메이드 양은 먹기만 할 뿐","type":"애니","img":"https://image.tmdb.org/t/p/w500/gHZbYY7eeZnUtPKZgcPJgpOD9iA.jpg","status":"방영 종료","summary":"영국의 저택에서 메이드로 일하던 스즈메는 어떤 사건을 계기로 일본의 어느 구석에 있는 작은 아파트에서 새로운 생활을 시작하게 된다.\n\n혼자서 처음 겪는 일본에서의 생활에 걱정이 앞서지만, 스즈메는 일본 음식에 흥미를 갖게 된다. 씩씩하게 아파트를 나와, 다양한 음식과 사람들을 만나게 된다.\n\n먹고 보는 것만으로 이렇게 행복하다니!\n\n비일상적인 메이드 양이 보여 주는 일상 애니메이션이 지금 시…"},"A0026":{"t":"또 죽고 말았나요, 탐정님","type":"애니","img":"https://image.tmdb.org/t/p/w500/6cD5SJglmHMCsSenFyqIFcMq7nL.jpg","status":"방영 종료","summary":"전설적인 명탐정의 아들, 오우츠키 사쿠야.\n\n탐정으로서의 실력은 아버지에게 한참 못 미치지만, 그것을 딱히 신경 쓰지 않고 소소한 의뢰를 선호하는 반푼이 고등학생 탐정이다.\n\n사쿠야는 평범한 인간에겐 없는 체질을 가지고 있었다. 살해당할 때마다 되살아나는 것이다.\n\n그리고 가는 곳마다 살인 사건에 휘말려서는 살해당하고 만다.\n\n기묘한 체질을 가진 사쿠야의 부활을 늘 무릎베개로 맞이하는 사람은…"},"A0027":{"t":"주토피아 2","type":"애니","img":"https://image.tmdb.org/t/p/w500/ib6v6qUXzez1x2qIOLN7C0yJNPQ.jpg","status":"개봉","summary":"미스터리한 뱀 게리가 나타난 순간, 주토피아가 다시 흔들리기 시작했다! 혼란에 빠진 도시를 구하기 위해 환상의 콤비 주디와 닉이 잠입 수사에 나서고 상상 그 이상의 진실과 위협을 마주하게 되는데...!"},"A0028":{"t":"마물을 먹는 모험가","type":"애니","img":"https://image.tmdb.org/t/p/w500/9sfqKo6Xh7vOqYqmjoKPvSgVLCC.jpg","status":"방영 중","summary":"E랭크 모험가 루드.\n\n그런 그가 가진 유일한 스킬 '상태 이상 무효화' 는, 독기로 가득 찬 던전에서 약초를 채취하는 것 정도 밖에 도움이 되지 않는 애매한 능력이다.\n\n전투능력도 전무하다시피 해, 다른 모험가로부터는 '독기꾼' 이라고 야유를 받는 나날.\n\n그런 현재 상황을 타파하기 위해 새로운 미궁에 도전하는 루드이지만, 동료에게 배신당해 조난당하고 만다.\n\n물자도 다 떨어진 빈사 상태에…"},"A0029":{"t":"劇場版「暗殺教室」みんなの時間","type":"애니","img":"https://image.tmdb.org/t/p/w500/dfrZ7VHcurFhLm2Hk6xyjRILc5d.jpg","status":"개봉","summary":""},"A0030":{"t":"슈퍼 마리오 갤럭시","type":"애니","img":"https://image.tmdb.org/t/p/w500/knaXOBDBecVBWZVup3zXaOoy23v.jpg","status":"개봉","summary":"브루클린의 배관공에서 세계를 구한 히어로로 레벨업한 형제 ‘마리오’와 ‘루이지’는 모래 왕국에서 임무를 수행하던 중, 길을 잃은 ‘요시’를 구출하며 특별한 우정을 쌓게 된다. 한편, 무너진 ‘쿠파’ 가문의 명예를 되찾기 위해 악의 왕자 ‘쿠파주니어’는 은하계의 수호자이자 치코들의 엄마 ‘로젤리나’를 납치하고, 버섯 왕국에 잡힌 아빠 ‘쿠파’를 되찾기 위해 왕국을 습격한다. 다시 찾아온 위기 …"},"A0031":{"t":"극장판 전생했더니 슬라임이었던 건에 대하여 창해의 눈물편","type":"애니","img":"https://image.tmdb.org/t/p/w500/y6EdV6tnfX0jd3I0rtw5U9jpnpi.jpg","status":"개봉","summary":"마물의 나라 【템페스트】의 개국제를 마친 리무루 일행은 엘프의 대국 【마도 왕조 살리온】의 천제 에르메시아의 초대를 받아 그녀가 소유하고 있는 리조트 섬을 방문한다. 리무루 일행이 잠깐 바캉스를 만끽하는 사이 유라라는 의문의 여성이 나타나는데──. 끝없이 펼쳐진 창해를 무대로 새로운 사건이 일어난다!"},"A0032":{"t":"극장판 내 마음의 위험한 녀석","type":"애니","img":"https://image.tmdb.org/t/p/w500/jdcVZ2B2kaBDKiVGkCXjgtu7KEW.jpg","status":"개봉","summary":"이치카와 쿄타로는 『살인 대백과』나 『인체 해부도』를 읽는 걸 즐기는 중증의 중2병 남자 아이. 그런 이치카와의 조용한 세계에, 반의 인기인・야마다 안나가 갑자기 들어왔다! 도서실에서 입 안이 가득해질 정도로 주먹밥을 먹거나, 콧노래를 부르거나. 그런가 하면, 갑자기 다가오거나…… 예측 불가능한 야마다의 언동에 당황하면서도 어느샌가 이치카와의 머릿속은 야마다에 대한 생각으로 가득 차 있었다.…"},"A0033":{"t":"명탐정 프리큐어!","type":"애니","img":"https://image.tmdb.org/t/p/w500/zuPQ9R5x17EM6xEA37TLRkL2BGD.jpg","status":"방영 중","summary":"그 수수께끼! 큐엇하게 해결!"},"A0034":{"t":"녹나무의 파수꾼","type":"애니","img":"https://image.tmdb.org/t/p/w500/iS2nH80GEv2OsDAJ48OrqojPVIU.jpg","status":"개봉","summary":"거절할 수 없는 제안을 받아들이고 영문도 모른 채 소원을 비는 녹나무의 파수꾼이 된 레이토. 그는 초승달과 보름달이 뜨는 날 나무를 찾아오는 심야의 방문객들을 만나며 녹나무에는 세상에 알려지지 않은 특별한 힘이 있다는 것을 알게 된다. 오래된 예약 장부를 정리하던 레이토는 이곳을 찾는 사람들과 녹나무의 연결 고리를 발견하고 자신이 파수꾼이 된 이유와 녹나무에 얽힌 놀라운 진실에 다가가게 되는…"},"A0035":{"t":"테러맨","type":"애니","img":"https://image.tmdb.org/t/p/w500/13izuyHXlQAAlt8Vy0H1apb3bty.jpg","status":"방영 중","summary":"불행을 감지하는 눈을 가진 고등학생 '정우'가 사람들을 구하기 위해 스스로 테러리스트가 되어 거대한 음모와 맞서는 액션 블록버스터 애니메이션"},"A0036":{"t":"『DRAGON BALL』40周年記念スペシャル映像","type":"애니","img":"https://image.tmdb.org/t/p/w500/nxkuQZv4oIxAOQzDh27I773MrIV.jpg","status":"개봉","summary":""},"A0037":{"t":"초(超) 가구야 공주!","type":"애니","img":"https://image.tmdb.org/t/p/w500/4Gh56xcxDoWWPuTclaKpKrZ3J4M.jpg","status":"개봉","summary":"달에서 도망쳐 온, 자유분방한 가구야가 이로하의 집에 살게 되면서, 이로하의 삶은 궤도를 이탈할 지경이다. 게다가 가구야는 이로하에게 가상 세계에서 함께 무대에 서자고 설득한다."},"A0038":{"t":"呪術廻戦：死滅回游 総集編","type":"애니","img":"https://image.tmdb.org/t/p/w500/yBaYAvdL6vBOEUL2drLbgKwWEgw.jpg","status":"개봉","summary":""},"A0039":{"t":"정반대의 너와 나","type":"애니","img":"https://image.tmdb.org/t/p/w500/pZ6LLzzdjeUTt481wkOYAyNgqfj.jpg","status":"방영 중","summary":"언제나 명랑하지만 주위의 시선을 신경 쓰는 여자, 스즈키와 조용하지만 자신의 의견을 당당하게 말하는 남자, 타니.\n\n정반대인 두사람이 서로를 존중하고, 깊이 이해하는 모습과 친구들과의 학교생활을 그린 러브 코미디."},"A0040":{"t":"쓰레기 용사","type":"애니","img":"https://image.tmdb.org/t/p/w500/zUdByBz1zWn4Prgw5nkVmgfFzfI.jpg","status":"방영 종료","summary":"21세기 중반, 뒷골목 세계는 에테르 강화 수술로 마왕이 된 마피아들이 지배하고 있다.\n\n이 마왕들을 처단하는 현상금 사냥꾼 그들을 '용사'라 부른다.\n\n견습 용사 죠가미네는 프로 용사인 야시로를 찾아와 자신을 제자로 받아 달라고 부탁하고\n\n어두운 뒷골목, 쓰레기 같은 용사들의 액션이 시작된다."},"A0041":{"t":"무사태평 영주의 즐거운 영지 방어 ~생산계 마법으로 이름 없는 마을을 최강의 성채 도시로~","type":"애니","img":"https://image.tmdb.org/t/p/w500/phMtSdBIvO9lmmZEE2WaiTNkRg2.jpg","status":"방영 종료","summary":"후작 가문의 4남으로 이세계에서 환생한 반은 어린 시절부터 신동이라고 불리며 장래가 촉망됐다.\n\n하지만 8살 때 받게 된 능력은 그 세계에서는 '쓸모없다'라고 여겨지는 '생산계 마법'이었다!\n\n그 탓에 반은 귀족에 어울리지 않는다며 아버지에 의해 실격 낙인이 찍히고 집에서 추방당했고 이름 없는 변경의 마을의 영주로서 부임하게 된다.\n\n하지만 쓸모없는 적성이라고 불리는 생산계 마법은 재료만 있…"},"A0042":{"t":"전생했더니 드래곤의 알이었다","type":"애니","img":"https://image.tmdb.org/t/p/w500/wwleFyKVSzCw2GkdJTwXplHsPZp.jpg","status":"방영 종료","summary":""},"A0043":{"t":"데드 어카운트","type":"애니","img":"https://image.tmdb.org/t/p/w500/3KxyECISY5arB72ADxUuY4DUwJL.jpg","status":"방영 종료","summary":"죽은 사람의 SNS 계정은 어떻게 될 거 같아? 미련을 남긴 '데드 어카운트'는, 이윽고 디지털 유령인 '유령 계정'으로서 현세에 되살아난다... 에니시로 소지는 여동생인 아카리의 치료비를 벌기 위해 어그로계 뮤튜버 '아오링고'로서 영상을 올리는 생활을 하고 있었다. 하지만 어떤 계기로 인해 전능에 개안한 에니시로는, 수상한 소문이 끊이지 않는 미덴 학원으로 옮겨졌다. 그곳은 인터넷 보급과 …"},"A0044":{"t":"헬 모드 ~파고들기 좋아하는 게이머는 폐급 설정 이세계에서 무쌍한다~","type":"애니","img":"https://image.tmdb.org/t/p/w500/pptA4IY2c7nbZdQEcaN0Vmw3fBq.jpg","status":"방영 중","summary":"'끝이 없는 게임에 당신을 초대합니다.'\n\n35살 독신에 여친 없는 샐러리맨 야마다 켄이치.\n\n쉬운 게임을 싫어하며 10년 이상 팔 수 있는 게임을 찾던 그는,\n\n어느 날 지구로부터 모습을 감췄다.\n\n우연히 찾게 된 이름 없는 인터넷 게임을 최고 난이도인 '헬 모드'로\n\n플레이하게 된 켄이치는, 이세계의 농노 소년 알렌으로 전생하고 말았다!!\n\n유일무이하면서 수수께끼가 많은 재능 '소환사'를…"},"A0045":{"t":"귀족 전생 ~축복받은 태생으로 최강의 힘을 손에 넣다~","type":"애니","img":"https://image.tmdb.org/t/p/w500/ggxUYlw7a3eVegnXDv8aCDiLccJ.jpg","status":"방영 종료","summary":"황제의 열세 번째 아이라는 축복받은 지위, 태어나자마자 레벨 상한 무한대, 거느리는 타인의 능력을 자신의 능력에 플러스할 수 있는 치트 스킬을 가진 이세계 최강 6살 노아. 전생으로 인해 귀족으로 다시 태어나, 뛰어난 교육과 풍부한 자원이 뒷받침해 주는 환경에서 자신의 재능을 개화해 나간다. 하지만, 화려한 귀족 사회의 이면에는 음모와 권력 투쟁이 소용돌이치고 있었는데."},"A0046":{"t":"투명남과 인간녀 ~곧 부부가 될 두 사람~","type":"애니","img":"https://image.tmdb.org/t/p/w500/ovkgVd6wwJ4FAwilVtxsmIhbXmp.jpg","status":"방영 종료","summary":"탐정 사무소를 운영하는 신사적인 '투명 인간' 토노메 아키라와\n\n그 사무소에서 일하는 차분한 '인간 여성' 야코 시즈카.\n\n토노메가 모습을 감춰도, 눈이 보이지 않는 야코는 이상하게도\n\n토노메가 어디에 있는지 잘 알아차렸다.\n\n'보이지 않는' 두 사람은, 어느샌가 서로 끌리기 시작했는데...?\n\n눈에 보이지 않는 신사적인 비인간 × 눈이 보이지 않는 차분한 여성의\n\n따스하고 애타게 설레는 러…"},"A0047":{"t":"블리치","type":"애니","img":"https://image.tmdb.org/t/p/w500/2cT8jkEVsAL86CVKALR4pnaVLDb.jpg","status":"방영 중","summary":"'쿠로사키 이치고'는 유령을 볼 수 있는 15세의 남자다. 특수한 체질을 가지고도 평범한 생활을 하던 이치고에게 갑자기 스스로를 사신이라고 소개하는 소녀 '쿠치키 루키아'가 나타난다. 유아울러 산 사람, 죽은 사람 안 가리고 공격해서 영혼을 먹어치우는 나쁜 혼령 '호로'도 모습을 드러낸다. 그런데 호로로 인해 이치고의 가족이 쓰러져가는데..."},"A0048":{"t":"마왕의 딸은 너무 친절해!!","type":"애니","img":"https://image.tmdb.org/t/p/w500/gUpjTomq5J4aOpwAOJ3WB76kh5g.jpg","status":"방영 종료","summary":"악의 화신인 마족들을 규합해, 폭력과 권력으로 세계를 침략해 온 마왕 아리만.\n\n하지만 그런 마왕이 어째서인가 갑자기 침략 행위를 일절 멈추고 말았다!\n\n마계 최강인 마왕이 침략을 멈춘 이유... 그것은!\n\n마왕의 딸인 두가 너무 친절하기 때문이었다!\n\n마족으로 태어났지만 두의 친절함은 그 끝을 보일 줄 몰랐다. 그 상냥함은 흉악한 마족도,\n\n흉포한 마물도, 노예인 인간도, 불구대천의 적인 …"},"A0049":{"t":"29세 독신 중견 모험가의 일상","type":"애니","img":"https://image.tmdb.org/t/p/w500/ue2xTM1hZ7l95lSnThPURxca9NH.jpg","status":"방영 종료","summary":"어린 시절을 빈민가에서 보내고, 살아남기 위해 필사적으로 강함을 추구해 온 시노노메 하지메. 지금은 코마이 마을의 전속 모험가로서 유유자적한 나날을 보내고 있었다. 어느 날 받은 퀘스트를 해결하러 던전으로 들어가자, 그곳에는 가장 약한 몬스터인 슬라임에게 먹히고 있는 소녀가 있었다! 소녀의 이름은 리루이. 살아남기 위해 혼자서 던전에 발을 내딛고 있었다. 부모에게 버림받은 데다가 갈 곳마저 …"},"A0050":{"t":"사망 유희로 밥을 먹는다.","type":"애니","img":"https://image.tmdb.org/t/p/w500/1NtBeaAxkIf6naFVZsCdtLxgnKl.jpg","status":"방영 종료","summary":"이것은 어느 정신 나간 세계의 이야기. 소녀 '플레이어'들이 도전하는 것은, 죽음이 이웃한 게임. 살아 돌아가면 상금을 얻을 수 있지만, 만전을 다해도 목숨을 잃는 경우가 있다. 이러한 세계에서 살아 나간다. 이 세상엔 그런 사람들이 확실히 존재한다. 플레이어 네임 '유우키'. 직업은 살인 게임의 프로페셔널. 그녀는 오늘도 사망 유희로 밥을 먹는다."},"A0051":{"t":"다윈 사변","type":"애니","img":"https://image.tmdb.org/t/p/w500/txrq32MeABrqofK0oZ20m0vWaW4.jpg","status":"방영 종료","summary":"미국 미주리주의 시골 마을에 사는 소년 찰리는 인간을 능가하는 지능과 침팬지를 능가하는 신체 능력을 겸비한 절반은 인간, 절반은 침팬지인 '휴먼지'다. 15살이 된 찰리는 인간 양부모의 권유로 처음 입학한 학교에서 두뇌는 명석하지만 소통 능력이 부족한 루시를 만난다. 하지만 평화로운 학교생활도 잠시, 특이한 출생 때문에 '동물 해방'을 표방하는 테러 조직 ALA의 표적이 되고 만 찰리는 가족…"},"A0052":{"t":"한밤중 하트튠","type":"애니","img":"https://image.tmdb.org/t/p/w500/qTZi2mXsLUOnM9IEFPhOh0znQUy.jpg","status":"방영 중","summary":"고등학교 2학년 아리스 야마부키.\n\n어린 시절, 혼자 잠들기 힘들었던 밤마다 그에게 위로가 되어준 건 라디오 DJ '아폴로'의 목소리였다.\n\n하지만 어느 날, 아무런 예고도 없이 아폴로의 방송은 갑자기 사라져버리고 만다.\n\n그렇게 몇 년의 시간이 흐르고——\n\n아직도 잊지 못한 아폴로에게 꼭 전하고 싶은 말이 생긴 아리스는, 그녀를 찾기 위해 학교 방송부의 문을 두드리게 된다.\n\n거기서 만난 …"},"A0053":{"t":"용사 파티에 귀여운 애가 있어서, 고백해봤다.","type":"애니","img":"https://image.tmdb.org/t/p/w500/hlprcIJFyWVkCNOxU7UySb1ECLe.jpg","status":"방영 종료","summary":"이세계에 전생한 인간 출신 마족 요키는 마왕의 부하라는 어중간한 포지션에 있으면서, 용사 일행을 쓰러뜨리는 임무를 수행하고 있었다. 이윽고 마왕성에 쳐들어온 용사 파티와 대치한 요키는... '대박, 완전 내 취향이야' 하필이면 용사 파티의 승려인 세실리아에게 첫눈에 반하고 말았다! 진심으로 싸움에 임하는 얼굴도, 몸짓도, 그냥 모든 게 귀엽다! 너무나도 천사 같다! 그리하여 요키는 고백하기로…"},"A0054":{"t":"스파이 패밀리","type":"애니","img":"https://image.tmdb.org/t/p/w500/rikBBQHmCTOiZ7YoJVkYcKdXgNx.jpg","status":"방영 종료","summary":"사람은 누구나 아무에게도 보여줄 수 없는 자신을 갖고 있다. 세계 각국이 물밑에서 치열하게 정보전을 펼치는 시대. 오스타니아와 웨스탈리스는 십수 년간에 걸쳐 냉전 상태에 있었다. 웨스탈리스의 정보국 대동과 'WISE' 소속의 수완가 스파이인 '황혼' 은 동서 평화를 위협하는 위험인물, 오스타니아의 국가통일당 총재 도노반 데스몬드의 동향을 살피기 위해 어떤 극비 임무를 수행하게 된다. 그 이름…"},"A0055":{"t":"마술사 쿠논은 보인다","type":"애니","img":"https://image.tmdb.org/t/p/w500/7IiScCDhRNFRfJEkziHz7d8Nqz1.jpg","status":"방영 종료","summary":"눈이 보이지 않는 소년 쿠논의 목표는 수마술로 새로운 눈을 만드는 것. 마술을 배우기 시작한 지 불과 5개월 만에 교사의 실력을 앞지른 쿠논은 사상 처음의 도전을 하면서도 더욱더 재능을 꽃피운다!\n\n마력으로 주변의 색을 감지하고, 수마술을 응용해서 손난로나 찜질 천을 만들고, 초급 마술만으로 고양이를 재현하기도 한다.\n\n그 기술과 발상은 왕궁 마술사도 혀를 내두를 정도였고 쿠논은 실력을 인정…"},"A0056":{"t":"용사 파티에서 쫓겨난 다재무능","type":"애니","img":"https://image.tmdb.org/t/p/w500/wXK0LfJRwXmn7GY7P5DPrtSUHUR.jpg","status":"방영 중","summary":"더는 '다재무능'이란 말은 못 하게 해 주지!\n\n언젠가 '만능인'이라고 불리는 탐색자가 되어 주겠어!\n\n어느 날...\n\n소속된 '용사 파티'의 리더이자 소꿉친구인 올리버로부터 실력 부족을 이유로 파티에서\n\n추방한다는 말을 듣게 된 오룬 두라. 파티를 위해 검사에서 부여술사로 전직해, 독자적으로  발전시킨 마술로 동료들을 서포트해 온 오룬에게 있어선 도저히 납득할 수 없는 일이었다.\n\n하지만 …"},"A0057":{"t":"고문 아르바이트의 일상","type":"애니","img":"https://image.tmdb.org/t/p/w500/eA471Tq8GMJb6zEwrB5PyICGM51.jpg","status":"방영 종료","summary":"이곳은 살인이나 고문이 합법화된 세계.\n\n수많은  중에서도 악인만을 대상으로 하는 업계 유수의 선한 기업\n\n「주식회사 스피리터스」. 그곳에서 일하는 4명의 아르바이트생.\n\n자상한 선배 알바생은 뭐든지 잘하고, 누구와도 쉽게 친해지는 에이스, 세로.\n\n모두가 동경하는 고문 업계의 살아 있는 전설, 시우.\n\n그리고 기대받는 신입 알바생.\n\n귀엽고 씩씩한 노력가, 미케.\n\n성실하고 마음 착한 대학…"},"A0058":{"t":"북두의 권 권왕군 자코들의 만가","type":"애니","img":"https://image.tmdb.org/t/p/w500/76VzGj5JENehcjWV4wK0LQKarhv.jpg","status":"방영 중","summary":""},"A0059":{"t":"용사형에 처함","type":"애니","img":"https://image.tmdb.org/t/p/w500/7rZBxt8leGS2fGsnswQIzpxPi5K.jpg","status":"방영 중","summary":"용사란, 이 세상에서 가장 끔찍한 형벌이다. 큰 죄를 저지른 자가 '용사'가 되어 마왕과 싸우는 형벌을 받게 되는 것이다. 싸우다 죽더라도 되살아나며, 죽음조차 허락되지 않는다. 용사형에 처해진 전직 성기사단 단장 자이로 폴바츠는 성격 파탄자들로만 구성된 징벌용사 부대를 이끌고 전장의 최전선을 누비고 있었다. 가혹한 상황 속에서 자이로는 최강의 생체 병기 중 하나인 검의 '여신' 테오리타를 …"},"A0060":{"t":"주술회전","type":"애니","img":"https://image.tmdb.org/t/p/w500/pnn223i9v5kfYku6TbqdSbPePJp.jpg","status":"방영 중","summary":"소년은 싸운다 '올바른 죽음'을 위해  쓰라린 고통, 후회, 치욕. 인간으로부터 흘러나온 부정적인 감정이 저주로 변해 일상에 숨어든다. 저주는 세상에 만연한 재앙의 근원이며, 최악의 경우 인간을 죽음으로 이끈다. 그리고 저주는 저주로밖에 없앨 수 없다.  경이적인 신체능력을 가진 소년 이타도리 유지는 아주 평범한 고등학생이었지만, 어느 날 '저주'에 습격당한 친구를 구하기 위해 특급 주물 '…"},"A0061":{"t":"극장판 귀멸의 칼날: 무한성편","type":"애니","img":"https://image.tmdb.org/t/p/w500/m6Dho6hDCcL5KI8mOQNemZAedFI.jpg","status":"개봉","summary":"혈귀로 변해버린 여동생 네즈코를 인간으로 되돌리기 위해 혈귀를 사냥하는 조직인 《귀살대》에 입대한 카마도 탄지로. 입대 후 동료인 아가츠마 젠이츠, 하시비라 이노스케와 함께 많은 혈귀와 싸우고, 성장하면서 세 사람의 우정과 유대는 깊어진다. 탄지로는 《귀살대》 최고위 검사인 《주》와도 함께 싸웠다. 「무한열차」에서는 염주・렌고쿠 쿄쥬로, 「유곽」에서는 음주・우즈이 텐겐, 「도공 마을」에서는 …"},"A0062":{"t":"강철의 연금술사 BROTHERHOOD","type":"애니","img":"https://image.tmdb.org/t/p/w500/9SkrxQDka8JAk8tUwb396prUR9J.jpg","status":"방영 종료","summary":"죽은 어머니를 살리기 위해 시도한 금단의 연금술로 인해 신체의 일부와 전부를 빼앗긴 에드워드와 알폰스 형제. 동생 알폰스의 신체를 되찾기 위해 현자의 돌을 찾아나선다. 강철의 연금술사 오리지널판 이후 제작되어 원작 만화를 더욱 충실히 반영한 리메이크 버전이다."},"A0063":{"t":"헌터x헌터","type":"애니","img":"https://image.tmdb.org/t/p/w500/8YKlXBit3PlVTXf9A1ohccCf9lQ.jpg","status":"방영 종료","summary":"곤프릭스는 보물섬에 사는 어린 소년이다. 곤은 아버지가 죽었다고 알려준 ‘헌터’ 카이트로부터 가르침을 받았지만, 아버지가 어디에선가 생존하여 최고의 헌터로 목숨을 걸고 미지의 아이템, 숨겨진 보물이나 진본을 찾아 다니고 있다고 생각한다. 곤은 전문 헌터가 되기로 결심하고 섬을 떠난다. 헌터가 되기 위해서는 반드시 헌터시험을 통과해야 되는데, 그 와중에 다른 세 명의 지원자 크라피카, 레오리오…"},"A0064":{"t":"장송의 프리렌","type":"애니","img":"https://image.tmdb.org/t/p/w500/mnj30hYDVAbL9BOA0f4HrKubAGF.jpg","status":"방영 중","summary":"용사 힘멜 일행과 함께 10년에 걸친 모험 끝에 마왕을 물리치고 세계에 평화를 가져온 마법사 프리렌. 천 년을 넘게 사는 엘프인 그녀는 힘멜 일행과 재회를 약속하고 혼자 여행을 떠난다. 그로부터 50년 후 프리렌은 힘멜을 찾아갔지만 50년 전과 달라진 게 없는 그녀에 비해 힘멜은 늙었고 수명이 얼마 남아있지 않았다. 그 후 죽음을 맞이한 힘멜을 보고 지금까지 '인간을 아는' 일을 하지 않았던…"},"A0065":{"t":"죠죠의 기묘한 모험","type":"애니","img":"https://image.tmdb.org/t/p/w500/9kav2ODiGILqV86XWSUn6g4KQq5.jpg","status":"방영 중","summary":"유서 깊은 죠스타 가문에 얽힌 기묘한 이야기를 아는가. 각기 다른 세상에서 애칭 '죠죠'를 공유하며 살아가는 주인공들. 시간적 공간적 배경은 달라도, 추구하는 가치는 다르지 않다. 악의 세력을 물리치고 정의가 이기는 세상을 만들라."},"A0066":{"t":"극장판 주술회전: 시부야사변 X 사멸회유","type":"애니","img":"https://image.tmdb.org/t/p/w500/ifK2v7oQQrgqrmDu7sr1TgoAPT9.jpg","status":"개봉","summary":"2018년 10월 31일 시부야 역 주변에 갑자기 ‘장막’이 내려지고, 다수의 일반인이 갇히게 된다. 그곳에 홀로 뛰어든 현대 최강의 주술사, 고죠 사토루. 그러나 그곳에는 고죠의 봉인을 꾀하는 주저사·주령들이 기다리고 있었다. 시부야에 집결하는 이타도리 유지를 비롯한 수많은 주술사들. 전례 없는 대규모 주술전 「시부야사변」이 시작된다—. 그리고 싸움은, 최악의 주술사 카모 노리토시가 꾸민 …"},"A0067":{"t":"이니셜D","type":"애니","img":"https://image.tmdb.org/t/p/w500/8TYwL6V8RA6kSi8PmBk703200Pm.jpg","status":"방영 종료","summary":"1998년 4월 Fuji TV에서 방영을 시작한 애니메이션. 후지와라 타쿠미는 중1때부터 아버지 후지와라 분타 때문에 AE86으로 강제로 두부배달을 시작, 5년 이상 군마의 아키나 고개를 주행해 왔다. 무료함을 달랠 심산으로 두부를 싣지 않은 내리막길에서는 마음껏 속도를 내고 빨리 돌아오기 때문에 5년이란 세월 동안 말도 안 되는 테크닉을 몸으로 익히게 되었다. 어느 날 갑자기 아키나 고개에…"},"A0068":{"t":"Re: 제로부터 시작하는 이세계 생활","type":"애니","img":"https://image.tmdb.org/t/p/w500/i7rka8OksNjM0BXjTmz8zwEDfO1.jpg","status":"방영 중","summary":"편의점에서 돌아가는 길. 갑자기 이세계로 날아간 소년, 나츠키 스바루.  무력한 소년이 손에 넣은 유일한 힘. 그것은 죽어서 시간을 되돌리는 사망귀환의 힘이었다.  소중한 사람을 지키기 위해. 그리고 분명히 존재했던 하나뿐인 시간을 되찾기 위해.  소년은 가혹한 운명에 맞선다.  널 구하기 위해서라면, 난 몇 번이든 죽겠어!"},"A0069":{"t":"파워 퍼프 걸","type":"애니","img":"https://image.tmdb.org/t/p/w500/468mmhMd21pY4Yx0S0woqeEcxtL.jpg","status":"방영 종료","summary":"파워퍼프걸은 유토니움 교수가 설탕, 향신료, 예쁘고 깜찍한 것들로 만든 아이들로 슈퍼 파워를 가지고 있다. 처음엔 시민들의 인정을 받지 못하지만 타운스빌을 위협하는 모조조조와 많은 악당들과 싸우면서 타운스빌에 없어선 안 될 존재가 된다."},"A0070":{"t":"너와 넘어 사랑이 된다","type":"애니","img":"https://image.tmdb.org/t/p/w500/l8YQfVfTKtWnBS54cvHlCLeUidc.jpg","status":"방영 종료","summary":""},"A0071":{"t":"케이팝 데몬 헌터스","type":"애니","img":"https://image.tmdb.org/t/p/w500/5fqcLmrgVDicMuGLOa9PKErFP72.jpg","status":"개봉","summary":"케이팝 슈퍼스타 루미, 미라, 조이. 매진을 기록하는 대형 스타디움 공연이 없을 때면 이들은 또 다른 활동에 나선다. 바로 비밀 능력을 이용해 팬들을 초자연적 위협으로부터 보호하는 것."},"A0072":{"t":"약사의 혼잣말","type":"애니","img":"https://image.tmdb.org/t/p/w500/vy9rMVergbppBCflHJyT78dz7mz.jpg","status":"방영 중","summary":"독과 약에 관한 지식에 심취한 황궁의 하녀. 유곽에서 약사 노릇을 했던 경험을 살려 의문의 사건들을 하나씩 해결해 나간다."},"A0073":{"t":"원피스","type":"애니","img":"https://image.tmdb.org/t/p/w500/qHjXsSUuolEtbgvYPzRjAuB1VHE.jpg","status":"방영 중","summary":"해적왕을 꿈꾸는 소년 루피와 동료들의 유쾌한 모험담을 그린 작품! 힘있는 연출과 개성있는 그림체 및 캐릭터들의 활기찬 묘사로 인기를 모았으며, 1억 만부 이상 판매된 원작만화의 인기를 바탕으로 다양한 버전으로 제작된 초히트작 애니메이션이다.\n\n˝최고의 해적왕˝을 꿈꾸는 루피와 동료들의 파란만장한 모험담 !\n\n떄는 해적들이 난무하는 ‘춘추전국시대’. 곳곳에서는 전설적인 해적왕 골드로저가 남긴 …"},"A0074":{"t":"원댄스","type":"애니","img":"https://image.tmdb.org/t/p/w500/5gflZcP8AnC7znLNoEppIgvNzeQ.jpg","status":"방영 종료","summary":"말더듬증 때문에 자신의 감정을 표현하는 데에 어려움을 겪는 고등학생 카보는 다른 사람의 시선을 신경 쓰지 않고 춤을 추는 같은 반 친구 완다에게 끌린다. 감정과 기억, 괴로움을 끌어내는 음악의 힘을 알게 된 카보는 말이 필요 없는 자유로운 표현법을 찾기 위해 경험한 적 없는 댄스의 세계에 도전한다."},"A0075":{"t":"소드 아트 온라인","type":"애니","img":"https://image.tmdb.org/t/p/w500/j1Ne28nNQrv6Fq51AppcBdJPNhf.jpg","status":"방영 종료","summary":"2022년. 인류는 마침내 완전한 가상 공간을 실현했다. 모든 게이머가 꿈꿔왔던 VRMMORPG (가상 대규모 온라인 롤 플레잉 게임)  \"소드 아트 온라인\" 이 정식 가동을 시작한다. 주인공은 소드 아트 온라인 플레이어인 키리토.  그는 SAO의 세계에서 플레이를 만끽하던 중 다른 1만 명의 플레이어와 함께 게임 마스터의 무자비한 선고를 듣는다. 100층까지 있다는 부유성 아인크라드의 정상…"},"A0076":{"t":"체인소 맨","type":"애니","img":"https://image.tmdb.org/t/p/w500/eblIShqBgVPmRt86f4e02ouDNhE.jpg","status":"방영 종료","summary":"'체인소의 악마'포치타와 함께 데블 헌터로 사는 소년 덴지. 부모가 남긴 빚을 갚기 위해, 가난한 생활을 하던 중, 배신을 당해 죽임을 당하고 만다. 희미해지는 의식 속에서, 덴지는 '포치타'와 계약을 맺고, 악마의 심장을 가진 자 '체인소 맨'으로 되살아난다~!"},"A0077":{"t":"암살자인 내 스테이터스가 용사보다도 훨씬 강한데요","type":"애니","img":"https://image.tmdb.org/t/p/w500/v6JugMiVXyFr3cVP1JpS1CcGEZM.jpg","status":"방영 종료","summary":"기색을 잘 지울 수 있는 특기를 가진 고교생 오다 아키라는 급우들과 함께 다른 이세계로 소환되어 버린다.\n\n그곳은 검과 마법의 세계로, 아키라 일행은 용사로써 마왕 토벌을 의뢰받는다.\n\n의뢰를 해 온 국왕과 공주에게 위화감을 느낀 아키라는 본인 특유의 기색을 감춰 국왕의 서재에 잠입해 가혹한 진실을 알게 된다.\n\n아무것도 모르는 급우들을 구하느냐, 마느냐, 모든 것은 아키라의 손에 달려 있다…"},"A0078":{"t":"도쿄 구울","type":"애니","img":"https://image.tmdb.org/t/p/w500/nkDtqLGG7J7L7YoodfCSWFUT65l.jpg","status":"방영 종료","summary":"\"군집 속에 섞여 인간을 사냥하고 그 죽은 고기를 먹는 괴인.\n\n우리들은 그들을... 구울이라 부른다.\"\n\n갑작스런 사고로 죽을 고비를 맞은 주인공이 이식을 받아 특별한 존재가 되어 구울 사이에서 방황하는데..."},"A0079":{"t":"진격의 거인","type":"애니","img":"https://image.tmdb.org/t/p/w500/kTYFXRdvo7GZWULKjeD4YZ929NC.jpg","status":"방영 종료","summary":"2013년 4월 MBS에서 방영을 시작한 애니메이션. 100여 년 전 갑자기 나타난 거인들에 의해 멸종 위기에 처한 인류는 거대한 벽을 쌓고 그 안에서 살아가고 있다. 에렌은 바깥 세계를 동경하며, 언젠가 저 방벽 밖으로 나가겠다는 꿈을 키우고 있었다. 그러던 어느 날, 60m가 넘는 초대형 거인의 등장으로 벽은 무너지고, 거인들이 벽 안으로 들어와 사람들을 잡아먹기 시작한다. 절규와 죽음으…"},"A0080":{"t":"하이큐!!","type":"애니","img":"https://image.tmdb.org/t/p/w500/3hbEgDctBcvM15uIH1RHR4cvWIv.jpg","status":"방영 종료","summary":"히나타 쇼요는 우연히 춘고 대회의 배구 경기를 보다 코트 위에서 활약하는 '작은 거인'에 이끌려 배구를 시작하게 된다. 그로부터 3년 뒤 중학교 처음이자 마지막 공식 경기에서, 히나타는 '코트 위의 제왕'이라는 별명을 지닌 천재 세터 카게야마 토비오가 속한 키타가와 제1 중학교와 맞붙어 참패당한다. 이후 배구 명문교에 진학했을 카게야마에게 리벤지하겠다는 일념으로 '작은 거인'이 다녔던 카라스…"},"A0081":{"t":"3학년 Z반 긴파치 선생","type":"애니","img":"https://image.tmdb.org/t/p/w500/wNnT7XRTenUDj0E0SVYqKaAUsdc.jpg","status":"방영 중","summary":"칠칠치 못한 흰옷, 은빛 곱슬머리에 죽은 물고기 같은 눈이 트레이드 마크인 고등학교 교사 사카타 긴파치.\n\n그가 담임을 맡고 있는 ‘은혼 고등학교 3학년 Z반’은 돌덕, 웩로인, 스토커, 마요라, 초S, 양아치 (이하 생략)\n\n어째선지 개성이 강한 학생들만 모여서 매일이 문제투성이!\n\n터무니없는 일만 일어나는 날들에 긴파치는 머리를 감싸 쥐는... 일은 없고, 멍한 얼굴로 문제를 해결하기도 …"},"A0082":{"t":"센과 치히로의 행방불명","type":"애니","img":"https://image.tmdb.org/t/p/w500/u1L4qxIu5sC2P082uMHYt7Ifvnj.jpg","status":"개봉","summary":"평범한 열 살 짜리 소녀 치히로 식구는 이사 가던 중 길을 잘못 들어 낡은 터널을 지나가게 된다. 터널 저편엔 폐허가 된 놀이공원이 있었고 그곳엔 이상한 기운이 흘렀다. 인기척 하나 없는 이 마을의 낯선 분위기에 불길한 기운을 느낀 치히로는 부모님에게 돌아가자고 조르지만 부모님은 호기심에 들떠 마을 곳곳을 돌아다니기 시작한다. 어느 음식점에 도착한 치히로의 부모님은 그 곳에 차려진 음식들을 …"},"A0083":{"t":"톰과 제리 쇼","type":"애니","img":"https://image.tmdb.org/t/p/w500/41EWXLXTZO4MLb2BL28mWZuydyq.jpg","status":"방영 종료","summary":""},"A0084":{"t":"카구야 님은 고백받고 싶어 ~천재들의 연애 두뇌전~","type":"애니","img":"https://image.tmdb.org/t/p/w500/urzSiR7IiImAzyq2VyOJ1BtNChY.jpg","status":"방영 종료","summary":"집안도 인망도 좋다!!\n\n장래가 기대되는 우수한 수재들이 모인 슈치인 학원!!\n\n그 학생회에서 만난 부회장 시노미야 카구야와 회장 시로가네 미유키는 서로에게 끌리고 있었지만, 아무 일도 없는 채로 반년이 경과!!\n\n프라이드가 강하고 솔직하지 못한 두 사람은, 귀찮게도 \"어떻게 상대방에게 고백을 받아낼 것인가\" 만을 생각하게 되어버렸다?!\n\n연애는 성취될 때까지가 즐겁다!!\n\n신감각 \"두뇌전\"…"},"A0085":{"t":"토지마 탄자부로는 가면라이더가 되고 싶어","type":"애니","img":"https://image.tmdb.org/t/p/w500/wqczcoNCokVreXw4QA4nyDlxkal.jpg","status":"방영 종료","summary":"40살이 되어서도 진심으로 '가면라이더'가 되고 싶어 했던 토지마 탄자부로. 그 꿈을 포기하려 했을 때, 세상을 떠들썩하게 한 '가짜 쇼커' 강도 사건에 휘말리는데…"},"A0086":{"t":"지옥락","type":"애니","img":"https://image.tmdb.org/t/p/w500/d5hzkYaO1h7UjH3Q0MRfyGVXjLi.jpg","status":"방영 종료","summary":"에도시대 말기. 이와가쿠레 최강의 닌자로 이름을 떨쳤으나 닌자의 세계에서 발을 빼려다 붙잡혀 사형수가 된 ‘가비마루’는 극락 정토라 소문난 섬에서 ‘불로불사의 약’을 가지고 오면 무죄 방면될 수 있다는 말을 듣는다. 가비마루는 사랑하는 아내와 재회하기 위해 참수 집행인 ‘야마다 아사에몬 사기리’와 함께 선약이 있다고 하는 섬으로 향한다. 그러나 같은 이유로 선약을 찾고 있는 사형수들이 섬에 …"},"A0087":{"t":"미소가 끊이지 않는 직장입니다","type":"애니","img":"https://image.tmdb.org/t/p/w500/vaOF01XpnySrkfYtbn6jYFMtW0V.jpg","status":"방영 종료","summary":"순정만화를 그리는 신인 만화가 후타미 나나. 멋있는 편집자와 든든한 어시스턴트의 도움으로 장기를 소재로 한 만화 '묘성에게'의 첫 연재를 마침내 시작하게 되는데... 스트레스로 위가 고장 나고, 1화부터 마감을 연장하고, 콘티 작업에 막혀서 밤새 책상에만 붙어 있고, 야식 때문에 살이 찌고, 이상한 망상을 도저히 멈출 수가 없는 등... 다사다난한 만화가 라이프, 웃으면서 만끽할 수 있을까?"},"A0088":{"t":"후르츠 바스켓","type":"애니","img":"https://image.tmdb.org/t/p/w500/tpsT4TtUU25I8VUTHC7jrrWr3HL.jpg","status":"방영 종료","summary":"산속에서 혼자 살게 된 소녀가 이성에게 안기면 동물로 변해버리는 '소우마' 집안과 엮이게 되면서 일어나는 이야기를 그린 애니메이션"},"A0089":{"t":"야생의 라스트 보스가 나타났다!","type":"애니","img":"https://image.tmdb.org/t/p/w500/zRYVIvMSj10SwerxmWbkv2ijjdR.jpg","status":"방영 중","summary":"엑스게이트 온라인이라는 게임을 통해 과금과 시간을 들여 만든 캐릭터 '루파스 마팔'을 게임 이벤트로서 다른 플레이어들의 연합으로 쓰러지는 보스역을 맡고 시나리오대로 지게 된다.\n\n본인 나름대로도 만족하고 나서 다음날 다시 접속을 하려고 보니 로그인 화면에 엑스게이트 온라인의 세계를 창조했다는 여신 애로비너스가 를 통해 yes라고 선택 후 눈을 뜨고 보니 자신이 만든 계정 캐릭터인 루파스 자체…"},"A0090":{"t":"얼굴에 드러나지 않는 카시와다 양과 얼굴에 드러나는 오오타 군","type":"애니","img":"https://image.tmdb.org/t/p/w500/xNOitDLzWugxFLQvMFik3lexWnk.jpg","status":"방영 종료","summary":"무슨 일이 있어도 얼굴에 드러나지 않는 여중생 카시와다 양과 얼굴에 완전히 다 드러나는 동급생 오오타 군.\n\n정반대인 두 사람은 분명 쌍방향...? 카시와다 양과 오오타 군, 같은 반 친구들의 따뜻한 러브 코미디."},"A0091":{"t":"일하는 세포","type":"애니","img":"https://image.tmdb.org/t/p/w500/vCnhh3wFfaTiZICV7af9hlNvcmY.jpg","status":"방영 종료","summary":"우리가 모르는 사이 인체를 지키기 위해 열심히 일하는 누군가가 있다?\n\n수많은 세포가 의인화된 캐릭터로 살아난다!\n\n빨간 모자를 쓴 배달부 적혈구, 침입자를 물리치는 백혈구, 귀여운 꼬맹이 혈소판 등.\n\n각각 몸 안에서 어떤 활약을 할까?"},"A0092":{"t":"아군이 너무 약해 보조 마법으로 일관하던 궁정 마법사, 추방당해서 최강을 노린다","type":"애니","img":"https://image.tmdb.org/t/p/w500/WCkzYA1vzIIhqHX1p4lux2HpV1.jpg","status":"방영 종료","summary":"「보조 마법 밖에 제대로 쓸 수 없는 무능한 마법사는 이 파티에 필요없다. 너는 해고다, 알렉 유그렛트」\n\n그것은 어느 날 갑자기, 왕태자의 던전 공략에 시중드는 형태로 파티에 참가하고 있던 궁정 마법사 알렉에게 들이닥친 추방 선고.\n\n그리고 파티는 커녕, 왕태자의 괴롭힘에 의해 궁정으로부터도 추방되어 어찌할 바를 몰라하고 있던 알렉에 말을 걸어온 것은, “마법 학원” 시절의 친구였다.\n\n「…"},"A0093":{"t":"아빠는 영웅, 엄마는 정령, 딸인 나는 전생자.","type":"애니","img":"https://image.tmdb.org/t/p/w500/xpJlYFp8HbPrxZnbM7Sa0exDZO4.jpg","status":"방영 종료","summary":"엘렌은 인간 영웅과 정령 여왕 사이에서 태어났지만, 원래는 일본의 과학자였던 전생자다. 아버지 로벨은 나라를 구한 전설의 영웅, 어머니 오리진은 원시의 어머니로 정령의 여왕이다! 엘렌은 아버지와 인간계를 찾았다가 왕가의 음모에 휘말린다. 정령의 힘을 손에 넣으려는 라비스엘 왕자에게, 엘렌은 압도적인 치트 능력으로 맞서는데…"},"A0094":{"t":"데스노트","type":"애니","img":"https://image.tmdb.org/t/p/w500/chnG4pYo89weaBjXHJWvW68E35B.jpg","status":"방영 종료","summary":"야가미 라이토는 장래가 유망한 모범생이지만 마음속으로는 따분해하고 있었다. 그러던 어느날 \"데스노트\"를 발견한다. 데쓰노트는 사신의 세계에서 온 공책으로 원하는 방식으로 사람을 죽일 수 있는 힘이 있다. 데스노트를 손에 넣은 라이토는 범죄와 범죄자가 없는 그만의 완전한 세상을 만들기로 결심한다. 범죄자들이 하나씩 죽어가자 당국에서는 전설적 탐정인 L을 보내 범인을 추적한다. 그리하여 재치와 …"},"A0095":{"t":"SANDA","type":"애니","img":"https://image.tmdb.org/t/p/w500/mIA684Vy3CpNXpQihHYYWP1lzAM.jpg","status":"방영 종료","summary":"무대는 초저출산 시대를 맞이한 근미래의 일본. 아이들은 나라의 보물로 취급받으며 어른들에 의해 전원 기숙 학교에서 관리 및 보호를 받고, 아이들에게 꿈과 희망을 주는 산타클로스는 위험인물로서 제거 대상으로 지정돼 있다. 중학생인 산다 카즈시게는 눈 내리는 12월 25일, 같은 반인 후유무라 시오리에게 목숨을 위협받는다. 후유무라는 산다가 산타클로스의 후예인 걸 알고 소원을 들어달라고 부탁한다…"},"A0096":{"t":"【최애의 아이】","type":"애니","img":"https://image.tmdb.org/t/p/w500/zim3SB5YPcS6Hl2uLScJeW5bLIz.jpg","status":"방영 중","summary":"지방 도시에서 일하는 산부인과 의사 고로. 어느 날, '최애' 아이돌 'B코마치'의 멤버 아이가 그의 앞에 나타난다. 그녀는 어떤 금단의 비밀을 품고 있었는데… 그런 두 사람의 '최악'의 만남에서부터 운명이 움직이기 시작한다──."},"A0097":{"t":"명탐정 코난","type":"애니","img":"https://image.tmdb.org/t/p/w500/tg5Gya0yv7mScUMIX8CSXZzLCVd.jpg","status":"방영 중","summary":"검은 조직의 약물에 당해서 초등학생의 몸이 된 고등학생 쿠도 신이치가 에도가와 코난이라는 가명을 사용하여 소꿉친구인 란의 아버지가 운영하는 탐정사무소에서 얹혀 살며 사건을 해결하는 이야기를 다루고 있다."},"A0098":{"t":"핀과 제이크의 어드벤처 타임","type":"애니","img":"https://image.tmdb.org/t/p/w500/11m6y2KdpnTJux0pStJ94GU1zQ7.jpg","status":"방영 종료","summary":"이 작품은 종말 이후의 세상인 우 랜드에서 살고 있는 인간 소년 핀과, 마법의 힘으로 몸의 크기와 모양을 자유자재로 변화할 수 있는 강아지 제이크의 모험을 다루고 있다. 워드는 핀을 ‘높은 도덕성을 가진 용맹한 어린 아이’라고 표현했고, 제이크는 영화 《미트볼》에서 빌 머리가 맡은 역할인 트리퍼 해리슨(Tripper Harrison)에서 영감을 받았다고 했다. 그 외 등장인물로는 캔디 왕국의…"},"A0099":{"t":"티미의 못말리는 수호천사","type":"애니","img":"https://image.tmdb.org/t/p/w500/xLBbOZCXLxYbtIOjC03dKxLlKqR.jpg","status":"방영 종료","summary":"크리에이터: 부치 하트만, 개리 콘래드, 켄 브루스\n\n출연: 타라 스트롱, 수잰 블레이크슬리, 대런 노리스\n\n티미의 못말리는 수호천사는 소설 속 마을인 딤스데일에 사는 10살 짜리 소년 티미가 어려움을 겪는 이야기이다. 그의 부모님도 그의 유모도 그의 말을 들어주지 않는다. 다행히도, 요정 수호천사들이 티미를 돕는다."},"A0100":{"t":"믿었던 동료들에게 던전 오지에서 살해당할 뻔했지만 기프트 『무한 뽑기』로 레벨 9999의 동료들을 손에 넣어 전 파티 멤버와 세계에 복수&『참교육!』합니다!","type":"애니","img":"https://image.tmdb.org/t/p/w500/to3gIp3AOGTSUwfD5hSup3cllIR.jpg","status":"방영 종료","summary":"과거 여신이 창조한 9개의 종족. 그중 가장 약하고, 조롱받는 존재――인종(휴먼). 인종(휴먼) 소년 라이트는 운 좋게도 9개 종족으로 편성된 파티 **'종족의 모임(種族の集い)'**에 받아들여져 행복한 시간을 보내고 있었다. 하지만, 그것은 덧없는 환상이었다. 그를 기다리고 있던 것은 세계 최대 최악의 던전 **'나락(奈落)'**에서의 배신. 나락의 밑바닥에서 살아남은 라이트는, 그곳에서 …"},"A0101":{"t":"짱구아빠 노하라 히로시의 점심","type":"애니","img":"https://image.tmdb.org/t/p/w500/nxfLdfhWDoPPH4UL5VyqhFg62KR.jpg","status":"방영 종료","summary":"국민적 인기 캐릭터를 탄생시킨 만화 '짱구는 못 말려'의 공식 스핀오프 애니메이션.  짱구 아빠 노하라 히로시가 잠시 숨을 돌리는 점심시간 동안 제한된 돈과 시간 속에서 본인의 취향을 관철하는 모습을 그린다. 평소에는 보기 힘든 일하는 남자 노하라 히로시가 점심시간을 보내는 모습!\n\n과연 어떤 점심이 등장할 것인가!? 그리고 히로시가 소중히 여기는 '격식'이란 무엇인가?"},"A0102":{"t":"악식 영애와 광혈 공작 ~그 마물, 제가 맛있게 먹겠습니다!~","type":"애니","img":"https://image.tmdb.org/t/p/w500/6E1hsfFlwWr14yxfgmt9Lt7Gjw9.jpg","status":"방영 종료","summary":"「먹기 위해서는 맛있어야지!」백작가의 딸 멜피에라는 누구에게도 이해되지 않는 취미를 가지고 있었다. 그것은 인간에게 해를 끼치는 마물을 맛있게 먹는 것! 그렇게 붙은 별명은 「악식 영애」. 어느 날, 약혼자를 찾기 위해 참가하고 있던 파티에서 광폭화된 마수를 만난다. 절체절명의 순간 무심코 멜피에라는 몸을 움츠리지만, 그 곳에 공포의「광혈공작」이라 불리는 갤브레이스 공작이 모습을 드러낸다. …"},"A0103":{"t":"영원한 황혼","type":"애니","img":"https://image.tmdb.org/t/p/w500/cDILNcuQq721iBaIdBWmsNUNLoS.jpg","status":"방영 종료","summary":"영원한 잠에서 깨어난 세상에서 구혼해 온 존재는,\n\n가장 사랑했던 그녀를 꼭 닮은 안드로이드였다...\n\n콜드슬립에서 깨어난 남자 고등학생,\n\n히메가미 아키라의 눈앞에는 믿을 수 없는 광경이 펼쳐져 있었다.\n\n전쟁에 의해 황폐해진 도시.\n\n국가는 사라지고, OWEL이라는 통일 조직에 의해 관리되는 사람들.\n\n'엘시'라고 불리는 결혼과는 다른 새로운 제도.\n\n과거 자신이 살던 세상과는 너무나도 …"},"A0104":{"t":"용한소녀","type":"애니","img":"https://image.tmdb.org/t/p/w500/3bPfjs6t7Yre9tHS8otQlFuzL8N.jpg","status":"방영 종료","summary":"용왕의 딸 '김용만', 성공을 목표로 인간세상에 당도했다\n\n그런데 용만의 옆자리인 전교 1등 '심해수'는 라이벌의 등장이 달갑지 않은 듯한데...\n\n공부만 하기에도 바쁜 두 사람이 어째서인지 자꾸만 엮인다?!\n\n열여덟 소년소녀의 성적 향상 로맨스 𝑻𝒐 𝒃𝒆 𝒄𝒐𝒏𝒕𝒊𝒏𝒖𝒆𝒅..🤍"},"A0105":{"t":"헌터X헌터","type":"애니","img":"https://image.tmdb.org/t/p/w500/eobAuhCJA8oRp814V67WhezVXtQ.jpg","status":"방영 종료","summary":"양친의 얼굴도 모른채 성장한 12살 소년 곤은 세계 제일의 헌터라 칭송받는 아버지와 만나기 위해 헌터가 되기로 결심한다. 헌터란 세계 최고의 직업으로 괴수나 범죄자를 잡거나 보물을 찾고, 새로운 자연현상을 발견하는 등 귀중하고 구하기 힘든 아이템을 찾아 생명을 거는 사람들을 뜻한다. 사람과 자연의 질서를 지키는 일을 기본적인 사명으로 삼는 헌터는 방대한 지식, 건강한 육체와 건전한 정신 그리…"},"A0106":{"t":"릭 앤 모티","type":"애니","img":"https://image.tmdb.org/t/p/w500/owhkU6KRqdXoUQpjV8uyZGPtX58.jpg","status":"방영 중","summary":"술에 절어 사는 천재 과학자 릭은 투정이 심한 10대 손자 모티를 데리고 외계와 대체 현실로 아슬아슬한 모험을 떠난다."},"A0107":{"t":"나를 먹고 싶은, 괴물","type":"애니","img":"https://image.tmdb.org/t/p/w500/ffAWNFURAmupnR3kh7C52uE4EX.jpg","status":"방영 종료","summary":"\"저는 당신을 먹으러 왔어요.\" 어느 날 갑자기 나타난 인어 소녀 시오리는 바닷가 마을에서 홀로 살아가는 히나코의 손을 잡고 다정하게 말했다. 히나코의 육신은 다른 인간의 그것보다 맛있다고 한다. 모든 요괴들이 먹고 싶어 할 만큼 특별한 맛이라고... 시오리는 히나코가 가장 맛있는 상태로 무르익을 때까지 히나코를 지키고, 언젠가 그녀를 먹겠다고 약속한다. 히나코의 마음속에 간절한 소망이 떠오…"},"A0108":{"t":"포켓몬스터","type":"애니","img":"https://image.tmdb.org/t/p/w500/vaXQOBNdQVtxUMN96cR4qQRxmoQ.jpg","status":"방영 종료","summary":"관동지방의 태초마을에 살고 있는 주인공 지우는 오박사로부터 피카츄와 몬스터볼, 포켓몬도감을 받아 포켓몬 마스터를 목표로 여행을 나선다. 회색체육관, 갈색체육관 등에서 격렬한 시합과 여러 곳에서 이루어지는 포켓몬과의 만남."},"A0109":{"t":"야노 군의 평범한 나날","type":"애니","img":"https://image.tmdb.org/t/p/w500/qBYIyDjROM0ssRw8C595ONnrzrv.jpg","status":"방영 종료","summary":"남들보다 살짝 걱정이 많은 반장・요시다는, 옆자리에 앉은 야노 군이 너무나도 걱정이다. 매일 상처투성이로 등교하는 '엄청난 불운 체질'의 야노 군. 그런 야노 군의 상처를 치료하며, 요시다의 마음속에는 특별한 감정이 피어나는데... 개성 있는 친구들에게 둘러싸여 조금씩 거리를 좁혀가는 두 사람. 과연, 요시다의 사랑은 어떻게 흘러갈 것인가? 그리고, 야노 군은 '평범한 고등학교 생활'을 보낼…"},"A0110":{"t":"위 베어 베어스: 곰 브라더스","type":"애니","img":"https://image.tmdb.org/t/p/w500/9UfP1bOzHGWnjviBeI9d8ZTU9pN.jpg","status":"방영 종료","summary":"2015년 7월 Cartoon Network에서 방영을 시작한 애니메이션. 애니메이션 제작자인 다니엘 정의 웹툰 The Three Bare Bears를 원작으로 한다. 부모 없이 자란 곰 삼형제인 그리즐리와 판다, 아이스 베어가 샌프란시스코 베이 에어리어에서 사람들처럼 음식을 구매하고 사람들과 친구 관계를 맺거나 인터넷 상에서 유명해지기 위해 노력하는 등 사람들과 함께 지내기 위해 갖은 시도…"},"A0111":{"t":"독립일기","type":"애니","img":"https://image.tmdb.org/t/p/w500/1Hj9onc6g1rIoQhA3uQlgcaZVMj.jpg","status":"방영 중","summary":""},"A0112":{"t":"도라에몽","type":"애니","img":"https://image.tmdb.org/t/p/w500/s4Z0qQHQame1xeZlwqiMOIkhqBn.jpg","status":"방영 종료","summary":"도라에몽은, 무엇을 해도 안 되는 진구를 돕기 위해 22 세기의 세계로부터 왔다. 진구는 비실이나 퉁퉁이로부터 여느 때처럼 괴롭힘을 당하고, 엄마나 학교의 선생님에게도 언제나 혼난다. 더군다나 학교에서는 낮잠을 자기 때문에 시험는 언제나 0점이다. 도라에몽은, 그런 진구를 미래의 편리한 도구로 돕는다. 그러나 때로는 진구가 언제나 도라에몽의 도구에 의지하기 때문에, 그를 차갑게 대하여 진구를…"},"A0113":{"t":"란마 ½","type":"애니","img":"https://image.tmdb.org/t/p/w500/6LmWAQFMD2j8gTUGgmD8vq7xxyA.jpg","status":"방영 종료","summary":"찬물을 뿌리면 여자로 더운물을 뿌리면 원래의 남자로 돌아간다는 특이한 설정과 타카하시 루미꼬 특유의 개그로 높은 인기를 누렸던 원작 만화를 TV시리즈 화한 것으로 원작의 분위기나 개그를 잘 살려낸 애니메이션으로 평가받고 있다. 텐도 도장에 중국으로 수련하러 아버지의 친구와 그 아들이 도착한다는 소식에 집안이 어수선해진다. 아카네의 아버지는 친구의 아들과 자신의 딸을 결혼시켜 도장을 잇게 할 …"},"A0114":{"t":"나 혼자만 레벨업","type":"애니","img":"https://image.tmdb.org/t/p/w500/5gR5oCQufzZ6tPcFoHb61ckiwiP.jpg","status":"방영 종료","summary":"다른 차원과 이쪽 세계를 이어주는 통로인 '게이트'가 갑자기 발생한 뒤 10년 세계에는 '헌터'라고 불리는 초인적인 힘에 각성한 사람들이 출현했다. 헌터는 게이트 안의 던전을 공략하고 대가를 받는 것을 생업으로 하고 있는데 그런 강자들만 가득한 헌터들 중 '성진우'는 인류 최약병기라고 불리는 저랭크 헌터로서 생활하고 있었다. 어느 날, 저랭크 던전에 숨겨진 고랭크 이중 던전을 발견했지만 빈사…"},"A0115":{"t":"무직의 영웅 ~스킬 따위는 별로 필요하지 않았다만~","type":"애니","img":"https://image.tmdb.org/t/p/w500/2I9v7FBgMtktnbhkHqyB8qZ2bW.jpg","status":"방영 종료","summary":"여신으로부터 축복을 받아 “직업”이 주어진 주인공 '아렐'. 그러나 그것은《무직》이라는 어떤 스킬도 습득할 수 없는 최저의 직업이었다.\n\n10살로 무능이라는 낙인이 찍힌 그는, 비탄에 저문다는 것은 없었다.\n\n「별로 스킬 같은거 없어도, 어떻게든 되는 것이 아닌가?」\n\n재능이 없으면 노력하면 좋잖아, 이라는 듯이 아렐은 맹특훈에 힘써… 「어떻게 하면《무직》의 네가,〈괴력〉스킬을 가지는 나와 …"},"A0116":{"t":"스파이더맨: 뉴 유니버스","type":"애니","img":"https://image.tmdb.org/t/p/w500/d9V6Q9vpVpmaca7vwSUbCajtDb3.jpg","status":"개봉","summary":"평범한 10대 마일스 모랄레스는 우연히 방사능 거미에 물려 스파이더맨 능력을 가지게 된다. 혼란스러워하던 마일스는 악당과 싸우고 있는 피터 파커를 마주치게 되고 피터 파커는 마일스가 자신과 같은 능력을 가지고 있음을 직감한다. 여러 개의 평행세계가 존재한다는 것을 알게 된 마일스와 피터 파커는 이후 스파이더우먼 스파이더 그웬, 스파이더맨 누아르, 스파이더햄 등 평행세계 속 공존하는 모든 스파…"},"A0117":{"t":"극장판 체인소 맨:  레제편","type":"애니","img":"https://image.tmdb.org/t/p/w500/oTn0PoR8gSMpMqJaT2pUtkkN0Ia.jpg","status":"개봉","summary":"데블 헌터로 일하는 소년 ‘덴지’는 조직의 배신으로 죽음에 내몰린 순간 전기톱 악마견 ‘포치타’와의 계약으로 하나로 합쳐져 누구도 막을 수 없는 존재 ‘체인소 맨’으로 다시 태어난다. 악마와 사냥꾼, 그리고 정체불명의 적들이 얽힌 잔혹한 전쟁 속에서 ‘레제’라는 이름의 미스터리한 소녀가 ‘덴지’ 앞에 나타나는데… ‘덴지’는 사랑이라는 감정에 이끌려 지금껏 가장 위험한 배틀에 몸을 던진다!"},"A0118":{"t":"모아나 2","type":"애니","img":"https://image.tmdb.org/t/p/w500/hwmwTFtMbzxAWbIOp1RyyiOCyx0.jpg","status":"개봉","summary":"바다를 누볐던 선조들에게서 예기치 못한 부름을 받은 모아나가 마우이와 다시 만나 새로운 선원들과 함께 오랫동안 잊혀진 멀고 위험한 바다 너머로 떠나는 특별한 모험을 담은 이야기"},"A0119":{"t":"인사이드 아웃","type":"애니","img":"https://image.tmdb.org/t/p/w500/rMXHvHzpuYZXrJUhRVJ3TvDSwe5.jpg","status":"개봉","summary":"모든 사람의 머릿속에 존재하는 감정 컨트롤 본부. 그곳에서 불철주야 열심히 일하는 기쁨, 슬픔, 버럭, 까칠, 소심 다섯 감정들. 정든 옛 동네를 떠나 도시로 이사하는 라일리 가족. 이사 후 새로운 환경에 적응해야 하는 라일리를 위해 그 어느 때 보다 바쁘게 감정의 신호를 보내지만 우연한 실수로 기쁨과 슬픔이 본부를 이탈하게 되자 라일리의 마음 속에 큰 변화가 찾아온다. 라일리가 예전의 모습…"},"A0120":{"t":"인사이드 아웃 2","type":"애니","img":"https://image.tmdb.org/t/p/w500/x2BHx02jMbvpKjMvbf8XxJkYwHJ.jpg","status":"개봉","summary":"13살이 된 라일리의 행복을 위해 매일 바쁘게 머릿속 감정 컨트롤 본부를 운영하는 ‘기쁨’, ‘슬픔’, ‘버럭’, ‘까칠’, ‘소심’. 그러던 어느 날, 낯선 감정인 ‘불안’, ‘당황’, ‘따분’, ‘부럽’이가 본부에 등장하고, 언제나 최악의 상황을 대비하며 제멋대로인 ‘불안’이와 기존 감정들은 계속 충돌한다. 결국 새로운 감정들에 의해 본부에서 쫓겨나게 된 기존 감정들은 다시 본부로 돌아가…"},"A0121":{"t":"너의 이름은.","type":"애니","img":"https://image.tmdb.org/t/p/w500/2DJCufz3Oa703PbLjNX1pM6MCG2.jpg","status":"개봉","summary":"시골에 사는 소녀 미츠하(가미시라이시 모네)는 어느 날 잠에서 깬 후 자신의 몸이 남자로 바뀐 걸 알게 된다.  같은 시간, 도쿄에 사는 소년 타키(가미키 류노스케) 역시 이 기이한 상황을 겪고 있다.  낯선 가족, 낯선 친구들, 낯선 풍경들...  서로에게 이어진 끈을 알게 된 둘은 둘만의 규칙을 정하고 점차 상황을 받아들이기 시작한다.  서로에게 남긴 메모를 확인하며  점점 친구가 되어가…"},"A0122":{"t":"지팡이와 검의 위스토리아","type":"애니","img":"https://image.tmdb.org/t/p/w500/hcLU81mLtNR9ariY7Afsckfx9QB.jpg","status":"방영 중","summary":"어엿한 마도사를 꿈꾸고 마법학교에 입학한 소년 윌. 누구보다도 노력하는 그에게는 마도사로서 치명적인 약점이 있었다. 그것은 '마법을 전혀 사용할 수 없다'는 것. 동급생과 교사가 차가운 눈으로 바라보는 가운데 때로는 꺾일 것 같으면서도, 윌은 마음을 강하게 먹고 정진했다. 지팡이는 쓸 수 없지만 검을 사용해 마법 지상주의인 세계에서 싸워 나간다. 자신에게만 주어진 힘을 믿고. 그리고 소중한 …"},"A01
