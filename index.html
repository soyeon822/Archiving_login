애니메이션 시리즈입니다. 도라는 부모님과 같이 정글에 살고 있어요. 도라는 호기심이 많고 숲에 있는 모든 동물들, 식물들, 꽃에 대해서 알고 싶어해요. 도라는 여행을 떠날 때면 작은 등에 항상 노래하는 지도와 구명장비들을 챙긴답니다!"},"A0131":{"t":"아케인","type":"애니","img":"https://image.tmdb.org/t/p/w500/1PeuDHoxfvgTaNIrJzM6vKmJarD.jpg","status":"방영 종료","summary":"지상 도시 필트오버와 그 아래의 지하 도시 자운. 극심하게 반목하는 두 쌍둥이 도시에서, 두 자매가 서로 반대편에 서서 싸우기에 이른다. 마법 기술과 신념의 충돌 속에서 전쟁이 시작된다."},"A0132":{"t":"Re: 제로부터 시작하는 이세계 생활 신편집판","type":"애니","img":"https://image.tmdb.org/t/p/w500/oSeElwSCybmO0Y5u3S4Kq9m8lEb.jpg","status":"방영 중","summary":""},"A0135":{"t":"괴수 8호","type":"애니","img":"https://image.tmdb.org/t/p/w500/wBsGdFsrD9CL8xRphidx60EmgBE.jpg","status":"방영 중","summary":"일상적으로 괴수가 사람들을 위협하는 세계. 괴수를 토벌하는 「일본 방위대」 입대를 지망하던 히비노 카프카는, 언제부턴가 그 꿈을 포기하고 괴수 전문 청소업자로서 일하고 있었다. 「둘이서 괴수를 전멸시키자」 어린 시절 그렇게 함께 맹세한 소꿉친구 아시로 미나가 제3부대 대장으로서 각광을 받고 있는 가운데, 그녀와 함께 싸울 수 없는 카프카는 자신이 한심하게 느껴졌다. 하지만, 방위대에 입대하려…"},"A0137":{"t":"단다단","type":"애니","img":"https://image.tmdb.org/t/p/w500/ztR1BJbFx5XZgbtX2Ii2y7jjT9X.jpg","status":"방영 중","summary":"영매사 집안에 태어난 여고생?모모＜아야세 모모＞와, 같은 학교에 다니는 오컬트 매니아 오카룽. 모모가 반에서 괴롭힘당하던 오카룽을 도와준 것을 계기로 이야기를 하게 된 두 사람이었지만 '유령의 존재는 믿지만 우주인의 존재는 부정'하는 모모와, '우주인의 존재는 믿지만 유령의 존재는 부정'하는 오카룽은 말다툼을 하게 된다.서로 존재를 부정하는 우주인과 유령의 존재를 믿게 만들기 위해 모모는 U…"},"A0138":{"t":"블루 록","type":"애니","img":"https://image.tmdb.org/t/p/w500/tqiDHyR3YoIq4h0taoodUwp78Uz.jpg","status":"방영 종료","summary":"세계 제일의 에고이스트가 아니면, 세계 제일의 스트라이커가 될 수 없다. 일본을 월드컵 우승으로 이끌 스트라이커를 육성하기 위해 일본 축구 연맹은 어떤 계획을 내세웠다. 그 이름은 '블루 록(푸른 감옥)' 프로젝트. 그렇게 해서 모인 300명의 고등학생들. 거기에다 모두 FW(포워드) 포지션이었다. 299명의 축구 생명을 희생시켜 탄생할, 일본 축구에 혁명을 불러일으킬 스트라이커는 과연? 지…"},"A0139":{"t":"체인소 맨 총집편","type":"애니","img":"https://image.tmdb.org/t/p/w500/a4XqQQ9Hx6O8BsQzkCyLaD43GJY.jpg","status":"방영 종료","summary":"큰 빚을 떠안은 십 대 소년이 악마의 심장을 가진 데블 헌터가 되어 악마들에 맞선다. 기존의 시즌 1을 2부작으로 재구성하고, 원작 만화의 보너스 챕터도 애니메이션으로 새로 제작해 추가했다."},"A0140":{"t":"더 파이팅","type":"애니","img":"https://image.tmdb.org/t/p/w500/a5g4AltmlNq0e1hN1jugemNa5wX.jpg","status":"방영 종료","summary":"어려서 아버지를 여의고 어머니와 단 둘이 낚시 가게를 꾸려나가던 왕따 고교생 마쿠노우치 잇포는 같은 학교의 불량학생 우메자와 일행에게 괴롭힘을 당하던 중 로드워크 중인 카모가와 짐 소속의 간판 복서 타카무라 마모루의 도움을 받게되고 복싱을 동경, 강해지기 위해 복싱을 시작한다. 같은 나이의 복서 미야타 이치로와 선의의 라이벌이 되어 프로 복서가 되고, 경기를 치루면서 점점 진정한 강함이 무엇…"},"A0141":{"t":"너에게 닿기를","type":"애니","img":"https://image.tmdb.org/t/p/w500/whZ4i3fx1CA9HZKmQmbPGkPUEWH.jpg","status":"방영 종료","summary":"겉으로 우울해 보이는 한 소녀가 인기 만점의 같은 학교 남학생 쇼타를 남몰래 좋아하며 벌어지는 이야기."},"A0142":{"t":"신세기 에반게리온","type":"애니","img":"https://image.tmdb.org/t/p/w500/k3NQ7gVfnNPWbdCgg0x0Tv8CNNN.jpg","status":"방영 종료","summary":"서기 2000년, 남극에 거대한 운석이 추락하며 미증유의 재난 세컨드 임팩트가 일어난다. 해수면의 상승, 천재지변, 경제붕괴, 민족분쟁, 내란 등으로 세계 인구는 반으로 격감된다. 2015년, 지구가 겨우 회복의 기미를 보이기 시작할 무렵 인류에겐 또 다른 위기가 닥쳐온다. 하나씩 모습을 드러내는 정체 불명의 거대 전투병기 군단 사도. 사도의 출현에 대항하기 위하여 인류는 E계획에 의해 탄생…"},"A0143":{"t":"극장판 짱구는 못말려: 초화려! 작열하는 떡잎마을 댄서즈","type":"애니","img":"https://image.tmdb.org/t/p/w500/hh2eWvm91RMIVQb0esjQab8sWgh.jpg","status":"개봉","summary":"떡잎마을 어린이 엔터 페스티벌에서 우승한 떡잎마을 방범대 짱구, 맹구, 철수, 유리, 훈이는 우승 상품으로 인도 엔터 페스티벌 무대에 초청받아, 여행을 만끽한다. 짱구와 맹구는 수상한 잡화점에서 코 모양처럼 생긴 배낭을 발견하고, 맹구는 배낭의 콧구멍에 꽂혀 있는 휴지(?)를 홀린 듯이 자신의 코에 꽂아버린다. 그 순간, 알 수 없는 힘이 맹구에게서 뿜어져 나오는데…! 겉보기에는 평범한 휴지…"},"A0144":{"t":"가라오케 가자!","type":"애니","img":"https://image.tmdb.org/t/p/w500/zDhO4AS0xkDzx5O7KCunEvGBf0d.jpg","status":"방영 종료","summary":"합창부 부장 오카 사토미에게 야쿠자 나리타 쿄지가 갑자기 나타나서 말을 건다. '가라오케 가자!' 그의 조직에서는 매년 가라오케 대회가 열리는데 거기서 음치왕이 되면 회장님이 미묘한 문신을 새겨준다는 규칙이 있었다. 쿄지에게 노래를 가르쳐달라고 해서 어쩔 수 없이 연습에 함께하게 된 사토미. 가라오케로 맺어진 두 사람의 기묘한 관계의 행방은!?"},"A0145":{"t":"카우보이 비밥","type":"애니","img":"https://image.tmdb.org/t/p/w500/hbLDwYri1pyiEIMpICgftu7s8NE.jpg","status":"방영 종료","summary":"1998년 4월 TV Tokyo에서 방영을 시작한 SF물. 21세기 후반 2071년, 미국의 서부시대와 같이 현상금 제도가 제정되어있는 세계. 스파이크 스피겔과 그 동료들은, 태양계를 중심으로 현상금 수배자를 붙잡는 일을 생계로 하고 있는 현상금 사냥꾼 카우보이다. 때때로 대물의 현상금 수배자를 붙잡는 일도 있지만, 거친 일처리 때문에 같이 휩쓸린 일반시민으로부터 배상청구도 많은 그들은 낡은…"},"A0146":{"t":"비스타즈","type":"애니","img":"https://image.tmdb.org/t/p/w500/lQwFRcAhtzFzMCx66RC0tRJxpZr.jpg","status":"방영 종료","summary":"모든 종류의 동물들이 공존하는 세상. 어느 날 교내에서 살해 사건이 일어나고, 온화한 성격의 늑대가 자신의 육식 본능을 발견한다. 그는 전처럼 조용히 지낼 수 있을까?"},"A0147":{"t":"그레이트 프리텐더","type":"애니","img":"https://image.tmdb.org/t/p/w500/F8GyqlAlKLEZ42ERAP2ymWc8MN.jpg","status":"방영 종료","summary":"자신을 일본 최고 사기꾼이라 생각했던 에다무라 마코토. 세계 일류 사기꾼 로랑 티에리를 속이려다, 되레 된통 당하고 끌려들기까지! 자네, 제대로 사기 쳐볼 생각 없나?"},"A0148":{"t":"오버로드","type":"애니","img":"https://image.tmdb.org/t/p/w500/7Tz5N2IFjjELjigqfQpz8UVaNew.jpg","status":"방영 종료","summary":"가상 세계에서 현실처럼 플레이하는 체감형 게임, 통칭 DMMO-RPG의 전성기 2138년. 2126년에 발매된 《위그드라실》은 DMMO-RPG들 중에서도 방대한 맵과 엄청나게 높은 플레이어 자유도로 인해 국내에서 폭발적인 인기를 얻었고 DMMO-RPG의 붐을 일으킨 장본인이다. 그러나 12년이 지난 지금 조용히 서비스를 종료할 예정이었다. 위그드라실의 최강 마법사, 모몬가는 쓸쓸히 나자릭 지…"},"A0149":{"t":"청의 엑소시스트","type":"애니","img":"https://image.tmdb.org/t/p/w500/8TTa91UMjuH3TUqB7dblTZzxSrj.jpg","status":"방영 종료","summary":"수도원에서 자란 쌍둥이 형제 오쿠무라 린과 오쿠무라 유키오. 우등생에 행실 바른 동생과는 달리 사고뭉치에다가 열등생인 형, 린의 앞에 린의 진짜 아버지이며 악마의 신인 사탄이 나타나 린을 마계 게헤나로 끌고 가려고 한다. 그리고 충격적인 사실에 당황하는 린을 구하기 위해 나선 엑소시스트인 양아버지 후지모토 시로마저 목숨을 잃고 만다. 사탄을 없애기 위해 린은 엑소시스트가 되기로 하고, 동생과…"},"A0150":{"t":"신의 탑","type":"애니","img":"https://image.tmdb.org/t/p/w500/7pdBa5BevAgUUr3BbsuT5J6tsen.jpg","status":"방영 종료","summary":"탑에 오르면, 모든 것을 얻을 수 있다. 탑의 정상엔 이 세상의 모든 것이 있고, 이 세계를 손에 넣을 수 있다. 신이 될 수도 있다. 이것은, 별을 보고 싶어서 탑을 오르는 소녀 ‘라헬’과 라헬만 있으면 아무것도 필요 없는 소년 ‘밤’의 끝과 시작의 이야기다...."},"A0151":{"t":"용사 파티에서 추방된 백마도사, S랭크 모험자에게 주워지다 ~이 백마도사가 너무 규격 외이다~","type":"애니","img":"https://image.tmdb.org/t/p/w500/gBBxIUXZmFyJQuejkGBRIPbTGzT.jpg","status":"방영 종료","summary":"\"실력 부족의 백마도사는 필요 없어\"\n\n백마도사 로이드는 어느 날 갑자기 파티에서 나가라는 통보를 듣고, 용사 파티에서 추방되어 버린다.\n\n곤란해하던 로이드는 우연히 백마도사를 찾고 있던 S랭크 모험가 파티를 알게 되고, 함께 퀘스트를 해결하게 된다.\n\n이때는 아직, 용사 파티가 붕괴되고, 이윽고 로이드의 명성이 널리 퍼지게 되리라는 것을 아는 자는 없었다.\n\n이것은, 자신이 평범하다고 생각…"},"A0152":{"t":"도원암귀","type":"애니","img":"https://image.tmdb.org/t/p/w500/yZisgSQkcYBNeig72axKb0rDLjx.jpg","status":"방영 중","summary":"자신에게 깃들어 있던 새로운 능력에 눈을 뜬 십 대 소년. 숙적인 모모타로 일파에게 살해된 아버지의 복수를 하기 위해 오니 기관에 들어간다. 우루시바라 유라의 인기 만화 원작."},"A0153":{"t":"내가 연인이 될 수 있을 리 없잖아, 무리무리! (※무리가 아니었다?!)","type":"애니","img":"https://image.tmdb.org/t/p/w500/2Ks4IYCPB2yQ9iiL6eaNgbyDaLT.jpg","status":"방영 종료","summary":"쟁취하는 거야, 최고의 학교생활을!\n\n외톨이였던 중학교 시절에서 벗어나기 위해, 전력을 다해 고등학교 데뷔를 마친 아마오리 레나코.\n\n하지만 타고난 아싸 기질 탓에, 동경하던 인싸 생활에 적응하지 못하고 질식 직전의 상태로...\n\n현역 모델이자 완벽한 미소녀, 오우즈카 마이\n\n상냥하고 부드러운 천사, 세나 아지사이\n\n쿨한 흑발 미녀, 코토 사츠키\n\n밝은 성격의 무드 메이커, 코야나기 카호\n\n…"},"A0154":{"t":"어떤 과학의 초전자포","type":"애니","img":"https://image.tmdb.org/t/p/w500/clPfDVNKT8hkmH7ydBSxQ3dxup9.jpg","status":"방영 중","summary":"인기 애니의 외전! 최첨단 SF 판타지 대탄생!!\n\n원작 최고 인기 캐릭터 미사카 미코토가 주인공으로 강림했다!!\n\n인구 230만 명 중 80%가 초능력을 가진 학생으로 도시 자체가 거대한 학교인 학원도시.  다른 지역보다 과학기술이 발전해 초능력 개발이 정규 수업화된 이곳의 학생들은 능력에 따라 레벨 0부터 레벨 5까지 그 단계가 나뉘어진다. 학원도시 내에서도 7명밖에 존재하지 않는 초능력…"},"A0155":{"t":"사이버펑크: 엣지러너","type":"애니","img":"https://image.tmdb.org/t/p/w500/5GrYF4dzKqlG8qcABlBC93zY7ny.jpg","status":"방영 종료","summary":"부패와 사이보그 임플란트로 가득한 디스토피아 세상. 재능은 넘치지만 무모한 길거리 소년이 무법의 용병, 엣지러너가 되기 위해 사투를 벌인다."},"A0156":{"t":"루리의 보석","type":"애니","img":"https://image.tmdb.org/t/p/w500/m6E1EpKwcQ8QyyOIcjgmOF0CNoP.jpg","status":"방영 종료","summary":"반짝반짝거리는 걸 정말 좋아하는 여고생 타니가와 루리는, 자신도 찾을 수 있을지 모른다면서\n\n수정을 찾아 산으로 향했다. 그곳에서 광물학을 전공하는 대학원생 아라토 나기를 만나\n\n함께 광물 채집을 하게 되었다.  어떤 때는 수정을 찾아 산길을 걷고, 어떤 때는 가닛을 주우러 강에 들어가고,\n\n또 어떤 때는 본 적 없는 광물을 현미경으로 들여다보는 등.\n\n루리는 나기에게 이끌려 광물 채칩의 세…"},"A0157":{"t":"주토피아","type":"애니","img":"https://image.tmdb.org/t/p/w500/uitqZVbhvlQV5iLOdbk3itGoNNd.jpg","status":"개봉","summary":"어릴 적부터 경찰이 꿈이었던 토끼 주디 홉스는 주변의 만류에도 불구하고 경찰학교에 들어가 당당히 수석으로 졸업한다. 온갖 동물들이 모여 살며 교양 있고 세련된 라이프 스타일을 주도하는 대도시 주토피아에 자원한 주디는 의욕을 안고 출근하지만, 상사는 작은 토끼라는 이유로 주차관리 같은 소일거리만 시킨다. 따분하게 업무를 보던 주디는 아이스크림 불법 판매를 일삼는 사기꾼 여우 닉 와일드를 알게 …"},"A0158":{"t":"향기로운 꽃은 늠름하게 핀다","type":"애니","img":"https://image.tmdb.org/t/p/w500/5zAeygm3BJBQ8GbPJjYJgHAlGId.jpg","status":"방영 종료","summary":"위협적인 외모 때문에 오해를 받는 린타로와 그런 린타로를 스스럼없이 대하는 카오루코. 우연히 알게 된 두 사람은 서로 가까워지지만, 이웃해 있는 둘의 고등학교는 서로를 철저히 혐오한다."},"A0159":{"t":"가치아쿠타","type":"애니","img":"https://image.tmdb.org/t/p/w500/RxuL7KuFoOzHC0htjtLGxJEGGx.jpg","status":"방영 중","summary":"범죄자 후손들이 모인 슬럼가에서 차별을 받으면서도 쓰레기를 주워 사는 루도.\n\n하지만 어느 날 몸에 익지 못한 죄를 뒤집어쓰고 누구나 두려워하는 '나락'으로 떨어지고 만다.\n\n나락에서 '청소부' 엔진과 만난 루도는 세계의 진실을 엿보고 사물에 목숨을 주고 힘을 끌어내는 능력을 발현시킨다.\n\n모든것은 똥같은 세상을 바꾸기 위해서--!!"},"A0160":{"t":"고블린 슬레이어","type":"애니","img":"https://image.tmdb.org/t/p/w500/3Y2k9AuSyERdmBvDnrViF4A1dUp.jpg","status":"방영 종료","summary":"난 세상을 구하지 않는다. 고블린을 죽일 뿐이다. 변경의 한 길드에는 고블린 토벌만으로도 은 등급까지 오른 엄청난 존재가 있다. 모험자가 되어 처음으로 파티에 참여해 고블린 퇴치에 나섰다가 위기에 처한 여신관. 그리고 그것을 구한 자가 바로 고블린 슬레이어라 불리는 남자였다. 그 남자는 고블린 슬레이어라는 이름만큼 수단을 가리지 않고 계속해서 고블린만을 퇴치했다. 그 고블린 슬레이어에게 휘둘…"},"A0161":{"t":"배드 걸","type":"애니","img":"https://image.tmdb.org/t/p/w500/1ET8mA2PKxi1quPKMugg1cLX2Te.jpg","status":"방영 종료","summary":"이 학원 코미디는 착한 소녀인 고등학교 1학년 유타니 유우를 따라갑니다. 하지만 학교의 학생회장이자 '마돈나' 미즈토리 아토리의 관심을 끌기 위해 그녀는 비행 청소년처럼 행동하기 시작합니다."},"A0162":{"t":"비와 너와","type":"애니","img":"https://image.tmdb.org/t/p/w500/bVHXoOd1E4ceDxYj37pTPdzQOlx.jpg","status":"방영 종료","summary":"ㅡ 어느 비 오는 날에, 한 사람과 한 마리는 만났습니다.\n\n흠뻑 젖어 집에 가는 길, 후지는 조금 특이한 '개'와 만난다.\n\n개는 흰 종이 카드를 써서 '데려가 주세요'라며 어필하고, 후지에게 접이식 우산을 건넨다.\n\n근데 이 개, 특이하다기보단....?\n\n아무 일도 없는 평범한 일상에 나타난 조금은 희한한 친구.\n\n함께 사계절을 보내며 먹고, 산책하고, 수다(?)도 떨고...\n\n'조금만 …"},"A0163":{"t":"사일런트 위치 침묵의 마녀의 비밀","type":"애니","img":"https://image.tmdb.org/t/p/w500/5GPT92ArAn7K0vAJ4uECGtnHuei.jpg","status":"방영 종료","summary":"인간은 영창을 하지 않으면, 마술을 사용할 수 없다.그런데 그 불가능을 가능하게 만들어 버린 한 명의 소녀가 있었다. 리디르 왕국 마술사들의 정점・칠현인 중 한 명  모니카 에버렛. 사상 최초로 무영창 마술을 만든 젊은 천재였다. 하지만... 심하게 낯을 가리고 대인 기피증이 있는 그녀는, 사역마인 검은 고양이와 산속에 틀어박혀서 수식 책에 둘러싸여 조용히 마술 연구에 몰두하고 있었다. 그런…"},"A0164":{"t":"페르마의 요리","type":"애니","img":"https://image.tmdb.org/t/p/w500/oMiKzK6IJOf2NOB40mUCa6HcAxo.jpg","status":"방영 종료","summary":"사립 웰스 학원의 진학과에 다니는 소년, 키타다 가쿠는 수학으로 이 세상의 진리를 찾아내는 위대한 수학자가 되기를 꿈꾸고 있었다. 하지만 가쿠는 수학 올림픽에서 큰 좌절을 맛보고 수학자가 되는 길을 포기하고 만다.\n\n수학 올림픽 일본 대표가 되지 못해 특기생 자격을 잃은 가쿠는 아르바이트로 학생 식당에서 일하는 와중에 직원 식사로 만든 나폴리탄을 계기로 젊은 천재 셰프, 아사쿠라 카이와 만난…"},"A0165":{"t":"천원돌파 그렌라간","type":"애니","img":"https://image.tmdb.org/t/p/w500/geFiRX5g4nHNaw0uvA9wHZfPWIS.jpg","status":"방영 종료","summary":"지하 마을(ジーハ村, Giha Village)은 땅 속으로 추정되는 공간으로, 많지 않은 수의 사람들이 사는 곳이다. 사람들은 이 폐쇄된 공간 안에서 돼지와 두더지를 섞은 듯한 뚱보두더지(ブタモグラ)라는 짐승을 길러 식량·의복의 재료 등으로 활용하며, 드릴을 써서 마을 이곳저곳에 구멍을 파서 마을을 확장한다. 이들이 지속적으로 구멍을 파야 하는 까닭은 간헐적으로 지진이 발생하여 확보했던 공간…"},"A0166":{"t":"SUGAR SUGAR RUNE　Les deux sorcières","type":"애니","img":"https://image.tmdb.org/t/p/w500/sIGsusWlBvDPjcGWIukbQbbDusV.jpg","status":"개봉","summary":""},"A0167":{"t":"추방자 식당에 어서 오세요!","type":"애니","img":"https://image.tmdb.org/t/p/w500/nhhpQoHz4RVYOjKJlIBwwmI5Pnt.jpg","status":"방영 종료","summary":"초일류 모험가 파티에서 추방당한 데니스는, 노예 출신의 미소녀 아틀리에를 만나 오랜 꿈이었던 자신만의 식당을 열게 된다. 하지만, 식당 문을 두드리는 자들은 왜인지 문제 있는 이상한 사람들뿐이었다! 사람을 좋아하는 데니스는 '최고의 요리'로 손님들의 배를 채워주고, '최강의 요리 기술'로 그들의 문제를 해결해 주는데... 고기 써는 식칼로 악당을 쓰러트리고, 중화 냄비로 동료를 지킨다?! 이…"},"A0168":{"t":"테니스의 왕자","type":"애니","img":"https://image.tmdb.org/t/p/w500/cbooqJWoAYwT5NCHM19YTAeDJ2K.jpg","status":"방영 종료","summary":"테니스부 명문인 '세이슌' 중학교에 입학한 료마. 그러나 입학한 날부터 테니스부 선배들로부터 못마땅한 눈초리를 받게 된다.\n\n테니스 채를 잡으면 박력과 카리스마가 넘치는 료마. 1학년은 대회에 나갈 수 없다는 관례를 깨고 선배들과 함께 대회에 나가게 된다."},"A0169":{"t":"사카모토 데이즈","type":"애니","img":"https://image.tmdb.org/t/p/w500/ftasBbzJ2OBCVAN5iMwf6JN8vCJ.jpg","status":"방영 중","summary":"한때 최강의 킬러라 불렸던 사카모토 타로. 사랑에 빠져 은퇴하지만 과거가 그의 발목을 잡기 시작한다. 이제, 사카모토는 사랑하는 가족을 지키기 위해 싸워야만 하는데."},"A0170":{"t":"귀멸의 칼날: 합동 강화 훈련 주집결편","type":"애니","img":"https://image.tmdb.org/t/p/w500/cQcCffMczkVfEVDI2kp2maVasrr.jpg","status":"개봉","summary":"탄지로의 활약으로 훈련을 통해 사이가 가까워진 무이치로와 귀살대원들.  탄지로는 무이치로의 훈련을 마치고 미츠리의 훈련장으로 향했다.  그곳에서 받게 될 유연성 훈련은 보기보다 매우 힘든 것이었는데--."},"A0171":{"t":"귀멸의 칼날: 합동 강화 훈련 개막편","type":"애니","img":"https://image.tmdb.org/t/p/w500/sSE8DZr44URZccaKtdU8BZyEU6Q.jpg","status":"개봉","summary":"도공 마을에서는 탄지로 일행과 두 명의 주의 활약으로 상현 혈귀 둘을 쓰러뜨릴 수 있었다.  그리고 태양을 극복한 네즈코의 존재는 키부츠지 무잔과의 큰 싸움을 예감하게 했다.  그러는 한편, 우부야시키 저택에서는 주들이 모두 모이는 주합 회의가 열렸는데--."},"A0172":{"t":"귀멸의 칼날: 도공 마을 이어진 인연편","type":"애니","img":"https://image.tmdb.org/t/p/w500/FlmOwlGyFKAdhCRqqcKCHBdfhd.jpg","status":"개봉","summary":"혈귀의 공격으로 상처를 입으면서도 물에 갇힌 무이치로를 구하려 애쓰는 코테츠.  자신을 위해 고통을 감수하는 코테츠의 모습에 탄지로의 말이 겹쳐지며 무이치로는 잊고 있던 아버지의 모습을 떠올리고 만다.  코테츠가 불어넣은 산소를 들이마시고 혼신의 힘을 다해 안개의 호흡을 내보낸 무이치로는 마침내 물속에서 탈출하지만…"},"A0173":{"t":"페어리 테일: 100년 퀘스트","type":"애니","img":"https://image.tmdb.org/t/p/w500/uH22uAnCoswhrDRbFfpbOQv2Ahg.jpg","status":"방영 종료","summary":"나츠, 루시, 해피 일행은 마도사 길드 창설 이후 100여년, 누구 하나 달성한 이가 없는 전설의 의뢰 에 도전하기로 결정했다! 첫 번째 대륙에서 만나는 '신비한 거리', '불가해한 신', 그리고 '소름 끼치는 적'…."},"A0174":{"t":"장난을 잘 치는 타카기 양","type":"애니","img":"https://image.tmdb.org/t/p/w500/A5UCoStIPajVRUTj3x7xAofCF2G.jpg","status":"방영 종료","summary":"중학교 같은 반이자 옆자리에 붙어 앉은 니시카타 군과 타카기 양. 하루가 멀다 하고 걸어오는 타카기의 짓궂은 장난에 니시카타는 속수무책, 매번 수모를 되갚아주려 해봐도 번번이 실패! ‘두고 봐, 오늘에야말로 타카기 양의 새빨개진 얼굴을 보고야 말겠어!’ ‘부끄러워 하는 사람이 지는'― 은근&달콤 청춘 러브코미디! 의미심장한 여중생 타카기 양에게 농락당하는 니시카타군의 수난을 그린 청춘 애니메…"},"A0175":{"t":"귀멸의 칼날: 도공 마을 적습편","type":"애니","img":"https://image.tmdb.org/t/p/w500/eiD4ohX2G06hgylB3GV5oXC6vcx.jpg","status":"개봉","summary":"칼날을 망가뜨려 하가네즈카의 분노를 산 탄지로는 네즈코와 함께 도공이 사는 마을로 향하게 된다.  귀살대에게 중요한 거점 중 한 곳, 깊숙히 숨겨진 도공의 마을에서 탄지로는  동기인 시나즈가와 겐야, 연주・ 칸로지 미츠리 등과 재회한다.  미츠리에게서 비밀의 무기에 대해 들은 탄지로는 산으로 탐색을 나가고.  그곳에서 토키토 무이치로와 마을 소년의 다툼을 목격한다."},"A0176":{"t":"던전밥","type":"애니","img":"https://image.tmdb.org/t/p/w500/caU0EaqHlpWVK7NYwjv4FBmzfcB.jpg","status":"방영 중","summary":"던전밥. '먹을 것'이냐, 아니면 '먹힐 것'이냐... 던전 깊은 곳, 레드 드래곤에게 먹힌 여동생을 두고 간신히 지상으로 생환한 모험가 라이오스. 다시 던전으로 들어가려 하지만, 돈도 식량도 모두 미궁 아래에 두고 나왔다. 당장이라도 동생이 소화될지 모르는 상황이기에, 라이오스는 결단을 내린다. \"식량은 던전 안에서 자급자족하자!\" 그것은 다시 말해, 슬라임, 바질리스크, 미믹 심지어 드래…"},"A0177":{"t":"호리미야","type":"애니","img":"https://image.tmdb.org/t/p/w500/p7xtgezzDFJu6gd9toVKg9NcdcX.jpg","status":"방영 종료","summary":"이어지고, 얽히면서 세계는 날마다 변해간다. 호리 쿄코는 미인에다 성적도 우수해서 학교에서는 반의 중심인물이다. 하지만 사실은 맞벌이를 하는 부모님을 대신해서 놀지도 않고  집안일을 하고 터울이 많이 지는 남동생을 돌보는 가정적인 고등학생이다. 어느 날, 다친 남동생 소타를 모르는 남자가 집에 데려다준다.  '호리 씨' 남자의 부름에 이야기해 보니 사실 그는 호리와 같은 반이었는데.  반에서…"},"A0178":{"t":"하울의 움직이는 성","type":"애니","img":"https://image.tmdb.org/t/p/w500/xiz6TiSduvR1U3VLfWVlBEdT9fO.jpg","status":"개봉","summary":"19세기 말 마법과 과학이 공존하고 있는 세계 앵거리. 소피는 돌아가신 아버지의 모자상점에서 쉴틈없이 일하는 18살 소녀이다. 어느 날 오랫만에 마을로 나간 소피는 우연히 하울을 만나게 된다. 하울은 왕실 마법사로서 핸섬하지만 조금 겁이 많은 청년이다. 황무지 마녀는 두 사람의 사이를 오해, 주문을 걸어 소피를 90살의 늙은 할머니로 만들어 버린다. 가족을 걱정한 소피는 집을 나오게 되고 황…"},"A0179":{"t":"나루토","type":"애니","img":"https://image.tmdb.org/t/p/w500/5llYnYzA2oiTxxSi9d7RSanrwR8.jpg","status":"방영 종료","summary":"에 연재되면서 폭발적인 인기를 모았던 '나루토'를 애니메이션으로 만들었다. 한국에서도 단행본이 나와 많은 인기를 얻고 있다. 나루토와 동료들이 닌자가 되기 위한 모험을 떠나는 흥미진진한 작품. \n\n닌자 마을 중 하나인 나뭇잎 마을. 매일같이 장난만 치며 공부도 뒤쳐져서 졸업조차 불안하기만 한 문제아 나루토. 그런 그이지만 마을에서 제일 가는 닌자, '호카게'가 되고 싶다는 커다란 꿈을 지니고…"},"A0180":{"t":"코코","type":"애니","img":"https://image.tmdb.org/t/p/w500/pQu93NuwR90AaCULzglVD5Ge4Ml.jpg","status":"개봉","summary":"미구엘은 멕시코의 자랑인 에르네스토 델라 크루즈 같은 뮤지션이 되길 꿈꾸지만 미구엘 집안 사람들에게 음악은 금기다. 먼 옛날 조상 중에 음악 때문에 가족을 버린 인물이 있었기 때문. 미구엘은 죽은 자의 날이 되자 실력으로 인정받겠다는 결심을 하고 경연 무대에 오르려 하는데, 우연히 에르네스토의 기타에 손을 댔다가 죽은 자들의 세상에 들어서게 된다. 이승과 저승을 이어주는 마리골드 꽃길을 건너…"},"A0181":{"t":"나루토 질풍전","type":"애니","img":"https://image.tmdb.org/t/p/w500/nZ2qXHJTtNAfa6cP1iw9onhA2H7.jpg","status":"방영 종료","summary":"에 연재되면서 폭발적인 인기를 모았던 '나루토'를 애니메이션으로 만들었다. 한국에서도 단행본이 나와 많은 인기를 얻고 있다. 나루토와 동료들이 닌자가 되기 위한 모험을 떠나는 흥미진진한 작품.  닌자 마을 중 하나인 나뭇잎 마을. 매일같이 장난만 치며 공부도 뒤쳐져서 졸업조차 불안하기만 한 문제아 나루토. 그런 그이지만 마을에서 제일 가는 닌자, '호카게'가 되고 싶다는 커다란 꿈을 지니고 …"},"A0182":{"t":"치하야후루","type":"애니","img":"https://image.tmdb.org/t/p/w500/hOHSPGGRk2VmPGudBrRInv5cSs5.jpg","status":"방영 종료","summary":"외적 이미지와는 달리 일본 전통 카드게임 카루타를 열렬히 애정하는 카루타 바보 아야세 치하야. 어린 시절부터 카루타에 빠진 치하야는 자신만의 꿈을 갖고 한 걸음씩 성장해나간다."},"A0183":{"t":"마법사의 신부","type":"애니","img":"https://image.tmdb.org/t/p/w500/iUorN5IPruwqUQGUcpKONhTjheG.jpg","status":"방영 종료","summary":"하토리 치세는 돌아갈 곳도, 살아갈 이유도, 먹고 살 기술도 그 무엇도 없는 15살 소녀였다. 단 한가지, 태어날 때부터 가지고 있는 힘을 제외하고. 그런 치세를 제자로서 그리고 미래의 신부로서 거둔 사람은 바로 신기한 모습을 한 마법사 엘리어스였다. 유구의 시간을 살아온 마법사의 삶 속에서 치세는 중요한 무엇인가를 조금씩 되돌려나간다. 이것은, 세상의 아름다움을 기록하기 위한 이야기."},"A0184":{"t":"청춘 돼지는 바니걸 선배의 꿈을 꾸지 않는다","type":"애니","img":"https://image.tmdb.org/t/p/w500/s7qBgudeUEczJYEsO9vvRVUNnFP.jpg","status":"방영 종료","summary":"사춘기 증후군. 불안정한 정신으로 인해 일어난다고 인터넷에서 화제인 불가사의한 현상. 에노시마에서 가까운 학교에 다니는 고등학교 2학년 아즈사가와 사쿠타는 사춘기 증후군이 일어난 소녀들과 만나게 된다. 예를 들면, 도서관에서 만난 야생 바니걸 정도. 바니걸의 정체는 고등학교 선배이자 활동을 중단한 연예인인 사쿠라지마 마이였다. 매력적인 마이의 차림에도 어째선지 주변 사람들은 그런 마이를 알아…"},"A0185":{"t":"샤먼킹","type":"애니","img":"https://image.tmdb.org/t/p/w500/tAOwHV9gwx3leW26Xch5gi16aII.jpg","status":"방영 종료","summary":"신, 정령, 영혼과 교류하는 샤먼들, 그 위엔 샤먼킹이 있다. 그 전지전능한 존재의 옥좌를 놓고 5백 년마다 열리는 샤먼 파이트 대회. 여기에 13세 소년 아사쿠라 요우가 도전장을 내민다."},"A0186":{"t":"모브사이코 100","type":"애니","img":"https://image.tmdb.org/t/p/w500/krBHtLnl6zLSmriYp8f7lpLlIoG.jpg","status":"방영 종료","summary":"가공할 초능력의 보유자지만 보통의 삶을 고집하고 있는 인기가 많아지고픈 평범한 중학생 카게야마 시게오의 이야기를 그린 애니메이션"},"A0187":{"t":"바케모노가타리","type":"애니","img":"https://image.tmdb.org/t/p/w500/8Gp6GNDKBjC4p4I49GsacK83VrM.jpg","status":"방영 중","summary":"흡혈귀와 만남. 그것은 나오에츠 고교 3학년 아라라기 코요미의 인생을 크게 뒤바꾸어 놓았다. 악몽과도 같았던 봄방학, 그리고 골든위크의 예기치 못했던 사건. 그리고 그런 그에게 또다시 새로운 괴이와 소녀들과의 인연이 시작된다. 게, 달팽이, 원숭이, 뱀, 고양이 아라라기 코요미와 괴이에 씌인 다섯 명의 소녀들의 이야기."},"A0188":{"t":"야마다 군과 Lv999의 사랑을 하다","type":"애니","img":"https://image.tmdb.org/t/p/w500/x7wcgYZ5rlulwf2UvhQGwKo2Kdg.jpg","status":"방영 종료","summary":"남자친구가 온라인 게임에서 만난 여자와 바람을 피웠고\n\n그대로 차여버리는 최악의 상황에 직면한 여대생 키노시타 아카네.\n\n남자친구와 대화하기 위해 온라인 게임을 시작한 아카네에게 남은 것은\n\n사랑과 함께 키워온 캐릭터뿐이었다.\n\n스트레스 발산을 위해 온라인 게임의 사냥터에서 날뛰던 아카네는\n\n우연히 만난 같은 길드의 '야마다'에게 실연한 처지를 토로했지만\n\n'관심은 없네요'라는 매정한 대답을…"},"A0189":{"t":"어둠의 실력자가 되고 싶어서!","type":"애니","img":"https://image.tmdb.org/t/p/w500/51hKUMfLjaFdw3uAoXeg5q9mA1d.jpg","status":"방영 종료","summary":"“어둠의 실력자” 그것은 주인공도 라스트 보스도 아니다. 평소에는 실력을 숨기고 모브에 투철하고, 이야기에 어둠으로 개입해 은밀하게 실력을 보여주는 존재. 이『어둠의 실력자』를 동경해, 매일 모브로서 눈에 띄지 않고 생활하면서, 힘을 찾아 정진하던 소년은 사고로 목숨을 잃고 이세계로 환생한다. ‘시드 카게노’로 다시 태어난 소년은, 이를 다행으로 여기고 이세계에서 ‘어둠의 실력자’라는 설정을…"},"A0190":{"t":"가정교사 히트맨 리본!","type":"애니","img":"https://image.tmdb.org/t/p/w500/7uzY5uXrTkd4gxwKoIbvE1fMHHG.jpg","status":"방영 종료","summary":"후회하라! 필살탄이 당신을 REBORN(부활)시킬 것이다!! 바보 같은 인생을 보내는 중학생 츠나의 집에 가정교사가 오게 되었다. 가정교사의 이름은 리본! 보기에는 어린아이지만, 실제 본업은 초일류 히트맨…?! 리본은 사실 본고라 조직의 10대 보스를 키우기 위해 이탈리아에서 건너온 살인 청부업자였다! 차기 보스로서 그의 타깃이 된 사람은 학교에서 제대로 하는 일이 없어 항상 왕따를 당하는 …"},"A0191":{"t":"문호 스트레이독스","type":"애니","img":"https://image.tmdb.org/t/p/w500/yY7eds57HBPNuD2SoPyHh9AmRcQ.jpg","status":"방영 중","summary":"고아원에서 쫓겨나 굶어 죽기 일보 직전,\n\n아쓰시가 만난 너무나도 특이한 남자들.백주대낮에 물에 뛰어들어 자살을 시도하는\n\n자살 마니아 다자이 오사무.신경을 곤두세워 수첩을 기록하는\n\n안경남 구니키다 돗포.군인도 경찰도 손대지 못하는\n\n험난한 사건을 해결한다는 그들.운명의 장난인지, 아쓰시는\n\n'식인 호랑이' 퇴치를 요구받는데...항구 도시 요코하마.\n\n문호의 이름을 한 그들과\n\n기이한 힘이…"},"A0192":{"t":"얼음 성벽","type":"애니","img":"https://image.tmdb.org/t/p/w500/etwhO95JBwMJuA0bwrp4KIWFOTC.jpg","status":"방영 중","summary":"타인과 부딪히는 것이 싫어 벽을 쌓아 버린 코유키. 이 벽을 허물기로 마음먹은 미나토. 이 두 고등학생이 만난 순간, 얼어 있던 감정들이 녹기 시작한다."},"A0193":{"t":"모노노케 히메","type":"애니","img":"https://image.tmdb.org/t/p/w500/lLftgg4iFyDwuodra3Isr41y2Lq.jpg","status":"개봉","summary":"북쪽의 끝, 에미시족의 마을에 어느 날 갑자기 재앙신이 나타나 마을을 위협한다. 이에 강한 힘을 소유한 에미시족의 후계자인 아시타카는 결투 끝에 포악해진 재앙신을 쓰러트리지만 싸움 도중 오른팔에 저주의 상처를 받고 죽어야 할 운명에 처하게 된다. 결국 재앙신의 탄생 원인을 밝혀 자신의 저주를 없애기 위해 서쪽으로 길을 떠난 아시카타는 여행 중에 지코라는 미스테리한 수도승을 만나 재앙 신이 생…"},"A0194":{"t":"여친, 빌리겠습니다","type":"애니","img":"https://image.tmdb.org/t/p/w500/uLrEqu1JkSMe4AN7IMMBEfhFAXE.jpg","status":"방영 중","summary":"20살의 글러먹은 대학생 키노시타 카즈야.\n\n처음으로 여자친구와 키스를 딱 한 번 했는데, 겨우 한 달 만에 녹초가 되어버렸다.\n\n‘아...싫어... 이제 뭔가 전부 싫다’\n\n자포 자기하게 된 카즈야는, ‘어떤 방법’을 사용해서 여자아이와 데이트를 하게 되고. 약속장소에 가게 되는데,\n\n“네가 카즈야군이야?”\n\n부슬부슬 검은 머리를 귀에 넘기고 카즈야의 얼굴을 살펴보는 미소녀, ‘미즈하라 치…"},"A0195":{"t":"니어:오토마타 Ver1.1a","type":"애니","img":"https://image.tmdb.org/t/p/w500/ow5ukZMCNvcCX9jVrM1AqIOY1Ys.jpg","status":"방영 종료","summary":"서력 5012년. 갑자기 지구로 날아온 '외계인'과 그들이 만들어 낸 '기계 생명체'의 침략으로 인류는 괴멸의 위기에 빠졌다. 달로 도망간 얼마 안 되는 인류는 지구를 탈환하기 위해 '안드로이드' 병사를 이용해 반격 작전을 개시했다. 하지만 무한히 증식하는 '기계 생명체' 앞에서 싸움은 교착 상태에 빠졌다. 이에 인류는 최종병기로 신형 안드로이드 '요르하 부대'를 지구에 파견했고, 새롭게 지…"},"A0196":{"t":"해즈빈 호텔","type":"애니","img":"https://image.tmdb.org/t/p/w500/c9epbOyQ5E0jc6uC10D21MsKYuF.jpg","status":"방영 중","summary":"성인용 애니메이션 뮤지컬 시리즈 '해즈빈 호텔'은 지옥의 공주 찰리가 넘쳐나는 지옥 왕국의 인구를 평화적으로 줄이기 위해 악령들을 재활한다는 불가능해 보이는 임무를 실행하는 모습을 보여준다. 천국에서 실시하는 연례행사인 '전멸의 날'이 끝나자 찰리는 호텔을 연다. 손님들이 자신들도 구원받을 수 있다는 사실을 증명한 후 호텔을 떠나는 것이 찰리의 목표다."},"A0197":{"t":"강철의 연금술사","type":"애니","img":"https://image.tmdb.org/t/p/w500/8xiFmi2lwNlNR3Rm70eNQHoNl4V.jpg","status":"방영 종료","summary":"연금술 대국인 아메스트리스의 리젬블에 사는 꼬마 연금술사 형제인 에드워드 엘릭과 알폰스 엘릭은 죽은 엄마를 되살리고자 하는 마음에 연금술을 이용하여 자신들의 엄마를 만들어내는 인체연성을 시도한다. 하지만 이들의 연금술은 실패하고, 진리의 문을 연 대가로 에드워드는 왼쪽 다리를, 알폰스는 자신의 몸 전체를 잃게된다. 이에 에드워드는 자신의 오른팔을 희생하여 동생 알폰스의 영혼을 장식용 갑옷에 …"},"A0198":{"t":"바람의 검심 -메이지 검객 낭만기-","type":"애니","img":"https://image.tmdb.org/t/p/w500/7foy5c27nMRSb9u79dNuCliUKLC.jpg","status":"방영 중","summary":"막부 말기 동란의 시기 '칼잡이 발도재'라 불리며 모두가 두려워하던 유신지사가 있었다.\n\n그는 새로운 시대의 도래와 함께 사람들 앞에서 모습을 감췄고 '최강'이라는 이름의 전설이 되었다.\n\n시간은 흘러, 메이지 11년 도쿄 서민 마을.\n\n역날검을 허리에 차고 불살을 맹세한 떠돌이 검객 히무라 켄신은\n\n카미야 활심류 사범 대리인 카미야 카오루와 만난다.\n\n켄신은 활심류를 사칭하며 칼부림을 일삼…"},"A0199":{"t":"몬스터 주식회사","type":"애니","img":"https://image.tmdb.org/t/p/w500/fnDLrtEoIrxTCWUvuurMzOzQGpQ.jpg","status":"개봉","summary":"호탕한 설리와 재치만점 마이크는 몬스터 주식회사 겁주기 팀의 최우수 콤비다. 매일 밤 투철한 직업정신으로 인간 세계로 통하는 벽장 문을 열던 설리와 마이크 콤비는 어느 날 일생일대의 실수를 저지른다. 덜 닫힌 벽장 문 사이로 인간아이 부가 몬스터 세계에 침입한 것. 설리와 마이크는 부를 인간세계로 돌려보내고 사건을 조용히 수습하려 하지만 부는 설리를 무서워하기는커녕 애완 야옹이쯤으로  생각하…"},"A0200":{"t":"전생했더니 슬라임이었던 건에 대하여","type":"애니","img":"https://image.tmdb.org/t/p/w500/eeemfj0Zv0SQlAqpitn7caJQvWI.jpg","status":"방영 중","summary":"어느 날 갑자기 나타난 괴한에게 습격당해 목숨을 잃은 미카미 사토루는 천문학적 확률로 이세계에 전생한다.\n\n그러나 왜인지 전생한 모습은, 최약체 몬스터로 유명한 슬라임이었다!\n\n이런 건 인정 못 해?! 라고 말하면서도 낯선 동굴에서 즐거운 슬라임 라이프를 만끽하지만...\n\n천재급 드래곤 『폭풍룡 베루도라』와 만남으로써, 운명의 수레바퀴는 움직이기 시작했다.\n\n몬스터 전생 판타지, 시작!"},"A0201":{"t":"마왕학원의 부적합자 ~사상 최강의 마왕인 시조, 전생해서 자손들의 학교에 다니다~","type":"애니","img":"https://image.tmdb.org/t/p/w500/b5FbuBwBaWzMIDpqpHCQCL8PrQf.jpg","status":"방영 종료","summary":"2천 년의 시간을 넘어 되살아난 포학의 마왕\n\n하지만, 마왕 후보를 육성하는 학원의 적성 '부적합'?!\n\n인간도, 정령도, 신들마저도 죽였지만 계속되는 투쟁에 질려  평화로운 세상을 꿈꾸며 전생한 포학의 마왕 '아노스 볼디고드'\n\n하지만 2천 년 후 전생한 그를 기다리고 있던 것은\n\n평화에 길들여져서 너무 나약해진 자손들과 급격하게 쇠퇴한 마법이었다.\n\n마왕의 환생이라고 생각되는 자를 모아서…"},"A0202":{"t":"도쿄 리벤저스","type":"애니","img":"https://image.tmdb.org/t/p/w500/qmFk2I6ov8kEVshSMyg1ZBEfvte.jpg","status":"제작 중","summary":"밑바닥 인생을 살던 타케미치.\n\n중학교 시절 사귀었던 인생에서 유일한 연인이었던 히나타가\n\n가장 흉포하고 악질적인 악당 연합 \"도쿄 만지회\"에게 살해당했다는 것을 알게 된다.\n\n사건을 알게 된 다음 날, 역 플랫폼에 있던 타케미치는\n\n누군가에게 떠밀려 선로로 떨어지고 다가오는 열차를 보며 자신의 죽음을 직감한다.\n\n하지만 정신을 차리고 보니 어째서인지 12년 전으로 타임 리프해 있었다.\n\n인…"},"A0203":{"t":"천국대마경","type":"애니","img":"https://image.tmdb.org/t/p/w500/kstoMA74FLD1rWV3PwJuIgMlvAl.jpg","status":"방영 종료","summary":"대재해 후 폐허가 된 세상. 괴이한 요괴가 도사리는 땅에서 생존을 위해 힘겹게 살아가는 사람들. 그중 심부름센터 일을 하는 키루코에게 한 여성이 숨을 거두며 마루를 맡긴다. 이 아이를... 천국으로 데려가 줘."},"A0204":{"t":"란마1/2","type":"애니","img":"https://image.tmdb.org/t/p/w500/yOFvSq8YGKSVvnbCc6IY4PWEssa.jpg","status":"방영 중","summary":"텐도 아카네 앞에 초면인 약혼남 사오토메 란마가 나타난다. 게다가 천재 무술 소년 란마에겐 대반전의 비밀이 있는데. 바로, 찬물을 뒤집어쓰면 소녀로 변신하는 것."},"A0205":{"t":"달의 요정 세일러문","type":"애니","img":"https://image.tmdb.org/t/p/w500/oCgEdfayxG8GoPydrlF2ZjcJyCL.jpg","status":"방영 종료","summary":"지구의 평화를 지키기 위해 적과 싸우는 소녀들의 이야기를 그린 애니메이션"},"A0206":{"t":"이 멋진 세계에 축복을!","type":"애니","img":"https://image.tmdb.org/t/p/w500/kBSbQD4JtsqCiGPMRDsM76g4boP.jpg","status":"방영 중","summary":"게임을 사랑하는 은둔형 외톨이 소년, 사토 카즈마의 인생은 너무나도 허무하게 그 막을 내린…… 줄 알았는데, 정신을 차려보니 눈앞에 여신을 자처하는 미소녀가 있었다.\n\n“이세계에 가지 않을래? 원하는 걸 딱 하나만 가지고 가게 해줄게.”\n\n“그럼 널 가지고 가겠어.”\n\n이리하여, 이세계로 넘어간 카즈마의 대모험이 시작…! 되나 싶었는데, 결국 시작된 것은 의식주 확보를 위한 노동이었다!\n\n카…"},"A0207":{"t":"킴 파서블","type":"애니","img":"https://image.tmdb.org/t/p/w500/jFb23Z5rZsET7YN0SLQej99PLPR.jpg","status":"방영 종료","summary":"킴 파서블은 평범한 고등학생이다. 남는 시간에 악당들에게서 세상을 구한다. 킴은 가장 친한 친구 론, 론의 털 없는 두더지쥐 루퍼스, 키뮤니케이터를 통해 중요한 정보를 전달해주는 웹 마스터 친구 웨이드와 함께 전 세계의 악당들을 좌절시킨다. 임무가 끝나면 킴은 가족과 숙제 곁으로 돌아온다."},"A0208":{"t":"불멸의 그대에게","type":"애니","img":"https://image.tmdb.org/t/p/w500/gM80dPt22btCRv1OcaQnhCfLq9v.jpg","status":"방영 종료","summary":"불사는 최초에 지상에 던져진 '구체'였다.\n\n가지고 있던 것은\n\n'자극을 받은 생물의 모습으로 변할 수 있는 능력'과 '죽어도 재생할 수 있는 능력'.\n\n구체에서 돌, 늑대, 그리고 소년으로 모습을 바꾸지만 아기와 다름없이 아무것도 알지 못한 채 방황한다.\n\n이윽고 만나는 사람들로부터 살아가는 법을 배우고 따뜻한 감정을 알게 되어\n\n인간을 모방해서 성장해 가는 불사.\n\n숙명의 적인 노커와의 …"},"A0209":{"t":"마계학교! 이루마군","type":"애니","img":"https://image.tmdb.org/t/p/w500/x2NU6cyUiN5qlypOpSZPRRlsoTj.jpg","status":"방영 중","summary":"14세 소년인 주인공 '스즈키 이루마'은, 어느 날 부모님의 금욕으로 인해 악마에게 팔려버린다\n\n한편, '이루마'를 구입한 대악마 '설리번'은 자손이 없어 그에게 손자가 되어달라고 부탁한다\n\n그렇게 '설리번'이 이사장으로 지내고 있는 마계 학교에 이사장 손자 겸 특기생으로.\n\n입학하게 된 '이루마'는 인간임을 숨기고 악마와 어울리는 학교생활을 하게 되고.\n\n여러 문제가 '이루마'를 덮쳐오지만…"},"A0210":{"t":"요자쿠라 일가의 대작전","type":"애니","img":"https://image.tmdb.org/t/p/w500/y4Yzi7UqGrwzgASnTUSLZqee3uV.jpg","status":"방영 중","summary":"가족이 사고로 사망하고, 마음을 닫게 된 고교생 · 아사노 타이요. 반 친구로부터의 인상은 「초 · 낯가림」. 유일하게 말할 수 있는 것은 소꿉친구의 요자쿠라 무츠미, 단지 한 사람이었다. 하지만 무츠미에는 있는 비밀이!? 그녀의 정체는 대대로 이어지는 스파이 일가의 당주로, 다양한 적으로부터 생명을 노리고 있었던 것이다! 게다가 그녀의 오빠 쿄이치로는 최고의 스파이로, 비정상적으로 무츠미를…"},"A0211":{"t":"아픈 건 싫으니까 방어력에 올인하려고 합니다","type":"애니","img":"https://image.tmdb.org/t/p/w500/8KSjWaNQjHVkLevCWOCkMd4AB6L.jpg","status":"방영 종료","summary":"친구가 같이 하자는 말에 시작한 VRMMORPG. ‘메이플’이라는 이름으로 가상현실에 접속한 카에데는 뭐가 뭔지 하나도 몰라, 스테이터스를 모두 VIT(방어력)에 투자하고 마는데…\n\n보통이라면 아무도 고르지 않은 방어 특화의 길. 하지만 그것이 메이플의 특이함과 맞물려 ‘절대방어’라는 스킬을 낳고, 어지간한 일로는 데미지가 1도 들어가지 않는 철벽의 최강 캐릭터를 탄생시켰다?!\n\n순진무구한 …"},"A0212":{"t":"썬더 일레븐","type":"애니","img":"https://image.tmdb.org/t/p/w500/qZFMDCZtMWgj9zhKo3tVJpfE81g.jpg","status":"방영 종료","summary":"천둥 중학교 축구부의 주장 강수호는 고민에 빠져 있었다. 팀은 멤버가 부족해 해체 직전의 위기에 놓여 있었고, 이대로라면 공식 경기에 출전할 수도 없는 상황이었다. 그러던 어느 날, 천둥 중학교에 한 학생이 전학을 오게 된다. 바로 전설적인 스트라이커, 염성화였다. 강수호는 염성화를 팀으로 영입할 계획을 세운다.\n\n이 두 사람의 만남이 약소 축구부의 운명을 바꾸게 된다!"},"A0213":{"t":"시로바코","type":"애니","img":"https://image.tmdb.org/t/p/w500/pGcyyvixbsJpgMngSCULFvbnpBK.jpg","status":"방영 종료","summary":"영상업계에서 작품이 완성되었을 때 가장 먼저 손에 쥐게 되는 것이 바로 하얀 케이스에 든 비디오 테이프로, 흔히 하얀 상자(시로바코)라 불리는 이 결과물을 만들기 위해 오늘도 수많은 사람들이 땀을 흘리고 있는데, 새롭게 애니회사에 입사하여 제작진행역에 임명된 신입사원 아오이는, 신인성우 시즈카, 애니메이터 에마, 각본가 지망생 미도리, CG아티스트 미사 등과 어울려가며 애니 제작의 험난함을 …"},"A0214":{"t":"원펀맨","type":"애니","img":"https://image.tmdb.org/t/p/w500/sV5D7lM4isMmK1gNSv2SglqYnni.jpg","status":"방영 중","summary":"취미로 히어로를 하기 시작한 남자 사이타마. 그는 3년간의 특훈으로 무적 파워를 손에 넣었다. 하지만 너무 강해진 나머지 어떤 강적을 상대해도 원펀치로 끝나버렸다. 압도적인 힘이란 재미없는거야... 그런 정열과, 모발을 잃은 평온한 최강 히어로 앞에 새로운 강적이 나타난다. 오늘이야말로 진심을 다해 싸울 수 있을 것인가!?"},"A0215":{"t":"86 에이티식스","type":"애니","img":"https://image.tmdb.org/t/p/w500/oIirhgCRpo2ZPFjl6HdxQSLhjq2.jpg","status":"방영 종료","summary":"‘그 전장에, 죽은 사람은 없다.’\n\n산마그놀리아 공화국. 그곳은 매일 이웃나라인 [제국]의 무인병기 '레기온'에 침략을 받고 있었다. 하지만 그 공격에 맞서 공화국 측도 무인병기 개발에 성공, 가까스로 희생자를 내는 일 없이 제국의 위협을 물리치고 있었다. ──어디까지나 표면상으로는.\n\n사실은 아무도 죽지 않을 리가 없었다. 공화국 85구의 밖, [제86구]. 거기에서는 [에이티식스]라는 …"},"A0216":{"t":"어떤 마술의 금서목록","type":"애니","img":"https://image.tmdb.org/t/p/w500/ttcZuM9WU4lTtRP22xa4FOEO6I9.jpg","status":"방영 종료","summary":"초능력이 과학에 의해 해명된 세계.\n\n초,중,고, 대학이 몰려있는 ‘학원도시’는 초능력 개발을 필수 교육과정으로 지정하고 있기 때문에, 이곳 학생들은 초능력 지수로 능력을 평가받는다. 하지만 주인공 토우마는 신체검사에서 무능력자로 분류되어 하루하루 무의미하게 살고 있다. 그런 토우마 앞에 어느날 수녀복장을 한 소녀가 나타난다. 소녀는 자신의 이름이 금서목록(인덱스)이라며 마술사에 쫓기고 있다…"},"A0217":{"t":"암살교실","type":"애니","img":"https://image.tmdb.org/t/p/w500/fIOYLPOorKvP4wut9y0edpnWROz.jpg","status":"방영 종료","summary":"어느 날 일반 진학교인 쿠누기가오카 중학교의 낙오자반이라고 불리는 3학년 E반에 정부 사람들과 인간이 아닌 정체불명의 생물이 찾아온다. 이 수수께끼의 생물은 어느 날 갑자기 나타나 달의 70%를 날려 버린 초생물로 내년에 지구를 날려버리겠다고 선언한 공공의 적. 마하 20의 속도로 하늘을 날며, 상상을 초월한 공격력과 다양한 능력을 가진 이 생물이 무슨 이유에서인지 ‘쿠누기가오카 중학교 3학…"},"A0218":{"t":"반요 야샤히메","type":"애니","img":"https://image.tmdb.org/t/p/w500/bXkRIQQDGGxJfoJk0plz0wgpTHI.jpg","status":"방영 종료","summary":"토와, 세츠나, 모로하는 요괴와 인간의 피를 이어받는 반요의 소녀들이다.\n\n어린 시절 숲의 화재에 휩쓸려 헤어진 쌍둥이 소녀, 토와와 세츠나.  언니인 토와는 시대수의 시공을 넘는 터널로 전국시대부터 현대에 시간여행을 해, 카고메의 남동생 소타의 도움을 받은 것을 계기로 히구라시 가의 딸로 양육되어 무도를 잘하는 중학생으로 성장했다.\n\n한편, 전국시대에 남겨진 여동생인 세츠나는 요괴 퇴치사의…"},"A0219":{"t":"임금님 랭킹","type":"애니","img":"https://image.tmdb.org/t/p/w500/e3LbjV2jpNaull04dNuTBbKWw0Q.jpg","status":"방영 종료","summary":"나라의 풍요, 안고 있는 강자들의 수, 그리고 왕 자신이 얼마나 용자와 같이 강한지, 그것들을 종합적으로 랭킹한 것, 그것이 바로 임금님 랭킹이다. 주인공 봇지는 왕 순위 7위의 봇스왕이 통치하는 왕국의 첫 왕자로 태어났다. 그런데 봇지는 천성적으로 귀가 들리지 않아 칼조차 제대로 휘두르지 못할 정도로 힘이 약해 가신은 물론 백성들로부터도 도저히 임금의 그릇이 아니다라는 멸시를 받았다. 그런…"},"A0220":{"t":"4월은 너의 거짓말","type":"애니","img":"https://image.tmdb.org/t/p/w500/xswPti7YWJfvqFf52P5VAN1QMuJ.jpg","status":"방영 종료","summary":"신동 피아니스트라 불리던 아리마 코세이는 어머니의 죽음을 계기로 몇 년 전부터 피아노를 칠 수 없게 되었다. 그리고 이런 코세이의 눈에 비치는 세상은 모노톤의 단조로운 풍경이었는데.그런데 어느 날, 친구의 소개팅 자리에 인원수 맞추기로 나가게 된 코세이는 개성 넘치는 소녀 바이올리니스트 미야조노 카오리를 만나게 된다."},"A0221":{"t":"닌자보이 란타로","type":"애니","img":"https://image.tmdb.org/t/p/w500/7SlGknNukx52jHh8FweXpQyA7EO.jpg","status":"방영 중","summary":"닌자학교에 다니는 란타로와 친구들의 이야기를 다룬 애니메이션"},"A0222":{"t":"겁쟁이 강아지 커리지","type":"애니","img":"https://image.tmdb.org/t/p/w500/uJQsBgzlrgZpjeB5fHBtJQA04nS.jpg","status":"방영 종료","summary":"캔자스주에 위치한 허허벌판의 저택이 커리지와 그의 가족이 사는 집이다. 이곳에는 유스테스와 뮤리엘이라는 노부부와 애완견인 커리지가 있다. 허허벌판에는 초자연현상,범죄자들,외계인 등의 악당들이 커리지와 노부부를 위협한다! 커리지는 초자연현상으로부터 가족들을 구해야한다!"},"A0223":{"t":"먼작귀","type":"애니","img":"https://image.tmdb.org/t/p/w500/9zpbC0icEnTG8bvXcMM3CzLMpop.jpg","status":"방영 중","summary":"먼가 작고 귀여운 녀석, ‘먼작귀’들이 펼치는 즐겁고, 애잔하고, 살짝 거친 날들의 이야기.\n\n모두에게 사랑 받고, 따스함을 받고, 그렇게 지내고 싶은데…  주위에는 정체 모를 존재들이 수두룩?!\n\n하지만 친한 친구 가르마, 토끼와 함께 열심히 살아가는 ‘먼작귀’들의 주변은 항상 웃음으로 가득합니다."},"A0224":{"t":"이세계 유유자적 농가","type":"애니","img":"https://image.tmdb.org/t/p/w500/lLekKj5p47B2OXsgdVvYDst0MWl.jpg","status":"방영 종료","summary":"고독한 투병 생활 끝에 숨을 거둔 마치오 히라쿠.\n\n신으로부터 제2의 인생을 받아 꿈에 그리던 농경 생활을 시작하고자 마음을 먹었으나...\n\n그가 홀로 보내진 곳은 마물투성이인 깊은 숲 한가운데였다.\n\n거기서 의지할 거라고는 전생에서 얻었던 지식과\n\n신으로부터 받은 '만능 농기구'의 힘뿐.\n\n그럼에도 시행착오를 거쳐가며 자신의 땅을 개척해나가는 히라쿠의 곁에는\n\n흡혈귀에다 엘프, 천사, 심지…"},"A0225":{"t":"오소마츠 6쌍둥이","type":"애니","img":"https://image.tmdb.org/t/p/w500/1yrvHcQrakCfbLAe5ehw5ACNYUw.jpg","status":"방영 중","summary":"마츠노 가(家)에 얼굴은 똑같지만 개성 만점인 6쌍둥이가 펼치는 요절복통 에피소드를 그린 애니메이션"},"A0226":{"t":"도로로","type":"애니","img":"https://image.tmdb.org/t/p/w500/yqPESGckTZtGx0LVelIAEF7KSqX.jpg","status":"방영 종료","summary":"주인공 햣키마루(百鬼丸)는 태어나기도 전에 친부가 그 육체를 요괴들에게 팔아버린 남자이다. 때문에 신체의 48개 부분이 결손된 상태로 태어났으며 강가에 버려진 것을 쥬카이라는 의사의 손에 거두어져 결손된 부분을 기계로 대체한다. 요괴들에게서 몸을 되찾기 위해 여행하던 햣키마루는 꼬마 도적 도로로를 만나고 함께 다니게 되는데..."},"A0227":{"t":"도로헤도로","type":"애니","img":"https://image.tmdb.org/t/p/w500/vkBvn2wyd8GcphSOpsKEwKfq27p.jpg","status":"방영 중","summary":"날 이 꼴로 만든 자는 누구인가. 마법에 걸려 도마뱀 머리를 갖게 된 카이만. 그와 니카이도는 인간 세계인 '홀'에서 위험한 계획을 꾸민다. 그놈을, 마법사를 죽이리라."},"A0228":{"t":"마슐","type":"애니","img":"https://image.tmdb.org/t/p/w500/zf07Z39YWFecDZMGQ9UWsCGX3ZD.jpg","status":"방영 중","summary":"이곳은 마법계. 이곳은 마법이 당연한 것처럼 사용되는 세계. 그런 마법계의 깊은 순속에서 혼자서 근육 단련에 힘쓰는 소년. 그의 이름은 마슈 반데드── 그의 비밀은, '마법을 사용하지 못한다는 것' 가족과의 평온하게 살길 원하는 그였지만 어느 날, 갑자기 목숨이 노려지고 어째선지 마법학교에 입학해 가장 우수한 학생만이 될 수 있다는 '신각자'를 목표로 하게 된다. 그의 단련된 근육은 정예 마…"},"A0229":{"t":"마루코는 아홉살","type":"애니","img":"https://image.tmdb.org/t/p/w500/nGZAwg2K3qwXg3vE2B2QKevpTy0.jpg","status":"방영 중","summary":"엉뚱하지만 미워할 수 없는 귀여운 9살 꼬마숙녀 마루코를 중심으로 그 가족과 친구들의 소소한 일상이야기를 따뜻하고 코믹하게 그린 작품으로 평온한 일상이 배경이다. 주로 학교생활에서 벌어지는 사소한 에피소드나 친구들과의 우정을 다루고 있어 오랜 시간이 지나도 변함없이 사랑 받고 있다. 엽기적이고 엉뚱하지만 자신의 생각을 거침없이 표현하는 꾸밈없는 캐릭터인 마루코의 순수함이 남녀노소 모두에게 웃…"},"A0230":{"t":"니모를 찾아서","type":"애니","img":"https://image.tmdb.org/t/p/w500/9ViCYfZ0whpwtKbM2WJP5PfsG2x.jpg","status":"개봉","summary":"광대어 말린은 아내 코랄과 2세들의 부화를 기다리던 중 상어의 습격을 받는다. 알을 보호하려던 아내는 행방불명되고, 유일하게 살아남은 아기에게 말린은 니모라는 이름을 붙인다. 사건 이후 큰 바다를 무조건 겁내게 된 말린은 니모를 과보호한다. 하지만 니모는 등교 첫날 잠수부에게 납치돼 시드니에 있는 치과의사의 수족관에 끌려가고, 슬픔으로 혼비백산한 아빠 말린은 평소의 심약함을 잊고니모를 찾아나…"},"A0231":{"t":"릴로와 스티치","type":"애니","img":"https://image.tmdb.org/t/p/w500/hmNpwSKZzStqO4bfOFeYNTn2B7.jpg","status":"방영 종료","summary":"스티치가 줌바 박사의 사랑받는 실험체 626이었다면, 다른 625마리 실험체들은 어떻게 되었을까? 줌바의 남은 실험체들은 바람 빠진 공 모양으로 하와이에 모두 착륙한다. 실험체들은 물속에 잠기면 활성화되고 각 실험체는 스티치처럼 파괴력과 유머 감각이 있다. 릴로와 스티치의 임무는 스티치의 사촌들이 악당 쟈크 본 햄스터비엘 박사와 심복 간투의 손아귀에 떨어지기 전에 붙잡고, 실험체들의 악한 본…"},"A0232":{"t":"슈퍼 마리오 브라더스","type":"애니","img":"https://image.tmdb.org/t/p/w500/jt1GlLLvkWL2m83VX8I1qsDR187.jpg","status":"개봉","summary":"따단-딴-따단-딴 ♫ 전 세계를 열광시킬 올 타임 슈퍼 어드벤처의 등장! 뉴욕의 평범한 배관공 형제 '마리오'와 ‘루이지’는 배수관 고장으로 위기에 빠진 도시를 구하려다 미스터리한 초록색 파이프 안으로 빨려 들어가게 된다. 파이프를 통해 새로운 세상으로 차원 이동하게 된 형제. 형 ' 한다."},"A0239":{"t":"바람의 검심","type":"애니","img":"https://image.tmdb.org/t/p/w500/9LsaIvAujFe8Ih0lS45Xgfma0L7.jpg","status":"방영 종료","summary":"메이지 시대로의 전개과정에서 수 많은 목숨을 베어야 했던 '칼잡이 발도제' 켄신이 떠돌이 무사가 되어 고통과 눈물 속에서 살아가는 민중들의 편에 서서 사람을 헤치지 않는 역날검을 들고 방랑길에 오르며 겪게 되는 스토리이다. 켄신은 자신의 검에 사라진 생명들에 대해 씻을 수 없는 깊은 상처를 안고 살아가지만 방랑생활을 통해 자신을 필요로 하는 더 많은 사람들을 구하며 곁에 항상 머물러 주는 친…"},"A0240":{"t":"그녀도 여친","type":"애니","img":"https://image.tmdb.org/t/p/w500/g3FZMkQ5lS2PifL8RFJRYCDlHs.jpg","status":"방영 종료","summary":"주인공 나오야는 고등학교 1학년. 쭉 좋아했던 사키에게 고백해, 여자친구가 되도록 성공. 행복의 절정에 있었다.\n\n그러나, 그런 나오야에게 미소녀 나기사가 말을 건다. 그녀는 다짜고짜 나오야에게 좋아한다고 고백을 하는 것이었다. 너무나 좋은 사람에게 마음이 흔들리는 나오야는, 어떤 결정을 한다...!!\n\n설마 한 선택으로부터 시작되는 네오 스탠다드 러브 코미디!!"},"A0241":{"t":"역시 내 청춘의 러브 코미디는 잘못됐다.","type":"애니","img":"https://image.tmdb.org/t/p/w500/d1SLKTqBuBKAzhupohSBLeEQ8zo.jpg","status":"방영 종료","summary":"치바시립 소부고등학교에 다니는 고교 2학년생 ‘히키가야 하치만’은 비뚤어진 성격으로 친구를 일절 사귀지 않지만, 생활지도 교사 ‘히라츠카 시즈카’의 눈에 띄어 학교 제일의 미소녀 ‘유키노시타 유키노’가 소속된 봉사부에 입부하게 된다. 봉사부는 학교의 문제를 해결하는데 도움을 주는 부로, 공개적으로 그 활동이 드러나있지 않은 비밀스러운 조직으로 시즈카의 소개로만 입부된다. 하치만은 봉사부에 입…"},"A0242":{"t":"한마 바키","type":"애니","img":"https://image.tmdb.org/t/p/w500/cY43oegkEgMhVtsRPrP6eActeWU.jpg","status":"방영 종료","summary":"지상 최강의 생명체인 아버지를 쓰러뜨려야 하는 숙명을 타고난 남자, 한마 바키. 사상 초유의 부자 대결을 앞두고, 미국 최강의 죄수 미스터 언체인과 싸우기 위해 제 발로 교도소에 들어간다."},"A0243":{"t":"귀멸의 칼날","type":"애니","img":"https://image.tmdb.org/t/p/w500/iR6T6QxSJpSQi1S4GGjGWLQkSva.jpg","status":"방영 종료","summary":"2019년 4월 Tokyo MX에서 방영을 시작한 애니메이션. 고토게 코요하루의 동명의 만화를 원작으로 한다. 다이쇼 시대, 가난하지만 가족들과 함께 행복한 일상을 보내던 카마도 탄지로. 설이 오기 전에 숯을 잔뜩 팔아 가족들을 배불리 먹여주고 싶었던 탄지로는 혼자 마을로 내려가 숯을 판다. 다음날이 밝고 집에 도착한 탄지로는 가족들이 처참하게 몰살당한 모습을 보고, 유일하게 살아있던 여동생…"},"A0244":{"t":"샹그릴라 프론티어 ~망겜 헌터, 갓겜에 도전하다~","type":"애니","img":"https://image.tmdb.org/t/p/w500/fPo5XKxuSK5KEEa5DBu5GSY5ZPb.jpg","status":"방영 중","summary":"세상에 100개의 갓겜이 있다면, 1000개의 망겜이 있다. 망겜을 클리어하는 데 열정을 바쳐 온 '망겜 헌터' 히즈토메 라쿠로. 그가 다음에 도전한 것은 망겜의 대척점에 위치한, 총 플레이어 수 3000만 명에 달하는 '갓겜'──[샹그릴라 프론티어]였다. 모이는 동료, 확장되는 세계. 그리고  넣은 신기한 장치에 이런 놀라운 능력이? 이것만 있으면 10가지 모습의 외계인으로 변신할 수 있다고. 나는야 슈퍼히어로!"},"A0252":{"t":"나 혼자만 레벨업 -리어웨이크닝-","type":"애니","img":"https://image.tmdb.org/t/p/w500/vOONcAbFSVCOgct9k4JJPLbPvOi.jpg","status":"개봉","summary":"다른 차원과 이쪽 세계를 이어 주는 통로인 '게이트가' 갑자기 발생한 지 10여 년. 세계에는 '헌터'라고 불리는 초인적인 힘에 각성한 사람들이 출현했다. 헌터는 그 힘을 사용해 게이트 안의 던전을 공략하고 대가를 받는 것을 생업으로 하고 있는데 강자들만 모인 헌터들 중 '성진우'는 인류 최약병기라 불리는 저랭크 헌터로서 생활하고 있었다. 어느 날, 저랭크 던전에 숨겨진 고랭크 이중 던전에서…"},"A0253":{"t":"정령환상기","type":"애니","img":"https://image.tmdb.org/t/p/w500/fIXhI6RvooMcCLXISHtMlY7cpDy.jpg","status":"방영 종료","summary":"벨트람 왕국 슬럼가의 고아로 힘겹게 살아가는 리오. 어느 날, 갑작스러운 사고로 사망한 '아마카와 하루토'의 기억이 떠오르고, 자신이 이 세계로 전생한 것이라는 사실을 깨닫는다. 그 후 자신 안에 있는 강력한 마력으로 우연히 공주를 구하게 되면서 왕립학원에 입학하게 되는데… 전생과 현생이 교차하는 두 개의 기억을 가진 소년이 만남과 이별을 거듭하면서 가혹한 운명을 깨트려 나간다!"},"A0254":{"t":"빌리와 맨디의 무시무시한 모험","type":"애니","img":"https://image.tmdb.org/t/p/w500/kbFIKt6NGppNr7OOn288A8gBObs.jpg","status":"방영 종료","summary":""},"A0255":{"t":"카드캡터 체리","type":"애니","img":"https://image.tmdb.org/t/p/w500/8jbo0LZ4cVrPI3IagPlizIwY7YT.jpg","status":"방영 종료","summary":"어느 날 밤 이상한 꿈을 꾸고 난 사쿠라는 아빠의 서재에서 꿈에서 본 책을 발견한다. 책 속에서 발견한 카드를 읽는 순간, 신비한 빛이 쏟아지면서 봉인된 카드의 파수꾼인 ′케로베로스′를 잠에서 깨운다. 그러나 카드 집을 열면서 크로우 카드의 봉인이 풀려 다시 카드를 모아야 하는데...."},"A0256":{"t":"푸른 상자","type":"애니","img":"https://image.tmdb.org/t/p/w500/H78ZF0JPjl86QxBtkyWhUH3nvr.jpg","status":"방영 중","summary":"농구부의 스타 치나츠를 멀리서 지켜보며 줄곧 짝사랑해 온 배드민턴부의 타이키. 그러던 어느 봄날, 두 사람의 거리가 갑자기 가까워지는 깜짝 놀랄 사건이 일어난다."},"A0257":{"t":"옆집 천사님 때문에 어느샌가 인간적으로 타락한 사연","type":"애니","img":"https://image.tmdb.org/t/p/w500/wJLbqX5VFCxViBHC0IkMRZmEkPq.jpg","status":"방영 종료","summary":"고등학교에 진학해 자취를 시작한 고등학교 1학년 후지미야 아마네.\n\n그가 살고 있는 맨션의 옆집에는 학교 제일의 미소녀 시이나 마히루가 살고 있다.\n\n특별히 얽힐 일이 없었던 두 사람이었지만,\n\n빗속에서 흠뻑 젖은 마히루에게 우산을 빌려주게 되면서 기묘한 교류가 시작된다.\n\n혼자서 게으르게 살던 아마네를 보다 못해 식사를 만들어 주고, 방을 청소해 주면서 보살펴주는 마히루.\n\n이웃인 둘의 마…"},"A0258":{"t":"플루토","type":"애니","img":"https://image.tmdb.org/t/p/w500/slKxVp3rGwUFQNglVi5oKx6ICjg.jpg","status":"방영 종료","summary":"최고로 진화한 세계 7대 로봇과 그들을 지지하는 인간이 차례로 살해되는 사건이 일어난다. 곧이어 게지히트 형사는 자신에게도 위험이 닥쳤음을 깨닫는데.\n\n수많은 사람이 걸작이라 칭송하는 원작 만화 《플루토》는 1964년에 발표된 테즈카 오사무의 《우주소년 아톰》 중 '지상 최강의 로봇' 편을 바탕으로 탄생한 작품으로, 우라사와 나오키(《20세기 소년》 《야와라! 》 《마스터 키튼》)와 그의 오…"},"A0259":{"t":"듀라라라!!","type":"애니","img":"https://image.tmdb.org/t/p/w500/akCQkLWz4TBWO7PMgC8VeBYf4mX.jpg","status":"방영 종료","summary":"도쿄 이케부쿠로. 도시의 비일상을 동경하는 소년 류가미네 미카도는 소꿉친구인 키다 마사오미의 권유로 이케부쿠로에 있는 고등학교에 입학하기 위해 상경한다. 그 이케부쿠로에 살아가기 위해선 적으로 만들면 안 되는 존재들이 있었다. 이케부쿠로 최강의 사나이, 헤이와지마 시즈오. 수수께기의 정보상, 오리하라 이자야. 그리고 기묘한 조직 체계를 갖고 있는 정체불명의 조직 “달라즈”. 상경한 첫날부터 …"},"A0260":{"t":"코미 양은 커뮤증입니다","type":"애니","img":"https://image.tmdb.org/t/p/w500/5WpjeabMdvXJL9nwvDZGkxHAchI.jpg","status":"방영 종료","summary":"눈부신 미모의 여고생 코미 양에겐 두 가지 비밀이 있다. 첫째는 남과 커뮤니케이션이 두려운 '커뮤증'이 있다는 것. 둘째는, 그래도 마음속에 친구 백 명을 사귀고 싶은 꿈이 있다는 것!"},"A0261":{"t":"갓 오브 하이스쿨","type":"애니","img":"https://image.tmdb.org/t/p/w500/gfMBnUVzWTlal8Hr0RfgnVe6kHW.jpg","status":"방영 종료","summary":"세계 최강의 고교생은 누구인가. 나름 '쎄'다는 고등학생들이 저마다의 사연을 안고 종합 격투기 대회에 참가한다. 이 대회에서 우승하면 어떤 소원도 이룰 수 있기 때문인데."},"A0262":{"t":"나의 히어로 아카데미아","type":"애니","img":"https://image.tmdb.org/t/p/w500/wiXNjJaSSpnhPPa4N6APqpyVNBy.jpg","status":"방영 종료","summary":"가공의 세계가 현실로! 이것은 내가 최고의 히어로가 되기까지의 이야기다. 시작은 중국의 경경 시에서 빛을 내뿜는 아기가 태어났다는 뉴스였다. 이후에 각지에서 초현실적 현상이 발견되고 원인도 밝혀지지 않은 채 세월이 흐른다. 세계 총인구의 80%가 어떤 형태로든 특이체질인 초인사회가 된 현재. 선천적으로 타고난 특별한 힘인 ‘개성’을 악용하는 범죄자 ‘빌런’이 갈수록 늘어난다. 이에 마찬가지로…"},"A0263":{"t":"페이트 / 제로","type":"애니","img":"https://image.tmdb.org/t/p/w500/hfTEDISVpFMqmp6uOGylsSakyXZ.jpg","status":"방영 종료","summary":"기적을 일으키는 만능의「성배」를 손에 넣기 위해 7명의 마술사가 서번트라 불리우는 7명의 「영령」을 소환하여 최후이 1명이 남을 때까지 벌이는 살육전을 다룬 애니메이션"},"A0264":{"t":"북두의 권","type":"애니","img":"https://image.tmdb.org/t/p/w500/lokIbr6KuBGQKwAlUGTs8eY0u3D.jpg","status":"방영 종료","summary":"핵전쟁의 발발로 황폐하고 문명이 붕괴한 무법 지대에서 평범한 사람들을 살해하는 난폭한 악당들이 날뛰는 서부극 같은 세계.\n\n북두신권의 전승자인 켄시로는 악당들과 사악한 권법가를 쓰러뜨려 사람들을 구하고, 공포로서 세상을 지배하려 하는 권왕 라오우에 도전하게 된다."},"A0265":{"t":"쿵푸팬더 4","type":"애니","img":"https://image.tmdb.org/t/p/w500/fvtswV04JfLGxxrjxW4t4j8bPhx.jpg","status":"개봉","summary":"마침내 내면의 평화… 냉면의 평화…가 찾아왔다고 믿는 용의 전사 ‘포’ 이젠 평화의 계곡의 영적 지도자가 되고, 자신을 대신할 후계자를 찾아야만 한다. “이제 용의 전사는 그만둬야 해요?” 용의 전사로의 모습이 익숙해지고 새로운 성장을 하기보다 지금 이대로가 좋은 ‘포’ 하지만 모든 쿵푸 마스터들의 능력을 그대로 복제하는 강력한 빌런 ‘카멜레온’이 나타나고 그녀를 막기 위해 정체를 알 수 없…"},"A0266":{"t":"쿵푸팬더","type":"애니","img":"https://image.tmdb.org/t/p/w500/c3Dzd3A3QE0LkKb5HMOHTzs2Fyg.jpg","status":"개봉","summary":"평화의 계곡에서 아버지의 국수 가게를 돕고 있는 팬더 포. 아버지는 국수의 비법을 알려주어 가업을 잇게 하고 싶지만, 포의 관심사는 오로지 쿵푸 마스터. 가게 일은 뒷전으로 하고 쿵푸의 비법이 적힌 용문서의 전수자를 정하는 무적의 5인방 대결을 보러 시합장을 찾은 포. 그런데 마을의 현인 우그웨이 대사부가 포를 용문서의 전수자로 점지하는 이변이 일어난다. 무적의 5인방은 물론 시푸 사부 역시…"},"A0267":{"t":"데빌맨 크라이베이비","type":"애니","img":"https://image.tmdb.org/t/p/w500/dkxAjG9tbBe3grIwMNOBQmyKxFp.jpg","status":"방영 종료","summary":"악령이 몸에 들어왔으나 인간의 마음을 잃지 않고 인류를 지키려 애쓰는 내용의 애니메이션 영화"},"A0268":{"t":"업","type":"애니","img":"https://image.tmdb.org/t/p/w500/lL2WzkjLZP0RkPgUhybBjb9x9SL.jpg","status":"개봉","summary":"평생 모험을 꿈꿔 왔던 칼 할아버지는 재개발 공사 현장의 인부를 실수로 다치게 하고 집을 빼앗길 위기에 처한다. 그 동안 미뤄 왔던, 먼저 세상을 떠난 아내와의 약속을 지키기 위해 그는 수천 개의 풍선을 매달아 집을 통째로 남아메리카로 날려 버린다. 하지만 이 위대한 모험에 초대 받지 않은 불청객이 있었으니, 바로 황야의 어린이 탐험가 러셀. 우여곡절 끝에 도착한 남미에서 칼은 어린 시절의 …"},"A0269":{"t":"겨울왕국","type":"애니","img":"https://image.tmdb.org/t/p/w500/lYceQKe3EsYn7VdDXGTy7dSwBLp.jpg","status":"개봉","summary":"서로가 최고의 친구였던 자매 엘사와 안나. 하지만 언니 엘사에게는 하나뿐인 동생에게조차 말 못할 비밀이 있다. 모든 것을 얼려버리는 신비로운 힘이 바로 그 것. 엘사는 통제할 수 없는 자신의 힘이 두려워 왕국을 떠나 북쪽 산으로 도망치고, 홀로 그곳에서 얼음 궁전을 지어 지내게 된다. 한편 얼어버린 왕국의 저주를 풀기 위해 안나는 언니를 찾아 나서고, 그 과정에서 안나는 까칠한 매력의 얼음장…"},"A0270":{"t":"아카메가 벤다!","type":"애니","img":"https://image.tmdb.org/t/p/w500/hDzm2VXxdeK5kztUN3RWTkBsBZg.jpg","status":"방영 종료","summary":"인간이 서서히 썩어가듯 나라도 멸망한다\n\n천 년을 번창한 도성조차도 지금은 부패한 생지옥.\n\n그곳에 가득한 것은 사람의 탈을 쓰고 잘난 척 날뛰는 온갖 요괴들.\n\n하늘이 벌하지 못하는 그 악을 어둠 속에서 처벌하는 살인청부업자, 나이트레이드의 활약이 지금 펼쳐진다."},"A0271":{"t":"5등분의 신부","type":"애니","img":"https://image.tmdb.org/t/p/w500/uIn2eTUDGFLZ2D9vEHzuHuqFEIc.jpg","status":"방영 종료","summary":"가난한 생활을 보내는 고등학생 2학년 우에스기 후타로에게 좋은 조건의 가정교사 아르바이트 이야기가 들아온다. 그런데 가르칠 대상은 놀랍게도 동급생!! 그것도 다섯 쌍둥이였다!! 전원 미소녀, 하지만 \"낙제 직전\", \"공부가 싫다\"는 문제아! 첫 과제는 자매로부터 신뢰를 얻어내는 것…?! 매일이 야단법석! 나카노 家 다섯 쌍둥이가 만들어내는 귀여움 500%의 5인 5색 러브코미디 개막!!"},"A0272":{"t":"지박소년 하나코 군","type":"애니","img":"https://image.tmdb.org/t/p/w500/zHQ5zSqQFmsapnSvXc9ZKOithlj.jpg","status":"방영 종료","summary":"카모메 학원에 전해오는 가장 유명한 7대 불가사의에 대한 소문.\n\n구 교사 3층 여자 화장실 세 번째 칸에는 하나코 씨가 있는데\n\n불러낸 사람의 소원을 무엇이든 이뤄준대.\n\n부르는 방법은 간단해  노크를 3번.\n\n그리고───\n\n'하나코 씨, 하나코 씨, 계신가요?'\n\n'네-에-……'\n\n자신의 소원을 이루기 위해  하나코 씨를 부른 오컬트 소녀 야시로 네네.\n\n하지만, 그녀의 앞에 나타난 것은…"},"A0273":{"t":"쿠로코의 농구","type":"애니","img":"https://image.tmdb.org/t/p/w500/4w2t3EqzGaKVvnGgTyTZitxM9eB.jpg","status":"방영 종료","summary":"국 중학교 농구대회 3연패의 초 강호 테이코 중학교 농구부, 그 빛나는 역사 속에서도 10년에 한 명 나올 천재 다섯명이 함께한 세대가 기적의 세대라 불린다. 그리고 기적의 세대에는 천재 다섯 명이 인정하던 선수가 또 한 명, 환상의 식스맨이 있었다. 미국에서 귀국학 거친 파워플레이를 하는 고교생 카가미 타이가. 타이가가 입학한 세이린 고교에서 만난 너무도 평범한 소년 쿠로코테츠야는 농구를 …"},"A0274":{"t":"드래곤볼 히어로즈","type":"애니","img":"https://image.tmdb.org/t/p/w500/79C1S70I2nR4o0WpVETIezT3jyG.jpg","status":"방영 종료","summary":"다른 차원의 사이야인들의 전투"},"A0275":{"t":"빙과","type":"애니","img":"https://image.tmdb.org/t/p/w500/q66cygMEKfR2Y8wAPSAb8G82b0l.jpg","status":"방영 종료","summary":"에너지 보존을 신조로 삼고 있는 고교생, 오레키 호타로는 누나의 명령으로 폐부직전의 클럽, 고전부에 입부하게 된다. 고전부에서 만나게 된 호기심 만발의 소녀, 치탄다 에루. 그리고 증학 시절부터 함께한 후쿠베 사토시와 이바라 마야카. 이들 4명이 카미야마 고교를 무대로 벌어지는 수많은 사건들을 추리해나가는 청춘학원 미스테리. \"저 신경 쓰여요!\" 호타로의 평온했던 잿빛 고교생활은 이 한마디로…"},"A0276":{"t":"터무니없는 스킬로 이세계 방랑 밥","type":"애니","img":"https://image.tmdb.org/t/p/w500/1iWzgAU9MMKrS67VnxH4XhDnTUa.jpg","status":"방영 종료","summary":"어느 날 갑자기 이세계로 소환된 평범한 샐러리맨 무코다 츠요시. 이세계의 주민이 된 그의 고유 스킬은 '인터넷 슈퍼' 라는 볼품없어 보이는 것이었다... 낙담하는 무코다였지만 사실 이 스킬로 가져올 수 있는 현대의 식품은 이세계에서 터무닝없는 효과를 발휘했는데...?!"},"A0277":{"t":"사신 도련님과 검은 메이드","type":"애니","img":"https://image.tmdb.org/t/p/w500/fO0mHKsCyE8eXABhYbw8yzoBLPn.jpg","status":"방영 종료","summary":"닿고 싶지만 닿을 수 없다. 세상에서 가장 애달픈 사랑. 어렸을 적에 마녀가 닿은 대상의 생명을 빼앗는 저주를 걸어버린 귀족 도련님. 저주 때문에 주변 사람들이 자신을 피하게 되어, 그는 숲속 깊은 곳에 있는 커다란 저택에서 고독한 일상을 보내고 있었다. 그런 그의 시중을 드는 메이드가 '앨리스'. 하지만 그 엘리스의 존재가 도련님에게 있어서 가장 큰 고민거리였다. 왜냐하면 앨리스는 하루가 …"},"A0278":{"t":"아따맘마","type":"애니","img":"https://image.tmdb.org/t/p/w500/aFtcVTcjFrwL1hvHdlmOrQsJMQN.jpg","status":"방영 종료","summary":"이 시대의 평범한 핵가족인 4명의 가족 구성원을 중심으로 각각의 생동감 있고 공감가는 에피소드가 중심이 되는 본격 일상 애니메이션."},"A0279":{"t":"벤10 얼티메이트 에일리언","type":"애니","img":"https://image.tmdb.org/t/p/w500/n4KwrlUKO9S4GvOdZzmnz4zOxx7.jpg","status":"방영 종료","summary":"카툰 네트워크에서 2010년 봄부터 방영을 시작한 벤10 시리즈의 세번째 작품. 세계관은 벤10 에일리언 포스의 연장선에 있다.문제의 연장 벤 테니슨의 존재가 매스컴을 통해 위협적인 존재로 알려지고, 그럼에도 히어로 활동을 계속하는 주인공들의 이야기로 국내에는 2010년 10월 10일에 카툰네트워크에서 방영되었다. 스토리가 전작에 비해 더 어두워진게 특징이며, 몇몇 잔인한 장면이나 기괴한 장…"},"A0280":{"t":"트라이건","type":"애니","img":"https://image.tmdb.org/t/p/w500/iF4y2FuDvPz0GADgQk60wxjFU0y.jpg","status":"방영 종료","summary":"행성을 떠돌며 100년을 넘게 살아온 밧슈와 나이브즈. 인간 세상에 적응하여 살아가려고 하지만 닥치는대로 사람을 해치는 나이브즈 덕에 밧슈는 엄청난 현상금이 걸린채 도망자 신세가 되고 만다.\n\n결국 나이브즈와 헤어져 어떻게든 사람은 쏘지 않는다는 신념을 지닌채 밧슈의 험난한 여정이 시작되는데...  이런 밧슈에게 보험사 직원이 미리톰슨과 니콜라스, 그리고 밧슈를 좋아하는 메릴등이 합류하면서 …"},"A0281":{"t":"뻐꾸기 커플","type":"애니","img":"https://image.tmdb.org/t/p/w500/ub9CwVbGexT75YCrdwgka9AljD2.jpg","status":"방영 종료","summary":"아기 때 뒤바뀌어, 드디어 진짜 부모님과 만나게 된 고교생 ‘우미노 나기’.\n\n그날, 영애들이 다니는 명문 학교의 여고생 ‘아마노 에리카’를 우연히 만나, 누군지도 모르는 약혼자와의 결혼을 막고 싶은 그녀의 부탁에 반 강제로 남자친구 역할을 맡게 된다.\n\n하지만, 이 두 사람이야 말로 뒤바뀐 아이이자, 약혼자였다!\n\n알고 보니 두 자녀를 사랑하는 부모들에 의해 ‘나기’와 ‘에리카’는 양가가 …"},"A0282":{"t":"내 마음의 위험한 녀석","type":"애니","img":"https://image.tmdb.org/t/p/w500/bn27ZxhxWmNiKHtPVrDdVEbhjX3.jpg","status":"방영 중","summary":"이치카와 쿄타로는 살인에 관련된 엽기적인 책들을 읽는 걸 즐기는,\n\n중증의 중2병을 가진 남자애였다.\n\n같은 반의 미소녀 야마다 안나를 힐끔힐끔 보면서\n\n위험한 망상을 하고는 했는데, 그러던 어느 날.\n\n야마다가 이치카와의 성역인 도서실에 찾아왔다.\n\n야마다는 혼자 있다고 생각했는지 입 안이 가득해질 정도로 주먹밥을 먹는다든지,\n\n이상한 콧노래를 부른다든지 하는 등 마음 가는 대로 행동했다.…"},"A0283":{"t":"바이올렛 에버가든","type":"애니","img":"https://image.tmdb.org/t/p/w500/bkjxICvFDDcmuRPtxScImBKXlBR.jpg","status":"방영 종료","summary":"어느 대륙의 어느 시대. 대륙을 남북으로 분단시킨 대전은 종식됐고 세상은 평화로 향하는 기운으로 가득했다. 전시 내내 군인으로 싸운 바이올렛 에버가든은 군을 떠나 큰 항구도시로 와 습니까......?\n\n쏜살같이 도망치시겠습니까?\n\n이상한 주술을 배우거나 아니면  영매사에게 부탁해서 그것들과 싸우겠습니까?\n\n여고생 요츠먀 미코가 선택한 것은\n\n철저한 무시!\n\n아무것도 보이지 않는다, 보이는…"},"A0303":{"t":"슬램덩크","type":"애니","img":"https://image.tmdb.org/t/p/w500/tl44cjAK0UiQSH6aRLs1ActnGEp.jpg","status":"방영 종료","summary":"살짝 불량하면서도 단순무식한 고등학교 1학년생, 강백호. '농구'의 'ㄴ'자도 몰랐던 그가 좋아하는 여학생에게 잘 보이겠다는 일념으로 농구부에 들어간다. 그리고 농구를 조금씩 배워가면서 그 매력에 점점 빠져든다."},"A0304":{"t":"원더 에그 프라이어리티","type":"애니","img":"https://image.tmdb.org/t/p/w500/unE5J8tPW2la5mHNjYfVUoUrpbe.jpg","status":"방영 종료","summary":"각본가 노지마 신지가 애니메이션 세계에서 새롭게 선보이는 고민 속에서 허우적거리는 소녀들의 이야기. 14살의 소녀 오오토 아이는 늦은 밤 산책을 하던 도중 마주한 정체불명의 목소리에 이끌려 '에그'를 손에 넣는다.  '미래를 바꾸고 싶으면 지금은 그저 선택해라' '자아, 스스로를 믿고 에그를 깨라' 에그를 깬 후 아이를 기다리고 있던 것은....."},"A0305":{"t":"스즈미야 하루히의 우울","type":"애니","img":"https://image.tmdb.org/t/p/w500/2fRht0UsBj8mZZTYtC3zhVO8B0M.jpg","status":"방영 종료","summary":"평범한 고등학교 생활을 원했던 쿈. 같은 반인 스즈미야 하루히에게 말 한번 잘못 걸었다가 이상한 클럽 활동에 참여하게 된다. 클럽의 목적은 우주인이나 미래에서 온 초능력자를 찾아 함께 노는 것이라는데. 이건 꿈이야, 그렇지?"},"A0306":{"t":"91 데이즈","type":"애니","img":"https://image.tmdb.org/t/p/w500/ArJQiKRRLM3v5SoEaPN0qo6NUVp.jpg","status":"방영 종료","summary":"금주법이 내려진 시대. 법은 땅에 떨어지고 도시는 마피아가 장악했다.암암리에 밀주가 오가는 도시, 로우리스. 마피아의 싸움에 휘말려 일가족을 살해당한 아빌리오. 그러던 어느 날 아빌리오 앞으로 도착한 한 통의 편지. 그 편지 속에는 일가족을 죽인 범인의 이름이 적혀 있었다. 복수의 칼날을 갈기 시작한 그는 돈 바네티의 아들, 네로에게 접근한다. 죽음이 죽음을 부르고 복수가 또 다른 복수를 부…"},"A0307":{"t":"블랙 클로버","type":"애니","img":"https://image.tmdb.org/t/p/w500/yLZS7lrY9GrWrzpMKSNkAfJNXCP.jpg","status":"방영 중","summary":"어린 시절 부모에게 버림을 받고 빈민 지역 교회에서 자란 아스타와 라이벌 유노. 두 사람은 마법 세계의 정점인 마법제가 되겠다는 목표를 가지고 있다. 그러나 아스타는 전혀 마력을 가지고 있지 않아 마법 기술을 쓰지 못하는 반면, 유노는 어린 나이에도 불구하고 엄청난 마법의 소유자로 촉망 받는다. 시간이 흘러 두 사람은 15세가 되고, 마력을 가진 15세 아이들에게 마법기사단에 들어갈 수 있는…"},"A0308":{"t":"アニメ『チェンソーマン』スマホゲーム OPムービー","type":"애니","img":"https://image.tmdb.org/t/p/w500/yIxq6dPHrcnP4fGM0QytBMlCWBG.jpg","status":"개봉","summary":""},"A0309":{"t":"방패 용사 성공담","type":"애니","img":"https://image.tmdb.org/t/p/w500/vc3O5LIry6zxO4A7gelyjojjpGZ.jpg","status":"방영 중","summary":"극히 평범한 오타쿠 대학생인 이와타니 나오후미는 도서관에서 어느 책 한 권을 발견한다. 그리고 그 책으로 인해 나오후미는 검, 창, 활 방패를 무기로 사용하는 사성 용사 중 방패 용사로서 이세계에 초대된다. 용사들에게 주어진 사명은 세상에 혼돈을 야기하는 재앙인 '파도'를 물리치는 것. 모험을 꿈꾸며 동료와 함께 여행을 떠난 나오후미였지만 동료의 배신으로 돈과 명예를 포함한 모든 것을 잃게 …"},"A0310":{"t":"고스트 바둑왕","type":"애니","img":"https://image.tmdb.org/t/p/w500/1nmLqPqnk9ob7rzyjIz8gHb10qw.jpg","status":"방영 종료","summary":"초등학교 6학년인 신도 히카루는 바둑판에 피가 묻어 있는 것을 우연히 발견한다. 또한 목소릴를 듣게 되는데, 고대의 바둑 사범이었던 후지와라 사이의 목소리 였다. 사이는 히카루의 안에 자리잡게 되고, 그를 보거나 대화할 수 있는 사람은 히카루 뿐이다. 사이의 소원은 바둑을 두는 것. 그러나, 히카루의 몸을 통해서만 바둑을 둘 수 있는데, 히카루는 바둑에 별 관심이 없다. 과연, 히카루는 사이…"},"A0311":{"t":"혈계전선","type":"애니","img":"https://image.tmdb.org/t/p/w500/fcC7DYN0957mJV8mq4pFGPVS70e.jpg","status":"방영 종료","summary":"한 때 뉴욕이라 불리던 거리는 3년 전에 출현한 게이트 때문에 단 하룻밤 만에 소실됐다. 지금은 상상의 산물로 여겨지던 이계의 생물들과 현세가 뒤섞여 다양한 의도를 가진 자들이 함부로 설치는 거리 ‘헤르살렘즈 롯’이 구축되었다. 그런 세계의 균형을 유지하려 비밀리에 움직이는 조직이 있었으니 그 조직의 이름은 ‘비밀 결사 라이브라’!. 소년 ‘레오나르도’는 우연한 계기로 라이브라에 입단하게 되…"},"A0312":{"t":"나만이 없는 거리","type":"애니","img":"https://image.tmdb.org/t/p/w500/aWYARgMiUMktzGUwTfCvwlCJ1wx.jpg","status":"방영 종료","summary":"무엇 하나 제대로 안 풀리는 현실 속에서 하루하루 조바심만 더해가던 청년 후지누마 사토루. 자신에게만 일어나는 ‘시간이 되돌아간다’는 불가사의한 현상조차, 청년의 불만은 더욱 크게 만들 뿐이었다. 하지만 그것은 어느 날을 기점으로 달라졌다. 커다란 사건이 청년의 주변을 다짜고짜 변화시켜 나가는데."},"A0313":{"t":"러브 라이브!","type":"애니","img":"https://image.tmdb.org/t/p/w500/ynbpiXGC01pCzHZGo16WigbJsQQ.jpg","status":"방영 종료","summary":"전통 있는 고등학교 오토노키자카 고교는 정원보다 지원자가 적어 폐교 위기에 놓여있었다. 최악의 경우 3년 후에 폐교가 될지도 모른다는 말에 코우사카 호노카를 중심으로 한 9명의 소녀가 학교를 지키기 위해 스쿨 아이돌 그룹을 결성한다!"},"A0314":{"t":"유유백서","type":"애니","img":"https://image.tmdb.org/t/p/w500/4qnoZl1kQPBBMZBETaPDvdrazKb.jpg","status":"방영 종료","summary":"학교에서 나쁜 짓만 골라서 하는 걸로 악명 높은 불량소년 우라메시 유스케. 아이들은 그를 피해다니고 선생님들도 어찌할 바를 모른다. 그러던 어느 날 유스케는 한 꼬마아이를 살리려다 죽고 마는데... 하늘이 정해준 수명보다 일찍 죽은 유스케는 하늘에서 '시련'을 받고 세상에 다시 내려오게 된다.\n\n물론 유령으로..."},"A0315":{"t":"이세계 삼촌","type":"애니","img":"https://image.tmdb.org/t/p/w500/7CLH2r90N73rPbpp5gaLYkhnySB.jpg","status":"방영 종료","summary":"17년 동안 혼수상태에 빠져 이제는 중년이 된, 타카후미의 삼촌이 어느 날 눈을 뜬다. 알아들을 수 없는 말을 하고 마법의 힘을 휘두르며."},"A0316":{"t":"내 이야기!!","type":"애니","img":"https://image.tmdb.org/t/p/w500/8ufpgv9wKB1TnjPjvO7NQiTDr1r.jpg","status":"방영 종료","summary":"고다 타케오, 고1 남자. 신장 2미터에 몸무게 120킬로. 꾸밈없고 서투르고 둔한 이 남자는 여자들에게는 인기가 없지만 남자들에게는 인기 폭발. 그러던 어느 날, 고다는 학교 가는 전철 안에서 치한을 퇴치하고 여대생 야마토 린코를 구해주게 되는데... 그 순간 고다는 야마토 린코에게 한눈에 반해버리게 된다."},"A0317":{"t":"북두의 권 -Fist of the North Star-","type":"애니","img":"https://image.tmdb.org/t/p/w500/jjpJNuMit5K0IDXVcnxJV60oZS5.jpg","status":"방영 중","summary":"199X년, 세계는 핵의 불길에 휩싸였다! 바다는 마르고 땅은 갈라져 모든 생명이 절멸한 듯했으나, 인류는 멸망하지 않았다! 하지만 황폐해진 대지 위 생존하려는 이들의 염원은 무자비한 폭력 앞에 철저히 짓밟힌다. 오직 힘만이 정의가 되고 약자는 유린당하는 절망의 시대. 그곳에 가슴에 일곱 개의 흉터를 지닌 전설의 암살권 '북두신권' 전승자 켄시로가 나타난다. 약혼자 유리아를 빼앗은 숙적 신을…"},"A0318":{"t":"꼬마마법사 레미","type":"애니","img":"https://image.tmdb.org/t/p/w500/yODQ7MDKMbvc9H7T06CCDTdzgeX.jpg","status":"방영 종료","summary":"얼빠져서 여동생에게도 바보소리를 듣는 자칭〈세계제일불행한 미소녀〉인 초등학교 3학년생 하루카제 도레미(도레미). 마녀를 동경하고, 좋아하는 사람에게 고백할 용기를 마법으로 손에 넣고 싶어했던 그녀는, 이상한 곳에서 진짜 마녀인 마조리카와 만나게 된다.\n\n마녀 개구리가 되어버린 마조리카를 원래대로 돌려놓기 위해서, 도레미는 친구인 후지와라 하즈키(장메이), 세노 아이코(유사랑) (후에는 도레미…"},"A0319":{"t":"제로의 사역마","type":"애니","img":"https://image.tmdb.org/t/p/w500/lalmkYtSEjPPTWNYrY6a2MWXkvz.jpg","status":"방영 종료","summary":"어느날 갑자기 이세계로 떨어지게 된 평범한 소년.\n\n그를 부른 것은 오만방자하지만 마법 능력은 갖고 있지 않은 미소녀 루이즈.\n\n둘은 키스로 계약을 맺게 되고, 이후 소년은 주인님의 '사역마'가 되어 주인님을 섬기게 된다."},"A0320":{"t":"어서 오세요 실력 지상주의 교실에","type":"애니","img":"https://image.tmdb.org/t/p/w500/vE5TgFtcSCgLICbGXE0aNQXvbWF.jpg","status":"방영 중","summary":"이 사회는 평등한가 아닌가. 진짜 '실력'이란 무엇인가.\n\n고도 육성 고등학교. 그곳은 철저한 실력지상주의를 내건 진학률과 취업률 100%를 자랑하는 학교이다.\n\n올해 입학해 1학년 D반에 소속된 아야노코지 키요타카. 하지만 학교는 '실력지상주의'라는 간판과는 정반대로 학생들에게 현금과 동일한 가치를 가진 포인트를 한 달에 10만엔 가량 주고선 수업이나 생활태도에 관해 방임주의로 일관한다.\n…"},"A0321":{"t":"BanG Dream!","type":"애니","img":"https://image.tmdb.org/t/p/w500/odOfS98nLcWcgz4NaGkTwI8jgq3.jpg","status":"방영 종료","summary":"두근거리며 반짝일 수 있는 뭔가를 찾던 고교 1학년 소녀 토야마 카스미. 전당포 구석에서 발견한 붉은 별 모양의 일렉트릭 기타로부터 어릴 적 느꼈던 별의 고동을 떠올리고 밴드를 결성하기로 결심한다. 이후 그녀는 라이브하우스에서 아르바이트를 하는 하나조노 타에. 언니로부터 베이스 기타를 물려받은 클래스메이트 우시고메 리미. 전당포 점주의 손녀인 이치가야 아리사 등, 악기를 연주할 수 있는 동급…"},"A0322":{"t":"대니팬텀","type":"애니","img":"https://image.tmdb.org/t/p/w500/eicgZ0BRI76EUZv81qmyPO5u16r.jpg","status":"방영 종료","summary":"출연: 데이비드 코프먼, 그레이 딜라일\n\n장르: 히어로, 어드벤처, 판타지, 키즈, 애니메이션\n\n어느 날 기계 버튼을 실수로 잘못 눌러 몸의 반이 유령으로 변하게 된 대니. 그리고 대니를 든든히 지원해주는 친구 터커와 샘의 멋진 협력 이야기."},"A0323":{"t":"우리는 공부를 못해","type":"애니","img":"https://image.tmdb.org/t/p/w500/fKIbQH4KywqEzd143sXHeTsCWRx.jpg","status":"방영 종료","summary":"찢어지게 가난한 집안 환경과 동생들을 위해 전액 무료 VIP 대학 추천을 노리는 고교 3학년 유이가 나리유키. 내 공부도 하기 바쁜 판에 본의 아니게 천재 미소녀 후미노와 리즈의 교육을 맡게 된다. 완전무결해 보이는 두 사람이지만 사실 의외의 고민을 안고 있었는데…?!"},"A0324":{"t":"종말의 세라프","type":"애니","img":"https://image.tmdb.org/t/p/w500/jP569pDgvwX3MeZPXUnmteYA2oZ.jpg","status":"방영 종료","summary":"미지의 바이러스에 의해 인류는 괴멸하고, 아이들만이 살아남아 지하 도시에서 뱀파이어의 지배를 받고 있었다.\n\n지기 싫어하는 기 센 소년, 햐쿠야 유이치로는 동료들의 희생으로 홀로 탈출에 성공, 복수를 맹세한다. 유이치로가 본 새로운 지상 세계란?!\n\n한편, 흡혈귀에게 친구를 잃은 유이치로는 복수를 위해 일본제귀군에 입대하고, 그곳에서 새로운 동료들과 흡혈귀 섬멸을 위해 싸우지만-…?!"},"A0325":{"t":"이 멋진 세계에 폭염을!","type":"애니","img":"https://image.tmdb.org/t/p/w500/pthtJJ0tMPPdPwCuLNogDheJYyl.jpg","status":"방영 종료","summary":"홍마의 마을— 그곳은, 선천적으로 마력과 지력이 매우 높으며, 마법사로서의 높은 적성을 가진, 붉은 눈동자를 가진 홍마족이 사는 땅. 그런 홍마의 마을에는 교훈이 있다. 「상급 마법을 습득해야 비로소 한 사람의 몫. 폭렬 마법은 엉터리 마법. 」 하지만 ＂마법학원 레드프리즌＂의 모든 동급생들이 상급 마법의 습득을 위해 열중할 때, 홍마족 소녀 메구밍은 홀로 폭렬 마법을 습득하기 위해 공부에 …"},"A0326":{"t":"토라도라!","type":"애니","img":"https://image.tmdb.org/t/p/w500/du2HNKZhQEMvaNF8S3afWg1AIDq.jpg","status":"방영 종료","summary":"벚꽃 흩날리는 4월. 고교 2학년의 신학기.\n\n눈매는 사납지만 의외로 평범한 학생인 타카스 류지는 조그마한 주제에 성격은 포악해 ‘미니 타이거’라고 불리며 모두에게 두려움의 대상이 되고 있는 아이사카 타이가와 같은 반이 된다.\n\n그리고 그날 밤, 절대 알아서는 안 되는 그녀의 비밀을 알게 되는데… 그것이 바로 용호상박의 싸움과 사랑의 시작이었다!\n\n그리고 늘 밝게 웃는 얼굴이지만 지나칠 정도…"},"A0327":{"t":"도우미 여우 센코 씨","type":"애니","img":"https://image.tmdb.org/t/p/w500/4pdyOLqy1fBktuxKstmRSiiCPgD.jpg","status":"공개 예정","summary":"악덕 기업에 다니는 나카노는 매일 늦게 퇴근해 집에서 잠만 자고 다시 회사로 향하는 반복된 일상에 지쳐있다.  그런 나카노의 앞에 나타난 것이 바로 여우 신선인 센코였다. 센코는 식사, 빨래 등 가사전반을 도와주며 피곤에 찌든 나카노에게 행복함을 느끼게 해주려 하는데...\n\n갑자기 시작된 센코 씨와 나카노의 동거. 현대사회의 지친 모든 이들을 치유하기 위한, 보살핌과 응석 어린 코미디가 시작…"},"A0328":{"t":"좋아하는 애가 안경을 깜박했다","type":"애니","img":"https://image.tmdb.org/t/p/w500/mtJMBaHBuFwKBvU9J61wTM1IiXN.jpg","status":"방영 종료","summary":"이 사랑은, 맨눈으로 바라보는 거리에서 시작되었다.\n\n살짝 소심한 남자 중학생인 코무라는,\n\n옆자리의 안경 낀 여자아이인 미에를 좋아하고 있었다.\n\n저 두꺼운 안경알 너머라도 좋으니 미에가 예쁜 눈으로 자신을 바라봐줬으면 하면서.\n\n알 수 없는 매력을 가진 미에에게 끌리면서도 코무라는 그녀에게 말 한번 걸어보지 못하는 나날을 보내고 있었다.\n\n그런데 미에는 툭하면 안경 끼는 걸 깜박하는 덜렁…"},"A0329":{"t":"마오","type":"애니","img":"https://image.tmdb.org/t/p/w500/AiUrQPK29pS0Eox94ogIzwmizmH.jpg","status":"방영 중","summary":"다이쇼 시대를 살아가는 청년, 마오. '저주'에 의해 900년을 살아온 미스터리한 음양사.\n\n레이와 시대를 살아가는 소녀, 키바 나노카. 어렸을 때 가족과 사고를 당해 혼자 살아남은 아이.\n\n어느 날, 사고 현장인 상점가의 문을 통과한 나노카는 요괴들로 가득한 다이쇼 시대에 흘러들고 만다.\n\n그곳에서 마오를 만난 나노카는...\n\n\"너, 요괴지?\"\n\n마오의 말에 자신의 몸에 일어난 변화를 눈치…"},"A0330":{"t":"히토리 봇치의 ○○생활","type":"애니","img":"https://image.tmdb.org/t/p/w500/vbVI8HoClVxFZZsG0Ck3CtdQOGQ.jpg","status":"방영 종료","summary":"심각한 대인기피증을 갖고 있는 소녀 히토리 봇치는 유일한 친구였던 야와라 카이와 다른 중학교에 진학하게 되고. 그런 그녀를 걱정한 카이로부터 봇치가 새 학급의 전원과 친구가 될 때까지 절교하겠다는 말을 듣는다. 결국 봇치는 앞자리에 앉는 스나오 나코부터 한 명씩 친구를 늘리기 위해 고군분투해가기 시작하는데......."},"A0331":{"t":"목소리의 형태","type":"애니","img":"https://image.tmdb.org/t/p/w500/aUF10sSW5OVfpK6Ma3vJYd3Tp3A.jpg","status":"개봉","summary":"따분한 게 질색인 아이, 이시다 쇼야.  간디가 어떤 사람인지, 인류의 진화과정이라든지, 알게뭐람.  어느 날 쇼야의 따분함을 앗아갈 전학생이 나타났다. 니시미야 쇼코. 그 아이는 귀가 들리지 않는다고 한다.  쇼야의 짓궂은 장난에도 늘, 생글생글 웃고만 있다. 짜증난다.  그의 괴롭힘에 쇼코는 결국 전학을 갔고, 이시다 쇼야는 외톨이가 되었다.  6년 후, 더 이상 이렇게 살아봐야 의미가 …"},"A0332":{"t":"드래곤 길들이기","type":"애니","img":"https://image.tmdb.org/t/p/w500/5JtTkNwOeztwfCPv965e9bZi6G3.jpg","status":"개봉","summary":"바이킹의 세계, 절대 친구가 될 수 없는 둘이 만났다?  용맹한 바이킹과 사나운 드래곤들의 싸움이 끊이지 않는 버크섬.  바이킹 족장의 아들 ‘히컵’은 드래곤 사냥에 소질 없는 마을의 사고뭉치. 어느날 그는 부상 당한 드래곤 ‘투슬리스’를 구하게 되고, 아무도 몰래 그를 돌본다. 서로를 알아가며, 드래곤들의 친구가 된 ‘히컵’. 그들과의 새로운 생활을 만끽하던 ‘히컵’은 드래곤들의 위험한 비…"},"A0333":{"t":"달이 이끄는 이세계 여행","type":"애니","img":"https://image.tmdb.org/t/p/w500/2I0OZm8DlVDJ9ade9MrtkGBvEzM.jpg","status":"방영 중","summary":"평범한 고등학생이었던 미스미 마코토는 어떤 사정으로 인해 용사로서 이세계에 소환당했다. 하지만 그 세계의 여신에게 '얼굴이 못생겼다'라는 말과 함께 용사의 칭호를 즉시 박탈당하고 세상의 끝에 있는 황무지로 날려 보내지고 말았다. 황무지를 방황하던 마코토가 만난 건, 용과 거미, 오크와 드워프... 인간이 아닌 다양한 종족들. 원래 살던 세계와는 환경이 다른 덕분에 마술이나 전투에 대해선 엄청…"},"A0334":{"t":"외톨이 THE ROCK!","type":"애니","img":"https://image.tmdb.org/t/p/w500/8UK89vv2iOQOmX3mKL0FhuhoPdR.jpg","status":"방영 중","summary":"동영상 투고 사이트에서 평판이 자자한 기타리스트 고토 히토리는 기타밖에 모르는 외로운 소녀였다. 어느 날, 기타리스트를 찾고 있던 이지치 니지카를 만나 그녀의 밴드 '결속 밴드'에 가입한 히토리는 새로운 세계에 발을 들이게 되는데…"},"A0335":{"t":"유희왕 듀얼몬스터즈 GX","type":"애니","img":"https://image.tmdb.org/t/p/w500/y2omj7iTgJlztvfAxkeBNKdK5NS.jpg","status":"방영 종료","summary":"듀얼 아카데미라는 듀얼학교에서 벌어지는 이야기를 그린 애니메이션"},"A0336":{"t":"마왕성에서 잘 자요","type":"애니","img":"https://image.tmdb.org/t/p/w500/tzDdTDW1Eydzj48LVkYKzuYrnuI.jpg","status":"방영 종료","summary":"먼 옛날 인간과 마물이 뒤섞여 함께 존재했던 시대. 마왕은 인간 나라의 공주를 납치해 자신의 성에 유폐시켰다.\n\n납치된 스야리스 공주는 감옥 안에서 중얼거린다. '잠자는 것 말고는... 할 일이 없어' 몰래 감옥을 빠져나와서 더욱 쾌적한 숙면을 위해 마왕성을... 탐색?!\n\n자유로운 인질 공주가 마물들을 이리저리 휘두르며 종횡무진!!"},"A0337":{"t":"이웃집 토토로","type":"애니","img":"https://image.tmdb.org/t/p/w500/c9zCkL0rTkNQ1HB9cmeFIqbkS50.jpg","status":"개봉","summary":"1955년 일본의 아름다운 시골 마을, 상냥하고 의젓한 11살 사츠키와 장난꾸러기에 호기심 많은 4살의 메이 는 사이좋은 자매로 아빠와 함께 도시를 떠나 시골로 이사온다. 자상한 아빠 쿠사카베타츠오는 도쿄에서 대학 연구원이며, 입원 중이지만 따뜻한 미소를 잃지 않는 엄마가 있다. 곧 퇴원하실 엄마를 공기가 맑은 곳에서 맞이하기 위해서다. 숲 한복판에 금방이라도 쓰러질 것처럼 낡은 집을 보며 …"},"A0338":{"t":"인크레더블 2","type":"애니","img":"https://image.tmdb.org/t/p/w500/qGmgOmeN8AQX5LwrAVaatwWffDs.jpg","status":"개봉","summary":"슈퍼맘 헬렌이 국민 히어로 일라스티걸로 활약하며 세상의 주목을 받자 바쁜 아내의 몫까지 집안일을 하기 위해 육아휴직을 낸 아빠 밥은 질풍노도 시기의 딸 바이올렛, 자기애가 넘치는 아들 대쉬, 어마무시한 능력을 시도때도 없이 방출하는 막내 잭잭까지 전담하며 전쟁같은 하루하루를 보낸다. 그러던 어느 날, 각자의 위치에서 바쁜 일상을 보내던 슈퍼파워 가족 앞에 새로운 악당이 나타났다. 다시 한번 …"},"A0339":{"t":"미래소년 코난","type":"애니","img":"https://image.tmdb.org/t/p/w500/eke6KkE2c9QZzcxxSC2khho5TWg.jpg","status":"방영 종료","summary":"2008년 7월, 지구에서 핵무기를 능가하는 초자력무기를 이용한 대규모 전쟁이 일어나 5개의 대륙 대다수가 바다에 가라앉고 문명도 멸망해 인류는 소수만이 살아남는다. 그 중 일부가 우주선으로 지구를 탈출하려다가, 선체가 망가져 비행능력이 상실되어, 다시 지구로 떨어져 '홀로 남은 섬'에 불시착하게 된다. '홀로 남은 섬'에 정착한 이후 태어난 아이가 '코난'이며, 시간이 흘러 한명씩 죽고 결…"},"A0340":{"t":"소년탐정 김전일","type":"애니","img":"https://image.tmdb.org/t/p/w500/hmQoLcqTmpxJpr8Uz8S6j5VnhyL.jpg","status":"방영 종료","summary":"킨다이치 코스케의 손자인 고등학생 탐정 김전일의 이야기"},"A0341":{"t":"켄간 아슈라","type":"애니","img":"https://image.tmdb.org/t/p/w500/yB8e1BnzrXoPbxfi3GnUgjCiN41.jpg","status":"방영 종료","summary":"기업 간의 분쟁을 맨몸의 승부로 해결한다. 그 비밀스러운 세계로 들어간 도키타 오마. 하지만 도키타가 원하는 건 돈이 아니다. 단지 싸우고 싶을 뿐. 그는 승리를 갈망한다."},"A0342":{"t":"변변찮은 마술강사와 금기교전","type":"애니","img":"https://image.tmdb.org/t/p/w500/drBuXuI6D7d7n0YntzTmLafQPJf.jpg","status":"방영 종료","summary":"일 년간 백수생활을 하던 청년 글렌은 집주인이자 마술학원 교수인 세리카의 명령으로 어쩔 수 없이 마술학원의 계약직 강사가 된다. 처음에는 잘리고 싶다는 마음에 엉터리 수업을 하던 그였지만, 학생 중 한 명인 루미아의 노력하는 모습을 보고 조금씩 제대로 된 선생님으로 변해간다. 그러던 중, 정부와 대립하고 있던 마술결사가 학원을 습격해오게 되는데…."},"A0343":{"t":"忍者ハットリくん","type":"애니","img":"https://image.tmdb.org/t/p/w500/9PUkpvq0wJnJ2M00dtgxKn6LptB.jpg","status":"방영 종료","summary":""},"A0344":{"t":"전생했더니 슬라임이었던 건에 대하여: 전생슬라임 일기","type":"애니","img":"https://image.tmdb.org/t/p/w500/kCrtgFpl3EOCFKOGttPO3rKFDs9.jpg","status":"방영 종료","summary":"멋진 슬라임 인생!\n\n'귀한 종이가 손에 들어와서 나의 지금까지를 일기로 쓰기로 했다.\n\n서두는 이렇게 할까... '전생했더니 슬라임이었다'.\n\n거기서부터 내 모험이, 모험..이?'\n\n장난기가 많고 유머러스한 리무루와 템페스트에 살고 있는 동료 마물들의 일상을 아낌없이 그려낸 '슬라임 계열'\n\n전생 엔터테인먼트!..."},"A0345":{"t":"쓰르라미 울 적에","type":"애니","img":"https://image.tmdb.org/t/p/w500/baQ5KyJTxZKRwaerXpfzmND69px.jpg","status":"방영 종료","summary":"도심에서 멀리 떨어져 울창한 자연에 둘러싸인 마을 히나미자와.\n\n한때, 댐 밑으로 가라앉을 예정이었던 마을은 지금도 여전히 예전과 다름없는 모습으로 전학생 마에바라 케이이치를 맞이한다.\n\n도시에서 살다 온 케이이치에게 히나미자와의 친구들과 보내는 활기차고 평화로운 일상은 언제까지고 계속될 행복한 시간일 터였다.\n\n1년에 한 번 시행되는 마을의 축제, 와타나가시. 그날이 오기 전까지는...\n\n…"},"A0346":{"t":"사무라이 참프루","type":"애니","img":"https://image.tmdb.org/t/p/w500/gLFshfLjPIlY0f6LeCZyv8PDl6V.jpg","status":"방영 종료","summary":"2004년 5월 Fuji TV에서 방영을 시작한 애니메이션. 에도 시대의 어느 날 요코하마에서 후우는 아르바이트를 하고 있었다. 그러던 중 권력을 쥔 아버지를 등에 업고 행패를 부리는 망나니가 후우가 일하는 가게에서 난동을 피운다. 이 때 무겐이 나타나 후우를 도와주고 망나니 패거리를 패던 중 진이 가게에 들어선다.  무겐은 진이 망나니 패거리 중 한 명이라고 생각하여 공격하지만 진과 무겐은…"},"A0347":{"t":"중2병이라도 사랑이 하고 싶어!","type":"애니","img":"https://image.tmdb.org/t/p/w500/9zxAbEGqVMJ5D6ZxEmhgjnRMTtz.jpg","status":"방영 종료","summary":"예전에 중2병을 앓았던 토가시 유타는 중학졸업과 동시에 중2병을 청산하고 고등학교에 올라오면서 새로운 삶을 살기로 결심 한다. 그런 유타 앞에 나타난 현역 중2병 환자 안대 소녀 릿카.\n\n유타는 어떤 사건을 계기로 반 친구인 타카나시 릿카와 강제적으로 계약을 맺게 된다. 교실에서도 항상 안대를 하고 있는 릿카는 유치찬란 오글거리는 대사를 유타 앞에서 읊는다. 이런 릿카의 말과 행동에 유타는 …"},"A0348":{"t":"극주부도","type":"애니","img":"https://image.tmdb.org/t/p/w500/lhMchAa3yhnIZO2D8hTMPJL0fRy.jpg","status":"방영 종료","summary":"지금 내가 관리하는 구역은 사랑하는 나의 가족이다. 한때는 ‘불사신 다쓰’로 불리며 어둠의 세계를 평정하고 수많은 전설을 남긴 흉악한 야쿠자. 그가 이제는 전업주부의 길을 간다. 가슴 속에는 칼이 아닌 할인 쿠폰을 품고."},"A0349":{"t":"쿠보 양은 나를 내버려두지 않아","type":"애니","img":"https://image.tmdb.org/t/p/w500/kejiJQxe1SQiiv7PImAbjQHf8L.jpg","status":"방영 종료","summary":"고등학교 1학년인 시라이시 준타에게는 누구도 흉내 낼 수 없는 성질을 가지고 있었다.\n\n바로 옆에 있어도 눈치채지 못하고 매일 출석해도 결석했다고 오해받는 등,\n\n그는 존재감이 제로인 '병풍' 남자였다.\n\n그래도 그 나름대로 얌전한 학교 생활을 보내고 있었지만, 약간 성가진 점이 하나 있었다.\n\n놀랍게도 같은 반의 '여주인공' 미소녀인 쿠보만이 그를 찾아내서 귀찮게 군다는 것이었다.  특별해…"},"A0350":{"t":"소드 아트 온라인 얼터너티브 건 게일 온라인","type":"애니","img":"https://image.tmdb.org/t/p/w500/s2j88mY08Ptl71TwbfwfDWvesvr.jpg","status":"방영 종료","summary":"총과 강철의 세계 '건게일 온라인'에서 솔로 플레이를 만끽하던 여성 플레이어 렌. 귀여운 걸 좋아해 분홍색 의상으로만 꾸민 렌은 꾸준하게 플레이하면서 실력을 쌓아갔다. 그러다 PK 플레이에 재미를 느낀 렌은 아름답고 미스터리한 플레이어인 피토휘를 만나 함께 팀 대항 이벤트인 스쿼드 잼에 참가하기로 한다...."},"A0351":{"t":"사이키 쿠스오의 재난","type":"애니","img":"https://image.tmdb.org/t/p/w500/hqOIldYJTq8eI1APi4tx4rZuiHe.jpg","status":"방영 종료","summary":"고등학교 2학년 사이키 쿠스오는 초능력자다. 그것도 사흘만에 지구를 멸망시킬 수 있을만큼 강력한 힘을 지녔다.\n\n때문에 세상 사는 재미라고는 하나도 없었고, 그저 평범한 고교생인 척 위장하고 주변 사람들을 속이며 하루하루를 보내고 있다.\n\n그런 사이키 쿠스오에게 어느날 친한 척 다가오는 사람이 생긴다. 하나는 바보요 또 하나는 중2병 환자... 덕분에 조용히 살고 싶다는 사이키 쿠스오의 바람…"},"A0352":{"t":"환생했는데 제7왕자라 내맘대로 마술을 연마합니다","type":"애니","img":"https://image.tmdb.org/t/p/w500/6sU4RJN7UUKM5vUNBQpFXPTEE14.jpg","status":"방영 종료","summary":"마술에 중요한 것은 '가문', '재능', '노력'... 마술을 깊이 사랑하지만, 핏줄과 재능을 타고나지 못해 비참하게 죽은 마술사. 죽기 직전에 '마술을 더 연마하고, 배우고 싶었다'고 생각한 남자는 마술 혈통이 강한 살룸 왕국의 제7왕자 로이드로 환생한다. 과거의 기억을 가진 채로 완벽한 핏줄과 재능을 갖추고 다시 태어난 그는 전생에서는 이루지 못한 것을 이루기 위해 엄청난 마력으로 '내맘…"},"A0353":{"t":"괴물사변","type":"애니","img":"https://image.tmdb.org/t/p/w500/ybhaeb88rbHoGgOWaznaV0JAqQ9.jpg","status":"방영 종료","summary":"예로부터 이 세상의 그림자에 숨어들어 사람들의 눈에 띄지 않으면서,\n\n사람들과 관계되어 살아가는 괴물이라는 존재.\n\n그들 중 대다수는 인간 세상에 적응해 사회 속에 섞여들어 살고 있다.\n\n하지만 현대에는 인간과 필요 이상으로\n\n깊게 관계를 맺으려 하는 경우가 다수 보고되는 상황.\n\n탐정사무소를 운영하는 이누가미는 그런 괴물들이 일으키는\n\n정체불명의 사건들 중 하나를 추적해 어느 시골 마을에 …"},"A0354":{"t":"슬라임을 잡으면서 300년, 모르는 사이에 레벨 MAX가 되었습니다","type":"애니","img":"https://image.tmdb.org/t/p/w500/AqCNaQ13kzij0RY54dvUOi1av4z.jpg","status":"방영 종료","summary":"현대 일본에서 가혹한 사축 생활 중 과로사한 아이자와 아즈사(相沢梓. 27세)는, 일만하다 죽은 인생이 불쌍하다며\n\n\"내세에서는 원하는 대로 할 수 있는 힘을 줄게요. 뭘 원하나요?\"라는 날개 달린 여성(아마도 신?)의 질문에 \"불로불사!\"라고 대답한다.\n\n다른 힘을 주겠다는 제안에도 그저 \"소금 등 필수품은 필요하니 마을과 그리 멀지 않지만 한적한 산골에서 느긋하게 자급자족하며 살고 싶다\"…"},"A0355":{"t":"이 소리에 모여!","type":"애니","img":"https://image.tmdb.org/t/p/w500/qpx359iP6h1kwxSLVhVJDCzdkii.jpg","status":"방영 종료","summary":"토키세 고교의 신입생인 쿠라타 타케조는 동아리 발표회에서 미숙한 실력임에도 너무나도 즐겁게 고토를 연주하는 선배들의 모습에 감화되어 소쿄쿠 부에 입부한다.\n\n그러나 1년이 지난 후 선배들이 졸업하자 동아리에 혼자만 남게 된 타케조. 설상가상으로 불량학생들이 부실을 점거하고 아지트처럼 사용하고 있는 상황이 되었다. 5명 이상의 부원을 모으지 못하면 폐부되는 상황에서 타케조는 열심히 부원을 모집…"},"A0356":{"t":"개구리 중사 케로로","type":"애니","img":"https://image.tmdb.org/t/p/w500/6Br7tLfECdcFHYlKcPAMY7RWCTs.jpg","status":"방영 종료","summary":"퍼렁별 침략을 위해 찾아온 개구리 우주인의 이야기"},"A0357":{"t":"단간론파 희망의 학원과 절망의 고교생","type":"애니","img":"https://image.tmdb.org/t/p/w500/cGR9NBOUNVI9UwMU9Urd2yAJJxd.jpg","status":"방영 종료","summary":"전국으로부터 스포츠나 학문은 물론이고 갬블, 점술, 프로그래밍 등 각종 분야의 초고교급 재능을 가진 소수의 학생들을 선발해 교육하는 특수고교에 초고교급 행운이란 명목으로 추첨을 통해 입학한 소년 나에기 마코토. 첫 등교날 그는 다른 신입생들과 함께 학교 내부에 감금을 당하고, 어디선가 나타난 정체불명의 기계 곰 모노쿠마의 명령에 따라 서로를 죽인 뒤 범인을 추리해내야 하는 살인게임을 강요받는…"},"A0358":{"t":"역전재판","type":"애니","img":"https://image.tmdb.org/t/p/w500/4yDFJ0VU1X8i8jeIjqnK70tZ211.jpg","status":"방영 종료","summary":"새내기 변호사 나루호도 류이치는 처음 법정에서 갑자기 살인 사건을 다루게 된다. 의뢰인이자 초등 학교 단짝 arMYxTw1uStEluCaFnmUqoK7gx.jpg","status":"방영 중","summary":"이세계로 전생한 주인공 아르스 로벤트는, 작은 영지를 가지고 있는 약소 귀족 가문의 아이로 살게 되었다. 아르스에게 특별한 지력이나 무력은 없었으나, 태어나면서부터 다른 사람의 능력, 즉 스테이터스를 꿰뚫어 보는 '감정 스킬'을 가지고 있었다. 그 스킬을 활용해 세상에 잠들어 있는 '인재'를 발굴해, 약소 영지에서부터 최강의 영지로 변모시켜 나간다. 상냥한 아르스와, 개성 넘치는 인재들의 만…"},"A0366":{"t":"변경의 팔라딘","type":"애니","img":"https://image.tmdb.org/t/p/w500/rMQtHJKigcpdDENKJ7bzUmgfIlj.jpg","status":"방영 종료","summary":"일찍이 멸망한 죽은 자의 거리- 외딴 이 땅에 살아있는 아이, 윌이 있었다. 소년을 키우는 것은 세 명의 불사자(언데드). 호쾌한 해골검사인 브래드, 정숙한 신관 미라 마리, 괴팍한 유령 마법사 가스. 그들 세 사람에게 가름침을 받고, 사랑을 받으며 소년은 자랄 수 있었다. 그러던 어느 날 소년은 한 가지 의심을 품는다. “…’.나’는, 대체 누구일까?” 윌에 의해 밝혀지는 땅 끝의 거리에 …"},"A0367":{"t":"니세코이","type":"애니","img":"https://image.tmdb.org/t/p/w500/n16Ft1f7mXEWLTFIKlK8aoIwsti.jpg","status":"방영 종료","summary":"야쿠자의 후계자지만 지극히 평범한 고교생 이치죠 라쿠.\n\n그런 그 앞에 나타난 미소녀 전학생, 키리사키 치토게.\n\n툭하면 싸우며 하나에서 열까지 으르렁대는 두 사람.\n\n하지만 어떤 사정으로 인해 두 사람은 연인인 척 연기해야할 처지에 놓이는데...?!"},"A0368":{"t":"이세계에서 치트 스킬을 얻은 나는 현실 세계에서도 무쌍한다~레벨업이 인생을 바꿨다~","type":"애니","img":"https://image.tmdb.org/t/p/w500/5NSAqp89A0UhiNjkAFBpLNi1Czy.jpg","status":"방영 중","summary":"주인공인 '텐조 유야'는 옛날부터 왕따였다.\n\n그는 아주 좋아했던 할아버지의 댁에서 혼자 생활하면서 고등학교에 다니고 있었다.  평소처럼 극심한 괴롭힘을 당하면서도 고등학교를 다니던 그는 얼마 안 되는 치유의 시간인 방학을 맞이한다.\n\n그리고 방학을 이용하여 할아버지의 집을 청소하고 있을 때,  할아버지가 수집했던 것을 정리하려고 했더니 벽에서 뚫린 것 같은 문이 있었다.  호기심으로 그 문…"},"A0369":{"t":"『チェンソーマン』9 巻発売記念スペシャルPV","type":"애니","img":"https://image.tmdb.org/t/p/w500/suv3m9ZAJf4rIWDGjN3amQpJRzj.jpg","status":"개봉","summary":""},"A0370":{"t":"그대들은 어떻게 살 것인가","type":"애니","img":"https://image.tmdb.org/t/p/w500/bzEpxah8vLNzPDrvswwgJ9rZQGX.jpg","status":"개봉","summary":"화재로 어머니를 잃은 11살 소년 ‘마히토’는 아버지와 함께 어머니의 고향으로 간다. 어머니에 대한 그리움과 새로운 보금자리에 적응하느라 힘들어하던 ‘마히토’ 앞에 정체를 알 수 없는 왜가리 한 마리가 나타나고, 저택에서 일하는 일곱 할멈으로부터 왜가리가 살고 있는 탑에 대한 신비로운 이야기를 듣게 된다. 그러던 어느 날, ‘마히토’는 사라져버린 새엄마 ‘나츠코’를 찾기 위해 탑으로 들어가고…"},"A0371":{"t":"마녀배달부 키키","type":"애니","img":"https://image.tmdb.org/t/p/w500/yEbyzK1cLDoZVIJV6auSr9yN5fG.jpg","status":"개봉","summary":"마녀 엄마와 인간 아빠 사이에서 태어난 소녀 키키는 ummary":"성질은 드래곤도 피해간다고 할 정도로 더럽지만, 실력만큼은 자타가 공인할 정도로 훌륭한 여마도사 리나 인버스. 어느날 그녀는 도둑에게는 인권은 없다하며 도둑을 소탕하고 있었다. 그런 와중 거기를 때마침 지나가던 빛의 검을 사용하는 금발의 미남 검사 가우리 가브리예프가 그 모습을 보게 된다. 그는 리나가 도적떼에게 당하고 있다고 착각하고는 그녀를 돕게 된다. 이것을 인연으로 둘은 동료가 되어서…"},"A0390":{"t":"페이트 / 스테이 나이트","type":"애니","img":"https://image.tmdb.org/t/p/w500/fMHGRLeV7ZbgF0jqTh9MtzIQksN.jpg","status":"방영 종료","summary":"˝성배를 얻기 위한 7팀의 치열한 전쟁! 과연 최후의 승자는?˝\n\n원하는 것을 모두 실현 시켜준다는 성배. 하지만, 성배를 얻기 위해서는 마술사인 ‘마스터’와 전투사인 ‘서번트’가 한 팀이 되어 이라고 불리는 전투를 해야만 한다. 마술능력은 거의 제로에 가까운 고교생 에미야 시로는 어느날 우연히 서번트들의 대결현장을 목격하여 위기에 처한다. 그때 갑자기 나타나 시로를 구해주는 금발의 미소녀 …"},"A0391":{"t":"갑철성의 카바네리","type":"애니","img":"https://image.tmdb.org/t/p/w500/c91ho10T3N5letfV4g1fMJzVFxz.jpg","status":"방영 종료","summary":"산업혁명과 함께 세상이 근세에서 근대로 넘어가던 무렵. 인류 앞에 불사의 괴물 카바네가 돌연 등장한다. 카바네에 물린 인간은 뇌가 감염돼 새로운 카바네가 되는 상황. 창궐해 가는 이 괴물을 죽일 방법은 강철 심장을 꿰뚫는 것뿐."},"A0392":{"t":"테라포마스","type":"애니","img":"https://image.tmdb.org/t/p/w500/4EUYrzfIibhyqZG0FxXmd6xSqK2.jpg","status":"방영 종료","summary":"서기 2099년에 인류가 화성을 테라포밍한다는 계획을 세운다. 테라포밍을 하는 수많은 방법들 중에서 선택한 것이 화성에 대량의 이끼와 바퀴벌레를 풀어놓는다는 것. 이끼는 광합성으로 산소를 형성시키며, 바퀴벌레는 이끼를 먹고 자라고, 바퀴벌레의 검은색으로 태양열을 흡수하여 화성의 기온을 상승시켜 지각에 있는 이산화탄소를 용출시켜 온실효과를 일으킨다는 계획이었다.\n\n그리고 500년이 흐른 257…"},"A0393":{"t":"작안의 샤나","type":"애니","img":"https://image.tmdb.org/t/p/w500/1V98igFU3su5VEXvcCNMd2JuLAD.jpg","status":"방영 종료","summary":"‘무리’의 이상향 ‘재너두’ 창조를 둘러싸고, ‘제례의 뱀’의 대행체 사카이 유지와 플레임헤이즈 ‘염발작안의 토벌자’ 샤나가 칼을 맞댄다.\n\n그리고 그 속에서 호박색의 바람이 불었다.\n\n요시다 카즈미가 보구 ‘히랄다’에게 기도한 마음을 받아들인 ‘채색의 회오리’ 피레스가 전장에 나타난다.\n\n일대 결전의 무대가 된 미사키 시는 이 사건과 함께 격동의 종막으로 향한다.\n\n피레스를 부른 요시다.\n…"},"A0394":{"t":"이세계 약국","type":"애니","img":"https://image.tmdb.org/t/p/w500/m2VBaxNRJ5SeDWegISpza1CgRTt.jpg","status":"방영 종료","summary":"현대 일본의 약학 연구자였던 야쿠타니 칸지는 어느 날 눈을 떠보니, 궁정 약사 명가, 드 메디시스 가문의 팔마 드 메디시스로 환생해 있었다. 팔마는 잘못된 치료법이나 약의 조합, 의료 행위라 부를 수 없는 주술이나 주문 같은 것이 남용되는 이 세계의 의료 현실에 절망했다. 이에 전생에서 얻은 현대 약학 지식에 더해 이세계에서 손에 넣은 치트 능력 '물질 창조 & 물질 소거', 귀족들만 사용할…"},"A0395":{"t":"타코피의 원죄","type":"애니","img":"https://image.tmdb.org/t/p/w500/dvNp6oTEibwrPpyOmTr1zNdnXyj.jpg","status":"방영 종료","summary":"행복을 전파하기 위해 지구에 내려온 해피성인의 타코피는 인간 여자아이인 시즈카와 만났다. 위기인 가운데 시즈카가 자신을 구해주자, 타코피는 그녀의 미소를 되찾기 위해 수수께끼의 힘을 가진 해피 도구를 사용해 분주히 움직였다. 하지만 시즈카는 집과 학교에서 어떤 사정이 있는 모양이었고... 이것은, 나와 너의 최고로 해피한 이야기."},"A0396":{"t":"카케구루이","type":"애니","img":"https://image.tmdb.org/t/p/w500/8nP1aFHa2QZbyvl4J5p4kK5HOVw.jpg","status":"방영 종료","summary":"도박 능력으로 학생을 평가하는 '햣카오학원'. 도박광 전학생 쟈바미 유메코가 학교를 평정하러 출사표를 던진다."},"A0397":{"t":"아오하라이드","type":"애니","img":"https://image.tmdb.org/t/p/w500/4mQQK8V5Hx8HzuCeu80aQOcwJK2.jpg","status":"방영 종료","summary":"처음으로 좋아했던 남자아이, 코우. 그러나 이 사랑은 코우의 갑작스런 전학과 함께 끝나버렸다. 그 후로 몇 년이 지난 지금, 후타바는 첫사랑과 재회하게 되는데... 목소리와 키, 이름마저 바뀌어버린 그였지만 후타바는 다시 마음이 두근거리기 시작한다."},"A0398":{"t":"죠죠의 기묘한 모험 (OVA)","type":"애니","img":"https://image.tmdb.org/t/p/w500/thyLlWU5CyenrPxKunztZFwfZE1.jpg","status":"방영 종료","summary":"죠죠의 기묘한 모험 Part 3 스타더스트 크루세이더즈를 베이스로 만든 OVA.\n\n죠죠의 기묘한 모험 시리즈 최초의 애니메이션으로, 원작 연재 7년 만에 만들어졌다. OVA 1과 2가 대략 7년 간격으로 두고 발표되었다."},"A0399":{"t":"불꽃 소방대","type":"애니","img":"https://image.tmdb.org/t/p/w500/eDoqgCOBc7leLpxMKBfu5xP3WIf.jpg","status":"방영 종료","summary":"인류는 공포에 휩싸여 있었다…. 방금 전까지 멀쩡하던 사람이 갑자기 불타올라 불꽃 괴물 '화염인간'이 되어 파괴의 끝을 달리는 '인체 발화 현상'.  불의 공포에 맞서는 특수 소방대는 그 현상의 수수께끼를 풀고, 인류를 구하는 것이 사명! 어떤 이유로 인해 악마라 불리는 신입대원 소년 신라는 히어로를 목표로 동료들과 함께 '화염인간'과의 대결의 나날에 몸을 던진다!!"},"A0400":{"t":"공각기동대","type":"애니","img":"https://image.tmdb.org/t/p/w500/piOTBFKd67p3ASodBjq5eOT8c4I.jpg","status":"개봉","summary":"때는 서기 2029년, 아시아의 뉴포트라는 도시. 인간의 뇌도 통신 네트워크의 일부가 된 사회에서 가장 극악한 범죄는 고스트 해킹이다. 인간의 정체성을 규명하는 광의의 영혼을 뜻하는 고스트를 해킹해 타인의 기억 등을 조작하고 변경시키는 것. 인형사라 불리는 정체불명의 악명 높은 고스트 해커가 유럽에서 뉴포트로 주활동 무대를 옮겼다는 소식이 들린다. 이를 막기 위해 외교상 일어나는 국제범죄, …"},"A0401":{"t":"드래곤볼 Z KAI","type":"애니","img":"https://image.tmdb.org/t/p/w500/yh11eNQyZOgZLMEW7llKYQ0oGcJ.jpg","status":"방영 종료","summary":"드래곤볼 카이(改)(일본어: ドラゴンボール改)는 토리야마 아키라의 만화인 드래곤볼을 원작으로 한 TV판 애니메이션이다. 초기 시리즈인 드래곤볼 이후의 스토리를 그리고있다\n\n변화점으로는 Z 방영 당시의 늘어지는 전개와 불필요한 각본 등을 잘라내고, 보다 원작의 빠른 전개에 가까운 구성으로 바꾸었으며, 화면 상의 비율을 위아래를 잘라내어 16:9로 맞추었으며, 성우들의 재녹음도 이루어졌다. 극소…"},"A0402":{"t":"극장판 주술회전 0","type":"애니","img":"https://image.tmdb.org/t/p/w500/gHcga1wgDD4MAeApoOM7yDn9BOq.jpg","status":"개봉","summary":"어린 시절, 소꿉친구인 오리모토 리카를 교통사고로 눈 앞에서 잃은 옷코츠 유타. 옷코츠는 원령으로 변한 리카의 저주에 괴로워한 나머지 자신도 죽기를 바라지만, 최강의 주술사인 고죠 사토루에 의해 주술고전에 들어가게 된다. 그리고 동급생인 젠인 마키, 이누마키 토게, 판다를 만나면서 굳은 결심을 한다. 한편 옷코츠와 친구들 앞에 과거에 일반인을 대량으로 학살해서 고전에서 추방된 최악의 주저사인…"},"A0403":{"t":"학교괴담","type":"애니","img":"https://image.tmdb.org/t/p/w500/mNGS7SkmoNY00hQz3PiLui9mYpR.jpg","status":"방영 종료","summary":"낡은 학교 교사를 배경으로 초등학교 4학년 소년 소녀들이 벌이는 등골 오싹한 퇴마 사투를 다룬 어린이 호러물"},"A0404":{"t":"스즈메의 문단속","type":"애니","img":"https://image.tmdb.org/t/p/w500/95cnAy1nqjoEev1YkaXrSf0NDa1.jpg","status":"개봉","summary":"“이 근처에 폐허 없니? 문을 찾고 있어” 규슈의 한적한 마을에 살고 있는 소녀 ‘스즈메’는 문을 찾아 여행 중인 청년 ‘소타’를 만난다. 그의 뒤를 쫓아 산속 폐허에서 발견한 낡은 문. ‘스즈메’가 무언가에 이끌리듯 문을 열자 마을에 재난의 위기가 닥쳐오고 가문 대대로 문 너머의 재난을 봉인하는 ‘소타’를 도와 간신히 문을 닫는다. “닫아야만 하잖아요, 여기를!” 재난을 막았다는 안도감도 …"},"A0405":{"t":"페이트 스테이 나이트 헤븐즈필 제3장 스프링 송","type":"애니","img":"https://image.tmdb.org/t/p/w500/eKPSnszx2OvEVlJSwk2Zsjc6Ir0.jpg","status":"개봉","summary":"마술사 '마스터'와 영령 '서번트'가 모든 소원을 이뤄주는 '성배'를 둘러싸고 싸우는 '성배전쟁'. 하지만 그 싸움은 일그러져 있었다. 마토 사쿠라는 자신이 저지른 죄와 함께 마키리의 잔으로서 각성하여 깊은 어둠 속에 빠지고 말았다. 그런 사쿠라를 지키겠다고 맹세한 소년, 에미야 시로는 토오사카 린과 함께 사쿠라를 어둠 속에서 구하고 일그러진 '성배전쟁'을 끝내기 위해 자신의 몸을 돌보지 않…"},"A0406":{"t":"벼랑 위의 포뇨","type":"애니","img":"https://image.tmdb.org/t/p/w500/tGSuFBsqdXxIz3fTSBfsZU9FBMN.jpg","status":"개봉","summary":"호기심 많은 물고기 소녀 포뇨는 따분한 바다 생활에 싫증을 느끼고, 급기야 아빠 몰래 늘 동경하던 육지로 가출을 감행한다. 해파리를 타고 육지로 올라온 포뇨는 그물에 휩쓸려 유리병 속에 갇히는 위기에 처하게 된다. 때마침 해변가에 놀러 나온 소년 소스케의 도움으로 구출되는 포뇨. 이후 소스케가 마련해 준 초록 양동이에서 소스케와의 즐거운 육지 생활을 시작한다. 하지만 곧 바다의 주인이자 포뇨…"},"A0407":{"t":"사쿠라장의 애완 그녀","type":"애니","img":"https://image.tmdb.org/t/p/w500/6pV5QSSZNtHd3ONrJeMy4SCoVFE.jpg","status":"방영 종료","summary":"변태지만 애니 제작에 재능을 가진 카미이구사 미사키, 인기폭발 남고생 미타카 진, 자칭 29세 15개월 미술교사 센고쿠 치히로, 수수께끼의 컴퓨터 천재 아카사카 류노스케. 그들과 함께 살고 있는 평범한 남고생 칸다 소라타의 목표는 언젠간 이 사쿠라장을 탈출하는 것! 그런데 어느 날 귀여운 외모의 천재 화가 시이나 마시로가 사쿠라장에 들어오게 되고, 소라타에게 그녀의 “보모 역할”이 맡겨지는데…"},"A0408":{"t":"샤먼킹","type":"애니","img":"https://image.tmdb.org/t/p/w500/sSEatd1aiJvTcYHLKQ4qXcRgVU1.jpg","status":"방영 종료","summary":"일명 샤먼이라고 일컬어지는 영 능력자인 소년 아사쿠라 요우가 샤먼의 정상을 결정하는 싸움인 〈샤먼 파이트〉에 참가해, 전지 전능한 힘을 가진 샤먼킹이 되기 위한 싸움을 그린 이야기"},"A0409":{"t":"다!다!다!","type":"애니","img":"https://image.tmdb.org/t/p/w500/6bi0difjW6BHEbwHYkUdo820lGq.jpg","status":"방영 종료","summary":"외계인 아이 루다를 키우는 예나와 사춘기에 접어든 중학생 우주의 좌충우돌 이야기"},"A0410":{"t":"월간순정 노자키 군","type":"애니","img":"https://image.tmdb.org/t/p/w500/lXB9kLp9lAv5V1O7VspcyQEn1a7.jpg","status":"방영 종료","summary":"노자키를 좋아해왔던 사쿠라는 용기를 내서 자신의 마음을 고백한다. 그러나 사쿠라의 말의 의미를 잘못 받아들인 노자키는 자신의 필명이 적힌 사인을 선물하고 어시스턴트로서 그녀를 집으로 데려오는데..."},"A0411":{"t":"게게게의 키타로","type":"애니","img":"https://image.tmdb.org/t/p/w500/oBrVXQiHfaOcaet68lWoLJerfZE.jpg","status":"방영 종료","summary":"21세기가 시작된지도 20년 가까이 지나, 사람들의 기억 속에서 요괴의 존재가 지워져버린 현대. 과학적으론 증명할 수 없는 현상이 나타나고 유언비어가 떠도는 가운데, 이 상황을 해결하기 위해 요괴 우체통에 편지를 넣은 것은 13살 소녀인 마나였다. 그러자 마나의 앞에 달각 달그락 하는 소리를 내며 키타로가 등장했다!"},"A0412":{"t":"우에키의 법칙","type":"애니","img":"https://image.tmdb.org/t/p/w500/jvtYweoXcEBAjBzfhQ3de4znYRV.jpg","status":"방영 종료","summary":"간략한 줄거리는 중학교 1학년인 우에키가 신 후보 코바야시로부터 '쓰레기[2]를 나무로 바꾸는 능력'을 받아 자신의 정의를 관철하기 위해 싸우는 것.\n\n배틀이 일어나게 된 배경은 이러하다. 천계에서 차기 신(神)을 뽑기 위해 후보 백 명이 경합한다. 이들은 지상의 인간을 한 명씩 뽑아 한 가지 능력을 부여하고, 이런 능력자 백 명이 배틀을 벌여 최후의 승자를 가린다. 최후의 승자에겐 어떤 재…"},"A0413":{"t":"자동판매기로 다시 태어난 나는 미궁을 방랑한다","type":"애니","img":"https://image.tmdb.org/t/p/w500/eJHLRlkO7fi5qgZSYxNudXpbgvi.jpg","status":"방영 종료","summary":"교통사고에 휘말린 내가 전생한 건... 무려 '자동판매기'였다?!\n\n하얀 사각형 몸체에, 낼 수 있는 건 기계 음성뿐.\n\n스스로 움직이지도 못 하고 대화도 제대로 못 하는 위기 상황에서,\n\n전직 자동판매기 마니아로서의 뜨거운 서비스 정신에 불이 붙었다!\n\n콜라, 어묵, 컵라면 등등.\n\n이세계 주민들의 위장을 공략하는 가운데,\n\n풍부한 지식과 기발한 아이디어로 모험에도 참여하게 되었는데.\n\n전…"},"A0414":{"t":"소라의 날개","type":"애니","img":"https://image.tmdb.org/t/p/w500/xbMmUNEYJoPJ0WIyU4jOGfFBJnJ.jpg","status":"방영 종료","summary":"키가 149센티밖에 안 되는 고교 신입생 쿠루마타니 소라.\n\n전국대회에서 우승하겠다는 어머니와의 약속을 지키기 위해 농구부에 들어가고자 하지만.\n\n농구부를 자신들의 아지트로 삼고 있던 불량배 집단으로부터 이 학교에서 농구를 하는 건 포기하란 말을 듣는다.\n\n결국 소라는 농구부 입부를 걸고 그들과 5 대 1의 농구 대결을 벌이게 되는데..."},"A0415":{"t":"빛의 전사 프리큐어","type":"애니","img":"https://image.tmdb.org/t/p/w500/3K4iQs7LBOl6FBWCo4aWK0koYaR.jpg","status":"방영 종료","summary":"인간계의 여자와 마법계의 여자, 다른 세계의 두 사람이 우연히 만나 전설의 마법사 프리큐어가 탄생하게 되면서 일어나는 이야기를 그린 애니메이션"},"A0416":{"t":"남녀의 우정은 성립할까? (아니 하지 않아!!)","type":"애니","img":"https://image.tmdb.org/t/p/w500/74Oi8x6kwqgeDgfIgNVQwl9b0FT.jpg","status":"방영 종료","summary":"어느 시골의 중학교에서, 어떤 남녀가 영원한 우정을 맹세했다. 하나의 꿈을 향해 운명 공동체가 된 두 사람, 특별한 진전 없이 어느덧 2년이라는 세월이 지났다 아직도 첫사랑을 해보지 못한 인싸 여고생 이누즈카 히마리와, 꽃을 사랑하는 초식 남고생 나츠메 유우는 고등학교 2학년이 되어서도 변함없이 둘만의 원예부에서 평화롭게 친구로 지내고 있었다 그러나, 유우가 과거 첫사랑 상대와 재회하면서 돌…"},"A0417":{"t":"월레스와 그로밋: 양털 도둑","type":"애니","img":"https://image.tmdb.org/t/p/w500/qdIR27trLyrlJ5nmkbcG3Bomah6.jpg","status":"개봉","summary":"신문을 읽고 있던 그로밋은 월레스에게 신문을 보여주면서 걱정한다. 신문마다 양털이 부족한 사태로 떠들썩하고, 한편으론 양들이 계속 어디론가 실종되는 사건이 벌어지고 있는 것. 한편 그 즈음 부업으로 창문닦이 서비스를 하고 있던 월레스와 그로밋은 털실가게를 운영하는 웬돌린이라는 여인으로부터 가게의 쇼윈도우를 닦아달라는 요청을 받게 되고, 월레스는 웬돌린에게 한눈에 반해 버린다. 그리고 그녀의 …"},"A0418":{"t":"헬싱 얼티메이트","type":"애니","img":"https://image.tmdb.org/t/p/w500/fum0tvBuVVeofFoHI0IXHgrzKEa.jpg","status":"방영 종료","summary":"악의 세력으로부터 영국을 지켜라. 뱀파이어의 흑막을 파악해 제거에 나서는 헬싱 기관의 당주 인테그라. 뱀파이어를 절멸하리라, 뱀파이어 잡는 뱀파이어 아카드와 함께!"},"A0419":{"t":"전수.","type":"애니","img":"https://image.tmdb.org/t/p/w500/yi4h50uaTMA5DNAd6pSC8fn6tbc.jpg","status":"방영 종료","summary":"히로세 나츠코는 고등학교 졸업 후 애니메이터가 되어 재능을 꽃피우며 순식간에 감독으로 데뷔했다. 처음으로 감독을 맡은 작품은 사회현상이 될 정도로 대히트했다. 신진기예의 천재 감독으로 세간에서도 인정받아 다음 작품은 첫사랑을 주제로 한 극장 상영 러브 코미디 작품으로 결정! 하지만, 사람을 좋아해 본 적이 없는 나츠코는 첫사랑이 무엇인지 몰라서, 콘티를 그릴 수 없게 되어 영화 제작은 답보 …"},"A0420":{"t":"월레스와 그로밋: 화려한 외출","type":"애니","img":"https://image.tmdb.org/t/p/w500/h5e3r12VwfUotN36fBr1DNeCD4n.jpg","status":"개봉","summary":"크래커에 치즈를 얹어 먹는 것을 가장 좋아하는 월레스는 어느날 벽장에 치즈가 떨어진 것을 발견한다. 휴가철이 되자 월레스와 그로밋은 휴가지를 고르다 치즈가 가득한 달로 목적지를 정한다. 지하실에서 만든 로켓을 타고 달에 도착한 둘은 피크닉을 하며 여기저기 산책을 하다 우연히 홀로 남겨진 이상한 기계를 발견한다. 호기심에 동전을 넣어보지만 작동을 하지 않자 투덜거리며 기계 곁을 떠난다. 몇 초…"},"A0421":{"t":"정원의 뱀파이어","type":"애니","img":"https://image.tmdb.org/t/p/w500/ipvsQ4mDr6WoNd6ZANVqxYGuoYZ.jpg","status":"방영 종료","summary":"인간과 뱀파이어가 평화롭게 공존하는 땅. 그 어딘가에 있을 ‘낙원’을 찾아 뱀파이어 여왕과 인간 소녀가 함께 역경에 맞서며 힘겨운 여정을 시작한다."},"A0422":{"t":"월레스와 그로밋: 빵과 죽음의 문제","type":"애니","img":"https://image.tmdb.org/t/p/w500/aCRoffkRpWRlArR7dAkxabaimLr.jpg","status":"개봉","summary":"월레스와 그로밋은 최고의 빵집이라는 가게를 시작하고, 매일 아침 맛있는 빵을 구워 여기저기 배달을 한다. 어느 날 배달 도중에 자전거 브레이크가 고장나 위기에 처한 여인 파이엘라 베이크웰을 구해주게 된 월레스. 그녀는 그 사건 이후로 월레스와 친하게 지내다가 점점 사랑이 싹트게 된다. 그로밋 또한 그녀의 애완견인 플러플과 묘한 감정이 싹튼다. 한편 마을에서는 빵집 주인만을 노린 연쇄살인이 벌…"},"A0423":{"t":"해골기사님은 지금 이세계 모험 중","type":"애니","img":"https://image.tmdb.org/t/p/w500/hd0uc0RMinOdquHzHmrfhLPDT2q.jpg","status":"방영 중","summary":"눈을 떠 보니 MMORPG에서 자신이 사용하던 게임 캐릭터의 모습으로 이세계에 떨어진 ‘아크‘.\n\n그 모습은 외형이 갑옷, 내용물은 전신골격 '해골기사'였다.\n\n정체를 들키면 몬스터로 몰려 토벌 대상이 될 수 있다?!\n\n때문에 ‘아크’는 눈에 띄지 않게 용병으로 지내기로 결심하지만,\n\n눈앞에서 일어난 악행을 내버려 둘 만한 남자는 아니었다!\n\n해골기사님의 무자각  '사회혁명' 이세계 판타지!…"},"A0424":{"t":"공주님 “고문”의 시간입니다","type":"애니","img":"https://image.tmdb.org/t/p/w500/zqlJaYIBVFX199iKfWhmyzh7315.jpg","status":"방영 종료","summary":"국왕군과 마왕군이 격돌하고 몇 해가 지났다.\n\n왕녀이자 국왕군 제3 기사단 '기사단장'인 공주는  마왕군에 붙잡혀 포로가 돼있었다.\n\n'공주님 \"고문\"의 시간입니다'\n\n감금된 공주를 기다리고 있는 것은\n\n고통에 몸부림 치게 되는 다양한 \"고문\"......\n\n따끈따끈한 갓 구운 토스트!\n\n김이 나는 심야 라멘!\n\n사랑스러운 동물들과의 놀이 시간!\n\n사정없이 내밀어진 맛있는 미식&즐거운 놀이에 …"},"A0425":{"t":"소용돌이","type":"애니","img":"https://image.tmdb.org/t/p/w500/byqKgLs2Se4m1185aQgKpfgqDbY.jpg","status":"방영 종료","summary":"어느 저주받은 마을에서 소용돌이와 관련되어 벌어지는 기괴한 이야기들을, 충격적인 비주얼과 함께 보여주는 그로테스크한 작품. 이토 준지의 만화 원작."},"A0426":{"t":"달과 라이카와 흡혈공주","type":"애니","img":"https://image.tmdb.org/t/p/w500/fhBAHscuQrLauz4l8B1ecJ3q06A.jpg","status":"방영 종료","summary":"아직 유인 우주 비행을 성공한 적이 없었던 시절.  치르니토라 공화국 연방의 최고 지도자는 인간을 로켓에 실어 우주로 보낼 계획을 발령한다.  수면 아래에서는 시험비행에 인간 대신 흡혈귀를 이용하는 『노스페라투 계획』이 진행되고 있었다.\n\n폐쇄된 도시에서 훈련을 받고 있는 우주비행사 후보생 레프는 실험에 선발된 흡혈귀 소녀인 이리나를 감시하라는 명령을 받는다.  상층부의 이기심과 시대의 분위…
