<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>올블루 0LLBLUE — 웹툰·애니 발견의 바다</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
:root{
  --bg:#ffffff;
  --bg-soft:#f4f5f7;
  --bg-soft2:#eceef1;
  --ink:#16171a;
  --ink-2:#5b626b;
  --ink-3:#959ba3;
  --line:#e8eaed;
  --line-2:#d9dce0;
  --accent:#ff2e63;      /* 왓챠 스타일 핑크레드 — 주요 액션/평점 */
  --accent-deep:#e11551;
  --accent-soft:#ffe7ee;
  --blue:#0a66ff;        /* 올블루 오션 */
  --blue-2:#00c6ff;
  --gold:#ffaf1a;
  --shadow:0 2px 8px rgba(20,25,40,.06), 0 8px 28px rgba(20,25,40,.05);
  --shadow-lg:0 12px 40px rgba(20,25,40,.14);
  --r:16px; --r-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:"Pretendard","Pretendard Variable",-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  background:var(--bg-soft); color:var(--ink); -webkit-font-smoothing:antialiased;
  line-height:1.5;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font-family:inherit}
img{display:block}
.app{max-width:1180px;margin:0 auto}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ---------- TOP BAR ---------- */
.topbar{position:sticky;top:0;z-index:60;background:rgba(255,255,255,.86);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.topbar-inner{max-width:1180px;margin:0 auto;display:flex;align-items:center;gap:18px;padding:13px 20px}
.logo{display:flex;align-items:center;gap:9px;cursor:pointer;flex-shrink:0}
.logo .mark{width:30px;height:30px;border-radius:9px;
  background:linear-gradient(135deg,var(--blue) 0%,var(--blue-2) 100%);
  display:grid;place-items:center;color:#fff;font-weight:900;font-size:15px;
  box-shadow:0 4px 12px rgba(10,102,255,.35)}
.logo .word{font-weight:900;font-size:21px;letter-spacing:-.5px;
  background:linear-gradient(135deg,var(--blue) 10%,var(--blue-2) 95%);
  -webkit-background-clip:text;background-clip:text;color:transparent}
.logo .word small{display:block;font-size:9.5px;font-weight:700;letter-spacing:1.5px;
  color:var(--ink-3);-webkit-text-fill-color:var(--ink-3);margin-top:-3px}
.search{flex:1;max-width:440px;position:relative}
.search input{width:100%;background:var(--bg-soft);border:1.5px solid transparent;border-radius:999px;
  padding:10px 16px 10px 40px;font-size:14px;color:var(--ink);transition:.18s}
.search input:focus{outline:none;background:#fff;border-color:var(--blue)}
.search .ic{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--ink-3);font-size:15px}
.topbar .spacer{flex:1}
.avatar{width:34px;height:34px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,#ff7eb3,#ff2e63);color:#fff;display:grid;place-items:center;
  font-weight:800;font-size:14px;cursor:pointer;border:2px solid #fff;box-shadow:var(--shadow)}

/* ---------- TABS ---------- */
.tabs{position:sticky;top:57px;z-index:55;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line)}
.tabs-inner{max-width:1180px;margin:0 auto;display:flex;gap:4px;padding:0 14px;overflow-x:auto;scrollbar-width:none}
.tabs-inner::-webkit-scrollbar{display:none}
.tab{padding:14px 16px;font-size:15px;font-weight:600;color:var(--ink-2);position:relative;white-space:nowrap;transition:.15s}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--ink);font-weight:800}
.tab.active::after{content:"";position:absolute;left:14px;right:14px;bottom:-1px;height:3px;border-radius:3px 3px 0 0;
  background:var(--accent)}
.tab .dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--accent);
  vertical-align:super;margin-left:2px}

/* ---------- LAYOUT ---------- */
.view{padding:26px 20px 80px;animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.section{margin-bottom:38px}
.section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px}
.section-head h2{font-size:20px;font-weight:800;letter-spacing:-.4px}
.section-head .sub{font-size:13px;color:var(--ink-3);font-weight:500}
.section-head .more{font-size:13px;color:var(--ink-2);font-weight:600}

/* ---------- POSTER GRID ---------- */
.grid{display:grid;gap:18px 16px}
.grid.works{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
.poster-card{cursor:pointer;transition:.2s}
.poster-card:hover{transform:translateY(-4px)}
.poster{position:relative;aspect-ratio:3/4.2;border-radius:var(--r-sm);overflow:hidden;
  box-shadow:var(--shadow);display:flex;flex-direction:column;justify-content:flex-end;padding:12px;color:#fff}
.poster::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 35%,rgba(0,0,0,.55) 100%)}
.poster .ptitle{position:relative;z-index:2;font-weight:800;font-size:15px;line-height:1.25;
  text-shadow:0 1px 6px rgba(0,0,0,.4)}
.poster .ptype{position:relative;z-index:2;font-size:11px;font-weight:600;opacity:.92;margin-top:3px}
.poster .badge{position:absolute;top:9px;left:9px;z-index:3;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);
  font-size:10.5px;font-weight:700;padding:3px 7px;border-radius:6px}
.poster .savedmark{position:absolute;top:8px;right:8px;z-index:3;width:26px;height:26px;border-radius:50%;
  background:rgba(255,46,99,.92);display:none;place-items:center;font-size:13px}
.poster.saved .savedmark{display:grid}
.poster-card .meta{margin-top:9px}
.poster-card .meta .t{font-weight:700;font-size:14px;letter-spacing:-.2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.poster-card .meta .r{font-size:12.5px;color:var(--ink-2);margin-top:2px;font-weight:600}
.star-mini{color:var(--accent)}

/* ---------- CARD / CHIP ---------- */
.card{background:#fff;border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
.chip{display:inline-flex;align-items:center;gap:4px;background:var(--bg-soft);color:var(--ink-2);
  font-size:12.5px;font-weight:600;padding:5px 11px;border-radius:999px;transition:.15s}
button.chip{cursor:pointer}
button.chip:hover{background:var(--bg-soft2)}
.chip.tag{color:var(--blue);background:#eef4ff}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;font-weight:700;font-size:14px;
  border-radius:11px;padding:12px 18px;transition:.15s;border:1.5px solid transparent}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-deep)}
.btn-ghost{background:var(--bg-soft);color:var(--ink)}
.btn-ghost:hover{background:var(--bg-soft2)}
.btn-line{background:#fff;border-color:var(--line-2);color:var(--ink)}
.btn-line:hover{border-color:var(--ink-3)}
.btn-line.on{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
.btn-blue{background:var(--blue);color:#fff}
.btn-blue:hover{filter:brightness(.94)}

/* ---------- HOME HERO ---------- */
.hero{position:relative;border-radius:22px;overflow:hidden;color:#fff;padding:40px 36px;margin-bottom:34px;
  background:radial-gradient(120% 140% at 8% 10%,#0a66ff 0%,#063e9e 45%,#021b4a 100%)}
.hero::before{content:"";position:absolute;right:-60px;top:-40px;width:340px;height:340px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,198,255,.5),transparent 65%);filter:blur(8px)}
.hero .eyebrow{font-size:13px;font-weight:700;letter-spacing:1px;color:#9fd1ff;position:relative}
.hero h1{font-size:34px;font-weight:900;letter-spacing:-1px;margin:8px 0 10px;position:relative;line-height:1.15}
.hero p{font-size:15px;color:#cfe1ff;max-width:540px;position:relative}
.hero .northstar{display:flex;gap:14px;margin-top:24px;position:relative;flex-wrap:wrap}
.ns{background:rgba(255,255,255,.12);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.18);
  border-radius:14px;padding:14px 18px;min-width:150px}
.ns .lab{font-size:11.5px;color:#bcd6ff;font-weight:600}
.ns .num{font-size:26px;font-weight:900;margin-top:2px;letter-spacing:-.5px}
.ns .num small{font-size:13px;font-weight:700;color:#bcd6ff}
.ns .delta{font-size:11.5px;font-weight:700;color:#7dffc0;margin-top:1px}

/* reco card with reason */
.reco-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.reco{display:flex;gap:13px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px;
  box-shadow:var(--shadow);cursor:pointer;transition:.18s}
.reco:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.reco .pp{width:66px;height:90px;border-radius:8px;flex-shrink:0;color:#fff;display:flex;align-items:flex-end;
  padding:6px;font-weight:800;font-size:11px}
.reco .info{min-width:0}
.reco .info .t{font-weight:800;font-size:15px}
.reco .info .why{font-size:12.5px;color:var(--accent);font-weight:700;margin-top:5px;display:flex;align-items:center;gap:4px}
.reco .info .desc{font-size:12.5px;color:var(--ink-2);margin-top:4px;line-height:1.45}

/* curator post */
.curator{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow)}
.curator .top{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.mini-av{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:800;font-size:13px}
.badge-pill{font-size:10.5px;font-weight:800;padding:2px 8px;border-radius:999px;color:#fff}
.curator .q{font-size:14.5px;font-weight:600;line-height:1.55}
.curator .foot{display:flex;gap:16px;margin-top:11px;color:var(--ink-2);font-size:13px;font-weight:600}
.curator .foot button:hover{color:var(--accent)}

/* ---------- WORK DETAIL ---------- */
.back{display:inline-flex;align-items:center;gap:6px;font-weight:700;color:var(--ink-2);margin-bottom:18px;font-size:14px}
.back:hover{color:var(--ink)}
.detail-hero{display:grid;grid-template-columns:230px 1fr;gap:30px;margin-bottom:34px}
.detail-poster{aspect-ratio:3/4.2;border-radius:14px;box-shadow:var(--shadow-lg);color:#fff;
  display:flex;align-items:flex-end;padding:16px;font-weight:900;font-size:20px;line-height:1.2;
  text-shadow:0 2px 8px rgba(0,0,0,.4)}
.detail-info h1{font-size:30px;font-weight:900;letter-spacing:-.8px;line-height:1.15}
.detail-info .meta-line{color:var(--ink-2);font-size:14px;font-weight:600;margin-top:8px}
.rating-block{display:flex;align-items:center;gap:22px;margin:18px 0;flex-wrap:wrap}
.rating-block .avg{display:flex;align-items:baseline;gap:8px}
.rating-block .avg .n{font-size:34px;font-weight:900;color:var(--accent);letter-spacing:-1px}
.rating-block .avg .c{font-size:13px;color:var(--ink-3);font-weight:600}
.myrate{display:flex;flex-direction:column;gap:4px}
.myrate .lab{font-size:12px;color:var(--ink-3);font-weight:600}
.stars{display:flex;gap:2px;font-size:26px;color:var(--line-2);cursor:pointer}
.stars .s{transition:.1s}
.stars .s.on{color:var(--accent)}
.stars .s:hover{transform:scale(1.12)}
.action-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
.tag-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:18px}

.detail-grid{display:grid;grid-template-columns:1fr 320px;gap:26px;align-items:start}
@media(max-width:860px){.detail-grid{grid-template-columns:1fr}.detail-hero{grid-template-columns:140px 1fr;gap:18px}}
.block{margin-bottom:30px}
.block h3{font-size:17px;font-weight:800;margin-bottom:12px;letter-spacing:-.3px}
.synopsis{font-size:14.5px;color:var(--ink);line-height:1.7}
.info-table{width:100%;border-collapse:collapse;font-size:14px}
.info-table td{padding:10px 0;border-bottom:1px solid var(--line);vertical-align:top}
.info-table td.k{color:var(--ink-3);font-weight:600;width:96px}
.info-table td.v{font-weight:600}
.platforms{display:flex;gap:10px;flex-wrap:wrap}
.plat{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:11px;padding:10px 14px;
  font-weight:700;font-size:13.5px;cursor:pointer;transition:.15s}
.plat:hover{border-color:var(--ink-3)}
.plat .pill{width:24px;height:24px;border-radius:7px;display:grid;place-items:center;color:#fff;font-size:11px;font-weight:800}

/* timeline */
.tl-toggle{display:flex;gap:6px;margin-bottom:14px}
.tl-toggle button{font-size:13px;font-weight:700;padding:7px 14px;border-radius:999px;background:var(--bg-soft);color:var(--ink-2)}
.tl-toggle button.on{background:var(--ink);color:#fff}
.tl-item{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid var(--line)}
.tl-item .no{width:26px;height:26px;border-radius:8px;background:var(--bg-soft);display:grid;place-items:center;
  font-weight:800;font-size:13px;color:var(--ink-2);flex-shrink:0}
.tl-item .name{font-weight:700;font-size:14.5px}
.tl-item .sub{margin-left:auto;font-size:12.5px;color:var(--ink-3);font-weight:600}

/* reco mini cards in sidebar */
.side-card{padding:18px}
.reco-mini{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid var(--line);cursor:pointer}
.reco-mini:last-child{border-bottom:none}
.reco-mini:hover .t{color:var(--accent)}
.reco-mini .pp{width:44px;height:60px;border-radius:7px;flex-shrink:0}
.reco-mini .t{font-weight:700;font-size:13.5px;transition:.15s}
.reco-mini .s{font-size:11.5px;color:var(--ink-3);margin-top:2px;font-weight:600}
.reco-mini .match{font-size:11.5px;color:var(--blue);font-weight:700;margin-top:3px}

/* comment */
.cmt-input{background:var(--bg-soft);border-radius:12px;padding:14px}
.cmt-input textarea{width:100%;border:none;background:transparent;resize:none;font-size:14px;min-height:46px;color:var(--ink)}
.cmt-input textarea:focus{outline:none}
.cmt-locked{background:var(--bg-soft);border:1px dashed var(--line-2);border-radius:14px;padding:30px 20px;text-align:center}
.cmt-input .row{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.cmt{padding:16px 0;border-bottom:1px solid var(--line)}
.cmt .head{display:flex;align-items:center;gap:9px}
.cmt .nm{font-weight:800;font-size:14px}
.cmt .stars-sm{color:var(--accent);font-size:13px;font-weight:700}
.cmt .body{font-size:14px;margin:9px 0;line-height:1.6}
.cmt .reco-tag{font-size:12.5px;color:var(--blue);font-weight:700;background:#eef4ff;display:inline-block;padding:4px 10px;border-radius:8px;margin-bottom:9px}
.cmt .foot{display:flex;gap:16px;color:var(--ink-2);font-size:13px;font-weight:600}
.cmt .foot button:hover{color:var(--accent)}

/* ---------- CONTENT HALL ---------- */
.hall-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
.hall-card{position:relative;border-radius:18px;padding:22px;color:#fff;overflow:hidden;cursor:pointer;
  min-height:150px;display:flex;flex-direction:column;justify-content:space-between;transition:.2s;box-shadow:var(--shadow)}
.hall-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.hall-card .emo{font-size:30px}
.hall-card h3{font-size:18px;font-weight:900;margin-top:auto;letter-spacing:-.4px}
.hall-card p{font-size:13px;opacity:.92;margin-top:4px;line-height:1.4}
.hall-card .live{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.22);font-size:11px;
  font-weight:800;padding:4px 9px;border-radius:999px;display:flex;align-items:center;gap:5px}
.hall-card .live::before{content:"";width:6px;height:6px;border-radius:50%;background:#fff;animation:blink 1.2s infinite}
@keyframes blink{50%{opacity:.3}}

/* ---------- MODAL ---------- */
.modal-bg{position:fixed;inset:0;z-index:100;background:rgba(15,20,35,.55);backdrop-filter:blur(4px);
  display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.modal-bg.open{display:flex;animation:fade .2s}
.modal{background:#fff;border-radius:22px;max-width:560px;width:100%;box-shadow:var(--shadow-lg);
  animation:pop .25s cubic-bezier(.2,.8,.3,1.2);margin:auto 0}
@keyframes pop{from{transform:scale(.94) translateY(10px);opacity:0}to{transform:none;opacity:1}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 22px 0}
.modal-head h2{font-size:19px;font-weight:900;letter-spacing:-.4px}
.modal-head .x{width:32px;height:32px;border-radius:50%;background:var(--bg-soft);display:grid;place-items:center;font-size:16px;color:var(--ink-2)}
.modal-head .x:hover{background:var(--bg-soft2)}
.modal-body{padding:18px 22px 24px}

/* worldcup */
.wc-stage{text-align:center}
.wc-round{font-size:13px;font-weight:800;color:var(--accent);margin-bottom:14px}
.wc-pair{display:grid;grid-template-columns:1fr 40px 1fr;align-items:center;gap:8px}
.wc-pick{cursor:pointer;border-radius:14px;overflow:hidden;transition:.15s}
.wc-pick:hover{transform:scale(1.03)}
.wc-pick .img{aspect-ratio:3/4;display:flex;align-items:flex-end;padding:12px;color:#fff;font-weight:800;font-size:16px;
  text-shadow:0 2px 6px rgba(0,0,0,.4)}
.wc-pick .nm{padding:10px;font-weight:800;font-size:14px;background:var(--bg-soft)}
.wc-vs{font-weight:900;color:var(--ink-3);font-size:15px}
.wc-prog{height:6px;background:var(--bg-soft);border-radius:999px;margin-bottom:18px;overflow:hidden}
.wc-prog i{display:block;height:100%;background:var(--accent);border-radius:999px;transition:.3s}

/* bar chart */
.bar-row{margin-bottom:16px}
.bar-row .lab{display:flex;justify-content:space-between;font-size:13.5px;font-weight:700;margin-bottom:6px}
.bar-row .lab .v{color:var(--ink-2)}
.bar-track{height:34px;background:var(--bg-soft);border-radius:9px;overflow:hidden}
.bar-fill{height:100%;border-radius:9px;transition:width .5s cubic-bezier(.2,.8,.3,1);min-width:8px}
.boost{margin-top:10px}

/* tag vote */
.tv-input{display:flex;gap:8px;margin-bottom:16px}
.tv-input input{flex:1;border:1.5px solid var(--line-2);border-radius:11px;padding:11px 14px;font-size:14px}
.tv-input input:focus{outline:none;border-color:var(--blue)}
.tv-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
.tv-item .rank{font-weight:900;color:var(--ink-3);width:18px;font-size:14px}
.tv-item .tg{flex:1;font-weight:700;color:var(--blue);font-size:14px}
.tv-item .cnt{font-weight:800;font-size:14px;color:var(--ink-2);min-width:42px;text-align:right}
.tv-item .up{width:34px;height:34px;border-radius:9px;background:var(--bg-soft);display:grid;place-items:center;font-size:14px}
.tv-item .up:hover{background:var(--accent-soft);color:var(--accent)}

/* attendance */
.att-week{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin:6px 0 18px}
.att-day{aspect-ratio:1;border-radius:12px;background:var(--bg-soft);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:3px;font-weight:700;position:relative}
.att-day .d{font-size:11px;color:var(--ink-3)}
.att-day .n{font-size:15px}
.att-day.done{background:var(--accent);color:#fff}
.att-day.done .d{color:rgba(255,255,255,.8)}
.att-day.today{box-shadow:0 0 0 2.5px var(--blue) inset}

/* ranking predict */
.rk-item{display:flex;align-items:center;gap:12px;background:var(--bg-soft);border-radius:12px;padding:11px 14px;margin-bottom:9px}
.rk-item .pp{width:38px;height:50px;border-radius:7px;flex-shrink:0}
.rk-item .nm{flex:1;font-weight:700;font-size:14px}
.rk-item .ar{display:flex;flex-direction:column;gap:2px}
.rk-item .ar button{width:26px;height:18px;border-radius:5px;background:#fff;display:grid;place-items:center;font-size:10px;color:var(--ink-2)}
.rk-item .ar button:hover{color:var(--blue)}
.rk-item .pos{font-weight:900;color:var(--accent);width:22px;text-align:center}

/* scenes */
.scene-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.scene{aspect-ratio:16/10;border-radius:12px;display:grid;place-items:center;color:#fff;font-size:22px;position:relative;overflow:hidden}
.scene .cap{position:absolute;bottom:8px;left:10px;font-size:12px;font-weight:700;text-shadow:0 1px 4px rgba(0,0,0,.4)}

/* ---------- FOLLOW ---------- */
.feed{display:flex;flex-direction:column;gap:16px;max-width:680px}
.feed-card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:var(--shadow)}
.feed-card .top{display:flex;align-items:center;gap:11px;margin-bottom:13px}
.feed-card .top .nm{font-weight:800;font-size:15px}
.feed-card .top .act{font-size:12.5px;color:var(--ink-3);font-weight:600}
.feed-card .top .fbtn{margin-left:auto;font-size:13px;font-weight:700;padding:7px 16px;border-radius:999px;
  border:1.5px solid var(--line-2);color:var(--ink)}
.feed-card .top .fbtn.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.feed-attach{display:flex;gap:13px;background:var(--bg-soft);border-radius:12px;padding:13px;cursor:pointer}
.feed-attach:hover{background:var(--bg-soft2)}
.feed-attach .pp{width:56px;height:76px;border-radius:8px;flex-shrink:0;color:#fff;font-weight:800;font-size:10px;display:flex;align-items:flex-end;padding:5px}
.feed-attach .t{font-weight:800;font-size:14.5px}
.feed-attach .g{font-size:12px;color:var(--ink-3);font-weight:600;margin-top:2px}
.feed-attach .pitch{font-size:13px;color:var(--ink);margin-top:7px;line-height:1.5}
.feed-card .foot{display:flex;gap:18px;margin-top:13px;color:var(--ink-2);font-size:13px;font-weight:600}
.feed-card .foot button:hover{color:var(--accent)}

/* ---------- MYPAGE ---------- */
.mp-profile{display:flex;gap:20px;align-items:center;background:#fff;border:1px solid var(--line);
  border-radius:18px;padding:22px 24px;box-shadow:var(--shadow);margin-bottom:28px;flex-wrap:wrap}
.mp-av{width:74px;height:74px;border-radius:50%;background:linear-gradient(135deg,#ff7eb3,#ff2e63);
  display:grid;place-items:center;color:#fff;font-weight:900;font-size:28px;flex-shrink:0}
.mp-profile .nm{font-size:21px;font-weight:900;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.mp-profile .titles{display:flex;gap:7px;margin-top:8px;flex-wrap:wrap}
.mp-stats{display:flex;gap:26px;margin-left:auto;flex-wrap:wrap}
.mp-stat{text-align:center}
.mp-stat .n{font-size:23px;font-weight:900}
.mp-stat .l{font-size:12px;color:var(--ink-3);font-weight:600;margin-top:1px}
.badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:13px}

/* v4: 홈 CTA / 랭킹 / 탐색 필터 / 준비중 */
.hero-cta{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.rank-list{display:flex;flex-direction:column;gap:8px}
.rank-item{display:flex;align-items:center;gap:13px;background:#fff;border:1px solid var(--line);border-radius:13px;padding:11px 15px;cursor:pointer;box-shadow:var(--shadow);transition:.15s}
.rank-item:hover{transform:translateX(3px);border-color:var(--line-2)}
.rank-item .rk{font-weight:900;font-size:18px;color:var(--blue);width:22px;text-align:center;flex-shrink:0}
.rank-item .pp{width:40px;height:54px;border-radius:8px;display:grid;place-items:center;color:#fff;font-size:10px;font-weight:800;flex-shrink:0}
.rank-item .t{font-weight:800;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-item .g{font-size:12px;color:var(--ink-3);font-weight:600;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-item .sc{margin-left:auto;font-weight:800;font-size:14px;color:#ffaf1a;flex-shrink:0}
.bf-label{font-size:12px;font-weight:800;color:var(--ink-3);margin:14px 0 7px}
.bf-chips{display:flex;gap:7px;flex-wrap:wrap}
.bf-chips .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.bf-bar{display:flex;align-items:center;justify-content:space-between;margin:18px 0 14px}
.bf-bar .cnt{font-size:13px;font-weight:800;color:var(--ink-2)}
.bf-sort{font-size:12.5px;font-weight:700;border:1.5px solid var(--line-2);border-radius:9px;padding:8px 12px;background:#fff;color:var(--ink);cursor:pointer}
.hall-card.soon{filter:saturate(.55);opacity:.82}
.badge-item{text-align:center;padding:16px 10px;border-radius:14px;background:#fff;border:1px solid var(--line);box-shadow:var(--shadow)}
.badge-item .ic{width:48px;height:48px;border-radius:50%;margin:0 auto 9px;display:grid;place-items:center;font-size:22px;color:#fff}
.badge-item.locked{opacity:.5;filter:grayscale(.6)}
.badge-item.locked .ic{background:var(--line-2)!important}
.badge-item .bn{font-weight:800;font-size:13px}
.badge-item .bd{font-size:11px;color:var(--ink-3);margin-top:3px;line-height:1.35}
.report-card{background:linear-gradient(135deg,#1a1c2e,#2a2e52);color:#fff;border-radius:18px;padding:24px;box-shadow:var(--shadow-lg)}
.report-card .rh{font-size:13px;font-weight:700;color:#a9b4ff}
.report-card h3{font-size:22px;font-weight:900;margin:4px 0 18px}
.report-row{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.12);font-size:14px}
.report-row:last-child{border:none}
.report-row .v{font-weight:800}
.chronicle{position:relative;padding-left:24px}
.chronicle::before{content:"";position:absolute;left:6px;top:6px;bottom:6px;width:2px;background:var(--line-2)}
.chr-item{position:relative;padding:0 0 22px}
.chr-item::before{content:"";position:absolute;left:-22px;top:4px;width:11px;height:11px;border-radius:50%;
  background:var(--accent);border:2px solid #fff;box-shadow:0 0 0 2px var(--accent)}
.chr-item .dt{font-size:12px;color:var(--ink-3);font-weight:700}
.chr-item .tx{font-size:14.5px;font-weight:600;margin-top:3px}

.empty{text-align:center;padding:50px 20px;color:var(--ink-3)}
.empty .e{font-size:40px;margin-bottom:10px}
.empty p{font-size:14px;font-weight:600}

/* toast */
.toast{position:fixed;left:50%;bottom:34px;transform:translateX(-50%) translateY(20px);z-index:200;
  background:var(--ink);color:#fff;padding:13px 22px;border-radius:13px;font-size:14px;font-weight:700;
  box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:.3s;display:flex;align-items:center;gap:9px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===== v2 보완: 시청상태 / 무드 / 발견신호 / 크리에이터 / Wrapped ===== */
.status-seg{display:flex;gap:6px;flex-wrap:wrap}
.status-seg button{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:700;
  padding:9px 13px;border-radius:11px;background:var(--bg-soft);color:var(--ink-2);border:1.5px solid transparent;transition:.15s}
.status-seg button:hover{background:var(--bg-soft2)}
.status-seg button.on{color:#fff}
.status-seg button.on.s-watch{background:#0a66ff}
.status-seg button.on.s-hold{background:#d97706}
.status-seg button.on.s-drop{background:#6b7280}
.status-seg button.on.s-done{background:#10b981}
.notify-row{display:flex;align-items:center;gap:9px;margin-top:12px;background:#eef4ff;border-radius:12px;
  padding:11px 14px;font-size:13.5px;font-weight:700;color:var(--blue)}
.notify-row .sw{margin-left:auto;width:42px;height:24px;border-radius:999px;background:var(--line-2);
  position:relative;transition:.2s;cursor:pointer;flex-shrink:0}
.notify-row .sw::after{content:"";position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s}
.notify-row .sw.on{background:var(--blue)}
.notify-row .sw.on::after{left:20px}
.signal{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:700;padding:8px 13px;border-radius:11px;margin-top:8px}
.signal.good{background:#e7f9f0;color:#0a8a52}
.signal.warn{background:#fff4e0;color:#c2790a}
.signal.cult{background:#f3eaff;color:#7c3aed}
.poster .statustag{position:absolute;bottom:0;left:0;right:0;z-index:3;font-size:10.5px;font-weight:800;padding:5px 10px;color:#fff;text-align:center}
.mood-row{display:flex;gap:12px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none}
.mood-row::-webkit-scrollbar{display:none}
.mood{flex:0 0 auto;width:150px;height:96px;border-radius:16px;padding:14px;color:#fff;cursor:pointer;
  display:flex;flex-direction:column;justify-content:space-between;transition:.2s;box-shadow:var(--shadow)}
.mood:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.mood .e{font-size:24px}
.mood .l{font-weight:800;font-size:14px;letter-spacing:-.3px;line-height:1.2}
.continue-row{display:flex;gap:14px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.continue-row::-webkit-scrollbar{display:none}
.cont-card{flex:0 0 auto;width:290px;display:flex;gap:12px;background:#fff;border:1px solid var(--line);
  border-radius:14px;padding:13px;box-shadow:var(--shadow);cursor:pointer;transition:.18s}
.cont-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.cont-card .pp{width:54px;height:74px;border-radius:8px;flex-shrink:0;color:#fff;font-weight:800;font-size:10px;display:flex;align-items:flex-end;padding:5px}
.cont-card .t{font-weight:800;font-size:14px}
.cont-card .nx{font-size:12.5px;color:var(--blue);font-weight:700;margin-top:4px}
.cont-bar{height:6px;background:var(--bg-soft);border-radius:999px;margin-top:7px;overflow:hidden}
.cont-bar i{display:block;height:100%;background:var(--blue);border-radius:999px}
.cre-chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px;
  background:#eef4ff;color:var(--blue);cursor:pointer;margin-left:7px;transition:.15s;white-space:nowrap}
.cre-chip:hover{background:#dbe8ff}
.cre-chip.on{background:var(--blue);color:#fff}
.cre-card{flex:0 0 auto;width:185px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow);text-align:center}
.cre-card .ic{width:50px;height:50px;border-radius:14px;margin:0 auto 9px;display:grid;place-items:center;color:#fff;font-weight:900;font-size:18px}
.cre-card .nm{font-weight:800;font-size:14px}
.cre-card .role{font-size:12px;color:var(--ink-3);font-weight:600;margin-top:2px}
.cre-card .new{font-size:11.5px;color:var(--accent);font-weight:800;margin-top:6px}
.cre-card button{margin-top:11px;width:100%;font-size:12.5px;font-weight:700;padding:8px;border-radius:9px;border:1.5px solid var(--line-2);background:#fff;color:var(--ink)}
.cre-card button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.sfilter{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
.sfilter button{font-size:13px;font-weight:700;padding:7px 13px;border-radius:999px;background:var(--bg-soft);color:var(--ink-2)}
.sfilter button.on{background:var(--ink);color:#fff}
.wrap-card{position:relative;border-radius:22px;overflow:hidden;color:#fff;padding:28px 26px;
  background:radial-gradient(130% 130% at 80% 0%,#7c3aed 0%,#0a66ff 50%,#021b4a 100%)}
.wrap-card::before{content:"";position:absolute;left:-40px;bottom:-50px;width:240px;height:240px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,198,255,.45),transparent 65%)}
.wrap-card .wh{font-size:12px;font-weight:800;letter-spacing:1.5px;color:#bcd6ff;position:relative}
.wrap-card h2{font-size:25px;font-weight:900;margin:5px 0 18px;letter-spacing:-.6px;position:relative;line-height:1.2}
.wrap-top3{display:flex;gap:10px;position:relative;margin-bottom:18px}
.wrap-top3 .wt{flex:1;text-align:center;min-width:0}
.wrap-top3 .pp{aspect-ratio:3/4;border-radius:10px;display:flex;align-items:flex-end;padding:7px;font-weight:800;font-size:11px;
  color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.4);box-shadow:0 6px 18px rgba(0,0,0,.3)}
.wrap-top3 .rk{font-size:11px;font-weight:800;margin-top:6px;color:#cfe1ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wrap-stats{display:flex;gap:18px;position:relative;flex-wrap:wrap}
.wrap-stats .ws .n{font-size:20px;font-weight:900}
.wrap-stats .ws .l{font-size:11px;color:#cfe1ff;font-weight:600}
.wrap-foot{position:relative;margin-top:18px;font-size:12px;color:#9fd1ff;font-weight:700}
.t3-pick{display:flex;gap:9px;flex-wrap:wrap}
.t3-pick .opt{cursor:pointer;border-radius:10px;overflow:hidden;width:84px;border:2.5px solid transparent;transition:.15s;position:relative}
.t3-pick .opt .img{aspect-ratio:3/4;display:flex;align-items:flex-end;padding:6px;color:#fff;font-size:10px;font-weight:800}
.t3-pick .opt.sel{border-color:var(--accent)}
.t3-pick .opt .ord{position:absolute;top:5px;right:5px;width:20px;height:20px;border-radius:50%;background:var(--accent);
  display:none;place-items:center;font-size:11px;font-weight:900;color:#fff}
.t3-pick .opt.sel .ord{display:grid}

/* ===== 취향분석 온보딩 ===== */
.onb-progress{height:5px;background:var(--bg-soft);border-radius:999px;margin:0 auto 24px;max-width:540px;overflow:hidden}
.onb-progress i{display:block;height:100%;background:var(--accent);border-radius:999px;transition:.4s}
.onb-wrap{max-width:540px;margin:0 auto}
.onb-card{background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow-lg);padding:34px 28px;animation:fade .3s}
.onb-mascot{width:108px;height:108px;border-radius:32px;margin:0 auto 22px;display:flex;align-items:center;justify-content:center;gap:13px;
  background:radial-gradient(circle at 42% 34%,#5fe0ff,#0a66ff 58%,#021b4a);box-shadow:0 14px 44px rgba(10,102,255,.45);position:relative}
.onb-mascot::after{content:"";position:absolute;inset:-6px;border-radius:38px;border:3px solid rgba(0,198,255,.35);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.06);opacity:0}}
.onb-mascot .eye{width:17px;height:26px;background:#04183f;border-radius:50%;box-shadow:0 0 14px #6ff0ff;animation:blinkeye 3.4s infinite}
@keyframes blinkeye{0%,92%,100%{transform:scaleY(1)}96%{transform:scaleY(.1)}}
.onb-title{font-size:23px;font-weight:900;text-align:center;letter-spacing:-.5px;line-height:1.3}
.onb-sub{font-size:14px;color:var(--ink-2);text-align:center;margin-top:11px;line-height:1.6;font-weight:500}
.onb-q{font-size:21px;font-weight:900;letter-spacing:-.5px;line-height:1.35}
.onb-qsub{font-size:13px;color:var(--ink-3);font-weight:600;margin:7px 0 20px}
.onb-opts{display:flex;flex-direction:column;gap:10px}
.onb-opt{display:flex;align-items:center;gap:12px;padding:15px 16px;border:1.5px solid var(--line);border-radius:14px;cursor:pointer;
  font-weight:700;font-size:14.5px;transition:.15s;background:#fff;text-align:left;width:100%;color:var(--ink)}
.onb-opt:hover{border-color:var(--ink-3)}
.onb-opt.sel{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-deep)}
.onb-opt .e{font-size:20px;flex-shrink:0}
.onb-opt .ck{margin-left:auto;width:22px;height:22px;border-radius:50%;border:2px solid var(--line-2);display:grid;place-items:center;font-size:11px;color:#fff;flex-shrink:0}
.onb-opt.sel .ck{background:var(--accent);border-color:var(--accent)}
.onb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:10px}
.onb-tile{border:1.5px solid var(--line);border-radius:14px;padding:15px 8px;text-align:center;cursor:pointer;transition:.15s;background:#fff;font-weight:700;font-size:13px;color:var(--ink)}
.onb-tile:hover{border-color:var(--ink-3)}
.onb-tile.sel{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-deep)}
.onb-tile .e{font-size:25px;display:block;margin-bottom:7px}
.onb-nick{display:flex;align-items:center;gap:10px;background:var(--bg-soft);border-radius:14px;padding:6px 6px 6px 18px;margin:6px 0 2px}
.onb-nick input{flex:1;border:none;background:transparent;font-size:17px;font-weight:800;color:var(--ink);min-width:0}
.onb-nick input:focus{outline:none}
.onb-nick .reroll{width:44px;height:44px;border-radius:11px;background:#fff;display:grid;place-items:center;font-size:18px;box-shadow:var(--shadow);flex-shrink:0}
.onb-nick .reroll:hover{background:var(--bg-soft2)}
.onb-nav{display:flex;gap:10px;margin-top:26px}
.onb-nav .btn{flex:1}
.onb-nav .onb-back{flex:0 0 auto;width:54px}
.onb-spin{width:52px;height:52px;border:5px solid var(--bg-soft2);border-top-color:var(--accent);border-radius:50%;margin:26px auto 6px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.onb-result-cards{display:flex;flex-direction:column;gap:12px;margin-top:6px}
.onb-rc{display:flex;gap:14px;padding:14px;border:1.5px solid var(--line);border-radius:16px;cursor:pointer;transition:.18s;background:#fff;align-items:center}
.onb-rc:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow)}
.onb-rc .pp{width:62px;height:84px;border-radius:10px;flex-shrink:0;color:#fff;font-weight:800;font-size:10px;display:flex;align-items:flex-end;padding:6px}
.onb-rc .t{font-weight:800;font-size:16px}
.onb-rc .g{font-size:12px;color:var(--ink-3);font-weight:600;margin-top:3px}
.onb-rc .why{font-size:12.5px;color:var(--accent);font-weight:700;margin-top:6px}
.onb-rc .go{margin-left:auto;color:var(--ink-3);font-size:24px;font-weight:300;flex-shrink:0}

/* ===== 작품 등록 / 소장관 / 프로필 수정 / 단행본 ===== */
.reg-tabs{display:flex;gap:6px;margin-bottom:16px;background:var(--bg-soft);padding:5px;border-radius:12px}
.reg-tabs button{flex:1;font-size:13.5px;font-weight:700;padding:9px;border-radius:9px;color:var(--ink-2)}
.reg-tabs button.on{background:#fff;color:var(--ink);box-shadow:var(--shadow)}
.reg-row{display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--line)}
.reg-row .pp{width:42px;height:58px;border-radius:7px;flex-shrink:0}
.reg-row .t{font-weight:800;font-size:14px}
.reg-row .g{font-size:12px;color:var(--ink-3);font-weight:600;margin-top:2px}
.reg-status{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.reg-status button{font-size:11px;font-weight:700;padding:5px 9px;border-radius:8px;background:var(--bg-soft);color:var(--ink-2)}
.reg-status button.on{color:#fff}
.reg-status button.on.s-watch{background:#0a66ff}.reg-status button.on.s-hold{background:#d97706}
.reg-status button.on.s-drop{background:#6b7280}.reg-status button.on.s-done{background:#10b981}
.reg-done{font-size:11px;font-weight:800;color:#10b981;flex-shrink:0;align-self:flex-start;margin-top:4px}
#regResults{max-height:340px;overflow-y:auto}
.reg-custom{display:flex;gap:14px;margin-bottom:6px}
.reg-photo{width:96px;height:130px;border-radius:12px;flex-shrink:0;overflow:hidden;cursor:pointer;
  border:1.5px dashed var(--line-2);display:grid;place-items:center;background:var(--bg-soft)}
.reg-photo img{width:100%;height:100%;object-fit:cover}
.reg-photo .ph{text-align:center;color:var(--ink-3);font-size:12px;font-weight:700}
.reg-inp{width:100%;border:1.5px solid var(--line-2);border-radius:11px;padding:11px 13px;font-size:14px;margin-bottom:9px;color:var(--ink);background:#fff}
.reg-inp:focus{outline:none;border-color:var(--blue)}
select.reg-inp{appearance:none;cursor:pointer}
.pe-lab{display:block;font-size:12.5px;font-weight:700;color:var(--ink-3);margin:4px 0 6px}
.edit-prof{font-size:12.5px;font-weight:700;color:var(--ink-2);background:var(--bg-soft);padding:8px 14px;border-radius:999px;margin-top:11px}
.edit-prof:hover{background:var(--bg-soft2)}
.buy-card{display:flex;align-items:center;gap:14px;border:1px solid var(--line);border-radius:14px;padding:14px 16px;box-shadow:var(--shadow)}
.buy-ic{width:46px;height:46px;border-radius:12px;background:linear-gradient(135deg,#0a66ff,#00c6ff);display:grid;place-items:center;font-size:22px;flex-shrink:0}
.buy-t{font-weight:800;font-size:14.5px}

function seenIds(){const s=new Set([...STATE.saved]);Object.keys(STATE.status).forEach(id=>s.add(+id));Object.keys(STATE.ratings).forEach(id=>s.add(+id));(STATE.top3||[]).forEach(id=>s.add(id));return s}
function genreSeen(g){let n=0;seenIds().forEach(id=>{const w=byId(id);if(w&&w.genres.includes(g))n++});return n}
function tagSeen(t){let n=0;seenIds().forEach(id=>{const w=byId(id);if(w&&w.tags.includes(t))n++});return n}
function genresCovered(){const s=new Set();seenIds().forEach(id=>{const w=byId(id);if(w)w.genres.forEach(g=>s.add(g))});return s.size}

function badgeState(b){const cur=b.cond()||0;return {cur,got:cur>=b.need,need:b.need,pct:Math.min(100,Math.round(cur/b.need*100))}}
function repBadge(){
  const earned=BADGES.filter(b=>badgeState(b).got);
  const pick=earned.find(b=>b.tier==='gold')||earned[earned.length-1];
  return pick?[pick.n,pick.c]:['신입 항해사','#94a3b8'];
}

function _goTab(view){
  CURRENT=view; renderTabs();
  window.scrollTo({top:0,behavior:'smooth'});
  if(view==='anime') return renderBrowse('anime');
  if(view==='webtoon') return renderBrowse('webtoon');
  if(view==='feed') return renderFeed();
  ({home:renderHome,hall:renderHall,mypage:renderMypage})[view]();
}
function _renderScreen(s){
  if(s.kind==='detail') _openDetail(s.id);
  else if(s.kind==='studio') _openStudio(s.name);
  else _goTab(s.view);
}
function navTo(s){
  if(SCREEN && JSON.stringify(SCREEN)===JSON.stringify(s)){_renderScreen(s);return}
  if(SCREEN) HISTORY.push(SCREEN);
  if(HISTORY.length>60) HISTORY.shift();
  SCREEN=s; updateBackBtn();
  try{history.pushState({ob:1},'')}catch(e){}
  _renderScreen(s);
}
function goBack(){
  if(!HISTORY.length) return;
  SCREEN=HISTORY.pop(); updateBackBtn(); _renderScreen(SCREEN);
}
function updateBackBtn(){const b=document.getElementById('backBtn');if(b)b.style.display=HISTORY.length?'grid':'none'}
function go(view){
  if(view==='works')view='anime'; if(view==='follow')view='feed'; if(view==='taste')view='home';
  navTo({kind:'tab',view});
}

WORKS.forEach(w=>{ if(WEBTOON_DAYS[w.id]) w.day=WEBTOON_DAYS[w.id]; });
function isAnime(w){return w.type.startsWith('애니')}
function isWebtoon(w){return w.type.includes('웹툰')}
let BROWSE={kind:'anime',genre:'all',plat:'all',day:'all',sort:'pop',q:''};
function renderBrowse(kind){
  BROWSE.kind=kind;
  const base=WORKS.filter(kind==='anime'?isAnime:isWebtoon);
  let list=base.slice();
  const q=(BROWSE.q||'').trim().toLowerCase();
  if(q) list=list.filter(w=>(w.t+w.genres.join()+w.tags.join()+w.type).toLowerCase().includes(q));
  if(BROWSE.genre!=='all') list=list.filter(w=>w.genres.includes(BROWSE.genre));
  if(BROWSE.plat!=='all') list=list.filter(w=>w.plat.some(p=>p[0]===BROWSE.plat));
  if(kind==='webtoon'&&BROWSE.day!=='all') list=list.filter(w=>w.day===BROWSE.day);
  if(BROWSE.sort==='rating') list.sort((a,b)=>b.rating-a.rating);
  else if(BROWSE.sort==='new') list.sort((a,b)=>b.id-a.id);
  else list.sort((a,b)=>b.count-a.count);
  const genres=[...new Set(base.flatMap(w=>w.genres))];
  const plats=[...new Set(base.flatMap(w=>w.plat.map(p=>p[0])))];
  const v=document.getElementById('view');
  v.innerHTML=`
  <div class="section">
    <div class="section-head">
      <h2>${kind==='anime'?'애니':'웹툰'}</h2>
      <span class="sub">${base.length}편 · ${kind==='anime'?'완주 기준으로 기록해요':'요일·플랫폼별로 탐색해요'}</span>
    </div>
    ${q?`<div style="font-size:13px;color:var(--ink-2);font-weight:600;margin-bottom:14px">“${BROWSE.q}” 검색 결과 ${list.length}편 · <button style="color:var(--accent);font-weight:700" onclick="clearFilters()">전체 보기</button></div>`:''}
    ${kind==='webtoon'?`
    <div class="bf-label">요일</div>
    <div class="bf-chips">
      <button class="chip ${BROWSE.day==='all'?'on':''}" onclick="setBrowse('day','all')">전체</button>
      ${WEEK.map(d=>`<button class="chip ${BROWSE.day===d?'on':''}" onclick="setBrowse('day','${d}')">${d}</button>`).join('')}
    </div>`:''}
    <div class="bf-label">장르</div>
    <div class="bf-chips">
      <button class="chip ${BROWSE.genre==='all'?'on':''}" onclick="setBrowse('genre','all')">전체</button>
      ${genres.map(g=>`<button class="chip ${BROWSE.genre===g?'on':''}" onclick="setBrowse('genre','${g}')">#${g}</button>`).join('')}
    </div>
    <div class="bf-label">플랫폼</div>

let STU={name:null,genre:'all',type:'all',status:'all',sort:'recent',unseen:false};

};
function openStudio(name){ navTo({kind:'studio',name}); }
function _openStudio(name){
  const s=STUDIOS[name]||AUTHORS[name];
  if(!s){toast('정보가 준비 중이에요');return}
  STU={name,genre:'all',type:'all',status:'all',sort:'recent',unseen:false};
  CURRENT='follow';renderTabs();window.scrollTo({top:0,behavior:'smooth'});
  renderStudio();
}
function studioFilteredWorks(){
  let ws=studioWorks(STU.name);
  if(STU.genre!=='all')ws=ws.filter(w=>w.genres.includes(STU.genre));
  if(STU.type!=='all')ws=ws.filter(w=>w.type.includes(STU.type));
  if(STU.status!=='all')ws=ws.filter(w=>w.status===STU.status);
  if(STU.unseen){const seen=seenIds();ws=ws.filter(w=>!seen.has(w.id))}
  ws=ws.slice();
  if(STU.sort==='rating')ws.sort((a,b)=>b.rating-a.rating);
  else if(STU.sort==='popular')ws.sort((a,b)=>b.count-a.count);
  else ws.sort((a,b)=>studioYear(b)-studioYear(a));
  return ws;
}
function studioSet(k,val){STU[k]=val;renderStudio()}
function studioUnseen(){STU.unseen=!STU.unseen;renderStudio()}
function renderStudio(){
  const name=STU.name;
  const s=STUDIOS[name]||AUTHORS[name];
  const isStudio=!!STUDIOS[name];
  const all=studioWorks(name);
  const list=studioFilteredWorks();
  const avg=all.length?(all.reduce((a,w)=>a+w.rating,0)/all.length).toFixed(1):'-';
  const done=all.filter(w=>w.status==='완결').length;
  const onair=all.filter(w=>w.status==='연재중').length;
  const inLib=all.filter(w=>STATE.saved.has(w.id)||STATE.status[w.id]).length;
  const top3=all.slice().sort((a,b)=>b.rating-a.rating).slice(0,3);
  // 장르 분포
  const gc={};all.forEach(w=>w.genres.forEach(g=>gc[g]=(gc[g]||0)+1));
  const gmax=Math.max(1,...Object.values(gc));
  const genreOpts=[...new Set(all.flatMap(w=>w.genres))];

let WC={pool:[],round:0,winners:[],i:0,size:8};
function hallWorldcup(){
  const pool=[...WORKS].sort((a,b)=>b.id-a.id).slice(0,8).sort(()=>Math.random()-.5);

function wcShell(){return `
  <div class="modal-head"><h2>🏆 기대작 월드컵</h2><button class="x" onclick="closeModal()">✕</button></div>
  <div class="modal-body"><div style="font-size:12.5px;color:var(--ink-3);font-weight:600;text-align:center;margin-bottom:10px">아직 안 본 작품도 OK! 썸네일·제목만 보고 더 기대되는 쪽을 골라요</div><div class="wc-prog"><i id="wcProg" style="width:0%"></i></div><div id="wcStage" class="wc-stage"></div></div>`;
}
function wcRender(){
  const stage=document.getElementById('wcStage');
  const roundNames={8:'8강',4:'4강',2:'결승'};
  const total=WC.pool.length;
  if(total===1){
    const w=WC.pool[0];
    document.getElementById('wcProg').style.width='100%';
    stage.innerHTML=`<div class="wc-round">🎉 가장 기대되는 작품</div>
      <div style="max-width:200px;margin:0 auto" class="wc-pick">
        <div class="img" style="background:${grad(w.genres[0])};aspect-ratio:3/4">${w.t}</div></div>
      <h2 style="margin:16px 0 6px;font-size:22px">${w.t}</h2>
      <p style="color:var(--ink-2);font-size:14px">이번 회차 당신의 기대작이에요!</p>
      <button class="btn btn-primary" style="margin-top:18px" onclick="openDetail(${w.id});closeModal()">작품 보러가기</button>
      <button class="btn btn-ghost" style="margin-top:8px" onclick="hallWorldcup()">다시 하기</button>`;
    return;
  }
  const a=WC.pool[WC.i], b=WC.pool[WC.i+1];
  document.getElementById('wcProg').style.width=(WC.i/total*100)+'%';
  stage.innerHTML=`<div class="wc-round">${roundNames[total]||total+'강'} · ${WC.i/2+1} / ${total/2}</div>
    <div class="wc-pair">
      <div class="wc-pick" onclick="wcPick(0)"><div class="img" style="background:${grad(a.genres[0])}">${a.t}</div><div class="nm">${a.t}</div></div>
      <div class="wc-vs">VS</div>
      <div class="wc-pick" onclick="wcPick(1)"><div class="img" style="background:${grad(b.genres[0])}">${b.t}</div><div class="nm">${b.t}</div></div>
    </div>`;
}
function wcPick(side){
  WC.winners.push(WC.pool[WC.i+side]); WC.i+=2;
  if(WC.i>=WC.pool.length){WC.pool=WC.winners;WC.winners=[];WC.i=0}
  wcRender();
}

/* 출석체크 */
function hallAttend(){openModal(attShell());attRender()}
function attShell(){return `
  <div class="modal-head"><h2>📅 출석체크 이벤트</h2><button class="x" onclick="closeModal()">✕</button></div>
  <div class="modal-body">
    <p style="font-size:13px;color:var(--ink-2);font-weight:600">연속 출석 <b id="streakN" style="color:var(--accent)">${STATE.streak}</b>일째 · 7일 채우면 한정 배지 획득</p>
    <div class="att-week" id="attWeek"></div>
    <button class="btn btn-primary" style="width:100%" id="attBtn" onclick="checkIn()">오늘 출석체크</button>
  </div>`;
}
function attRender(){
  const days=['월','화','수','목','금','토','일'];
  document.getElementById('attWeek').innerHTML=days.map((d,i)=>`
    <div class="att-day ${STATE.attendance.has(i)?'done':''} ${i===STATE.streak&&!STATE.attendance.has(i)?'today':''}">
      <span class="d">${d}</span><span class="n">${STATE.attendance.has(i)?'✓':'+10'}</span></div>`).join('');
}
function checkIn(){
  if(STATE.attendance.has(STATE.streak)){toast('오늘은 이미 출석했어요');return}
  STATE.attendance.add(STATE.streak);STATE.streak++;
  document.getElementById('streakN').textContent=STATE.streak;
  attRender();
  if(STATE.streak>=7){toast('🏅 7일 개근! 한정 배지 획득');document.getElementById('attBtn').textContent='이번 주 개근 완료 🎉';document.getElementById('attBtn').disabled=true}
  else toast(`✅ ${STATE.streak}일 연속 출석 · +10P`);
}

/* 신작 등수 맞추기 */
let PRED=[];
function hallPredict(){
  PRED=[2,8,7,11].map(id=>byId(id));
  openModal(predShell());predRender();
}
function predShell(){return `
  <div class="modal-head"><h2>🔮 신작 등수 맞추기</h2><button class="x" onclick="closeModal()">✕</button></div>
  <div class="modal-body">
    <p style="font-size:13px;color:var(--ink-2);font-weight:600;margin-bottom:14px">이번 분기 신작이 실제로 몇 등 할지 순위를 예측해보세요</p>
    <div id="predList"></div>
    <button class="btn btn-primary" style="width:100%;margin-top:8px" onclick="predSubmit()">내 예측 제출하기</button>
  </div>`;
}
function predRender(){
  document.getElementById('predList').innerHTML=PRED.map((w,i)=>`
    <div class="rk-item">
      <span class="pos">${i+1}</span>
      <div class="pp" style="background:${grad(w.genres[0])}"></div>
      <span class="nm">${w.t}</span>
      <div class="ar">
        <button onclick="predMove(${i},-1)">▲</button>
        <button onclick="predMove(${i},1)">▼</button>
      </div>
    </div>`).join('');
}
function predMove(i,dir){
  const j=i+dir;if(j<0||j>=PRED.length)return;
  [PRED[i],PRED[j]]=[PRED[j],PRED[i]];predRender();
}
function predSubmit(){toast('🔮 예측 제출 완료! 분기 마감 후 결과를 알려드려요');closeModal()}

/* ============================================================
   v2: 마이페이지 — 도감 필터 / Wrapped / 인생작 탑3
============================================================ */
function collectionHTML(){
  const f=STATE.mpFilter||'all';
  let cards=[];
  if(f==='saved'){
    const ws=WORKS.filter(w=>STATE.saved.has(w.id));
    if(!ws.length) return emptyCol('보고싶어요에 담은 작품이 없어요','작품관에서 ‘+ 보고싶어요’를 눌러보세요','works');
    cards=ws.map(posterCard);
  } else if(f==='all'){
    const ws=WORKS.filter(w=>STATE.saved.has(w.id)||STATE.status[w.id]);
    cards=ws.map(posterCard).concat(STATE.customWorks.map(customPoster));
    if(!cards.length) return emptyCol('아직 도감이 비어 있어요','보고싶어요를 담거나 소장 작품을 등록해보세요','works');
  } else {
    const cat=WORKS.filter(w=>STATE.status[w.id]===f).map(posterCard);
    const cus=STATE.customWorks.filter(c=>c.status===f).map(customPoster);
    cards=cat.concat(cus);
    if(!cards.length) return emptyCol('이 상태의 작품이 없어요','나의 아카이브에서 작품을 추가해보세요','none');
  }
  return `<div class="grid works">${cards.join('')}</div>`;
}
function emptyCol(t,s,dest){return `<div class="empty"><div class="e">📖</div><p>${t}<br>${s}</p>${dest!=='none'?`<button class="btn btn-primary" style="margin-top:14px" onclick="go('${dest}')">작품 보러가기</button>`:''}</div>`}
function customPoster(c){
  const cover=c.cover?`background-image:url('${c.cover}');background-size:cover;background-position:center`:`background:${grad(c.genre||'')}`;
  const m=STATUS_META[c.status];
  return `<div class="poster-card" onclick="toast('직접 등록한 작품 · 나의 아카이브에서 관리해요')">
    <div class="poster" style="${cover}">
      <span class="badge">직접 등록</span>
      <span class="ptitle">${c.cover?'':c.title}</span>
      ${m?`<span class="statustag" style="background:${m.c}">${m.e} ${m.l}</span>`:''}
    </div>
    <div class="meta"><div class="t">${c.title}</div><div class="r">${c.type||''}${c.genre?' · '+c.genre:''}</div></div>
  </div>`;
}
function setMpFilter(k){STATE.mpFilter=k;renderMypage();}

/* v3: 뱃지 카드(진행도 포함) */
/* v3.1: 신규 유저 배경에 맞춘 동적 칭호/연대기/최애장르 */
function topGenres(n){
  const gc={};seenIds().forEach(id=>{const w=byId(id);if(w)w.genres.forEach(g=>gc[g]=(gc[g]||0)+1)});
  return Object.entries(gc).sort((a,b)=>b[1]-a[1]).slice(0,n||3).map(e=>e[0]);
}
function titlesHTML(){
  let chips='';
  if(STATE.taste) chips+=`<span class="chip" style="color:var(--blue);background:#eef4ff">✨ ${STATE.taste.nickname}</span>`;
  const earned=BADGES.filter(b=>badgeState(b).got);
  if(earned.length) chips+=earned.slice(0,4).map(b=>`<span class="chip" style="color:${b.c};background:${b.c}1a">${b.ic} ${b.n}</span>`).join('');
  else chips+=`<span class="chip" style="color:var(--ink-3);background:var(--bg-soft)">🌱 새내기 항해사</span>`;
  return chips;
}
function chronicleHTML(){
  const items=[];
  const earned=BADGES.filter(b=>badgeState(b).got);
  earned.forEach(b=>items.push([b.tier==='gold'?'황금 배지':'배지',`${b.ic} ‘${b.n}’ 배지를 획득했어요`]));
  const done=statusCountAll('done'); if(done) items.push(['완주',`🏁 작품 ${done}편을 완주했어요`]);
  const rated=Object.keys(STATE.ratings).length; if(rated) items.push(['평가',`⭐ 작품 ${rated}개를 평가했어요`]);
  const saved=STATE.saved.size; if(saved) items.push(['수집',`💗 보고싶어요 ${saved}편을 담았어요`]);
  if(STATE.myReviews) items.push(['활동',`✍️ 영업글 ${STATE.myReviews}개를 작성했어요`]);
  if(STATE.taste) items.push(['취향',`🔮 취향 분석을 완료했어요`]);
  const join=`<div class="chr-item"><div class="dt">합류</div><div class="tx">올블루에 합류해 항해를 시작했어요 ⚓</div></div>`;
  if(!items.length){
    return `<div class="chronicle"><div class="chr-item"><div class="dt">지금</div><div class="tx" style="color:var(--ink-3)">아직 기록이 없어요. 작품을 감상하고 평가하면 여기에 연대기가 쌓여요 🌊</div></div>${join}</div>`;
  }
  return `<div class="chronicle">${items.map(it=>`<div class="chr-item"><div class="dt">${it[0]}</div><div class="tx">${it[1]}</div></div>`).join('')}${join}</div>`;
}

function badgeCard(b){
  const st=badgeState(b);const gold=b.tier==='gold';
  return `<div class="badge-item ${gold?'gold':''} ${st.got?'got':''}">
    ${gold?'<span class="goldtag">GOLD</span>':''}${st.got?'<span class="gotmark">✅</span>':''}
    <div class="ic" style="background:${st.got?b.c:'var(--line-2)'}">${b.ic}</div>
    <div class="bn">${b.n}</div>
    <div class="bd">${b.d}</div>
    ${st.got?'':`<div class="prog"><i style="width:${st.pct}%"></i></div><div class="pv">${st.cur.toLocaleString()} / ${st.need.toLocaleString()}</div>`}
  </div>`;
}

/* v3: 월간 리포트 — 실제 감상 로그(STATE.viewLog) 기반, 클릭 시 작품 이동 */
function reportStats(){
  let total=0,eps=0;
  Object.values(STATE.viewLog).forEach(arr=>arr.forEach(e=>{total++;eps+=e.ep}));
  const months=new Set(Object.keys(STATE.viewLog).map(k=>k.split('-')[0])).size||1;
  const rv=Object.values(STATE.ratings);
  const avg=rv.length?rv.reduce((a,b)=>a+b,0)/rv.length:0;
  return {total,eps,monthAvg:(total/months).toFixed(1),avg:avg?avg.toFixed(1):'-'};
}
function monthCount(mi){let n=0;Object.keys(STATE.viewLog).forEach(k=>{if(+k.split('-')[0]===mi)n+=STATE.viewLog[k].length});return n}
function monthlyReportHTML(){
  const st=reportStats();
  const m=STATE.reportMonth;
  const MN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const counts=[];for(let i=0;i<12;i++)counts.push(monthCount(i));
  const maxM=Math.max(1,...counts);
  const first=new Date(2026,m,1).getDay();
  const dim=new Date(2026,m+1,0).getDate();
  const dows=['일','월','화','수','목','금','토'];
  let cells='';
  for(let i=0;i<first;i++)cells+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=dim;d++){
    const arr=STATE.viewLog[m+'-'+d];
    if(arr&&arr.length){
      const w=byId(arr[0].wid);
      const click=arr.length>1?`openDayLog(${m},${d})`:`openDetail(${arr[0].wid})`;
      cells+=`<div class="cal-cell has" style="background:${grad(w.genres[0])}" onclick="${click}" title="${w.t}${arr.length>1?` 외 ${arr.length-1}편`:''}"><span class="dn">${d}</span>${arr.length>1?`<span class="cnt">${arr.length}</span>`:''}</div>`;
    } else cells+=`<div class="cal-cell">${d}</div>`;
  }
  const pct=Math.min(100,Math.round(st.total/200*100));
  return `<div class="mr-wrap">
    <div class="mr-profile">
      <div class="av">${STATE.profile.name[0]}</div>
      <div class="nm">${STATE.profile.name}</div>
      <div class="id">@ollblue_user</div>
      <div class="mr-ring" style="--p:${pct}"><div class="in"><div class="y">2026년</div><div class="n">${st.total}</div><div class="u">편</div></div></div>
    </div>
    <div class="mr-main">
      <div class="mr-stats">
        <div class="mr-stat"><div class="l">올해 본 작품</div><div class="v">${st.total}편</div></div>
        <div class="mr-stat"><div class="l">월평균</div><div class="v">${st.monthAvg}편</div></div>
        <div class="mr-stat"><div class="l">별점 평균</div><div class="v">${st.avg}점</div></div>
        <div class="mr-stat"><div class="l">본 화수</div><div class="v">${st.eps.toLocaleString()}화</div></div>
      </div>
      <div class="mr-cal">
        <div class="top"><button class="mr-nav" onclick="reportNav(-1)">‹</button> ${MN[m]} <button class="mr-nav" onclick="reportNav(1)">›</button></div>
        <div class="cal-grid">${dows.map((d,i)=>`<div class="cal-h ${i===0?'sun':''}">${d}</div>`).join('')}${cells}</div>
        <div style="text-align:center;font-size:11.5px;color:var(--ink-3);font-weight:600;margin-top:11px">📅 표지를 누르면 그 작품 상세로 이동 · 막대를 누르면 그 달로 이동</div>
      </div>
      <div class="mr-bars">
        ${counts.map((v,i)=>`<div class="mr-bar ${i===m?'cur':''}" onclick="reportSetMonth(${i})"><div class="v">${v?v+'편':''}</div><div class="b" style="height:${v?Math.max(6,Math.round(v/maxM*100)):2}%"></div><div class="m">${i+1}월</div></div>`).join('')}
      </div>
    </div>
  </div>`;
}
function refreshReport(){const b=document.getElementById('mrBox');if(b)b.innerHTML=monthlyReportHTML()}
function reportNav(d){let m=STATE.reportMonth+d;m=Math.max(0,Math.min(11,m));STATE.reportMonth=m;refreshReport()}
function reportSetMonth(m){STATE.reportMonth=m;refreshReport()}
function openDayLog(m,d){
  const arr=STATE.viewLog[m+'-'+d]||[];
  openModal(`<div class="modal-head"><h2>${m+1}월 ${d}일 감상 기록</h2><button class="x" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <p style="font-size:13px;color:var(--ink-2);font-weight:600;margin-bottom:12px">이 날 ${arr.length}편을 감상했어요. 작품을 누르면 상세로 이동해요.</p>
      ${arr.map(e=>{const w=byId(e.wid);return `<div class="reco-mini" onclick="closeModal();openDetail(${w.id})"><div class="pp" style="background:${grad(w.genres[0])}"></div><div><div class="t">${w.t}</div><div class="s">${w.type} · ${e.ep}화 감상 · ★${w.rating}</div></div></div>`}).join('')}
    </div>`);
}

/* ===== 소장 작품(catalog 상태 + 직접 등록) ===== */
function ownedAll(){
  const cat=WORKS.filter(w=>STATE.status[w.id]).map(w=>({key:'w'+w.id,wid:w.id,title:w.t,type:w.type,genre:w.genres[0],status:STATE.status[w.id],cover:null,custom:false}));
  const cus=STATE.customWorks.map(c=>({key:c.key,wid:null,title:c.title,type:c.type,genre:c.genre,status:c.status,cover:c.cover,custom:true}));
  return cat.concat(cus);
}
function ownedCount(){return ownedAll().length}

}
function setOwnedStatus(key,k){
  if(/^w\d+$/.test(key)){STATE.status[+key.slice(1)]=k;logView(+key.slice(1))}
  else{const c=STATE.customWorks.find(x=>x.key===key);if(c)c.status=k}
  renderMypage();toast(`‘${STATUS_META[k].l}’(으)로 변경했어요`);
}
function removeOwned(key){
  if(/^w\d+$/.test(key)){delete STATE.status[+key.slice(1)]}
  else{STATE.customWorks=STATE.customWorks.filter(x=>x.key!==key)}

function tasteToggle(key,val){const a=ONB.ans[key];const i=a.indexOf(val);if(i>=0)a.splice(i,1);else a.push(val);renderTaste()}
function tasteSet(key,val){
  ONB.ans[key]=(ONB.ans[key]===val?null:val);

/* 추천 엔진: 설문 답변 → 선호 장르·태그로 점수화 */
function recommend(ans){
  const moodMap={
    cry:{g:['로맨스','드라마'],t:['감동','감정선']}, fun:{g:['액션','코미디'],t:['사이다','웃김']},
    empty:{g:['일상','코미디'],t:['힐링','입문추천']}, epic:{g:['다크판타지','판타지'],t:['명작','성장물']},
    flutter:{g:['로맨스'],t:['로판','감정선']}, thrill:{g:['스릴러','다크판타지'],t:['반전미친','떡밥']},
    heal:{g:['일상','로맨스'],t:['힐링','잔잔']}, stim:{g:['액션','무협'],t:['광기','중독성']},
  };
  const toneMap={'사이다·먼치킨':['사이다','먼치킨'],'잔잔한 감정선':['감정선','잔잔','로판'],'떡밥·반전':['떡밥','반전미친','메타'],'작화·연출 甲':['작화미친','연출'],'입문하기 쉬운':['입문추천']};
  PREF={g:new Set(),t:new Set()};
  (ans.genre||[]).forEach(lbl=>{const m=GENRE_MAP[lbl];if(m){(m.g||[]).forEach(g=>PREF.g.add(g));(m.t||[]).forEach(t=>PREF.t.add(t))}else PREF.g.add(lbl)});
  ans.mood.forEach(m=>{const mm=moodMap[m];if(mm){mm.g.forEach(g=>PREF.g.add(g));mm.t.forEach(t=>PREF.t.add(t))}});
  if(ans.tone&&toneMap[ans.tone])toneMap[ans.tone].forEach(t=>PREF.t.add(t));
  const pain=ans.pain||[];
  const scored=WORKS.map(w=>{
    let sc=w.rating*0.3;
    w.genres.forEach(g=>{if(PREF.g.has(g))sc+=3});
    w.tags.forEach(t=>{if(PREF.t.has(t))sc+=2});
    if(ans.ctype&&ans.ctype!=='all'){sc+=w.type.includes(ans.ctype)?2:-4}
    if(ans.pace==='완결작 한 번에'&&w.status==='완결')sc+=2;
    if(ans.pace==='몰아서 정주행'&&w.hours>=20)sc+=1.5;
    if(ans.pace==='가볍게 한두 편'&&w.hours<=12)sc+=1.5;
    if(ans.why==='인생작을 만나고 싶어서')sc+=(w.rating-4)*2;
    // 어려웠던 점(페인포인트)을 발견 기준으로 반영
    if(pain.includes('start')){if(w.tags.includes('입문추천'))sc+=2.5;sc+=(w.comp-85)*0.05}
    if(pain.includes('fail')){sc+=(w.comp-85)*0.08;if(w.rating>=4.7)sc+=1}        // 실패 회피 → 검증된 고완주작
    if(pain.includes('platform')){if((w.plat||[]).length>=2)sc+=1.5}              // 여러 플랫폼에서 볼 수 있는 작품
    if(pain.includes('long')){if(w.hours<=10)sc+=2.5;else if(w.hours>=24)sc-=3;else if(w.hours>=18)sc-=1}
    if(pain.includes('niche')){if(w.tags.includes('숨은명작'))sc+=3;if(w.count<5000)sc+=2;else if(w.count>15000)sc-=1.5}
    if(pain.includes('ongoing')){sc+=(w.status==='완결'?2:-2.5)}                  // 완결작 선호
    if(pain.includes('samey')){if(w.count<7000)sc+=1}                             // 뻔하지 않은 작품
    return {w,sc};
  });
  scored.sort((a,b)=>b.sc-a.sc);
  return scored.slice(0,3).map(x=>x.w.id);
}
function whyText(w,ans){
  ans=ans||{};const pain=ans.pain||[];
  if(pain.includes('niche')&&(w.tags.includes('숨은명작')||w.count<5000)) return '아직 덜 알려진 숨은 명작';
  if(pain.includes('long')&&w.hours<=10) return `예상 완주 ${w.hours}시간 · 부담 없어요`;
  if(pain.includes('fail')&&w.comp>=90) return `완주율 ${w.comp}% · 실패 걱정 적어요`;
  const gm=w.genres.find(g=>PREF.g.has(g));
  if(gm) return `#${gm} 취향에 딱 맞아요`;
  const tm=w.tags.find(t=>PREF.t.has(t));
  if(tm) return `#${tm} 요소가 강한 작품`;
  if(pain.includes('start')&&w.tags.includes('입문추천')) return '입문하기 좋은 작품';
  return `★${w.rating} · 많은 유저가 만족한 작품`;
}

  if(ONB&&ONB.ans) STATE.taste={nickname:ONB.ans.nickname,genres:[...ONB.ans.genre]};

/* 데모 계정(soya)용 마이페이지 데이터 — 이 데이터는 soya 계정에만 들어감 */
function demoData(){
  const counts=[32,27,27,26,26,21],ids=WORKS.map(w=>w.id),vl={};
  let s=20260601;const rnd=()=>{s=(s*1103515245+12345)&0x7fffffff;return s/0x7fffffff};
  counts.forEach((cnt,mi)=>{const dim=new Date(2026,mi+1,0).getDate();
    for(let i=0;i<cnt;i++){const day=1+Math.floor(rnd()*dim);const wid=ids[Math.floor(rnd()*ids.length)];const ep=3+Math.floor(rnd()*10);
      (vl[mi+'-'+day]=vl[mi+'-'+day]||[]).push({wid,ep})}});
  return {
    saved:[1,3,5,10],
    ratings:{1:5,2:4,3:5,5:5,7:4,10:5,12:4},
    status:{1:'done',3:'done',5:'done',10:'done',2:'watch',8:'hold'},
    progress:{1:2},notify:[],followCreators:['ufotable'],top3:[1,3,5],customWorks:[],
    seriesProgress:['0-0','0-1'],myReviews:2,viewLog:vl,
    profile:{name:'소연',bio:'웹툰·애니 발견을 즐기는 항해사'},
    attendance:[0,1,2],streak:3,taste:null,following:['민지','성욱']
  };
}

}
function doSignup(){
  const id=val('suId').trim().toLowerCase(),pw=val('suPw'),name=val('suName').trim()||(id.split('@')[0]||'항해사');
  if(!id||!pw){toast('아이디와 비밀번호를 입력해주세요');return}
  const db=dbLoad();
  if(db.accounts[id]){toast('이미 가입된 아이디예요. 로그인해주세요');authTab('login');return}
  db.accounts[id]={pw,data:freshData(name)};db.session=id;dbSave(db);
  AUTH.user=id;applyState(db.accounts[id].data);
  closeAuth();bootApp();toast(`🎉 환영해요 ${name}님! 새 항해를 시작해요`);
}
function doLogin(){
  const id=val('liId').trim().toLowerCase(),pw=val('liPw');
  const db=dbLoad();const acc=db.accounts[id];
  if(!acc||acc.pw!==pw){toast('아이디 또는 비밀번호가 맞지 않아요');return}
  db.session=id;dbSave(db);
  AUTH.user=id;applyState(acc.data);
  closeAuth();bootApp();toast(`${acc.data.profile.name||id}님, 다시 오셨네요 ⚓`);
}
function logout(){
  saveAccount();const db=dbLoad();db.session=null;dbSave(db);AUTH.user=null;closeAcct();
  openAuth();toast('로그아웃 되었어요');
}
function guestMode(){AUTH.user=null;applyState(demoData());closeAuth();bootApp();toast('게스트 미리보기 · 활동은 저장되지 않아요')}

/* 토픽바 계정 메뉴 */
function toggleAcct(){const m=document.getElementById('acctMenu');if(m)m.classList.toggle('open')}
function closeAcct(){const m=document.getElementById('acctMenu');if(m)m.classList.remove('open')}
function refreshAcct(){
  const av=document.getElementById('topAv');if(av)av.textContent=(STATE.profile.name[0]||'?');
  const nm=document.getElementById('amName'),ac=document.getElementById('amActions');
  if(!nm||!ac)return;
  if(AUTH.user){nm.innerHTML=`${STATE.profile.name}<small>${AUTH.user}</small>`;
    ac.innerHTML=`<button onclick="go('mypage');closeAcct()">마이페이지</button><button class="danger" onclick="logout()">로그아웃</button>`}
  else{nm.innerHTML=`게스트 모드<small>로그인하면 활동이 저장돼요</small>`;
    ac.innerHTML=`<button onclick="closeAcct();openAuth()">로그인 / 회원가입</button>`}
}
function bootApp(){CURRENT='home';renderTabs();refreshAvatar();refreshAcct();renderHome()}

/* ============================================================
   부팅
============================================================ */
(function boot(){
  const db=dbLoad();
  if(!db.accounts['soya']){db.accounts['soya']={pw:'@123456789',data:demoData()};dbSave(db)} // 데모 계정 시드
  if(db.session&&db.accounts[db.session]){AUTH.user=db.session;applyState(db.accounts[db.session].data)}
  else{AUTH.user=null;applyState(freshData('게스트'))}
  closeAuth();bootApp();
  updateBackBtn();
  window.addEventListener('popstate',()=>{if(HISTORY.length)goBack()});
  setInterval(()=>{if(AUTH.user)saveAccount()},2000);
  window.addEventListener('beforeunload',()=>{if(AUTH.user)saveAccount()});
  document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeAcct()}});
  document.addEventListener('click',e=>{const w=document.getElementById('acctWrap');if(w&&!w.contains(e.target))closeAcct()});
})();
</script>
